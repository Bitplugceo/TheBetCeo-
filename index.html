<title>Basketball Prediction Engine</title>
<style>
:root{
  --sb-red:#d92d2a;
  --sb-red-dark:#b92220;
  --sb-green:#4aa346;
  --sb-green-dark:#3e913b;
  --sb-bg:#ececec;
  --sb-card:#ffffff;
  --sb-border:#d9d9d9;
  --sb-text:#20242c;
  --sb-muted:#7b8088;
  --sb-dark:#313744;
  --sb-dark-2:#424856;
  --sb-pill:#e9eaef;
  --sb-under:#7a1d1d;
  --sb-over:#3e913b;
  --sb-noplay:#737884;
}

html{-webkit-text-size-adjust:100%;}

body{
background:var(–sb-bg);
color:var(–sb-text);
font-family:Segoe UI,sans-serif;
margin:0;
-webkit-text-size-adjust:100%;
}

.wrapper{max-width:760px;margin:10px auto;padding:0 10px;}

h1{
text-align:center;
font-size:20px;
margin:0 0 10px 0;
padding:16px 12px;
background:var(–sb-red);
color:#fff;
font-weight:700;
box-shadow:0 2px 8px rgba(0,0,0,0.12);
}

.section{
border:1px solid var(–sb-border);
background:var(–sb-card);
padding:10px;
margin:8px auto;
border-radius:8px;
box-shadow:0 1px 4px rgba(0,0,0,0.06);
}

label{display:block;font-size:12px;margin-bottom:4px;color:var(–sb-text);font-weight:600;}

input{
width:100%;
max-width:260px;
padding:8px 10px;
font-size:12px;
background:#fff;
color:var(–sb-text);
border:1px solid #cfd3da;
margin-bottom:6px;
border-radius:4px;
}

input:focus,select:focus{
outline:none;
border-color:var(–sb-green);
box-shadow:0 0 0 2px rgba(74,163,70,0.12);
}

::placeholder{color:#9aa0a8;}

button{
padding:8px 16px;
margin:6px;
font-weight:700;
background:var(–sb-dark);
color:#fff;
border:none;
border-radius:4px;
cursor:pointer;
}

button:hover{opacity:0.95;}
button:disabled{opacity:0.5;cursor:not-allowed;}

.fetch-btn{
background:var(–sb-green);
color:#fff;
padding:8px 14px;
font-size:12px;
font-weight:700;
border:none;
cursor:pointer;
margin-top:4px;
border-radius:4px;
}

.fetch-btn:disabled{opacity:0.5;cursor:not-allowed;}

table{width:100%;border-collapse:collapse;margin-top:10px;font-size:12px;background:#fff;}
th,td{border:1px solid #dfe2e7;padding:8px 6px;text-align:center;}
th{background:var(–sb-dark);color:#fff;font-weight:700;}
td{background:#fff;color:var(–sb-text);}

.pred-over{background:var(–sb-over);color:#fff;font-weight:bold;}
.pred-under{background:var(–sb-under);color:#fff;font-weight:bold;}
.pred-noplay{background:var(–sb-noplay);color:#fff;font-weight:bold;}

.lock{font-size:10px;display:inline-block;vertical-align:middle;transform:translateY(-1px);margin-left:4px;}

small.error-note{color:#d92d2a;font-size:10px;display:block;margin-top:3px;}

.injury-box{
background:#f5f6f8;
border:1px solid #d7dbe2;
padding:8px;
margin-top:6px;
font-size:11px;
line-height:1.8;
display:none;
border-radius:4px;
}

.injury-box .inj-title{color:var(–sb-dark);font-weight:bold;margin-bottom:2px;}
.inj-out{color:#d92d2a;}
.inj-dtd{color:#d98a00;}
.inj-rest{color:#2f8f4a;}

.table-wrap{overflow-x:auto;}

#fetchStatus{font-size:11px;margin-top:6px;min-height:16px;color:var(–sb-muted);}
#fetchStatus.ok{color:#2f8f4a;}
#fetchStatus.err{color:#d92d2a;}
#fetchStatus.loading{color:#d98a00;}

.autofill-indicator{font-size:10px;color:#2f8f4a;display:none;}

.spinner{
display:inline-block;width:10px;height:10px;
border:2px solid var(–sb-green);border-top-color:transparent;
border-radius:50%;animation:spin 0.6s linear infinite;
vertical-align:middle;margin-right:4px;
}

@keyframes spin{to{transform:rotate(360deg);}}

.autocomplete-wrap{position:relative;width:100%;max-width:260px;margin-bottom:4px;}
.autocomplete-wrap input{width:100%;margin-bottom:0;box-sizing:border-box;}

.autocomplete-list{
position:absolute;top:100%;left:0;right:0;
background:#fff;border:1px solid #cfd3da;border-top:none;
z-index:999;max-height:180px;overflow-y:auto;display:none;
}

.autocomplete-list div{padding:8px 10px;font-size:12px;cursor:pointer;color:var(–sb-text);}
.autocomplete-list div:hover,.autocomplete-list div.active{background:var(–sb-green);color:#fff;}
.autocomplete-list div.group-label{color:var(–sb-muted);font-size:10px;padding:4px 8px;cursor:default;background:#f2f3f5;pointer-events:none;}

.fixture-toolbar{display:flex;gap:8px;margin:10px 0 8px;flex-wrap:wrap;}

.fixture-day{
background:var(–sb-pill);color:var(–sb-dark);
border:1px solid #d4d8de;padding:8px 12px;
border-radius:4px;font-size:12px;font-weight:700;
margin:0;min-width:120px;text-align:center;
}

.fixture-day.active{background:var(–sb-green);color:#fff;border-color:var(–sb-green);}

input,
.league-box,
.autocomplete-wrap{width:100%;max-width:260px;box-sizing:border-box;}

.league-box{
display:block;padding:8px 10px;font-size:12px;
background:#fff;color:var(–sb-text);
border:1px solid #cfd3da;margin-bottom:6px;border-radius:4px;
appearance:none;-webkit-appearance:none;-moz-appearance:none;
}

input[type=“checkbox”] {width:12px;height:12px;margin-right:6px;vertical-align:middle;}

.section-toggle{
width:100%;background:none !important;border:none;padding:0;margin:0 !important;
color:var(–sb-text) !important;display:flex;align-items:center;
justify-content:space-between;text-align:left;cursor:pointer;
}

.section-toggle .toggle-title{display:block;font-weight:700;}
.section-toggle .toggle-icon{font-size:18px;line-height:1;transition:transform 0.2s ease;color:var(–sb-dark) !important;}

.section-body{margin-top:10px;}
.section.collapsed .section-body{display:none;}
.section.collapsed .section-toggle .toggle-icon{transform:rotate(-90deg);}

.section.locked .section-body{display:none !important;}
.section.locked .section-toggle{opacity:0.35;cursor:not-allowed;pointer-events:none;}
.section.locked .section-toggle .toggle-icon{display:none;}

.fixture-empty{border:1px dashed #d4d8de;color:#9aa0a8;padding:10px;border-radius:4px;font-size:12px;}

/* ===== SHARP RECTANGLES + SIZE FIXES ===== */

/* Remove ALL rounded corners */
.section,
input,
.league-box,
button,
.fetch-btn,
.fixture-day,
.autocomplete-list,
.injury-box,
table,
th, td {
border-radius:0 !important;
}

/* Fixture buttons — smaller and sharp */
.fixture-day {
padding:6px 10px !important;
font-size:12px !important;
min-width:90px !important;
}

/* Fetch Stats button — smaller */
.fetch-btn {
padding:6px 12px !important;
font-size:12px !important;
}

/* Remove padding-top that causes home screen gap */
body {
padding-top:0 !important;
}

/* Keep header margin but no body padding */
.app-header {
margin-top:0 !important;
}

/* ===== BUTTON + TABLE + COLOR FIXES ===== */

/* Run and Clear buttons - fully visible */
div[style*=“text-align:center”] button,
div[style*=“text-align:center”] button:first-child,
div[style*=“text-align:center”] button:last-child {
opacity:1 !important;
}

div[style*=“text-align:center”] button:first-child {

}

/* Table cells - clear white background, dark text */
td {

}

}

}

.pred-noplay {

}

/* Error notes in table - red and visible */
small.error-note {

}

/* Locked/faded sections - make them more clearly locked not invisible */
.section.locked .section-toggle {

}

// ── Line range parser ────────────────────────────────────────
function parseLineRange(val, allowSingle = false) {
  if (!val || !String(val).trim()) return null;
  val = String(val).trim();
  if (val.includes('-')) {
    const parts = val.split('-').map(v => parseFloat(v.trim()));
    if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1]) && parts[1] > 0) {
      if (parts[1] < parts[0]) return null;
      return (parts[0] + parts[1]) / 2;
    }
    return null;
  }
  if (!allowSingle) return null;
  if (!/^\d{2,3}\.\d+$/.test(val)) return null;
  const single = parseFloat(val);
  return isNaN(single) ? null : single;
}

// ── Helpers ──────────────────────────────────────────────────
function safeText(str) {
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

function extractFirstHalf(lm, lo) {
  if (!lm || !lo || lm.length === 0) return [0, 0];
  if (lm.length === 2) return [readVal(lm[0]), readVal(lo[0])];
  if (lm.length >= 4) return [readVal(lm[0]) + readVal(lm[1]), readVal(lo[0]) + readVal(lo[1])];
  return [readVal(lm[0]), readVal(lo[0])];
}

function readVal(p) {
  if (p === null || p === undefined) return 0;
  if (typeof p === "object") {
    const v = parseFloat(p.value ?? p.displayValue ?? 0);
    return isFinite(v) ? v : 0;
  }
  const v = parseFloat(p);
  return isFinite(v) ? v : 0;
}

let _activeFixtureId = "";

function getLocalDateKey(daysAhead = 0) {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() + daysAhead);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}${m}${day}`;
}

function getLocalDateKeyFromISO(iso) {
  const d = new Date(iso);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}${m}${day}`;
}

function setFixtureDay(offset) {
  const todayBtn = document.getElementById("fixturesTodayBtn");
  const tomorrowBtn = document.getElementById("fixturesTomorrowBtn");
  if (!todayBtn || !tomorrowBtn) return;

  tomorrowBtn.classList.toggle("active", offset === 1);
}

function formatFixtureTime(dateStr) {
  if (!dateStr) return "--:--";
  try { return new Date(dateStr).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" }); }
  catch { return "--:--"; }
}

function formatFixtureHeaderDate(dateStr) {
  if (!dateStr) return "";
  try {
    return new Date(dateStr).toLocaleDateString([], { weekday: "long", month: "2-digit", day: "2-digit" });
  } catch { return ""; }
}



function escJs(str) {
  return String(str).replace(/\\/g, "\\\\").replace(/'/g, "\\'");

async function loadFixtures(offset = 0) {
  const league = document.getElementById("leagueSelect").value;
  const toolbar = document.getElementById("fixtureToolbar");
  const sel = document.getElementById("fixtureSelect");
  if (!toolbar || !sel) return;

  const supported = league === "nba" || league === "ncaa";
  if (!supported) {
    toolbar.style.display = "none";
    sel.style.display = "none";
    sel.innerHTML = '<option value="">— Select match —</option>';
    return;
  }

  toolbar.style.display = "flex";
  sel.style.display = "block";
  setFixtureDay(offset);
  sel.innerHTML = '<option value="">Loading matches...</option>';

  const leagueSlug = league === "ncaa" ? "mens-college-basketball" : "nba";
  const base = "https://site.api.espn.com/apis/site/v2/sports/basketball/" + leagueSlug;
  const targetLocalKey = getLocalDateKey(offset);
  const queryDates = [
    getLocalDateKey(-1),
    getLocalDateKey(0),
    getLocalDateKey(1),
    getLocalDateKey(2)
  ];

  try {
    const payloads = await Promise.all(
      queryDates.map(function(dateStr) {
        const cacheKey = "fixtures:" + league + ":" + dateStr;
        if (_fixtureCache.has(cacheKey)) return _fixtureCache.get(cacheKey);
        const p = proxyFetch(base + "/scoreboard?dates=" + dateStr + "&limit=200").catch(function(err) {
          _fixtureCache.delete(cacheKey); throw err;
        });
        cacheSet(_fixtureCache, cacheKey, p);
        return p;
      })
    );

    const seen = new Set();
    const merged = [];
    payloads.forEach(function(data) {
      (data && data.events ? data.events : []).forEach(function(ev) {
        if (!ev || !ev.id || seen.has(ev.id)) return;
        seen.add(ev.id); merged.push(ev);
      });
    });

    const now = Date.now();
    const events = merged
      .filter(function(ev) {
        const comp = ev && ev.competitions && ev.competitions[0];
        if (!comp || (comp.competitors || []).length < 2) return false;

        const eventTime = new Date(ev.date);
        if (isNaN(eventTime.getTime())) return false;

        if (getLocalDateKeyFromISO(ev.date) !== targetLocalKey) return false;

        const state = (comp.status && comp.status.type && comp.status.type.state) || "";
        const completed = (comp.status && comp.status.type && comp.status.type.completed) || state === "post";
        if (completed) return false;

        if (offset === 0 && eventTime.getTime() <= now) return false;

        return true;
      })
      .sort(function(a, b) {
        return new Date(a.date) - new Date(b.date);
      });

    if (!events.length) {
      sel.innerHTML = '<option value="">No upcoming matches</option>';
      return;
    }

    sel.innerHTML = '<option value="">— Select match —</option>';
    events.forEach(function(ev) {
      const comp = ev.competitions[0];
      const competitors = comp.competitors || [];
      const home = competitors.find(function(c) { return c.homeAway === "home"; }) || competitors[0];
      const away = competitors.find(function(c) { return c.homeAway === "away"; }) || competitors[1];
      const homeName = (home && home.team && home.team.displayName) || "Home";
      const awayName = (away && away.team && away.team.displayName) || "Away";
      const homeId = (home && home.team && home.team.id) || "";
      const awayId = (away && away.team && away.team.id) || "";
      const tipoff = formatFixtureTime(ev.date);
      const eventId = String(ev.id || "");
      const opt = document.createElement("option");
      opt.value = eventId;
      opt.textContent = tipoff + " — " + homeName + " vs " + awayName;
      opt.dataset.home = homeName;
      opt.dataset.away = awayName;
      opt.dataset.homeId = homeId;
      opt.dataset.awayId = awayId;
      sel.appendChild(opt);
    });
  } catch(e) {
    sel.innerHTML = '<option value="">Unable to load matches</option>';
  }
}

function makeSectionsCollapsible() {
  document.querySelectorAll(".section").forEach(section => {
    if (section.dataset.collapsibleReady === "1") return;

    const heading = section.querySelector("h3");
    if (!heading) return;

    const titleHTML = heading.innerHTML;

    const body = document.createElement("div");
    body.className = "section-body";

    const children = [...section.childNodes];
    children.forEach(node => {
      if (node !== heading) {
        // Skip pure whitespace or stray backtick text nodes
        if (node.nodeType === 3 && !node.textContent.trim().replace(/`/g,'').trim()) return;
        body.appendChild(node);
      }
    });

    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "section-toggle";
    const titleSpan = document.createElement("span");
    titleSpan.className = "toggle-title";
    titleSpan.innerHTML = titleHTML;
    const iconSpan = document.createElement("span");
    iconSpan.className = "toggle-icon";
    iconSpan.innerHTML = "&#9662;";
    btn.appendChild(titleSpan);
    btn.appendChild(iconSpan);

    btn.addEventListener("click", () => {
      const wasCollapsed = section.classList.contains("collapsed");
      section.classList.toggle("collapsed");
      // If user just collapsed a section manually, open the next logical step
      if (!wasCollapsed) {
        updateSectionLocks();
        goToNextStep();
      }
    });

    section.innerHTML = "";
    section.appendChild(btn);
    section.appendChild(body);

    section.classList.add("collapsed");
    section.dataset.collapsibleReady = "1";
  });
}

let activeDropTeam = null;
let selectedTeamIds = { A: null, B: null };

function getTeamList() {
  const league = document.getElementById("leagueSelect").value;
  if (league === "nba") return { label: "NBA", teams: TEAM_LISTS.nba };
  if (league === "ncaa") return { label: "NCAA", teams: TEAM_LISTS.ncaa };
  return null;
}

function onTeamInput(side) {
  clearAutoFill(side);
  selectedTeamIds[side] = null;
  const inputId = side === "A" ? "teamAName" : "teamBName";
  const dropId  = side === "A" ? "dropA" : "dropB";
  const val = document.getElementById(inputId).value.trim().toLowerCase();
  const drop = document.getElementById(dropId);
  if (!val || val.length < 1) { closeDrop(dropId); return; }
  const list = getTeamList();
  if (!list) { closeDrop(dropId); return; }
  const matches = list.teams.filter(t => t.toLowerCase().includes(val));
  if (!matches.length) { closeDrop(dropId); return; }
  drop.innerHTML = `<div class="group-label">${list.label}</div>` +
    matches.map(t => {
      const tid = lookupTeamId(t, document.getElementById("leagueSelect").value) || "";
      return `<div onmousedown="selectTeam('${side}','${t.replace(/'/g,"\\'")}','${tid}')">${highlight(safeText(t), val)}</div>`;
    }).join("");
  drop.style.display = "block";
  activeDropTeam = side;
}

function highlight(name, query) {
  const i = name.toLowerCase().indexOf(query.toLowerCase());
  if (i === -1) return name;
  return name.slice(0, i) +
    `<strong style="color:#fff">${name.slice(i, i + query.length)}</strong>` +
    name.slice(i + query.length);
}

function selectTeam(side, name, id) {
  const inputId = side === "A" ? "teamAName" : "teamBName";
  const dropId  = side === "A" ? "dropA" : "dropB";
  document.getElementById(inputId).value = name;
  selectedTeamIds[side] = id || null;
  closeDrop(dropId);
  activeDropTeam = null;
}

function closeDrop(dropId) {
  const drop = document.getElementById(dropId);
  if (drop) { drop.style.display = "none"; drop.innerHTML = ""; }
  if (activeDropTeam === (dropId === "dropA" ? "A" : "B")) activeDropTeam = null;
}

document.addEventListener("click", e => {
  if (!e.target.closest(".autocomplete-wrap")) {
    closeDrop("dropA");
    closeDrop("dropB");
  }
});

document.addEventListener("keydown", e => {
  if (!activeDropTeam) return;
  const dropId = activeDropTeam === "A" ? "dropA" : "dropB";
  const drop = document.getElementById(dropId);
  const items = [...drop.querySelectorAll("div:not(.group-label)")];
  if (!items.length) return;
  const current = drop.querySelector(".active");
  let idx = items.indexOf(current);
  if (e.key === "ArrowDown") {
    e.preventDefault();
    if (current) current.classList.remove("active");
    items[Math.min(idx + 1, items.length - 1)].classList.add("active");
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    if (current) current.classList.remove("active");
    items[Math.max(idx - 1, 0)].classList.add("active");
  } else if (e.key === "Enter") {
    if (current) { e.preventDefault(); current.dispatchEvent(new MouseEvent("mousedown")); }
  } else if (e.key === "Escape") {
    closeDrop(dropId);
    activeDropTeam = null;
  }
});

// ── Proxy Fetch ───────────────────────────────────────────────
async function proxyFetch(url, timeoutMs=12000) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    const res = await fetch(WORKER_URL + "?url=" + encodeURIComponent(url), {
      signal: ctrl.signal,
      headers: {}
    });
    if (!res.ok) throw new Error("Worker HTTP " + res.status);
    const text = await res.text();
    try { return JSON.parse(text); } catch(e) { throw new Error("Bad JSON: " + text.slice(0,100)); }
  } finally { clearTimeout(timer); }
}

async function findMatchupDate(base, teamAId, teamBId) {
  for (const season of [String(new Date().getFullYear()), String(new Date().getFullYear()-1)]) {
    for (const stype of ["2","3"]) {
      try {
        const _sk = `${base}:sched:${teamAId}:${season}:${stype}`;
        const r = await (_schedCache.has(_sk) ? _schedCache.get(_sk) : (()=>{const p=proxyFetch(`${base}/teams/${teamAId}/schedule?season=${season}&seasontype=${stype}`).catch(()=>({}));cacheSet(_schedCache,_sk,p);return p;})());
        const events = (r?.events || r?.team?.schedule?.events || []).slice().sort((a,b)=>new Date(a.date||0)-new Date(b.date||0));
        for (const ev of events) {
          const comp = ev?.competitions?.[0]; if (!comp) continue;
          const done = comp?.status?.type?.completed || comp?.status?.type?.name==="STATUS_FINAL" || comp?.status?.type?.state==="post";
          if (done) continue;
          const hasB = (comp?.competitors||[]).some(c => matchesTeam(c, teamBId));
          if (hasB && ev.date) return ev.date;
        }
      } catch(e) {}
    }
  }
  return null;
}

async function findNextGameDate(base, teamId) {
  for (const season of [String(new Date().getFullYear()), String(new Date().getFullYear()-1)]) {
    for (const stype of ["2","3"]) {
      try {
        const _sk = `${base}:sched:${teamId}:${season}:${stype}`;
        const r = await (_schedCache.has(_sk) ? _schedCache.get(_sk) : (()=>{const p=proxyFetch(`${base}/teams/${teamId}/schedule?season=${season}&seasontype=${stype}`).catch(()=>({}));cacheSet(_schedCache,_sk,p);return p;})());
        const events = (r?.events || r?.team?.schedule?.events || []).slice().sort((a,b)=>new Date(a.date||0)-new Date(b.date||0));
        for (const ev of events) {
          const comp = ev?.competitions?.[0]; if (!comp) continue;
          const done = comp?.status?.type?.completed || comp?.status?.type?.name==="STATUS_FINAL" || comp?.status?.type?.state==="post";
          if (!done && ev.date) return ev.date;
        }
      } catch(e) {}
    }
  }
  return null;
}

async function fetchInjuryAndRest(base, teamId, teamAvgScored, lastGameDate, nextGameDate, league) {
  const result = {restMult:1, scoringMult:1, notes:[]};
  if (lastGameDate && nextGameDate) {
    const last = new Date(lastGameDate);
    const gameDate = new Date(nextGameDate);
    gameDate.setHours(0,0,0,0); last.setHours(0,0,0,0);
    const restDays = Math.max(0, Math.round((gameDate - last) / 86400000) - 1);
    if (restDays > 7) {
      result.restMult = 1;
      result.notes.push({ type: "rest", text: "Rest unavailable" });
    } else {
      result.restMult = restMultiplier(restDays, league);
      const label =
        restDays === 0 ? "Back-to-back ⚠️" :
        restDays === 1 ? "1 day rest" :
        restDays === 2 ? "2 days rest ✓" :
        `${restDays} days rest`;
      const adj = result.restMult !== 1
        ? ` (${((result.restMult - 1) * 100).toFixed(1)}% scoring adj)`
        : "";
      result.notes.push({ type: "rest", text: label + adj });
    }
  } else if (lastGameDate) {
    result.notes.push({type:"rest", text:"Rest unknown"});
  }
  try {
    const data = await proxyFetch(`${base}/teams/${teamId}/injuries`).catch(()=>null);
    const items = data?.injuries||data?.items||[];
    if (!items.length) return result;
    const avgPPG = teamAvgScored||75;
    let totalReduction = 0;
    for (const inj of items) {
      const status = (inj?.status||inj?.type?.description||"").toLowerCase();
      const isOut = status.includes("out")||status.includes("injured reserve")||status.includes("suspended");
      const isDTD = status.includes("questionable")||status.includes("doubtful")||status.includes("day-to-day");
      if (!isOut&&!isDTD) continue;
      const athlete = inj?.athlete||inj?.person||{};
      const playerName = athlete?.displayName||athlete?.fullName||"Unknown";
      let ppg = 0;
      for (const cat of (athlete?.statistics?.splits?.categories||[])) {
        for (const stat of (cat.stats||[])) {
          if (stat.name==="avgPoints"||stat.abbreviation==="PPG") ppg=parseFloat(stat.value)||0;
        }
      }
      if (ppg===0) {
        const pos=(athlete?.position?.abbreviation||athlete?.position?.name||"").toUpperCase();
        if (isOut) {
          if (pos==="PG"||pos==="SG"||pos==="G") ppg=10;
          else if (pos==="SF"||pos==="PF"||pos==="F") ppg=9;
          else if (pos==="C") ppg=8;
          else ppg=7;
        }
      }
      if (ppg===0) continue;
      const share=ppg/avgPPG;
      const impact=Math.min(isOut?share*0.65:share*0.30,0.22);
      totalReduction+=impact;
      const tag=isOut?"OUT":"DTD";
      const ppgStr=ppg>0?` (${ppg.toFixed(1)} ppg)`:"";
      const adjStr=impact>0.005?` → -${(impact*100).toFixed(1)}% offense`:"";
      result.notes.push({type:isOut?"out":"dtd",text:`${playerName}${ppgStr} — ${tag}${adjStr}`});
    }
    const maxInjCap = league === "nba" ? 0.25 : 0.20;
    result.scoringMult=1-Math.min(totalReduction, maxInjCap);
  } catch(e) {}
  return result;
}

function validateTeamId(id, league) {
  if (!id) return false;
  const n = parseInt(id);
  if (isNaN(n)) return false;
  if (league === "nba" && (n < 1 || n > 30)) return false;
  if (league === "ncaa" && n < 2) return false;
  return true;
}

function lookupTeamId(name, leagueHint) {
  const n = name.toLowerCase().trim();
  const isNba = leagueHint === "nba";
  const MAP = isNba ? NBA_TEAM_MAP : NCAA_TEAM_MAP;
  if (MAP[n] !== undefined) return MAP[n];
  let bestKey=null, bestLen=0;
  for (const key of Object.keys(MAP)) {
    if (n.includes(key) && key.length > bestLen) { bestKey=key; bestLen=key.length; }
  }
  if (bestKey) return MAP[bestKey];
  if (n.length >= 3) {
    bestKey=null; bestLen=0;
    for (const key of Object.keys(MAP)) {
      if (key.includes(n) && key.length > bestLen) { bestKey=key; bestLen=key.length; }
    }
    if (bestKey) return MAP[bestKey];
  }
  return null;
}

function normalizeId(raw) {
  if (raw===null||raw===undefined) return "";
  const s = String(raw);
  const tMatch = s.match(/t:(\d+)/);
  if (tMatch) return tMatch[1];
  const numMatch = s.match(/^(\d+)$/);
  if (numMatch) return numMatch[1];
  return s.replace(/\D/g,"")||s;
}

function matchesTeam(competitor, teamId) {
  const tid = String(teamId);
  if (!competitor) return false;
  if (normalizeId(competitor.team?.id)===tid) return true;
  if (normalizeId(competitor.team?.uid)===tid) return true;
  if (normalizeId(competitor.uid)===tid) return true;
  if (normalizeId(competitor.id)===tid) return true;
  return false;
}

  try {

    let teamAId = selectedTeamIds.A || lookupTeamId(teamAName,league);
    if (!validateTeamId(teamAId, league)) teamAId = await searchTeamFromAPI(espnBase, teamAName, league);
    if (!validateTeamId(teamAId, league)) teamAId = null;
    let teamBId = selectedTeamIds.B || lookupTeamId(teamBName,league);
    if (!validateTeamId(teamBId, league)) teamBId = await searchTeamFromAPI(espnBase, teamBName, league);
    if (!validateTeamId(teamBId, league)) teamBId = null;
    if (!teamAId) throw new Error(`Can't find "${teamAName}". Try just the nickname.`);
    if (!teamBId) throw new Error(`Can't find "${teamBName}". Try just the nickname.`);
    if (String(teamAId) === String(teamBId)) throw new Error("Team A and Team B cannot be the same team.");
    setStatus('<span class="spinner"></span>Loading game stats...',"loading");
    let aStats, bStats;

      q1: { source: "espn", venueReliable: Array.isArray(aStats.q1Scored) && aStats.q1Scored.length >= 2 }
    } : _defaultFetchMeta().A;
    g_fetchMeta.B = bStats ? {

      q1: { source: "espn", venueReliable: Array.isArray(bStats.q1Scored) && bStats.q1Scored.length >= 2 }

    } else if (h2hGames?.length===1) {
      const tA = String(teamAId); const g = h2hGames[0];
      document.getElementById("aFTH2H").value = normalizeId(g.teamAId)===tA?g.scoreA:g.scoreB;
      document.getElementById("bFTH2H").value = normalizeId(g.teamAId)===tA?g.scoreB:g.scoreA;
      document.getElementById("useFTH2H").checked = false;
      document.getElementById("use1HH2H").checked = false;
      messages.push("H2H: 1 game found (min 2 to auto-enable)");
    } else {
      document.getElementById("useFTH2H").checked = false;
      document.getElementById("use1HH2H").checked = false;
      messages.push("H2H: none found");
    }
    setStatus('<span class="spinner"></span>Checking injuries &amp; rest days...',"loading");
    const aAvg = aStats?.scored?.length ? aStats.scored.reduce((a,b)=>a+b,0)/aStats.scored.length : 75;
    const bAvg = bStats?.scored?.length ? bStats.scored.reduce((a,b)=>a+b,0)/bStats.scored.length : 75;
    const matchupDate = await findMatchupDate(espnBase, teamAId, teamBId);
    const nextGameDateA = matchupDate || await findNextGameDate(espnBase, teamAId);
    const nextGameDateB = matchupDate || await findNextGameDate(espnBase, teamBId);
    [g_injA,g_injB] = await Promise.all([
      fetchInjuryAndRest(espnBase,teamAId,aAvg,aStats?.lastGameDate||null,nextGameDateA,league),
      fetchInjuryAndRest(espnBase,teamBId,bAvg,bStats?.lastGameDate||null,nextGameDateB,league)
    ]);
    if (_myToken !== _fetchToken) return;
    function renderInjBox(boxId,contentId,inj) {
      if (!inj.notes.length) return;
      document.getElementById(contentId).innerHTML = inj.notes.map(n => {
        const cls = n.type==="out"?"inj-out":n.type==="dtd"?"inj-dtd":"inj-rest";
        return `<div class="${cls}">${safeText(n.text)}</div>`;
      }).join("");
      document.getElementById(boxId).style.display = "block";

    renderInjBox("injuryBoxA","injuryContentA",g_injA);
    renderInjBox("injuryBoxB","injuryContentB",g_injB);
    const allGood = aStats?.scored?.length>0 && bStats?.scored?.length>0;
    if (allGood) { updateSectionLocks(); goToNextStep(); }
    setStatus(messages.map(m=>`<div>${m}</div>`).join(""), allGood?"ok":"err");
  } catch(e) {
    if (_myToken === _fetchToken) setStatus("&#10060; " + safeText(e.message), "err");
  }
  finally {
    if (_myToken === _fetchToken) btn.disabled = false;
  }
}

// ── NCAA Schedule ─────────────────────────────────────────────
async function fetchNbaSchedule(base, teamId, requiredVenue) {
  const tId = String(teamId);
  const gameRefs = [];
  for (const season of [String(new Date().getFullYear()), String(new Date().getFullYear()-1)]) {
    for (const stype of ["2", "3"]) {
      try {
        const r = await proxyFetch(`${base}/teams/${teamId}/schedule?season=${season}&seasontype=${stype}`).catch(() => ({}));
        const events = r?.events || r?.team?.schedule?.events || [];
        for (const ev of events) {
          if (!ev.id) continue;
          const comp = ev?.competitions?.[0]; if (!comp) continue;
          const done = comp?.status?.type?.completed || comp?.status?.type?.name === "STATUS_FINAL" || comp?.status?.type?.state === "post";
          if (!done || (comp?.competitors || []).length < 2) continue;
          const c = comp.competitors;
          const mine = c.find(x => matchesTeam(x, tId)) || c[0];
          const opp  = c.find(x => !matchesTeam(x, tId)) || c[1];
          const ps = s => typeof s === "object" ? parseFloat(s.value ?? s.displayValue ?? 0) : parseFloat(s);
          gameRefs.push({ id: String(ev.id), date: ev.date || "", rawS: ps(mine?.score), rawA: ps(opp?.score), venue: mine?.homeAway || '' });
        }
      } catch(e) {}
    }
    if (gameRefs.length >= 10) break;
  }
  if (!gameRefs.length) return null;
  const seen = new Set();
  const unique = gameRefs.filter(g => { if (seen.has(g.id)) return false; seen.add(g.id); return true; });
  unique.sort((a, b) => { const da = a.date ? new Date(a.date).getTime() : 0; const db = b.date ? new Date(b.date).getTime() : 0; return db - da; });
  const strictFiltered = requiredVenue ? unique.filter(g => g.venue === requiredVenue) : unique;
  if (strictFiltered.length < 2) return null;
  const top5 = strictFiltered.slice(0, 5);
  const scored = [], allowed = [], h1Scored = [], h1Allowed = [], q1Scored = [], q1Allowed = [];
  for (const ref of top5) {

function parseNbaEvents(data) {
  const games = [];
  for (const ev of (data?.events||[])) {
    const comp = ev?.competitions?.[0];
    if (!comp?.status?.type?.completed) continue;
    const c = comp.competitors||[]; if (c.length<2) continue;
    let sA=Number(c[0]?.score), sB=Number(c[1]?.score);
    if (isNaN(sA)||isNaN(sB)||(sA===0&&sB===0)) continue;
    const lA=c[0]?.linescores||[], lB=c[1]?.linescores||[];
    const h1A = lA.length>=2 ? readVal(lA[0])+readVal(lA[1]) : 0;
    const h1B = lB.length>=2 ? readVal(lB[0])+readVal(lB[1]) : 0;
    const q1A = lA.length>=1 ? readVal(lA[0]) : 0;
    const q1B = lB.length>=1 ? readVal(lB[0]) : 0;
    const nbaReg = 4;
    if (lA.length>nbaReg&&lB.length>nbaReg) {
      const tA=lA.reduce((s,p)=>s+readVal(p),0), tB=lB.reduce((s,p)=>s+readVal(p),0);
      if (Math.abs(tA-sA)<=3&&Math.abs(tB-sB)<=3) {
        let otA=0, otB=0;
        for(let i=nbaReg;i<lA.length;i++) otA+=readVal(lA[i]);
        for(let i=nbaReg;i<lB.length;i++) otB+=readVal(lB[i]);
        if(otA>0||otB>0){sA-=otA;sB-=otB;}
      }
    }
    if (sA>0&&sB>0) games.push({teamAId:String(c[0]?.team?.id),teamBId:String(c[1]?.team?.id),scoreA:sA,scoreB:sB,h1A,h1B,q1A,q1B,date:ev?.date||"",venueA:c[0]?.homeAway||null,venueB:c[1]?.homeAway||null});
  }
  return games;
}

async function fetchNbaScoreboard(base, daysBack, teamAId, teamBId) {
  const all = [];
  const tA = String(teamAId), tB = String(teamBId);
  let aHomeCount = 0, bAwayCount = 0;
  for (let d = 1; d <= daysBack; d++) {
    if (aHomeCount >= 5 && bAwayCount >= 5) break;
    const dateStr = getDateString(d);
    const cacheKey = `sb:${dateStr}`;
    let p;
    if (_sbCache.has(cacheKey)) {
      p = _sbCache.get(cacheKey);
    } else {
      p = proxyFetch(`${base}/scoreboard?dates=${dateStr}&limit=200`)
        .catch(() => { _sbCache.delete(cacheKey); return {}; });
      cacheSet(_sbCache, cacheKey, p);
    }
    try {
      const data = await p;
      const games = parseNbaEvents(data);
      for (const g of games) {
        if (g.teamAId===tA && g.venueA==='home') aHomeCount++;
        if (g.teamBId===tA && g.venueB==='home') aHomeCount++;
        if (g.teamAId===tB && g.venueA==='away') bAwayCount++;
        if (g.teamBId===tB && g.venueB==='away') bAwayCount++;
      }
      all.push(...games);
    } catch(e) {}
  }
  return all;
}

function extractLastFive(games, teamId, requiredVenue) {
  const scored=[], allowed=[], h1Scored=[], h1Allowed=[], q1Scored=[], q1Allowed=[];
  let lastVenueGameDate=null, lastOverallGameDate=null;
  const sorted = [...games].sort((a,b)=>{const da=a.date?new Date(a.date).getTime():0;const db=b.date?new Date(b.date).getTime():0;return db-da;});
  for (const g of sorted) {
    const isA = g.teamAId===teamId, isB = g.teamBId===teamId;
    if (!isA && !isB) continue;
    if (!lastOverallGameDate && g.date) lastOverallGameDate = g.date;
    if (scored.length>=5) continue;
    const venueMatch = isA ? g.venueA : g.venueB;
    if (requiredVenue && venueMatch !== requiredVenue) continue;
    if (!lastVenueGameDate && g.date) lastVenueGameDate = g.date;
    if (isA) { scored.push(g.scoreA);allowed.push(g.scoreB);if(g.h1A>0){h1Scored.push(g.h1A);h1Allowed.push(g.h1B);}if(g.q1A>0){q1Scored.push(g.q1A);q1Allowed.push(g.q1B);}
    } else    { scored.push(g.scoreB);allowed.push(g.scoreA);if(g.h1B>0){h1Scored.push(g.h1B);h1Allowed.push(g.h1A);}if(g.q1B>0){q1Scored.push(g.q1B);q1Allowed.push(g.q1A);} }
  }
  if (scored.length < 2) return null;
  return {scored,allowed,h1Scored,h1Allowed,q1Scored,q1Allowed,lastGameDate:lastOverallGameDate||lastVenueGameDate};
}

async function searchTeamFromAPI(base, name, league) {
  const n = name.toLowerCase().trim();
  try {
    const data = await proxyFetch(`${base}/teams?limit=500`);
    const leagues = data?.sports?.[0]?.leagues||[]; let teams=[];
    for (const l of leagues) teams = teams.concat(l?.teams||[]);
    if (!teams.length) teams = data?.teams||[];
    const words = n.split(/\s+/).filter(w=>w.length>=3);
    let best=null, bestScore=0;
    for (const t of teams) {
      const team = t.team||t;
      const displayName = (team.displayName||"").toLowerCase();
      const shortName   = (team.shortDisplayName||"").toLowerCase();
      const nickname    = (team.nickname||"").toLowerCase();
      const location    = (team.location||"").toLowerCase();
      const abbrev      = (team.abbreviation||"").toLowerCase();
      if (displayName === n || shortName === n) return String(team.id);
      let score = 0;
      if (displayName.includes(n) || n.includes(displayName)) score += 3;
      if (shortName.includes(n) || n.includes(shortName)) score += 3;
      if (nickname && (nickname === n || n.includes(nickname))) score += 2;
      if (location && n.includes(location)) score += 2;
      if (abbrev && abbrev === n) score += 2;
      score += words.filter(w => displayName.includes(w) || shortName.includes(w)).length;
      if (score > bestScore) { bestScore = score; best = String(team.id); }
    }
    if (bestScore >= 3) return best;
  } catch(e) {}
  try {
    const data = await proxyFetch(`https://site.api.espn.com/apis/common/v3/search?query=${encodeURIComponent(name)}&limit=10&type=team&sport=basketball`);
    let bestId=null, bestScore=0;
    for (const r of (data?.items||data?.results||[])) {
      const uid = r?.uid||r?.team?.uid||"";
      const mUid = uid.match(/t:(\d+)/);
      const id = mUid ? mUid[1] : (r?.id||r?.team?.id ? String(r?.id||r?.team?.id) : null);
      if (!id) continue;
      const rName = (r?.displayName||r?.team?.displayName||r?.name||"").toLowerCase();
      let score = 0;
      if (rName === n) score += 5;
      else if (rName.includes(n) || n.includes(rName)) score += 2;
      if (score > bestScore) { bestScore = score; bestId = id; }
    }
    return (bestScore >= 2 && bestId && validateTeamId(bestId, league)) ? bestId : null;
  } catch(e) { return null; }
}

function parseGames(id) {
  const el = document.getElementById(id); const raw = el.value.trim(); el.style.borderColor="";
  if (!raw) return null;
  const parts = raw.split(",").map(x=>x.trim()).filter(x=>x!=="");
  if (!parts.length) return null;
  for (let i=0;i<parts.length;i++) {
    const v = parseFloat(parts[i]);
    if (isNaN(v)) return {err:'"'+parts[i]+'" at position '+(i+1)+' is not a number'};
    if (v<0) return {err:'value at position '+(i+1)+' is negative ('+v+')'};
    if (v>250) return {err:'value at position '+(i+1)+' is too high ('+v+')'};
  }
  return parts.map(x=>parseFloat(x));
}

function avg(arr){if(!arr||arr.length===0)return NaN;return arr.reduce((a,b)=>a+b,0)/arr.length;}
function trimmedAvg(arr){if(!arr||arr.length===0)return NaN;if(arr.length<5)return avg(arr);let s=[...arr].sort((a,b)=>a-b);s.shift();s.pop();return avg(s);}
function weightedAvg(arr) {
  if (!arr||arr.length===0) return NaN; if (arr.length<2) return arr[0];
  const W=[0.10,0.15,0.20,0.25,0.30];
  if (arr.length>=5){const a=arr.slice(0,5).reverse();return a.reduce((s,v,i)=>s+v*W[i],0);}
  return avg(arr);
}
function stdDev(arr){if(!arr||arr.length<2)return 0;let m=avg(arr);return Math.sqrt(arr.reduce((a,b)=>a+Math.pow(b-m,2),0)/(arr.length-1));}

function displayLine(val){if(isNaN(val))return"NaN";return(Math.round(val*2)/2).toFixed(1);}
function dynamicWeight(s){if(!s||s.length<2)return 0;return s.length<=3?0.20:0.30;}
function applyVolatility(proj,std,limit){if(isNaN(proj)||isNaN(std))return NaN;if(std<=limit)return proj;return proj*(1-0.05*Math.min(1,(std-limit)/limit));}

function getSampleTier(...arrays) {
  const lens = arrays.map(a => Array.isArray(a) ? a.length : 0);
  const minLen = Math.min(...lens);
  if (minLen >= 5) return "full";
  if (minLen >= 2) return "thin";
  return "insufficient";
}

function detectTrap(edge, line, pick, league, marketType, vol) {
  if (!line || isNaN(edge) || line <= 0) return false;
  const pct = Math.abs(edge / line);
  let bad = 0;
  if (pct > 0.12) bad++;
  if (vol && vol > 18) bad++;
  if (marketType === "ft" && pick.includes("UNDER")) {
    if (league === "nba" && line < 205) bad++;
    else if (league === "ncaa" && line < 125) bad++;
  }
  return bad >= 2;
}

function getLeagueEdgeThresholds(league) {
  if (league === 'nba')
    return { ft: 0.047, h1: 0.050, q1: 0.055, team: 0.072 };
  if (league === 'ncaa')
    return { ft: 0.053, h1: 0.058, team: 0.088 };
  if ([
    'euroleague','eurocup','acb','lba','bbl','bcl','lkl','proa','prob',
    'bsl','isl','aba','plk','serbia_kls','croatia_premier','elbl',
    'georgia_super','hungary_nb1','romania_ln','austria_zweite',
    'belgium_top','bih_1st','bulgaria_nbl','nbl_cz','denmark_bliga',
    'england_slb','finland_koris','finland_koris_w','germany_proa',
    'germany_prob','a2','italy_a2','italy_serb','lithuania_nkl',
    'poland_1liga','portugal_lpb','portugal_proliga','serbia_2mls',
    'spain_primera','spain_segunda','sweden_super','sweden_sbl',
    'swiss_nlb','swiss_sbl','turkey_tbl','turkey_tb2l','turkey_tkbl_w',
    'united_league'
  ].includes(league))
    return { ft: 0.054, h1: 0.059, team: 0.082 };
  if ([
    'cba','china_nbl','taipei_pleague','taipei_sbl','taipei_tpbl',
    'bleague','pba','korea_kbl'
  ].includes(league))
    return { ft: 0.058, h1: 0.063, team: 0.095 };
  return { ft: 0.062, h1: 0.067, team: 0.105 };
}

function getLineSanityBands(league) {
  if (league === 'nba')    return { ft:[190,260], h1:[90,135], q1:[44,70], team:[85,140] };
  if (league === 'ncaa')   return { ft:[110,175], h1:[52,90],  q1:null,    team:[50,95]  };
  if (['euroleague','eurocup','acb','lba','bbl','bcl','bsl','isl'].includes(league))
                           return { ft:[130,185], h1:[62,95],  q1:null,    team:[60,100] };
  if (['cba','pba'].includes(league))
                           return { ft:[165,225], h1:[80,115], q1:null,    team:[75,120] };
                           return { ft:[110,220], h1:[52,115], q1:null,    team:[48,120] };
}

function validateLines(league, ftLine, h1Line, q1Line, aLine, bLine) {
  const bands = getLineSanityBands(league);
  const errs = [];
  const chk = (val, band, label) => {
    if (val === null || !band) return;
    if (val < band[0]) errs.push(`${label} looks too low (${val})`);
    if (val > band[1]) errs.push(`${label} looks too high (${val})`);
  };
  chk(ftLine,  bands.ft,   `${league.toUpperCase()} FT total`);
  chk(h1Line,  bands.h1,   `${league.toUpperCase()} 1H total`);
  chk(q1Line,  bands.q1,   `${league.toUpperCase()} Q1 total`);
  chk(aLine,   bands.team, `${league.toUpperCase()} Team A total`);
  chk(bLine,   bands.team, `${league.toUpperCase()} Team B total`);
  return errs;
}

function getPick(edge, line, league, marketType) {
  if (!line || isNaN(edge) || isNaN(line) || line <= 0) return "NO PLAY";
  const thr = getLeagueEdgeThresholds(league || 'unknown');
  const minPct =
    marketType === 'h1'   ? thr.h1 :
    marketType === 'q1'   ? (thr.q1 ?? (thr.h1 + 0.01)) :
    marketType === 'team' ? thr.team :
    thr.ft;
  if (Math.abs(edge / line) < minPct) return "NO PLAY";
  return edge > 0 ? `OVER ${displayLine(line)}` : `UNDER ${displayLine(line)}`;
}

function getPickWithThreshold(edge, line, minEdge, league, marketType) {
  if (!line || isNaN(edge) || isNaN(line) || line <= 0) return "NO PLAY";
  const thr = getLeagueEdgeThresholds(league || 'unknown');
  const leaguePct =
    marketType === 'h1' ? thr.h1 :
    marketType === 'q1' ? (thr.q1 ?? (thr.h1 + 0.01)) :
    marketType === 'team' ? thr.team :
    thr.ft;
  const useMin = Math.max(minEdge, leaguePct);
  if (Math.abs(edge / line) < useMin) return "NO PLAY";
  return edge > 0 ? `OVER ${displayLine(line)}` : `UNDER ${displayLine(line)}`;
}

function sanitizePick(pick, proj, line) {
  if (isNaN(proj) || isNaN(line)) return '—';
  if (pick === 'NO PLAY') return '—';
  return pick;
}

function selectLock(markets) {
  const valid = markets.filter(m =>
    m.pick !== "NO PLAY" &&
    m.pick !== "—" &&
    !isNaN(m.edge) &&
    m.line !== null &&
    !isNaN(m.line) &&
    m.line > 0 &&
    Math.abs(m.edge / m.line) >= 0.045 &&
    (m.fullModel !== false)
  );
  if (!valid.length) return -1;
  const best = [...valid].sort((a, b) => {
    const ea = Math.abs(a.edge / a.line), eb2 = Math.abs(b.edge / b.line);
    if (Math.abs(eb2 - ea) > 0.0005) return eb2 - ea;
    return Math.abs(b.edge) - Math.abs(a.edge);
  })[0];
  return markets.findIndex(m => m === best);
}

// ── Global completion helpers ─────────────────────────────────────────────
function hasValue(id) {
  const el = document.getElementById(id);
  return !!(el && el.value.trim());
}

function hasValidMarketLine(id, allowSingle) {
  const el = document.getElementById(id);
  if (!el) return false;
  const val = el.value.trim();
  if (!val) return false;
  if (val.includes("-")) {
    // Range: both sides must be present, non-empty, and parseable
    const parts = val.split("-").map(s => s.trim());
    if (parts.length !== 2 || !parts[0] || !parts[1]) return false;
    const a = parseFloat(parts[0]), b = parseFloat(parts[1]);
    if (isNaN(a) || isNaN(b)) return false;
    return b >= a && b > 0;
  }
  // Single value — only for Q1
  if (!allowSingle) return false;
  if (!/^\d{2,3}\.\d+$/.test(val)) return false;
  return parseLineRange(val, true) !== null;
}

function marketDone() {
  // Validate every filled market field before advancing
  const fields = [
    { id: "ftMarket",    allowSingle: false },
    { id: "h1Market",    allowSingle: false },
    { id: "q1Market",    allowSingle: true  },
    { id: "teamAMarket", allowSingle: false },
    { id: "teamBMarket", allowSingle: false },
  ];
  let anyFilled = false;
  for (const f of fields) {
    const el = document.getElementById(f.id);
    if (!el) continue;
    const val = el.value.trim();
    if (!val) continue;
    anyFilled = true;
    if (!hasValidMarketLine(f.id, f.allowSingle)) {
      el.style.borderColor = "#ff6b6b";
      el.focus();
      return;
    }
    el.style.borderColor = "";
  }
  if (!anyFilled) {
    const ft = document.getElementById("ftMarket");
    if (ft) { ft.style.borderColor = "#ff6b6b"; ft.focus(); }
    return;
  }
  updateSectionLocks();
  closeSection("marketSection");
  accordionOpen("teamASection");
}

function isMarketComplete() {
  // Market is complete when at least one field has a valid value
  // (used for section-lock state only — actual advance is via Done button)
  const fields = [
    { id: "ftMarket",    allowSingle: false },
    { id: "h1Market",    allowSingle: false },
    { id: "q1Market",    allowSingle: true  },
    { id: "teamAMarket", allowSingle: false },
    { id: "teamBMarket", allowSingle: false },
  ];
  return fields.some(f => hasValidMarketLine(f.id, f.allowSingle));
}

function isTeamAComplete() {
  return hasValue("aFTScored") && hasValue("aFTAllowed");
}

function isTeamBComplete() {
  return hasValue("bFTScored") && hasValue("bFTAllowed");
}

function isH2HComplete() {
  const cb = document.getElementById("useFTH2H");
  if (cb && cb.checked) return hasValue("aFTH2H") && hasValue("bFTH2H");
  return true;
}

function goToNextStep() {
  const league = document.getElementById("leagueSelect").value;
  if (!league)              { accordionOpen("leagueSection"); return; }

  // Don't auto-navigate into market — user fills it at their own pace and collapses manually
  const marketOpen = document.getElementById("marketSection") &&
                     !document.getElementById("marketSection").classList.contains("collapsed");
  if (marketOpen) return;

  if (!isMarketComplete())  { accordionOpen("marketSection"); return; }
  if (!isTeamAComplete())   { accordionOpen("teamASection");  return; }
  if (!isTeamBComplete())   { accordionOpen("teamBSection");  return; }
  if (!isH2HComplete())     { accordionOpen("h2hSection");    return; }
  closeSection("h2hSection");
}

  if (ls0) ls0.value = "";

  const espnEl = document.getElementById("espnSection");
  if (espnEl) espnEl.style.display = "none";

  ["a1HSection","b1HSection","h2h1HSection","h1MarketSection",
   "aQ1Section","bQ1Section","q1MarketSection"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = "none";
  });

  lockFrom("espnSection");
  openSection("leagueSection");

  ["useFTH2H","use1HH2H"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener("change", resetResultsTable);
  });

  ["aFTH2H","bFTH2H","a1HH2H","b1HH2H"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener("input", () => {
      const tag = document.getElementById("h2hAutoTag");
      if (tag) tag.style.display = "none";
      resetResultsTable();
    });
  });

  const bucketMap = {
    "aFTScored":  ["A","ft"], "aFTAllowed":  ["A","ft"],
    "a1HScored":  ["A","h1"], "a1HAllowed":  ["A","h1"],
    "aQ1Scored":  ["A","q1"], "aQ1Allowed":  ["A","q1"],
    "bFTScored":  ["B","ft"], "bFTAllowed":  ["B","ft"],
    "b1HScored":  ["B","h1"], "b1HAllowed":  ["B","h1"],
    "bQ1Scored":  ["B","q1"], "bQ1Allowed":  ["B","q1"],
  };

  Object.entries(bucketMap).forEach(([id, [side, bucket]]) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener("input", () => {
      setManualSource(side, bucket);
      const tag = side === "A" ? "aAutoTag" : "bAutoTag";
      const tagEl = document.getElementById(tag);
      if (tagEl) tagEl.style.display = "none";
      resetResultsTable();
      // Auto-open next section based on what was just filled
      updateSectionLocks();
    });
  });

  // ── Market fields — only reset results, never auto-advance ──────────────
  ["ftMarket","teamAMarket","teamBMarket","h1Market","q1Market"].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener("input", () => { resetResultsTable(); });
  });

  // ── Team A fields ─────────────────────────────────────────────
  ["aFTScored","aFTAllowed","a1HScored","a1HAllowed","aQ1Scored","aQ1Allowed"].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener("input", () => { updateSectionLocks(); goToNextStep(); });
  });

  // ── Team B fields ─────────────────────────────────────────────
  ["bFTScored","bFTAllowed","b1HScored","b1HAllowed","bQ1Scored","bQ1Allowed"].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener("input", () => { updateSectionLocks(); goToNextStep(); });
  });

  // ── H2H fields ────────────────────────────────────────────────
  ["aFTH2H","bFTH2H","a1HH2H","b1HH2H","useFTH2H","use1HH2H"].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const check = () => { updateSectionLocks(); goToNextStep(); };
    el.addEventListener("input", check);
    el.addEventListener("change", check);
  });
});



// ── Theme Toggle ──────────────────────────────────────────────
function toggleTheme() {
  const isDark = document.body.classList.toggle("dark-mode");
  localStorage.setItem("theme", isDark ? "dark" : "light");
}

// Apply saved theme on load
(function() {
  if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark-mode");
  }
})();

</script>
