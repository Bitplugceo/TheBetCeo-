async function proxyFetch(url) {
  const res = await fetch(WORKER_URL + "?url=" + encodeURIComponent(url));
  if (!res.ok) throw new Error("Worker HTTP " + res.status);
  const text = await res.text();
  try { return JSON.parse(text); }
  catch(e) { throw new Error("Bad JSON: " + text.slice(0, 100)); }
}

function lookupTeamId(name) {
  const n = name.toLowerCase().trim();
  for (let key of Object.keys(NBA_TEAM_MAP)) {
    if (n === key || n.includes(key) || key.includes(n)) return NBA_TEAM_MAP[key];
  }
  for (let key of Object.keys(NCAA_TEAM_MAP)) {
    if (n === key || n.includes(key) || key.includes(n)) return NCAA_TEAM_MAP[key];
  }
  return null;
}

function normalizeId(raw) {
  if (!raw) return "";
  const s = String(raw);
  const m = s.match(/t:(\d+)/);
  if (m) return m[1];
  return s.replace(/\D/g, "") || s;
}

function onLeagueChange() {
  const league = document.getElementById("leagueSelect").value;
  const isNbaOrNcaa = league === "nba" || league === "ncaa";
  const isEuro = league === "euroleague" || league === "eurocup";
  const hasAutoFetch = isNbaOrNcaa || isEuro;
  const show1H = isNbaOrNcaa || isEuro;
  document.getElementById("espnSection").style.display = hasAutoFetch ? "block" : "none";
  ["a1HSection","b1HSection","h2h1HSection","h1MarketSection"].forEach(id => {
    document.getElementById(id).style.display = show1H ? "block" : "none";
  });
  const title = document.getElementById("fetchSectionTitle");
  if (isEuro) {
    title.innerHTML = '⚡ EuroLeague Auto-Fetch <span style="font-size:11px;color:#aaa;">(EuroLeague &amp; EuroCup)</span>';
    document.getElementById("teamAName").placeholder = "e.g. Real Madrid";
    document.getElementById("teamBName").placeholder = "e.g. Barcelona";
  } else {
    title.innerHTML = '⚡ ESPN Auto-Fetch <span style="font-size:11px;color:#aaa;">(NBA &amp; NCAA only)</span>';
    document.getElementById("teamAName").placeholder = "e.g. Lakers";
    document.getElementById("teamBName").placeholder = "e.g. Celtics";
  }
}

function clearAutoFill() {
  ["aAutoTag","bAutoTag","h2hAutoTag"].forEach(id => document.getElementById(id).style.display = "none");
  setStatus("","");
}

function setStatus(msg, type) {
  const el = document.getElementById("fetchStatus");
  el.className = type;
  el.innerHTML = msg;
}

function getDateString(daysAgo) {
  const d = new Date();
  d.setDate(d.getDate() - daysAgo);
  return d.toISOString().slice(0,10).replace(/-/g,"");
}

async function fetchStats() {
  const league = document.getElementById("leagueSelect").value;
  if (league === "euroleague" || league === "eurocup") {
    await fetchEuroLeague();
  } else {
    await fetchESPN();
  }
}

async function fetchESPN() {
  const league = document.getElementById("leagueSelect").value;
  const teamAName = document.getElementById("teamAName").value.trim();
  const teamBName = document.getElementById("teamBName").value.trim();
  if (!teamAName || !teamBName) { setStatus("❌ Enter both team names first.","err"); return; }

  const btn = document.getElementById("fetchBtn");
  btn.disabled = true;
  setStatus('<span class="spinner"></span>Fetching from ESPN...', "loading");

  try {
    const isNcaa = league === "ncaa";
    const leagueSlug = isNcaa ? "mens-college-basketball" : "nba";
    const espnBase = `https://site.api.espn.com/apis/site/v2/sports/basketball/${leagueSlug}`;

    let teamAId = lookupTeamId(teamAName) || await searchTeamFromAPI(espnBase, teamAName);
    let teamBId = lookupTeamId(teamBName) || await searchTeamFromAPI(espnBase, teamBName);
    if (!teamAId) throw new Error(`Can't find "${teamAName}". Try just the nickname.`);
    if (!teamBId) throw new Error(`Can't find "${teamBName}". Try just the nickname.`);

    setStatus('<span class="spinner"></span>Loading game stats...', "loading");

    let aStats, bStats;
    if (isNcaa) {
      [aStats, bStats] = await Promise.all([
        fetchNcaaSchedule(espnBase, teamAId),
        fetchNcaaSchedule(espnBase, teamBId)
      ]);
    } else {
      // BUG 3 FIX: fetch day by day instead of range format
      const allGames = await fetchNbaScoreboard(espnBase, 60);
      if (!allGames.length) throw new Error("No recent game data from ESPN.");
      aStats = extractLastFive(allGames, String(teamAId));
      bStats = extractLastFive(allGames, String(teamBId));
    }

    const messages = [];

    if (aStats?.scored?.length > 0) {
      document.getElementById("aFTScored").value  = aStats.scored.join(",");
      document.getElementById("aFTAllowed").value = aStats.allowed.join(",");
      if (aStats.h1Scored?.length > 0) {
        document.getElementById("a1HScored").value  = aStats.h1Scored.join(",");
        document.getElementById("a1HAllowed").value = aStats.h1Allowed.join(",");
      }
      document.getElementById("aAutoTag").style.display = "inline";
      messages.push(`${teamAName}: ${aStats.scored.length} games ✅`);
    } else {
      messages.push(`${teamAName}: no data ❌`);
    }

    if (bStats?.scored?.length > 0) {
      document.getElementById("bFTScored").value  = bStats.scored.join(",");
      document.getElementById("bFTAllowed").value = bStats.allowed.join(",");
      if (bStats.h1Scored?.length > 0) {
        document.getElementById("b1HScored").value  = bStats.h1Scored.join(",");
        document.getElementById("b1HAllowed").value = bStats.h1Allowed.join(",");
      }
      document.getElementById("bAutoTag").style.display = "inline";
      messages.push(`${teamBName}: ${bStats.scored.length} games ✅`);
    } else {
      messages.push(`${teamBName}: no data ❌`);
    }

    setStatus('<span class="spinner"></span>Scanning H2H since 2024...', "loading");
    const h2hGames = isNcaa
      ? await fetchNcaaH2H(espnBase, teamAId, teamBId)
      : await fetchNbaH2H(espnBase, teamAId, teamBId);

    if (h2hGames?.length >= 2) {
      const tA = String(teamAId);
      const h2hA = [], h2hB = [];
      for (const g of h2hGames.slice(0,5)) {
        if (normalizeId(g.teamAId) === tA) { h2hA.push(g.scoreA); h2hB.push(g.scoreB); }
        else { h2hA.push(g.scoreB); h2hB.push(g.scoreA); }
      }
      document.getElementById("aFTH2H").value = h2hA.join(",");
      document.getElementById("bFTH2H").value = h2hB.join(",");
      document.getElementById("useFTH2H").checked = true;
      document.getElementById("h2hAutoTag").style.display = "inline";
      const h2hA1H = h2hGames.slice(0,5).map(g => g.teamAId===tA ? g.h1A : g.h1B).filter(v => v > 0);
      const h2hB1H = h2hGames.slice(0,5).map(g => g.teamAId===tA ? g.h1B : g.h1A).filter(v => v > 0);
      if (h2hA1H.length >= 2) {
        document.getElementById("a1HH2H").value = h2hA1H.join(",");
        document.getElementById("b1HH2H").value = h2hB1H.join(",");
        document.getElementById("use1HH2H").checked = true;
      }
      messages.push(`H2H: ${Math.min(h2hGames.length,5)} games ✅`);
    } else {
      document.getElementById("useFTH2H").checked = false;
      messages.push("H2H: none found");
    }

    const allGood = aStats?.scored?.length > 0 && bStats?.scored?.length > 0;
    setStatus("", "");

  } catch(e) {
    setStatus("❌ " + e.message, "err");
  } finally {
    btn.disabled = false;
  }
}

  const n = name.toLowerCase().trim();
  // exact match first

    if (n.includes(key) || key.includes(n)) return EURO_TEAM_MAP[key];
  }
  // try word-by-word (e.g. "Bayern" matches "fc bayern")
  const words = n.split(/\s+/).filter(w => w.length >= 4);
  for (const key of Object.keys(EURO_TEAM_MAP)) {
    if (words.some(w => key.includes(w))) return EURO_TEAM_MAP[key];
  }
  return null;
}

function getCurrentEuroSeason(compCode) {
  // EuroLeague/EuroCup season runs Oct-May
  // Season "E2025" covers Oct 2025 - May 2026
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1; // 1-12
  // If we're Jan-Sep, the current season started last year
  const seasonYear = month >= 9 ? year : year - 1;
  return compCode + seasonYear;
}

async function fetchEuroLeague() {
  const league = document.getElementById("leagueSelect").value;
  const teamAName = document.getElementById("teamAName").value.trim();
  const teamBName = document.getElementById("teamBName").value.trim();
  if (!teamAName || !teamBName) { setStatus("❌ Enter both team names first.", "err"); return; }

  const btn = document.getElementById("fetchBtn");
  btn.disabled = true;
  setStatus('<span class="spinner"></span>Fetching from EuroLeague API...', "loading");

  try {
    const compCode = league === "euroleague" ? "E" : "U";
    const seasonCode = getCurrentEuroSeason(compCode);

    const codeA = lookupEuroCode(teamAName);
    const codeB = lookupEuroCode(teamBName);
    if (!codeA) throw new Error(`Can't find "${teamAName}". Try the full club name.`);
    if (!codeB) throw new Error(`Can't find "${teamBName}". Try the full club name.`);

    setStatus('<span class="spinner"></span>Loading game results...', "loading");

    // Fetch all played games from the season (regular season + playoffs)
    const allGames = await fetchEuroGames(compCode, seasonCode);
    if (!allGames.length) throw new Error("No game data found for this season.");

    const aStats = extractEuroLastFive(allGames, codeA);
    const bStats = extractEuroLastFive(allGames, codeB);

    if (aStats?.scored?.length > 0) {
      document.getElementById("aFTScored").value  = aStats.scored.join(",");
      document.getElementById("aFTAllowed").value = aStats.allowed.join(",");
      if (aStats.h1Scored?.length > 0) {
        document.getElementById("a1HScored").value  = aStats.h1Scored.join(",");
        document.getElementById("a1HAllowed").value = aStats.h1Allowed.join(",");
      }
      document.getElementById("aAutoTag").style.display = "inline";
    }
    if (bStats?.scored?.length > 0) {
      document.getElementById("bFTScored").value  = bStats.scored.join(",");
      document.getElementById("bFTAllowed").value = bStats.allowed.join(",");
      if (bStats.h1Scored?.length > 0) {
        document.getElementById("b1HScored").value  = bStats.h1Scored.join(",");
        document.getElementById("b1HAllowed").value = bStats.h1Allowed.join(",");
      }
      document.getElementById("bAutoTag").style.display = "inline";
    }

    // H2H
    setStatus('<span class="spinner"></span>Scanning H2H...', "loading");
    const h2hGames = allGames.filter(g =>
      (g.localCode === codeA && g.roadCode === codeB) ||
      (g.localCode === codeB && g.roadCode === codeA)
    ).sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0,5);

    if (h2hGames.length >= 2) {
      const h2hA   = h2hGames.map(g => g.localCode===codeA ? g.localScore : g.roadScore);
      const h2hB   = h2hGames.map(g => g.localCode===codeA ? g.roadScore  : g.localScore);
      const h2hA1H = h2hGames.map(g => g.localCode===codeA ? g.localH1    : g.roadH1).filter(v => v > 0);
      const h2hB1H = h2hGames.map(g => g.localCode===codeA ? g.roadH1     : g.localH1).filter(v => v > 0);
      document.getElementById("aFTH2H").value = h2hA.join(",");
      document.getElementById("bFTH2H").value = h2hB.join(",");
      document.getElementById("useFTH2H").checked = true;
      document.getElementById("h2hAutoTag").style.display = "inline";
      if (h2hA1H.length >= 2) {
        document.getElementById("a1HH2H").value = h2hA1H.join(",");
        document.getElementById("b1HH2H").value = h2hB1H.join(",");
        document.getElementById("use1HH2H").checked = true;
      }
    } else {
      document.getElementById("useFTH2H").checked = false;
    }

    setStatus("", "");
  } catch(e) {
    setStatus("❌ " + e.message, "err");
  } finally {
    btn.disabled = false;
  }
}

async function fetchEuroGames(compCode, seasonCode) {
  const base = "https://api-live.euroleague.net/v2/competitions";
  const games = [];
  // Fetch regular season (RS) and playoffs (PO) in parallel
  const [rsData, poData] = await Promise.allSettled([
    proxyFetch(`${base}/${compCode}/seasons/${seasonCode}/games?phaseTypeCode=RS&limit=500`),
    proxyFetch(`${base}/${compCode}/seasons/${seasonCode}/games?phaseTypeCode=PO&limit=100`)
  ]);
  for (const result of [rsData, poData]) {
    if (result.status !== "fulfilled") continue;
    for (const g of (result.value?.data || [])) {
      if (!g.played) continue;
      const local = g.local, road = g.road;
      if (!local || !road) continue;
      // OT stripping: regulation = p1+p2+p3+p4; extraPeriods has OT points
      const ep = local.partials?.extraPeriods || {};
      let otLocal = 0, otRoad = 0;
      // extraPeriods is an object like {1: {local: 5, road: 7}} or similar
      if (typeof ep === "object") {
        for (const k of Object.keys(ep)) {
          const period = ep[k];
          if (typeof period === "object") {
            otLocal += Number(period.local || period.pointsLocal || 0);
            otRoad  += Number(period.road  || period.pointsRoad  || 0);
          } else {
            otLocal += Number(ep[k] || 0);
          }
        }
      }
      const lScore = Math.round((local.score || 0) - otLocal);
      const rScore = Math.round((road.score  || 0) - otRoad);
      // 1H = partials1 + partials2
      const lH1 = (local.partials?.partials1||0) + (local.partials?.partials2||0);
      const rH1 = (road.partials?.partials1||0)  + (road.partials?.partials2||0);
      if (lScore > 0 && rScore > 0) {
        games.push({
          localCode: local.club?.code || local.code,
          roadCode:  road.club?.code  || road.code,
          localScore: lScore, roadScore: rScore,
          localH1: lH1, roadH1: rH1,
          date: g.date || g.utcDate || "",
          gameCode: g.gameCode
        });
      }
    }
  }
  return games;
}

function extractEuroLastFive(games, teamCode) {
  const scored=[], allowed=[], h1Scored=[], h1Allowed=[];
  const sorted = [...games].sort((a,b) => new Date(b.date) - new Date(a.date));
  for (const g of sorted) {
    if (scored.length >= 5) break;
    if (g.localCode === teamCode) {
      scored.push(g.localScore); allowed.push(g.roadScore);
      if (g.localH1 > 0) { h1Scored.push(g.localH1); h1Allowed.push(g.roadH1); }
    } else if (g.roadCode === teamCode) {
      scored.push(g.roadScore); allowed.push(g.localScore);
      if (g.roadH1 > 0) { h1Scored.push(g.roadH1); h1Allowed.push(g.localH1); }
    }
  }
  return scored.length >= 2 ? { scored, allowed, h1Scored, h1Allowed } : null;
}

async function fetchNcaaSchedule(base, teamId) {
  const tId = String(teamId);
  const pv = p => parseFloat(String(p?.value ?? p?.displayValue ?? 0)) || 0;
  const gameRefs = [];
  for (const season of ["2026","2025"]) {
    try {
      const [r1, r2] = await Promise.all([
        proxyFetch(`${base}/teams/${teamId}/schedule?season=${season}&seasontype=2`).catch(() => ({})),
        proxyFetch(`${base}/teams/${teamId}/schedule?season=${season}&seasontype=3`).catch(() => ({}))
      ]);
      const events = [...(r1?.events||r1?.team?.schedule?.events||[]),...(r2?.events||r2?.team?.schedule?.events||[])];
      for (const ev of events) {
        if (!ev.id) continue;
        const comp = ev?.competitions?.[0];
        if (!comp) continue;
        const done = comp?.status?.type?.completed||comp?.status?.type?.name==="STATUS_FINAL"||comp?.status?.type?.state==="post";
        if (!done||(comp?.competitors||[]).length<2) continue;
        const c = comp.competitors;
        const mine = c.find(x=>normalizeId(x.id)===tId||normalizeId(x.team?.id)===tId)||c[0];
        const opp  = c.find(x=>normalizeId(x.id)!==tId&&normalizeId(x.team?.id)!==tId)||c[1];
        const ps = s => typeof s==="object"?parseFloat(s.value??s.displayValue??0):parseFloat(s);
        gameRefs.push({id:String(ev.id),date:ev.date||"",rawS:ps(mine?.score),rawA:ps(opp?.score)});
      }
    } catch(e) {}
  }
  if (!gameRefs.length) return null;
  const seen = new Set();
  const unique = gameRefs.filter(g=>{if(seen.has(g.id))return false;seen.add(g.id);return true;});
  unique.sort((a,b)=>{const da=a.date?new Date(a.date).getTime():0,db=b.date?new Date(b.date).getTime():0;return db-da;});
  const top5 = unique.slice(0,5);
  const scored=[],allowed=[],h1Scored=[],h1Allowed=[];
  for (const ref of top5) {
    let ms=ref.rawS,os=ref.rawA,h1m=0,h1o=0,gotLS=false;
    try {
      const data = await proxyFetch(`${base}/summary?event=${ref.id}`);
      const hc = data?.header?.competitions?.[0];
      if (hc) {
        const competitors = hc?.competitors||[];
        const mine = competitors.find(c=>normalizeId(c.team?.id)===tId||normalizeId(c.id)===tId);
        const opp  = competitors.find(c=>normalizeId(c.team?.id)!==tId&&normalizeId(c.id)!==tId);
        if (mine&&opp) {
          const lm=mine?.linescores||[],lo=opp?.linescores||[];
          if (lm.length>=1) {
            gotLS=true;
            ms=parseFloat(mine.score)||ms;
            os=parseFloat(opp.score)||os;
            h1m=pv(lm[0]); h1o=pv(lo[0]);
            if (lm.length>2) {
              const sm=lm.reduce((s,p)=>s+pv(p),0),so=lo.reduce((s,p)=>s+pv(p),0);
              if (Math.abs(sm-ms)<=3&&Math.abs(so-os)<=3) {
                let otm=0,oto=0;
                for(let i=2;i<lm.length;i++)otm+=pv(lm[i]);
                for(let i=2;i<lo.length;i++)oto+=pv(lo[i]);
                if(otm>0||oto>0){ms-=otm;os-=oto;}
              }
            }
          }
        }
      }
    } catch(e) {}
    if(isNaN(ms)||isNaN(os)||ms<=0||os<=0) continue;
    scored.push(Math.round(ms));allowed.push(Math.round(os));
    if(gotLS&&h1m>0){h1Scored.push(Math.round(h1m));h1Allowed.push(Math.round(h1o));}
  }
  return scored.length>=2?{scored,allowed,h1Scored,h1Allowed}:null;
}

function parseNbaEvents(data) {
  const games=[];
  const pvN=p=>parseFloat(String(p?.value??p?.displayValue??0))||0;
  for(const ev of(data?.events||[])){
    const comp=ev?.competitions?.[0];
    if(!comp?.status?.type?.completed)continue;
    const c=comp.competitors||[];
    if(c.length<2)continue;
    let sA=Number(c[0]?.score),sB=Number(c[1]?.score);
    if(isNaN(sA)||isNaN(sB)||(sA===0&&sB===0))continue;
    const lA=c[0]?.linescores||[],lB=c[1]?.linescores||[];
    const h1A=lA.length>=2?pvN(lA[0])+pvN(lA[1]):0;
    const h1B=lB.length>=2?pvN(lB[0])+pvN(lB[1]):0;
    if(lA.length>4&&lB.length>4){
      const tA=lA.reduce((s,p)=>s+pvN(p),0),tB=lB.reduce((s,p)=>s+pvN(p),0);
      if(Math.abs(tA-sA)<=3&&Math.abs(tB-sB)<=3){
        let otA=0,otB=0;
        for(let i=4;i<lA.length;i++)otA+=pvN(lA[i]);
        for(let i=4;i<lB.length;i++)otB+=pvN(lB[i]);
        if(otA>0||otB>0){sA-=otA;sB-=otB;}
      }
    }
    if(sA>0&&sB>0)games.push({teamAId:String(c[0]?.team?.id),teamBId:String(c[1]?.team?.id),scoreA:sA,scoreB:sB,h1A,h1B,date:ev?.date||""});
  }
  return games;
}

      if(m)return m[1];
      const id=r?.id||r?.team?.id;
      if(id&&String(id).match(/^\d+$/))return String(id);
    }
  }catch(e){}
  try{
    const data=await proxyFetch(`${base}/teams?limit=500`);
    const leagues=data?.sports?.[0]?.leagues||[];
    let teams=[];
    for(const l of leagues)teams=teams.concat(l?.teams||[]);
    if(!teams.length)teams=data?.teams||[];
    const words=n.split(/\s+/).filter(w=>w.length>=3);
    let best=null,bestScore=0;
    for(let t of teams){
      const team=t.team||t;
      const fields=[team.displayName,team.shortDisplayName,team.name,team.nickname,team.abbreviation,team.location].filter(Boolean).map(f=>f.toLowerCase()).join(" ");
      if(fields.includes(n))return String(team.id);
      let score=words.filter(w=>fields.includes(w)).length;
      if(team.location&&n.includes(team.location.toLowerCase()))score+=2;
      if(team.nickname&&n.includes(team.nickname.toLowerCase()))score+=2;
      if(score>bestScore){bestScore=score;best=String(team.id);}
    }
    return bestScore>=2?best:null;
  }catch(e){return null;}
}

/* =============================================
   ENGINE CORE
   ============================================= */
function parseGames(id){let raw=document.getElementById(id).value.trim();if(!raw)return null;let arr=raw.split(",").map(x=>parseFloat(x.trim()));if(arr.some(x=>isNaN(x)||x<0||x>300))return"error";return arr;}
function avg(arr){if(!arr||arr.length===0)return NaN;return arr.reduce((a,b)=>a+b,0)/arr.length;}
function trimmedAvg(arr){if(!arr||arr.length===0)return NaN;if(arr.length<5)return avg(arr);let s=[...arr].sort((a,b)=>a-b);s.shift();s.pop();return avg(s);}
function stdDev(arr){if(!arr||arr.length<2)return 0;let m=avg(arr);return Math.sqrt(arr.reduce((a,b)=>a+Math.pow(b-m,2),0)/(arr.length-1));}
function mid(val){if(!val)return NaN;val=val.trim();if(!val.includes("-"))return NaN;let p=val.split("-").map(x=>x.trim());let a=parseFloat(p[0]),b=parseFloat(p[1]);if(isNaN(a)||isNaN(b))return NaN;return(a+b)/2;}
function displayLine(val){if(isNaN(val))return"NaN";return(Math.round(val*2)/2).toFixed(1);}
function dynamicWeight(s){if(!s||s.length<2)return 0;return s.length<=3?0.20:0.30;}
function applyVolatility(proj,std,limit){if(isNaN(proj)||isNaN(std))return NaN;if(std<=limit)return proj;return proj*(1-0.07*Math.min(1,(std-limit)/limit));}

// BUG 1 FIX: added "1h_total" as alias for "ft_total"
function decision(edge,line,type,teamSc,aSc,bSc){
  if(isNaN(edge)||isNaN(line))return"NaN";
  if(Math.abs(edge/line)<0.045)return"NO PLAY";
  const isTotalType = type==="ft_total"||type==="1h_total";
  let thr = isTotalType ? (edge>0?line*0.045:line*0.06) : (edge>0?line*0.05:line*0.065);
  if(isNaN(thr)||Math.abs(edge)<thr)return"NO PLAY";
  if(edge<0){
    if(isTotalType&&!isNaN(aSc)&&!isNaN(bSc)&&(aSc>=line*0.58||bSc>=line*0.58))return"NO PLAY";
    if(type==="team"&&!isNaN(teamSc)&&teamSc>=line*0.58)return"NO PLAY";
  }
  return edge>0?"OVER "+displayLine(line):"UNDER "+displayLine(line);
}

function runEngine(){
  const table=document.getElementById("results");
  table.style.display="table";
  table.innerHTML="<tr><th>Pick</th><th>Projection</th><th>Edge</th><th>Prediction</th></tr>";
  const league=document.getElementById("leagueSelect").value;
  const bases={"nba":230,"euroleague":175,"eurocup":170,"euro_elite":175,"secondary":170,"ncaa":150,"africa":160,"unknown":160};
  const paceClamps={"nba":{min:0.90,max:1.15},"euroleague":{min:0.92,max:1.10},"eurocup":{min:0.92,max:1.10},"euro_elite":{min:0.92,max:1.10},"secondary":{min:0.92,max:1.10},"ncaa":{min:0.90,max:1.12},"africa":{min:0.90,max:1.12},"unknown":{min:0.90,max:1.12}};
  let eb=bases[league]||160;
  const cl=paceClamps[league]||{min:0.90,max:1.12};
  let ftLine=mid(document.getElementById("ftMarket").value);
  let aLine=mid(document.getElementById("teamAMarket").value);
  let bLine=mid(document.getElementById("teamBMarket").value);
  let aSA=parseGames("aFTScored"),aAA=parseGames("aFTAllowed"),bSA=parseGames("bFTScored"),bAA=parseGames("bFTAllowed");
  let aS=(aSA==="error"||aSA===null)?NaN:trimmedAvg(aSA);
  let aA=(aAA==="error"||aAA===null)?NaN:trimmedAvg(aAA);
  let bS=(bSA==="error"||bSA===null)?NaN:trimmedAvg(bSA);
  let bA=(bAA==="error"||bAA===null)?NaN:trimmedAvg(bAA);
  let fma=!isNaN(aS)&&!isNaN(aA)&&!isNaN(bS)&&!isNaN(bA);
  let bAFT=(!isNaN(aS)&&!isNaN(bA))?(aS+bA)/2:(!isNaN(aS)?aS:NaN);
  let bBFT=(!isNaN(bS)&&!isNaN(aA))?(bS+aA)/2:(!isNaN(bS)?bS:NaN);
  let tAP=(!isNaN(aS)&&!isNaN(aA))?(aS+aA)/2:NaN;
  let tBP=(!isNaN(bS)&&!isNaN(bA))?(bS+bA)/2:NaN;
  let pgr=(!isNaN(tAP)&&!isNaN(tBP)&&Math.abs(tAP-tBP)>eb*0.10);
  let rp=(!isNaN(tAP)&&!isNaN(tBP))?(tAP+tBP)/2:(!isNaN(tAP)?tAP:(!isNaN(tBP)?tBP:NaN));
  let pace=!isNaN(rp)&&eb?Math.max(cl.min,Math.min(cl.max,rp/eb)):1;
  let h2ha=null,h2hb=null;
  if(document.getElementById("useFTH2H").checked){h2ha=parseGames("aFTH2H");h2hb=parseGames("bFTH2H");}
  if(fma&&h2ha&&h2hb&&h2ha!=="error"&&h2hb!=="error"&&h2ha.length>=2&&h2hb.length>=2){
    let w=Math.min(0.30,dynamicWeight(h2ha)+dynamicWeight(h2hb));
    let bt=bAFT+bBFT,ht=avg(h2ha)+avg(h2hb);
    if(!isNaN(bt)&&!isNaN(ht)&&bt>0){
      if(Math.abs(ht-bt)/bt>0.20)w*=0.5;
      let r=(bt*(1-w)+ht*w)/bt;bAFT*=r;bBFT*=r;
    }
  }
  let aVol=(stdDev(aSA==="error"?[]:aSA)+stdDev(aAA==="error"?[]:aAA))/2;
  let bVol=(stdDev(bSA==="error"?[]:bSA)+stdDev(bAA==="error"?[]:bAA))/2;
  let dfr=(!isNaN(aA)&&aA<eb*0.40)||(!isNaN(bA)&&bA<eb*0.40);
  let vl={"nba":14,"euroleague":12,"eurocup":12,"euro_elite":12,"secondary":12,"ncaa":11,"africa":11,"unknown":12}[league]||12;
  bAFT=applyVolatility(bAFT,aVol,vl);bBFT=applyVolatility(bBFT,bVol,vl);
  let lta=eb/2;bAFT=(bAFT*0.85)+(lta*0.15);bBFT=(bBFT*0.85)+(lta*0.15);
  bAFT=bAFT*(0.5+pace/2);bBFT=bBFT*(0.5+pace/2);
  let ftP=(!isNaN(bAFT)&&!isNaN(bBFT))?bAFT+bBFT:NaN;
  if(!isNaN(ftP)){
    if(Math.abs(bAFT-bBFT)>18)ftP*=0.98;
    if(pgr)ftP*=0.97;
    if(!isNaN(ftLine)&&Math.abs(ftP-ftLine)>25)ftP=ftLine+(ftP-ftLine)*0.5;
    if(league==="nba"&&!isNaN(ftLine)&&Math.abs(ftP-ftLine)>18)ftP=ftLine+(ftP-ftLine)*0.65;
  }

  // 1H ENGINE
  let h1P=NaN,h1Line=NaN;
  let aVol1=0,bVol1=0,vl1=7,pgr1=false,dfr1=false;
  const isNbaOrNcaa=league==="nba"||league==="ncaa"||league==="euroleague"||league==="eurocup";
  if(isNbaOrNcaa){
    const eb1H=eb/2;
    h1Line=mid(document.getElementById("h1Market").value);
    let a1HS=parseGames("a1HScored"),a1HA=parseGames("a1HAllowed");
    let b1HS=parseGames("b1HScored"),b1HA=parseGames("b1HAllowed");
    let aS1=(a1HS==="error"||a1HS===null)?NaN:trimmedAvg(a1HS);
    let aA1=(a1HA==="error"||a1HA===null)?NaN:trimmedAvg(a1HA);
    let bS1=(b1HS==="error"||b1HS===null)?NaN:trimmedAvg(b1HS);
    let bA1=(b1HA==="error"||b1HA===null)?NaN:trimmedAvg(b1HA);
    let fma1=!isNaN(aS1)&&!isNaN(aA1)&&!isNaN(bS1)&&!isNaN(bA1);
    if(fma1){
      let bA1H=(aS1+bA1)/2,bB1H=(bS1+aA1)/2;
      let tAP1=(aS1+aA1)/2,tBP1=(bS1+bA1)/2;
      pgr1=Math.abs(tAP1-tBP1)>eb1H*0.10;
      let rp1=(tAP1+tBP1)/2;
      let pace1=Math.max(cl.min,Math.min(cl.max,rp1/eb1H));
      if(document.getElementById("use1HH2H").checked){
        let h2ha1=parseGames("a1HH2H"),h2hb1=parseGames("b1HH2H");
        if(h2ha1&&h2hb1&&h2ha1!=="error"&&h2hb1!=="error"&&h2ha1.length>=2&&h2hb1.length>=2){
          let w1=Math.min(0.30,dynamicWeight(h2ha1)+dynamicWeight(h2hb1));
          let bt1=bA1H+bB1H,ht1=avg(h2ha1)+avg(h2hb1);
          if(!isNaN(bt1)&&!isNaN(ht1)&&bt1>0){
            if(Math.abs(ht1-bt1)/bt1>0.20)w1*=0.5;
            let r1=(bt1*(1-w1)+ht1*w1)/bt1;bA1H*=r1;bB1H*=r1;
          }
        }
      }
      vl1={"nba":7,"ncaa":6}[league]||7;
      aVol1=(stdDev(a1HS||[])+stdDev(a1HA||[]))/2;
      bVol1=(stdDev(b1HS||[])+stdDev(b1HA||[]))/2;
      // BUG 2 FIX: dfr1 now correctly calculated and stored for use in OVER filter
      dfr1=(!isNaN(aA1)&&aA1<eb1H*0.40)||(!isNaN(bA1)&&bA1<eb1H*0.40);
      bA1H=applyVolatility(bA1H,aVol1,vl1);
      bB1H=applyVolatility(bB1H,bVol1,vl1);
      bA1H=(bA1H*0.85)+(eb1H*0.15);
      bB1H=(bB1H*0.85)+(eb1H*0.15);
      bA1H=bA1H*(0.5+pace1/2);
      bB1H=bB1H*(0.5+pace1/2);
      h1P=bA1H+bB1H;
      if(!isNaN(h1P)){
        if(Math.abs(bA1H-bB1H)>9)h1P*=0.98;
        if(pgr1)h1P*=0.97;
        if(!isNaN(h1Line)&&Math.abs(h1P-h1Line)>12)h1P=h1Line+(h1P-h1Line)*0.5;
        if(league==="nba"&&!isNaN(h1Line)&&Math.abs(h1P-h1Line)>9)h1P=h1Line+(h1P-h1Line)*0.65;
      }
    }
  }

  // OUTPUT ORDER: FT Total, 1H Total, Team A, Team B
  let picks=[
    {name:"FT Total",   proj:ftP,  line:ftLine, type:"ft_total", teamSc:null, aSc:aS,  bSc:bS},
    {name:"1H Total",   proj:h1P,  line:h1Line, type:"1h_total", teamSc:null, aSc:aS,  bSc:bS},
    {name:"Team A Total",proj:bAFT,line:aLine,  type:"team",     teamSc:aS,   aSc:aS,  bSc:bS},
    {name:"Team B Total",proj:bBFT,line:bLine,  type:"team",     teamSc:bS,   aSc:aS,  bSc:bS}
  ];

  // Filter out 1H if not NBA/NCAA or no projection
  if(!isNbaOrNcaa||isNaN(h1P))picks=picks.filter(p=>p.type!=="1h_total");

  let li=-1,ms=0;
  picks.forEach((p,i)=>{
    if(isNaN(p.line)||isNaN(p.proj))return;
    let e=p.proj-p.line,st=p.line?Math.abs(e/p.line):0;
    let pt=decision(e,p.line,p.type,p.teamSc,p.aSc,p.bSc);
    if(fma&&pt!=="NO PLAY"&&pt!=="NaN"&&st>=0.045&&st>ms){ms=st;li=i;}
  });

  picks.forEach((p,i)=>{
    let edge=NaN,pt="NaN",dn="";
    if(isNaN(p.line)){dn="Missing / Invalid Line";pt="—";}
    else if(isNaN(p.proj)){dn="Missing / Invalid Last-5 Data";pt="—";}
    else{
      edge=p.proj-p.line;
      pt=decision(edge,p.line,p.type,p.teamSc,p.aSc,p.bSc);
      if(Math.abs(edge)<p.line*0.025)pt="NO PLAY";
      if(p.type==="ft_total"&&pt.startsWith("OVER")){
        if(pgr||dfr)pt="NO PLAY";
        if(Math.abs(bAFT-bBFT)>20)pt="NO PLAY";
        if(aVol>vl&&bVol>vl)pt="NO PLAY";
      }
      // BUG 2 FIX: dfr1 now applied to 1H OVER filter
      if(p.type==="1h_total"&&pt.startsWith("OVER")){
        if(pgr1)pt="NO PLAY";
        if(dfr1)pt="NO PLAY";
        if(aVol1>vl1&&bVol1>vl1)pt="NO PLAY";
      }
    }
    let row=table.insertRow();
    let pred=pt;
    if(i===li&&pt!=="NO PLAY"&&pt!=="NaN")pred+=` <span class="lock">🔒</span>`;
    let pd=isNaN(p.proj)?"NaN":p.proj.toFixed(2);
    let ed=isNaN(edge)?"NaN":edge.toFixed(2);
    let cn=pred.startsWith("OVER")?"pred-over":pred.startsWith("UNDER")?"pred-under":"pred-noplay";
    row.innerHTML=`<td>${p.name}</td><td>${pd}</td><td>${ed}</td><td class="${cn}">${pred}${dn?`<br><small class="error-note">${dn}</small>`:""}</td>`;
  });
}

function clearAll(){
  document.querySelectorAll("input").forEach(i=>{if(i.type!=="checkbox")i.value="";else i.checked=false;});
  ["aAutoTag","bAutoTag","h2hAutoTag"].forEach(id=>document.getElementById(id).style.display="none");
  setStatus("","");
  const t=document.getElementById("results");
  t.innerHTML="<tr><th>Pick</th><th>Projection</th><th>Edge</th><th>Prediction</th></tr>";
  t.style.display="none";
}

onLeagueChange();
</script>
