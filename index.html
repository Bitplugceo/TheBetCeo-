<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BB Engine">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d4af37">

<link rel="apple-touch-icon" href="0A45F320-A89F-4851-AA4E-CE22138FD52F.jpeg">
<link rel="icon" type="image/jpeg" href="0A45F320-A89F-4851-AA4E-CE22138FD52F.jpeg">

<title>Basketball Prediction Engine</title>

<style>

body{
background:#111;
color:#d4af37;
font-family:Segoe UI,sans-serif;
margin:0;
}

.wrapper{
max-width:760px;
margin:10px auto;
padding:0 10px;
}

.section{
border:1px solid #d4af37;
background:#1a1a1a;
padding:8px;
margin:6px auto;
}

input,select{
width:100%;
max-width:260px;
padding:5px;
font-size:12px;
background:#222;
color:#d4af37;
border:1px solid #d4af37;
margin-bottom:4px;
}

button{
padding:6px 16px;
margin:6px;
font-weight:bold;
background:#d4af37;
color:#111;
border:none;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
font-size:12px;
}

th,td{
border:1px solid #d4af37;
padding:6px;
text-align:center;
}

.pred-over{background:#1e7d3a;color:#fff;font-weight:bold;}
.pred-under{background:#8b1e1e;color:#fff;font-weight:bold;}
.pred-noplay{background:#444;color:#bbb;font-weight:bold;}

.lock{
font-size:4px;
display:inline-block;
vertical-align:middle;
margin-left:4px;
}

</style>
</head>

<body>

<h1 style="text-align:center">🏀 Basketball Prediction Engine</h1>

<div class="wrapper">

<div class="section">

<label>League</label>

<select id="leagueSelect">

<option value="nba">NBA</option>
<option value="euro">Euro Elite</option>
<option value="secondary">Europe Secondary</option>
<option value="ncaa">NCAA</option>
<option value="africa">Africa</option>

</select>

</div>

<div class="section">

<label>FT Total</label>
<input id="ftMarket">

<label>Team A Total</label>
<input id="teamAMarket">

<label>Team B Total</label>
<input id="teamBMarket">

</div>

<div class="section">

<h3>Team A</h3>

<label>Scored</label>
<input id="aFTScored">

<label>Allowed</label>
<input id="aFTAllowed">

</div>

<div class="section">

<h3>Team B</h3>

<label>Scored</label>
<input id="bFTScored">

<label>Allowed</label>
<input id="bFTAllowed">

</div>

<div style="text-align:center">

<button onclick="runEngine()">Run</button>
<button onclick="clearAll()">Clear</button>

</div>

<table id="results" style="display:none;">

<tr>
<th>Pick</th>
<th>Projection</th>
<th>Edge</th>
<th>Prediction</th>
</tr>

</table>

</div>

<script>

function parseGames(id){

let raw=document.getElementById(id).value.trim()

if(!raw)return null

let arr=raw.split(",").map(x=>parseFloat(x.trim()))

if(arr.some(x=>isNaN(x)))return "error"

return arr

}

function avg(arr){

return arr.reduce((a,b)=>a+b,0)/arr.length

}

function trimmedAvg(arr){

if(arr.length<5)return avg(arr)

let s=[...arr].sort((a,b)=>a-b)

s.shift()
s.pop()

return avg(s)

}

function stdDev(arr){

let m=avg(arr)

let v=arr.reduce((a,b)=>a+Math.pow(b-m,2),0)/(arr.length-1)

return Math.sqrt(v)

}

function mid(v){

let p=v.split("-").map(x=>parseFloat(x.trim()))

return (p[0]+p[1])/2

}

function runEngine(){

const table=document.getElementById("results")

table.style.display="table"

table.innerHTML="<tr><th>Pick</th><th>Projection</th><th>Edge</th><th>Prediction</th></tr>"

const league=document.getElementById("leagueSelect").value

const leagueBase={
nba:230,
euro:175,
secondary:170,
ncaa:150,
africa:160
}

const defenseFloor={
nba:107,
euro:72,
secondary:70,
ncaa:64,
africa:68
}

const volLimit={
nba:14,
euro:12,
secondary:12,
ncaa:11,
africa:11
}

let ftLine=mid(document.getElementById("ftMarket").value)

let aLine=mid(document.getElementById("teamAMarket").value)

let bLine=mid(document.getElementById("teamBMarket").value)

let aScArr=parseGames("aFTScored")

let aAlArr=parseGames("aFTAllowed")

let bScArr=parseGames("bFTScored")

let bAlArr=parseGames("bFTAllowed")

let aSc=trimmedAvg(aScArr)

let aAl=trimmedAvg(aAlArr)

let bSc=trimmedAvg(bScArr)

let bAl=trimmedAvg(bAlArr)

let baseA=(aSc*0.6)+(bAl*0.4)

let baseB=(bSc*0.6)+(aAl*0.4)

let pace=((aSc+aAl)+(bSc+bAl))/2

pace/=leagueBase[league]

pace=Math.max(0.9,Math.min(1.12,pace))

baseA*=0.5+pace/2

baseB*=0.5+pace/2

let ftProj=baseA+baseB

let aVol=(stdDev(aScArr)+stdDev(aAlArr))/2

let bVol=(stdDev(bScArr)+stdDev(bAlArr))/2

let volatilityBlock=false

if(aVol>volLimit[league]*1.35||bVol>volLimit[league]*1.35){

volatilityBlock=true

}

let paceGap=Math.abs((aSc+aAl)-(bSc+bAl))

let paceGapRisk=paceGap>18

let defensiveRisk=false

if(aAl<defenseFloor[league]||bAl<defenseFloor[league]){

defensiveRisk=true

}

let projDiff=Math.abs(baseA-baseB)

let picks=[

{name:"FT Total",proj:ftProj,line:ftLine,type:"ft"},

{name:"Team A Total",proj:baseA,line:aLine,type:"team"},

{name:"Team B Total",proj:baseB,line:bLine,type:"team"}

]

let lockIndex=-1

let maxStrength=0

picks.forEach((p,i)=>{

if(isNaN(p.proj)||isNaN(p.line))return

let edge=p.proj-p.line

let strength=Math.abs(edge/p.line)

if(strength>=0.045&&strength>maxStrength){

maxStrength=strength

lockIndex=i

}

})

picks.forEach((p,i)=>{

let edge=p.proj-p.line

let pick="NO PLAY"

if(Math.abs(edge)>=3){

let threshold=p.type==="ft"?p.line*0.045:p.line*0.05

if(Math.abs(edge)>=threshold){

pick=edge>0?"OVER "+p.line:"UNDER "+p.line

}

}

if(volatilityBlock)pick="NO PLAY"

if(paceGapRisk&&p.type==="ft")pick="NO PLAY"

if(defensiveRisk&&pick.startsWith("OVER"))pick="NO PLAY"

if(projDiff>20&&p.type==="ft")pick="NO PLAY"

let pred=pick

if(i===lockIndex&&pick!=="NO PLAY"){

pred+=` <span class="lock">🔒</span>`

}

let row=table.insertRow()

let className="pred-noplay"

if(pred.startsWith("OVER"))className="pred-over"

if(pred.startsWith("UNDER"))className="pred-under"

row.innerHTML=`

<td>${p.name}</td>

<td>${p.proj.toFixed(2)}</td>

<td>${edge.toFixed(2)}</td>

<td class="${className}">${pred}</td>

`

})

}

function clearAll(){

document.querySelectorAll("input").forEach(i=>i.value="")

document.getElementById("results").style.display="none"

}

</script>

</body>
</html>
