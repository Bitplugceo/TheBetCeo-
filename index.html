<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basketball Prediction Engine</title>

  <!-- Icons & PWA settings -->
  <link rel="icon" type="image/jpeg" href="0A45F320-A89F-4851-AA4E-CE22138FD52F.jpeg">
  <link rel="apple-touch-icon" href="0A45F320-A89F-4851-AA4E-CE22138FD52F.jpeg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BB Engine">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#d4af37">

  <style>
    body {
      background: #111;
      color: #d4af37;
      font-family: Segoe UI, sans-serif;
      margin: 0;
      padding: 10px;
    }
    .wrapper { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; font-size: 1.6em; margin: 10px 0; }
    .section {
      border: 1px solid #d4af37;
      background: #1a1a1a;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
    }
    label { display: block; font-size: 0.9em; margin: 6px 0 2px; }
    input, select {
      width: 100%;
      max-width: 320px;
      padding: 8px;
      font-size: 0.95em;
      background: #222;
      color: #d4af37;
      border: 1px solid #d4af37;
      border-radius: 4px;
      box-sizing: border-box;
    }
    input.error { border-color: #ff6b6b; }
    input[type=checkbox] { width: auto; }
    button {
      padding: 8px 20px;
      margin: 8px 4px;
      background: #d4af37;
      color: #111;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 0.9em;
      display: none;
    }
    th, td {
      border: 1px solid #d4af37;
      padding: 8px;
      text-align: center;
    }
    .pred-over { background: #1e7d3a; color: #fff; font-weight: bold; }
    .pred-under { background: #8b1e1e; color: #fff; font-weight: bold; }
    .pred-noplay { background: #444; color: #bbb; }
    .lock { font-size: 0.7em; vertical-align: middle; }
    small.error-note { color: #ff6b6b; font-size: 0.8em; display: block; margin-top: 3px; }
    #globalError { color: #ff6b6b; margin: 8px 0; min-height: 1.2em; }
    @media (min-width: 600px) { input, select { max-width: 400px; } }
  </style>
</head>
<body>
  <h1>🏀 Basketball Prediction Engine</h1>
  <div class="wrapper">

    <div class="section">
      <h3>League Tier</h3>
      <label>Select League</label>
      <select id="leagueSelect">
        <option value="nba">NBA</option>
        <option value="euro_elite">EuroLeague</option>
        <option value="euro_elite">EuroCup</option>
        <option value="euro_elite">Spain Liga ACB</option>
        <option value="euro_elite">Turkey BSL</option>
        <option value="euro_elite">Italy Serie A</option>
        <option value="euro_elite">Germany BBL</option>
        <option value="euro_elite">France Pro A</option>
        <option value="secondary">ABA Liga</option>
        <option value="secondary">Turkey TBL</option>
        <option value="secondary">France Pro B</option>
        <option value="secondary">Poland PLK</option>
        <option value="secondary">Greece A2</option>
        <option value="ncaa">NCAA</option>
        <option value="ncaa">NCAAB</option>
        <option value="africa">BAL</option>
        <option value="africa">Nigeria League</option>
        <option value="africa">Rwanda League</option>
        <option value="africa">AfroBasket</option>
        <option value="unknown">Unknown / Mixed</option>
      </select>
    </div>

    <div class="section">
      <h3>Market Lines</h3>
      <label>FT Total (e.g. 225.5 - 230.5)</label>
      <input id="ftMarket"><small id="ftMarketErr" class="error-note"></small>
      <label>Team A Total</label>
      <input id="teamAMarket"><small id="teamAMarketErr" class="error-note"></small>
      <label>Team B Total</label>
      <input id="teamBMarket"><small id="teamBMarketErr" class="error-note"></small>
    </div>

    <div class="section">
      <h3>Team A Last 5 (FT)</h3>
      <label>Scored</label>
      <input id="aFTScored"><small id="aFTScoredErr" class="error-note"></small>
      <label>Allowed</label>
      <input id="aFTAllowed"><small id="aFTAllowedErr" class="error-note"></small>
    </div>

    <div class="section">
      <h3>Team B Last 5 (FT)</h3>
      <label>Scored</label>
      <input id="bFTScored"><small id="bFTScoredErr" class="error-note"></small>
      <label>Allowed</label>
      <input id="bFTAllowed"><small id="bFTAllowedErr" class="error-note"></small>
    </div>

    <div class="section">
      <h3>Head-to-Head (FT)</h3>
      <label><input type="checkbox" id="useFTH2H"> Use H2H (min 2 games each)</label>
      <label>Team A H2H points</label>
      <input id="aFTH2H"><small id="aFTH2HErr" class="error-note"></small>
      <label>Team B H2H points</label>
      <input id="bFTH2H"><small id="bFTH2HErr" class="error-note"></small>
    </div>

    <div style="text-align: center;">
      <button id="runBtn">Run Engine</button>
      <button id="clearBtn">Clear All</button>
      <div id="globalError"></div>
    </div>

    <table id="results">
      <thead>
        <tr>
          <th>Pick</th>
          <th>Proj</th>
          <th>Edge</th>
          <th>Edge %</th>
          <th>Conf</th>
          <th>Prediction</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </div>

  <script>
    <script>
(function () {

  const CONFIG = {
    leagueBases: {
      nba: 230.6,
      euro_elite: 172,
      secondary: 165,
      ncaa: 148,
      africa: 158,
      unknown: 160
    },
    paceClamps: {
      nba: {min:0.88, max:1.18},
      euro_elite: {min:0.90, max:1.12},
      secondary: {min:0.90, max:1.12},
      ncaa: {min:0.88, max:1.15},
      africa: {min:0.88, max:1.15},
      unknown: {min:0.88, max:1.15}
    },
    offenseWeight: 0.55,
    h2hTargetWeight: 0.25,
    volLimit: 12,
    meanRegWeight: 0.30,
    decisionThresholds: {
      nba: {pos:0.022, neg:0.032},
      euro_elite: {pos:0.028, neg:0.038},
      default: {pos:0.030, neg:0.040}
    },
    maxPoints: { nba:200, default:180 }
  };

  const DOM = {
    league: document.getElementById('leagueSelect'),
    runBtn: document.getElementById('runBtn'),
    clearBtn: document.getElementById('clearBtn'),
    globalError: document.getElementById('globalError'),
    results: document.getElementById('results'),
    tbody: document.querySelector('#results tbody')
  };

  function getLeagueConfig(league) {
    return {
      base: CONFIG.leagueBases[league] || 160,
      clamps: CONFIG.paceClamps[league] || CONFIG.paceClamps.unknown,
      thresh: CONFIG.decisionThresholds[league] || CONFIG.decisionThresholds.default,
      maxPt: CONFIG.maxPoints[league] || CONFIG.maxPoints.default
    };
  }

  function avg(a) { return a.length ? a.reduce((x,y)=>x+y,0)/a.length : NaN; }

  function std(a) {
    if (a.length < 2) return 1; // prevent division by zero in z-score
    const m = avg(a);
    return Math.sqrt(a.reduce((s,x)=>s+(x-m)**2,0)/(a.length-1));
  }

  function shrink(sampleAvg, leagueAvg, w = CONFIG.meanRegWeight) {
    return (1-w)*sampleAvg + w*leagueAvg;
  }

  function parseNumbers(id, errId, maxPt) {
    const el = document.getElementById(id);
    const err = document.getElementById(errId);
    err.textContent = '';
    el.classList.remove('error');

    const raw = el.value.trim();
    if (!raw) return null;

    const arr = raw.split(',')
      .map(x => parseFloat(x.trim()))
      .filter(n => Number.isFinite(n));

    if (!arr.length || arr.some(n => n < 0 || n > maxPt)) {
      err.textContent = 'Invalid format or unrealistic values';
      el.classList.add('error');
      return null;
    }

    return arr;
  }

  function midRange(id, errId) {
    const el = document.getElementById(id);
    const err = document.getElementById(errId);
    err.textContent = '';
    el.classList.remove('error');

    const v = el.value.trim();
    if (!v.includes('-')) {
      err.textContent = 'Use format: low - high';
      el.classList.add('error');
      return NaN;
    }

    const [low, high] = v.split('-').map(x => parseFloat(x.trim()));

    if (!Number.isFinite(low) || !Number.isFinite(high) ||
        low <= 0 || high <= 0 || high <= low) {
      err.textContent = 'Invalid market range';
      el.classList.add('error');
      return NaN;
    }

    return (low + high) / 2;
  }

  function getPaceFactor(aSc, aAl, bSc, bAl, cfg) {
    if ([aSc,aAl,bSc,bAl].some(isNaN)) return 1;

    const raw = (aSc + aAl + bSc + bAl) / (2 * cfg.base);

    return Math.max(cfg.clamps.min,
           Math.min(cfg.clamps.max, raw));
  }

  function applyVolatility(p, sd, lim = CONFIG.volLimit) {
    if (!Number.isFinite(p) || !Number.isFinite(sd)) return p;

    if (sd < lim * 0.6) return p * 1.01;
    if (sd <= lim) return p;

    const f = Math.min(1, (sd - lim) / (lim * 1.5));
    return p * (1 - 0.05 * f);
  }

  function getDecision(edge, line, thresh, zScore) {
    if (!Number.isFinite(edge) || !Number.isFinite(line))
      return {txt:'—', cls:'pred-noplay'};

    const absE = Math.abs(edge);
    const thr = edge > 0 ? thresh.pos : thresh.neg;

    if (absE < thr * line || Math.abs(zScore) < 0.5)
      return {txt:'NO PLAY', cls:'pred-noplay'};

    return {
      txt: edge > 0
        ? `OVER ${line.toFixed(1)}`
        : `UNDER ${line.toFixed(1)}`,
      cls: edge > 0 ? 'pred-over' : 'pred-under'
    };
  }

  function getConfidence(sample, vol, zScore, leagueBase) {
    const adj = leagueBase > 200 ? 1 : 0.85;

    if (Math.abs(zScore) > 1.0*adj && sample >= 5 && vol < 10)
      return 'High';

    if (Math.abs(zScore) > 0.7*adj && sample >= 3)
      return 'Medium';

    return 'Low';
  }

  function calculate() {

    const cfg = getLeagueConfig(DOM.league.value);
    const teamLeagueAvg = cfg.base / 2;

    const ftL = midRange('ftMarket','ftMarketErr');
    const aL  = midRange('teamAMarket','teamAMarketErr');
    const bL  = midRange('teamBMarket','teamBMarketErr');

    const aScA = parseNumbers('aFTScored','aFTScoredErr',cfg.maxPt);
    const aAlA = parseNumbers('aFTAllowed','aFTAllowedErr',cfg.maxPt);
    const bScA = parseNumbers('bFTScored','bFTScoredErr',cfg.maxPt);
    const bAlA = parseNumbers('bFTAllowed','bFTAllowedErr',cfg.maxPt);

    if ([ftL,aL,bL].some(isNaN) ||
        [aScA,aAlA,bScA,bAlA].some(v=>!v||!v.length)) {
      DOM.globalError.textContent =
        'Please fill all required fields correctly';
      return null;
    }

    const aSc = shrink(avg(aScA), teamLeagueAvg);
    const aAl = shrink(avg(aAlA), teamLeagueAvg);
    const bSc = shrink(avg(bScA), teamLeagueAvg);
    const bAl = shrink(avg(bAlA), teamLeagueAvg);

    const pace = getPaceFactor(aSc,aAl,bSc,bAl,cfg);

    let pA = CONFIG.offenseWeight*aSc +
             (1-CONFIG.offenseWeight)*bAl*pace;

    let pB = CONFIG.offenseWeight*bSc +
             (1-CONFIG.offenseWeight)*aAl*pace;

    const aVol = (std(aScA)+std(aAlA))/2;
    const bVol = (std(bScA)+std(bAlA))/2;

    pA = applyVolatility(pA,aVol);
    pB = applyVolatility(pB,bVol);

    pA = Math.min(pA, cfg.maxPt);
    pB = Math.min(pB, cfg.maxPt);

    return {
      cfg,
      ftL,aL,bL,
      pA,pB,
      ftP: pA+pB,
      aVol,bVol,
      sample: Math.max(
        aScA.length,bScA.length,
        aAlA.length,bAlA.length
      )
    };
  }

function render(data) {

  DOM.tbody.innerHTML = '';

  // Correct total volatility aggregation
  const totalVol = Math.sqrt(
    Math.pow(data.aVol, 2) +
    Math.pow(data.bVol, 2)
  );

  const picks = [
    {name:'FT Total', proj:data.ftP, line:data.ftL, vol:totalVol},
    {name:'Team A', proj:data.pA, line:data.aL, vol:data.aVol},
    {name:'Team B', proj:data.pB, line:data.bL, vol:data.bVol}
  ];

  let best = {val:0, idx:-1};

  picks.forEach((p,i)=>{

    if (!Number.isFinite(p.line) || p.line <= 0) return;

    const edge = p.proj - p.line;
    const edgePct = (edge / p.line) * 100;

    // Protect against extremely small volatility
    const safeVol = p.vol < 0.01 ? 0.01 : p.vol;
    const zScore = edge / safeVol;

    const d = getDecision(edge,p.line,data.cfg.thresh,zScore);

    const conf = getConfidence(
      data.sample,
      p.vol,
      zScore,
      data.cfg.base
    );

    if (d.txt !== 'NO PLAY' &&
        Math.abs(zScore) > best.val)
      best = {val:Math.abs(zScore),idx:i};

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${p.name}</td>
      <td>${p.proj.toFixed(1)}</td>
      <td>${edge.toFixed(1)}</td>
      <td>${edgePct.toFixed(1)}%</td>
      <td>${zScore.toFixed(2)}</td>
      <td>${conf}</td>
      <td class="${d.cls}">
        ${d.txt}${i===best.idx && d.txt!=='NO PLAY'?' <span class="lock">🔒</span>':''}
      </td>
    `;
    DOM.tbody.appendChild(tr);
  });

  DOM.results.style.display = 'table';
}

  function runEngine() {
    DOM.globalError.textContent = '';
    DOM.results.style.display = 'none';
    DOM.runBtn.disabled = true;

    try {
      const data = calculate();
      if (data) render(data);
    } finally {
      DOM.runBtn.disabled = false;
    }
  }

  function clearAll() {
    document.querySelectorAll('input:not([type="checkbox"])')
      .forEach(el=>el.value='');

    document.querySelectorAll('input[type="checkbox"]')
      .forEach(el=>el.checked=false);

    document.querySelectorAll('small.error-note')
      .forEach(el=>el.textContent='');

    document.querySelectorAll('input')
      .forEach(el=>el.classList.remove('error'));

    DOM.results.style.display='none';
    DOM.tbody.innerHTML='';
    DOM.globalError.textContent='';
  }

  DOM.runBtn.onclick = runEngine;
  DOM.clearBtn.onclick = clearAll;

  document.addEventListener('keydown', e=>{
    if (e.key==='Enter' &&
        document.activeElement.tagName!=='BUTTON') {
      e.preventDefault();
      runEngine();
    }
  });

})();
</script>
  </script>
</body>
</html>
