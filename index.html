// Fetch with 8s timeout
async function proxyFetch(url) {
const controller = new AbortController();
const timer = setTimeout(() => controller.abort(), 8000);
try {
const res = await fetch(WORKER_URL + “?url=” + encodeURIComponent(url), { signal: controller.signal });
clearTimeout(timer);
if (!res.ok) throw new Error(“HTTP “ + res.status);
const text = await res.text();
try { return JSON.parse(text); } catch(e) { throw new Error(“Bad JSON”); }
} catch(e) {
clearTimeout(timer);
throw e;
}
}

// Safe fetch — never throws, returns null on failure
async function safeFetch(url) {
try { return await proxyFetch(url); } catch(e) { return null; }
}

function lookupTeamId(name) {
const n = name.toLowerCase().trim();
// Exact match first
if (NBA_TEAM_MAP[n]) return NBA_TEAM_MAP[n];
if (NCAA_TEAM_MAP[n]) return NCAA_TEAM_MAP[n];
// Partial match
for (const key of Object.keys(NBA_TEAM_MAP)) {
if (n.includes(key) || key.includes(n)) return NBA_TEAM_MAP[key];
}
for (const key of Object.keys(NCAA_TEAM_MAP)) {
if (n.includes(key) || key.includes(n)) return NCAA_TEAM_MAP[key];
}
return null;
}

function pv(p) {
if (!p) return 0;
if (typeof p === “object”) return parseFloat(p.value ?? p.displayValue ?? 0) || 0;
return parseFloat(p) || 0;
}

function ps(s) {
if (s === null || s === undefined) return NaN;
if (typeof s === “object”) return parseFloat(s.value ?? s.displayValue ?? 0);
return parseFloat(s);
}

function normId(raw) {
if (!raw) return “”;
const s = String(raw);
const m = s.match(/t:(\d+)/);
return m ? m[1] : s.replace(/\D/g,””) || s;
}

function stripOT(score, lines, regPeriods) {
if (!lines || lines.length <= regPeriods) return score;
const total = lines.reduce((s,p) => s + pv(p), 0);
if (Math.abs(total - score) > 3) return score;
let ot = 0;
for (let i = regPeriods; i < lines.length; i++) ot += pv(lines[i]);
return ot > 0 ? score - ot : score;
}

}

if (team.location&&n.includes(team.location.toLowerCase())) score+=3;

}

function parseGames(id){let raw=document.getElementById(id).value.trim();if(!raw)return null;let arr=raw.split(”,”).map(x=>parseFloat(x.trim()));if(arr.some(x=>isNaN(x)||x<0||x>300))return”error”;return arr;}
function avg(arr){if(!arr||!arr.length)return NaN;return arr.reduce((a,b)=>a+b,0)/arr.length;}
function trimmedAvg(arr){if(!arr||!arr.length)return NaN;if(arr.length<5)return avg(arr);let s=[…arr].sort((a,b)=>a-b);s.shift();s.pop();return avg(s);}
function stdDev(arr){if(!arr||arr.length<2)return 0;let m=avg(arr);return Math.sqrt(arr.reduce((a,b)=>a+Math.pow(b-m,2),0)/(arr.length-1));}
function mid(val){if(!val)return NaN;val=val.trim();if(!val.includes(”-”))return NaN;let p=val.split(”-”).map(x=>x.trim());let a=parseFloat(p[0]),b=parseFloat(p[1]);if(isNaN(a)||isNaN(b))return NaN;return(a+b)/2;}
function displayLine(val){return(Math.round(val*2)/2).toFixed(1);}
function dynamicWeight(s){if(!s||s.length<2)return 0;return s.length<=3?0.20:0.30;}
function applyVolatility(proj,std,limit){if(isNaN(proj)||isNaN(std))return NaN;if(std<=limit)return proj;return proj*(1-0.07*Math.min(1,(std-limit)/limit));}

function decision(edge,line,type,teamSc,aSc,bSc){
if(isNaN(edge)||isNaN(line))return”NaN”;
if(Math.abs(edge/line)<0.045)return”NO PLAY”;
const isTotal=type===“ft_total”||type===“1h_total”;
let thr=isTotal?(edge>0?line*0.045:line*0.06):(edge>0?line*0.05:line*0.065);
if(Math.abs(edge)<thr)return”NO PLAY”;
if(edge<0){
if(isTotal&&!isNaN(aSc)&&!isNaN(bSc)&&(aSc>=line*0.58||bSc>=line*0.58))return”NO PLAY”;
if(type===“team”&&!isNaN(teamSc)&&teamSc>=line*0.58)return”NO PLAY”;
}
return edge>0?“OVER “+displayLine(line):“UNDER “+displayLine(line);
}

}

const isNbaOrNcaa=league===“nba”||league===“ncaa”;
let h1P=NaN,h1Line=NaN,aVol1=0,bVol1=0,vl1=7,pgr1=false,dfr1=false;
if(isNbaOrNcaa){
h1Line=mid(document.getElementById(“h1Market”).value);
const eb1H=eb/2;
const a1HS=parseGames(“a1HScored”),a1HA=parseGames(“a1HAllowed”);
const b1HS=parseGames(“b1HScored”),b1HA=parseGames(“b1HAllowed”);
const aS1=a1HS===“error”||!a1HS?NaN:trimmedAvg(a1HS);
const aA1=a1HA===“error”||!a1HA?NaN:trimmedAvg(a1HA);
const bS1=b1HS===“error”||!b1HS?NaN:trimmedAvg(b1HS);
const bA1=b1HA===“error”||!b1HA?NaN:trimmedAvg(b1HA);
if(!isNaN(aS1)&&!isNaN(aA1)&&!isNaN(bS1)&&!isNaN(bA1)){
let bA1H=(aS1+bA1)/2,bB1H=(bS1+aA1)/2;
const tAP1=(aS1+aA1)/2,tBP1=(bS1+bA1)/2;
pgr1=Math.abs(tAP1-tBP1)>eb1H*0.10;
const pace1=Math.max(cl.min,Math.min(cl.max,(tAP1+tBP1)/2/eb1H));
if(document.getElementById(“use1HH2H”).checked){
const h2ha1=parseGames(“a1HH2H”),h2hb1=parseGames(“b1HH2H”);
if(h2ha1&&h2hb1&&h2ha1!==“error”&&h2hb1!==“error”&&h2ha1.length>=2&&h2hb1.length>=2){
const w1=Math.min(0.30,dynamicWeight(h2ha1)+dynamicWeight(h2hb1));
const bt1=bA1H+bB1H,ht1=avg(h2ha1)+avg(h2hb1);
if(!isNaN(bt1)&&!isNaN(ht1)&&bt1>0){
let r1=(bt1*(1-w1)+ht1*w1)/bt1;
if(Math.abs(ht1-bt1)/bt1>0.20)r1=(bt1*(1-w1*0.5)+ht1*w1*0.5)/bt1;
bA1H*=r1;bB1H*=r1;
}
}
}
vl1={“nba”:7,“ncaa”:6}[league]||7;
aVol1=(stdDev(a1HS||[])+stdDev(a1HA||[]))/2;
bVol1=(stdDev(b1HS||[])+stdDev(b1HA||[]))/2;
dfr1=(!isNaN(aA1)&&aA1<eb1H*0.40)||(!isNaN(bA1)&&bA1<eb1H*0.40);
bA1H=applyVolatility(bA1H,aVol1,vl1);
bB1H=applyVolatility(bB1H,bVol1,vl1);
bA1H=(bA1H*0.85)+(eb1H*0.15); bB1H=(bB1H*0.85)+(eb1H*0.15);
bA1H=bA1H*(0.5+pace1/2); bB1H=bB1H*(0.5+pace1/2);
h1P=bA1H+bB1H;
if(!isNaN(h1P)){
if(Math.abs(bA1H-bB1H)>9)h1P*=0.98;
if(pgr1)h1P*=0.97;
if(!isNaN(h1Line)&&Math.abs(h1P-h1Line)>12)h1P=h1Line+(h1P-h1Line)*0.5;
if(league===“nba”&&!isNaN(h1Line)&&Math.abs(h1P-h1Line)>9)h1P=h1Line+(h1P-h1Line)*0.65;
}
}
}

let picks=[
{name:“FT Total”,    proj:ftP, line:ftLine,type:“ft_total”,teamSc:null,aSc:aS,bSc:bS},
{name:“1H Total”,    proj:h1P, line:h1Line,type:“1h_total”,teamSc:null,aSc:aS,bSc:bS},
{name:“Team A Total”,proj:bAFT,line:aLine, type:“team”,    teamSc:aS,  aSc:aS,bSc:bS},
{name:“Team B Total”,proj:bBFT,line:bLine, type:“team”,    teamSc:bS,  aSc:aS,bSc:bS}
];
if(!isNbaOrNcaa||isNaN(h1P)) picks=picks.filter(p=>p.type!==“1h_total”);

let li=-1,ms=0;
picks.forEach((p,i)=>{
if(isNaN(p.line)||isNaN(p.proj))return;
const e=p.proj-p.line,st=Math.abs(e/p.line);
const pt=decision(e,p.line,p.type,p.teamSc,p.aSc,p.bSc);
if(fma&&pt!==“NO PLAY”&&pt!==“NaN”&&st>=0.045&&st>ms){ms=st;li=i;}
});

picks.forEach((p,i)=>{
let edge=NaN,pt=“NaN”,dn=””;
if(isNaN(p.line)){dn=“Missing / Invalid Line”;pt=”—”;}
else if(isNaN(p.proj)){dn=“Missing / Invalid Last-5 Data”;pt=”—”;}
else{
edge=p.proj-p.line;
pt=decision(edge,p.line,p.type,p.teamSc,p.aSc,p.bSc);
if(Math.abs(edge)<p.line*0.025)pt=“NO PLAY”;
if(p.type===“ft_total”&&pt.startsWith(“OVER”)){
if(pgr||dfr)pt=“NO PLAY”;
if(Math.abs(bAFT-bBFT)>20)pt=“NO PLAY”;
if(aVol>vl&&bVol>vl)pt=“NO PLAY”;
}
if(p.type===“1h_total”&&pt.startsWith(“OVER”)){
if(pgr1||dfr1)pt=“NO PLAY”;
if(aVol1>vl1&&bVol1>vl1)pt=“NO PLAY”;
}
}
let pred=pt;
if(i===li&&pt!==“NO PLAY”&&pt!==“NaN”)pred+=` <span class="lock">🔒</span>`;
const pd=isNaN(p.proj)?“NaN”:p.proj.toFixed(2);
const ed=isNaN(edge)?“NaN”:edge.toFixed(2);
const cn=pred.startsWith(“OVER”)?“pred-over”:pred.startsWith(“UNDER”)?“pred-under”:“pred-noplay”;
const row=table.insertRow();
row.innerHTML=`<td>${p.name}</td><td>${pd}</td><td>${ed}</td><td class="${cn}">${pred}${dn?`<br><small class="error-note">${dn}</small>`:""}</td>`;
});
}

function clearAll(){
// Re-enable fetch button in case it got stuck
document.getElementById(“fetchBtn”).disabled = false;
// Clear data fields only (keep team name inputs)
[“aFTScored”,“aFTAllowed”,“a1HScored”,“a1HAllowed”,
“bFTScored”,“bFTAllowed”,“b1HScored”,“b1HAllowed”,
“aFTH2H”,“bFTH2H”,“a1HH2H”,“b1HH2H”,
“ftMarket”,“h1Market”,“teamAMarket”,“teamBMarket”].forEach(id=>{
const el=document.getElementById(id);
if(el) el.value=””;
});
[“useFTH2H”,“use1HH2H”].forEach(id=>{
const el=document.getElementById(id);
if(el) el.checked=false;
});
[“aAutoTag”,“bAutoTag”,“h2hAutoTag”].forEach(id=>document.getElementById(id).style.display=“none”);
setStatus(””,””);
const t=document.getElementById(“results”);
t.innerHTML=”<tr><th>Pick</th><th>Projection</th><th>Edge</th><th>Prediction</th></tr>”;
t.style.display=“none”;
}

onLeagueChange();
</script>
