function lookupTeamId(name) {
  const n = name.toLowerCase().trim();
  // exact match first
  for (let key of Object.keys(NBA_TEAM_MAP)) {
    if (n === key) return NBA_TEAM_MAP[key];
  }
  for (let key of Object.keys(NCAA_TEAM_MAP)) {
    if (n === key) return NCAA_TEAM_MAP[key];
  }
  // partial match
  for (let key of Object.keys(NBA_TEAM_MAP)) {
    if (n.includes(key) || key.includes(n)) return NBA_TEAM_MAP[key];
  }
  for (let key of Object.keys(NCAA_TEAM_MAP)) {
    if (n.includes(key) || key.includes(n)) return NCAA_TEAM_MAP[key];
  }
  return null;
}

// Parse score from ESPN — can be number, string, or object {value, displayValue}
function parseScore(s) {
  if (s === null || s === undefined) return NaN;
  if (typeof s === "object") return parseFloat(s.value ?? s.displayValue ?? 0);
  return parseFloat(s);
}

// Parse linescore value
function parsePeriod(p) {
  if (!p) return 0;
  if (typeof p === "object") return parseFloat(p.value ?? p.displayValue ?? 0) || 0;
  return parseFloat(p) || 0;
}

// Get team ID from a competitor object — schedule uses c.id, summary uses c.team.id
function getCompId(c) {
  return String(c.id ?? c.team?.id ?? "");
}

// Strip OT from NCAA game (2 halves regulation)
function stripOtNcaa(score, linescores) {
  if (!linescores || linescores.length <= 2) return score;
  const total = linescores.reduce((s, p) => s + parsePeriod(p), 0);
  if (Math.abs(total - score) > 3) return score; // validation failed
  let ot = 0;
  for (let i = 2; i < linescores.length; i++) ot += parsePeriod(linescores[i]);
  return ot > 0 ? score - ot : score;
}

// Strip OT from NBA game (4 quarters regulation)
function stripOtNba(score, linescores) {
  if (!linescores || linescores.length <= 4) return score;
  const total = linescores.reduce((s, p) => s + parsePeriod(p), 0);
  if (Math.abs(total - score) > 3) return score;
  let ot = 0;
  for (let i = 4; i < linescores.length; i++) ot += parsePeriod(linescores[i]);
  return ot > 0 ? score - ot : score;
}

function normalizeId(raw) {
  if (!raw) return "";
  const s = String(raw);
  const m = s.match(/t:(\d+)/);
  if (m) return m[1];
  return s.replace(/\D/g, "") || s;
}

// ─────────────────────────────────────────────
// NCAA: fetch last 5 games via team schedule
// NO summary calls — use schedule data directly
// ─────────────────────────────────────────────
async function fetchNcaaSchedule(base, teamId) {
  const tId = String(teamId);
  const allEvents = [];

  // Fetch current + previous season, regular + postseason
  const fetches = [];
  for (const season of ["2026","2025"]) {
    for (const type of ["2","3"]) {
      fetches.push(
        proxyFetch(`${base}/teams/${teamId}/schedule?season=${season}&seasontype=${type}`)
          .catch(() => ({}))
      );
    }
  }
  const results = await Promise.all(fetches);
  for (const r of results) {
    const evs = r?.events || r?.team?.schedule?.events || [];
    allEvents.push(...evs);
  }

  // Deduplicate by event id
  const seen = new Set();
  const unique = allEvents.filter(ev => {
    if (!ev.id || seen.has(ev.id)) return false;
    seen.add(ev.id); return true;
  });

  // Sort newest first
  unique.sort((a, b) => new Date(b.date||0) - new Date(a.date||0));

  const scored=[], allowed=[], h1Scored=[], h1Allowed=[];

  for (const ev of unique) {
    if (scored.length >= 5) break;
    const comp = ev?.competitions?.[0];
    if (!comp) continue;

    const competitors = comp?.competitors || [];
    if (competitors.length < 2) continue;

    // Find our team and opponent
    const mine = competitors.find(c => getCompId(c) === tId) || competitors[0];
    const opp  = competitors.find(c => getCompId(c) !== tId) || competitors[1];

    let ms = parseScore(mine?.score);
    let os = parseScore(opp?.score);

    // Skip if no valid scores
    if (isNaN(ms) || isNaN(os) || ms <= 0 || os <= 0) continue;

    // Strip OT
    const lm = mine?.linescores || [];
    const lo = opp?.linescores  || [];
    ms = stripOtNcaa(ms, lm);
    os = stripOtNcaa(os, lo);

    // 1H = first half linescore
    const h1m = lm.length >= 1 ? parsePeriod(lm[0]) : 0;
    const h1o = lo.length >= 1 ? parsePeriod(lo[0]) : 0;

    scored.push(Math.round(ms));
    allowed.push(Math.round(os));
    if (h1m > 0) { h1Scored.push(Math.round(h1m)); h1Allowed.push(Math.round(h1o)); }
  }

  return scored.length >= 2 ? { scored, allowed, h1Scored, h1Allowed } : null;
}

// ─────────────────────────────────────────────
// NCAA H2H: scan Team A schedule for Team B
// NO summary calls — use schedule data directly
// ─────────────────────────────────────────────
async function fetchNcaaH2H(base, teamAId, teamBId) {
  const tA = String(teamAId);
  const tB = String(teamBId);
  const allEvents = [];

  const fetches = [];
  for (const season of ["2026","2025","2024"]) {
    for (const type of ["2","3"]) {
      fetches.push(
        proxyFetch(`${base}/teams/${teamAId}/schedule?season=${season}&seasontype=${type}`)
          .catch(() => ({}))
      );
    }
  }
  const results = await Promise.all(fetches);
  for (const r of results) {
    const evs = r?.events || r?.team?.schedule?.events || [];
    allEvents.push(...evs);
  }

  // Deduplicate
  const seen = new Set();
  const unique = allEvents.filter(ev => {
    if (!ev.id || seen.has(ev.id)) return false;
    seen.add(ev.id); return true;
  });

  // Sort newest first
  unique.sort((a, b) => new Date(b.date||0) - new Date(a.date||0));

  const h2h = [];

  for (const ev of unique) {
    if (h2h.length >= 5) break;
    const dateStr = ev?.date || "";
    if (dateStr && dateStr < "2024-01-01") continue;

    const comp = ev?.competitions?.[0];
    if (!comp) continue;

    const competitors = comp?.competitors || [];
    if (competitors.length < 2) continue;

    // Check if Team B is in this game
    const hasB = competitors.some(c => getCompId(c) === tB);
    if (!hasB) continue;

    const cA = competitors.find(c => getCompId(c) === tA) || competitors[0];
    const cB = competitors.find(c => getCompId(c) === tB) || competitors[1];

    let sA = parseScore(cA?.score);
    let sB = parseScore(cB?.score);

    if (isNaN(sA) || isNaN(sB) || sA <= 0 || sB <= 0) continue;

    // Strip OT
    sA = stripOtNcaa(sA, cA?.linescores || []);
    sB = stripOtNcaa(sB, cB?.linescores || []);

    const lA = cA?.linescores || [];
    const lB = cB?.linescores || [];
    const h1A = lA.length >= 1 ? parsePeriod(lA[0]) : 0;
    const h1B = lB.length >= 1 ? parsePeriod(lB[0]) : 0;

    h2h.push({
      teamAId: tA, teamBId: tB,
      scoreA: Math.round(sA), scoreB: Math.round(sB),
      h1A, h1B, date: dateStr
    });
  }

  return h2h;
}

// ─────────────────────────────────────────────
// NBA: scoreboard day by day
// ─────────────────────────────────────────────
function parseNbaEvents(data) {
  const games = [];
  for (const ev of (data?.events || [])) {
    const comp = ev?.competitions?.[0];
    if (!comp?.status?.type?.completed) continue;
    const c = comp.competitors || [];
    if (c.length < 2) continue;
    let sA = Number(c[0]?.score), sB = Number(c[1]?.score);
    if (isNaN(sA) || isNaN(sB) || (sA === 0 && sB === 0)) continue;
    const lA = c[0]?.linescores || [], lB = c[1]?.linescores || [];
    sA = stripOtNba(sA, lA);
    sB = stripOtNba(sB, lB);
    const h1A = lA.length >= 2 ? parsePeriod(lA[0]) + parsePeriod(lA[1]) : 0;
    const h1B = lB.length >= 2 ? parsePeriod(lB[0]) + parsePeriod(lB[1]) : 0;
    if (sA > 0 && sB > 0) {
      games.push({
        teamAId: String(c[0]?.team?.id), teamBId: String(c[1]?.team?.id),
        scoreA: sA, scoreB: sB, h1A, h1B, date: ev?.date || ""
      });
    }
  }
  return games;
}

async function fetchNbaScoreboard(base, daysBack) {
  const all = [];
  for (let i = 1; i <= daysBack; i++) {
    try { all.push(...parseNbaEvents(await proxyFetch(`${base}/scoreboard?dates=${getDateString(i)}&limit=200`))); } catch(e) {}
  }
  return all;
}

// ─────────────────────────────────────────────
// NBA H2H: scan schedule (same as NCAA approach)
// ─────────────────────────────────────────────
async function fetchNbaH2H(base, teamAId, teamBId) {
  const tA = String(teamAId), tB = String(teamBId);
  const allEvents = [];

  const fetches = [];
  for (const season of ["2026","2025","2024"]) {
    for (const type of ["2","3"]) {
      fetches.push(
        proxyFetch(`${base}/teams/${teamAId}/schedule?season=${season}&seasontype=${type}`)
          .catch(() => ({}))
      );
    }
  }
  const results = await Promise.all(fetches);
  for (const r of results) {
    const evs = r?.events || r?.team?.schedule?.events || [];
    allEvents.push(...evs);
  }

  const seen = new Set();
  const unique = allEvents.filter(ev => {
    if (!ev.id || seen.has(ev.id)) return false;
    seen.add(ev.id); return true;
  });
  unique.sort((a, b) => new Date(b.date||0) - new Date(a.date||0));

  const h2h = [];
  for (const ev of unique) {
    if (h2h.length >= 5) break;
    const dateStr = ev?.date || "";
    if (dateStr && dateStr < "2024-01-01") continue;
    const comp = ev?.competitions?.[0];
    if (!comp) continue;
    const competitors = comp?.competitors || [];
    if (competitors.length < 2) continue;
    const hasB = competitors.some(c => getCompId(c) === tB);
    if (!hasB) continue;
    const cA = competitors.find(c => getCompId(c) === tA) || competitors[0];
    const cB = competitors.find(c => getCompId(c) === tB) || competitors[1];
    let sA = parseScore(cA?.score);
    let sB = parseScore(cB?.score);
    if (isNaN(sA) || isNaN(sB) || sA <= 0 || sB <= 0) continue;
    sA = stripOtNba(sA, cA?.linescores || []);
    sB = stripOtNba(sB, cB?.linescores || []);
    const lA = cA?.linescores || [], lB = cB?.linescores || [];
    const h1A = lA.length >= 2 ? parsePeriod(lA[0]) + parsePeriod(lA[1]) : 0;
    const h1B = lB.length >= 2 ? parsePeriod(lB[0]) + parsePeriod(lB[1]) : 0;
    h2h.push({ teamAId: tA, teamBId: tB, scoreA: Math.round(sA), scoreB: Math.round(sB), h1A, h1B, date: dateStr });
  }
  return h2h;
}

function extractLastFive(games, teamId) {
  const scored=[], allowed=[], h1Scored=[], h1Allowed=[];
  const sorted = [...games].sort((a,b) => new Date(b.date||0) - new Date(a.date||0));
  for (const g of sorted) {
    if (scored.length >= 5) break;
    if (g.teamAId === teamId) {
      scored.push(g.scoreA); allowed.push(g.scoreB);
      if (g.h1A > 0) { h1Scored.push(g.h1A); h1Allowed.push(g.h1B); }
    } else if (g.teamBId === teamId) {
      scored.push(g.scoreB); allowed.push(g.scoreA);
      if (g.h1B > 0) { h1Scored.push(g.h1B); h1Allowed.push(g.h1A); }
    }
  }
  return scored.length >= 2 ? { scored, allowed, h1Scored, h1Allowed } : null;
}

async function searchTeamFromAPI(base, name) {
  const n = name.toLowerCase().trim();

  // Strategy 1: ESPN search API (most reliable for any team name)
  try {
    const data = await proxyFetch(`https://site.api.espn.com/apis/common/v3/search?query=${encodeURIComponent(name)}&limit=20&type=team&sport=basketball`);
    const items = data?.items || data?.results || [];
    for (const r of items) {
      // Filter to college basketball only
      const uid = r?.uid || r?.team?.uid || "";
      const isCollege = uid.includes("s:40") || r?.type === "team";
      const id = r?.id || r?.team?.id;
      const m = uid.match(/t:(\d+)/);
      const teamId = m ? m[1] : (id && String(id).match(/^\d+$/) ? String(id) : null);
      if (teamId) return teamId;
    }
  } catch(e) {}

  // Strategy 2: ESPN teams list with fuzzy matching
  try {
    const data = await proxyFetch(`${base}/teams?limit=1000&groups=100`);
    const leagues = data?.sports?.[0]?.leagues || [];
    let teams = [];
    for (const l of leagues) teams = teams.concat(l?.teams || []);
    if (!teams.length) teams = data?.teams || [];

    const words = n.split(/\s+/).filter(w => w.length >= 3);
    let best = null, bestScore = 0;

    for (let t of teams) {
      const team = t.team || t;
      const fields = [
        team.displayName, team.shortDisplayName, team.name,
        team.nickname, team.abbreviation, team.location
      ].filter(Boolean).map(f => f.toLowerCase());
      const joined = fields.join(" ");

      // Exact full name match
      if (joined.includes(n)) return String(team.id);

      // Score by word matches
      let score = 0;
      for (const w of words) {
        if (fields.some(f => f.includes(w))) score += 2;
      }
      // Bonus for location or nickname match
      if (team.location && n.includes(team.location.toLowerCase())) score += 3;
      if (team.nickname && n.includes(team.nickname.toLowerCase())) score += 3;

      if (score > bestScore) { bestScore = score; best = String(team.id); }
    }
    if (bestScore >= 3) return best;
  } catch(e) {}

  // Strategy 3: Direct ESPN search endpoint for college basketball
  try {
    const data = await proxyFetch(`${base}/search?query=${encodeURIComponent(name)}&limit=10`);
    const items = data?.results || data?.items || [];
    for (const r of items) {
      const id = r?.id || r?.team?.id;
      if (id) return String(id);
    }
  } catch(e) {}

  return null;
}

        document.getElementById("a1HAllowed").value = aStats.h1Allowed.join(",");

      document.getElementById("aAutoTag").style.display = "inline";
      messages.push(`${teamAName}: ${aStats.scored.length} games ✅`);
    } else {
      messages.push(`${teamAName}: no data ❌`);
    }

    if (bStats?.scored?.length > 0) {
      document.getElementById("bFTScored").value  = bStats.scored.join(",");
      document.getElementById("bFTAllowed").value = bStats.allowed.join(",");
      if (bStats.h1Scored?.length > 0) {
        document.getElementById("b1HScored").value  = bStats.h1Scored.join(",");
        document.getElementById("b1HAllowed").value = bStats.h1Allowed.join(",");
      }
      document.getElementById("bAutoTag").style.display = "inline";
      messages.push(`${teamBName}: ${bStats.scored.length} games ✅`);
    } else {
      messages.push(`${teamBName}: no data ❌`);
    }

    setStatus('<span class="spinner"></span>Scanning H2H since 2024...', "loading");
    const h2hGames = isNcaa
      ? await fetchNcaaH2H(espnBase, teamAId, teamBId)
      : await fetchNbaH2H(espnBase, teamAId, teamBId);

    if (h2hGames?.length >= 2) {
      const tA = String(teamAId);
      const h2hA = [], h2hB = [];
      for (const g of h2hGames.slice(0,5)) {
        if (String(g.teamAId) === tA) { h2hA.push(g.scoreA); h2hB.push(g.scoreB); }
        else { h2hA.push(g.scoreB); h2hB.push(g.scoreA); }
      }
      document.getElementById("aFTH2H").value = h2hA.join(",");
      document.getElementById("bFTH2H").value = h2hB.join(",");
      document.getElementById("useFTH2H").checked = true;
      document.getElementById("h2hAutoTag").style.display = "inline";
      const h2hA1H = h2hGames.slice(0,5).map(g => String(g.teamAId)===tA ? g.h1A : g.h1B).filter(v => v > 0);
      const h2hB1H = h2hGames.slice(0,5).map(g => String(g.teamAId)===tA ? g.h1B : g.h1A).filter(v => v > 0);
      if (h2hA1H.length >= 2) {
        document.getElementById("a1HH2H").value = h2hA1H.join(",");
        document.getElementById("b1HH2H").value = h2hB1H.join(",");
        document.getElementById("use1HH2H").checked = true;
      }
      messages.push(`H2H: ${Math.min(h2hGames.length,5)} games ✅`);
    } else {
      document.getElementById("useFTH2H").checked = false;
      messages.push("H2H: none found");
    }

    setStatus("", "");

  } catch(e) {
    setStatus("❌ " + e.message, "err");
  } finally {
    btn.disabled = false;
  }
}

/* =============================================
   ENGINE CORE
   ============================================= */
function parseGames(id){let raw=document.getElementById(id).value.trim();if(!raw)return null;let arr=raw.split(",").map(x=>parseFloat(x.trim()));if(arr.some(x=>isNaN(x)||x<0||x>300))return"error";return arr;}
function avg(arr){if(!arr||arr.length===0)return NaN;return arr.reduce((a,b)=>a+b,0)/arr.length;}
function trimmedAvg(arr){if(!arr||arr.length===0)return NaN;if(arr.length<5)return avg(arr);let s=[...arr].sort((a,b)=>a-b);s.shift();s.pop();return avg(s);}
function stdDev(arr){if(!arr||arr.length<2)return 0;let m=avg(arr);return Math.sqrt(arr.reduce((a,b)=>a+Math.pow(b-m,2),0)/(arr.length-1));}
function mid(val){if(!val)return NaN;val=val.trim();if(!val.includes("-"))return NaN;let p=val.split("-").map(x=>x.trim());let a=parseFloat(p[0]),b=parseFloat(p[1]);if(isNaN(a)||isNaN(b))return NaN;return(a+b)/2;}
function displayLine(val){if(isNaN(val))return"NaN";return(Math.round(val*2)/2).toFixed(1);}
function dynamicWeight(s){if(!s||s.length<2)return 0;return s.length<=3?0.20:0.30;}
function applyVolatility(proj,std,limit){if(isNaN(proj)||isNaN(std))return NaN;if(std<=limit)return proj;return proj*(1-0.07*Math.min(1,(std-limit)/limit));}

function decision(edge,line,type,teamSc,aSc,bSc){
  if(isNaN(edge)||isNaN(line))return"NaN";
  if(Math.abs(edge/line)<0.045)return"NO PLAY";
  const isTotalType = type==="ft_total"||type==="1h_total";
  let thr = isTotalType ? (edge>0?line*0.045:line*0.06) : (edge>0?line*0.05:line*0.065);
  if(isNaN(thr)||Math.abs(edge)<thr)return"NO PLAY";
  if(edge<0){
    if(isTotalType&&!isNaN(aSc)&&!isNaN(bSc)&&(aSc>=line*0.58||bSc>=line*0.58))return"NO PLAY";
    if(type==="team"&&!isNaN(teamSc)&&teamSc>=line*0.58)return"NO PLAY";
  }
  return edge>0?"OVER "+displayLine(line):"UNDER "+displayLine(line);
}

function runEngine(){
  const table=document.getElementById("results");
  table.style.display="table";
  table.innerHTML="<tr><th>Pick</th><th>Projection</th><th>Edge</th><th>Prediction</th></tr>";
  const league=document.getElementById("leagueSelect").value;
  const bases={"nba":230,"euro_elite":175,"secondary":170,"ncaa":150,"africa":160,"unknown":160};
  const paceClamps={"nba":{min:0.90,max:1.15},"euro_elite":{min:0.92,max:1.10},"secondary":{min:0.92,max:1.10},"ncaa":{min:0.90,max:1.12},"africa":{min:0.90,max:1.12},"unknown":{min:0.90,max:1.12}};
  let eb=bases[league]||160;
  const cl=paceClamps[league]||{min:0.90,max:1.12};
  let ftLine=mid(document.getElementById("ftMarket").value);
  let aLine=mid(document.getElementById("teamAMarket").value);
  let bLine=mid(document.getElementById("teamBMarket").value);
  let aSA=parseGames("aFTScored"),aAA=parseGames("aFTAllowed"),bSA=parseGames("bFTScored"),bAA=parseGames("bFTAllowed");
  let aS=(aSA==="error"||aSA===null)?NaN:trimmedAvg(aSA);
  let aA=(aAA==="error"||aAA===null)?NaN:trimmedAvg(aAA);
  let bS=(bSA==="error"||bSA===null)?NaN:trimmedAvg(bSA);
  let bA=(bAA==="error"||bAA===null)?NaN:trimmedAvg(bAA);
  let fma=!isNaN(aS)&&!isNaN(aA)&&!isNaN(bS)&&!isNaN(bA);
  let bAFT=(!isNaN(aS)&&!isNaN(bA))?(aS+bA)/2:(!isNaN(aS)?aS:NaN);
  let bBFT=(!isNaN(bS)&&!isNaN(aA))?(bS+aA)/2:(!isNaN(bS)?bS:NaN);
  let tAP=(!isNaN(aS)&&!isNaN(aA))?(aS+aA)/2:NaN;
  let tBP=(!isNaN(bS)&&!isNaN(bA))?(bS+bA)/2:NaN;
  let pgr=(!isNaN(tAP)&&!isNaN(tBP)&&Math.abs(tAP-tBP)>eb*0.10);
  let rp=(!isNaN(tAP)&&!isNaN(tBP))?(tAP+tBP)/2:(!isNaN(tAP)?tAP:(!isNaN(tBP)?tBP:NaN));
  let pace=!isNaN(rp)&&eb?Math.max(cl.min,Math.min(cl.max,rp/eb)):1;
  let h2ha=null,h2hb=null;
  if(document.getElementById("useFTH2H").checked){h2ha=parseGames("aFTH2H");h2hb=parseGames("bFTH2H");}
  if(fma&&h2ha&&h2hb&&h2ha!=="error"&&h2hb!=="error"&&h2ha.length>=2&&h2hb.length>=2){
    let w=Math.min(0.30,dynamicWeight(h2ha)+dynamicWeight(h2hb));
    let bt=bAFT+bBFT,ht=avg(h2ha)+avg(h2hb);
    if(!isNaN(bt)&&!isNaN(ht)&&bt>0){
      if(Math.abs(ht-bt)/bt>0.20)w*=0.5;
      let r=(bt*(1-w)+ht*w)/bt;bAFT*=r;bBFT*=r;
    }
  }
  let aVol=(stdDev(aSA==="error"?[]:aSA)+stdDev(aAA==="error"?[]:aAA))/2;
  let bVol=(stdDev(bSA==="error"?[]:bSA)+stdDev(bAA==="error"?[]:bAA))/2;
  let dfr=(!isNaN(aA)&&aA<eb*0.40)||(!isNaN(bA)&&bA<eb*0.40);
  let vl={"nba":14,"euro_elite":12,"secondary":12,"ncaa":11,"africa":11,"unknown":12}[league]||12;
  bAFT=applyVolatility(bAFT,aVol,vl);bBFT=applyVolatility(bBFT,bVol,vl);
  let lta=eb/2;bAFT=(bAFT*0.85)+(lta*0.15);bBFT=(bBFT*0.85)+(lta*0.15);
  bAFT=bAFT*(0.5+pace/2);bBFT=bBFT*(0.5+pace/2);
  let ftP=(!isNaN(bAFT)&&!isNaN(bBFT))?bAFT+bBFT:NaN;
  if(!isNaN(ftP)){
    if(Math.abs(bAFT-bBFT)>18)ftP*=0.98;
    if(pgr)ftP*=0.97;
    if(!isNaN(ftLine)&&Math.abs(ftP-ftLine)>25)ftP=ftLine+(ftP-ftLine)*0.5;
    if(league==="nba"&&!isNaN(ftLine)&&Math.abs(ftP-ftLine)>18)ftP=ftLine+(ftP-ftLine)*0.65;
  }

  let h1P=NaN,h1Line=NaN;
  let aVol1=0,bVol1=0,vl1=7,pgr1=false,dfr1=false;
  const isNbaOrNcaa=league==="nba"||league==="ncaa";
  if(isNbaOrNcaa){
    const eb1H=eb/2;
    h1Line=mid(document.getElementById("h1Market").value);
    let a1HS=parseGames("a1HScored"),a1HA=parseGames("a1HAllowed");
    let b1HS=parseGames("b1HScored"),b1HA=parseGames("b1HAllowed");
    let aS1=(a1HS==="error"||a1HS===null)?NaN:trimmedAvg(a1HS);
    let aA1=(a1HA==="error"||a1HA===null)?NaN:trimmedAvg(a1HA);
    let bS1=(b1HS==="error"||b1HS===null)?NaN:trimmedAvg(b1HS);
    let bA1=(b1HA==="error"||b1HA===null)?NaN:trimmedAvg(b1HA);
    let fma1=!isNaN(aS1)&&!isNaN(aA1)&&!isNaN(bS1)&&!isNaN(bA1);
    if(fma1){
      let bA1H=(aS1+bA1)/2,bB1H=(bS1+aA1)/2;
      let tAP1=(aS1+aA1)/2,tBP1=(bS1+bA1)/2;
      pgr1=Math.abs(tAP1-tBP1)>eb1H*0.10;
      let rp1=(tAP1+tBP1)/2;
      let pace1=Math.max(cl.min,Math.min(cl.max,rp1/eb1H));
      if(document.getElementById("use1HH2H").checked){
        let h2ha1=parseGames("a1HH2H"),h2hb1=parseGames("b1HH2H");
        if(h2ha1&&h2hb1&&h2ha1!=="error"&&h2hb1!=="error"&&h2ha1.length>=2&&h2hb1.length>=2){
          let w1=Math.min(0.30,dynamicWeight(h2ha1)+dynamicWeight(h2hb1));
          let bt1=bA1H+bB1H,ht1=avg(h2ha1)+avg(h2hb1);
          if(!isNaN(bt1)&&!isNaN(ht1)&&bt1>0){
            if(Math.abs(ht1-bt1)/bt1>0.20)w1*=0.5;
            let r1=(bt1*(1-w1)+ht1*w1)/bt1;bA1H*=r1;bB1H*=r1;
          }
        }
      }
      vl1={"nba":7,"ncaa":6}[league]||7;
      aVol1=(stdDev(a1HS||[])+stdDev(a1HA||[]))/2;
      bVol1=(stdDev(b1HS||[])+stdDev(b1HA||[]))/2;
      dfr1=(!isNaN(aA1)&&aA1<eb1H*0.40)||(!isNaN(bA1)&&bA1<eb1H*0.40);
      bA1H=applyVolatility(bA1H,aVol1,vl1);
      bB1H=applyVolatility(bB1H,bVol1,vl1);
      bA1H=(bA1H*0.85)+(eb1H*0.15);
      bB1H=(bB1H*0.85)+(eb1H*0.15);
      bA1H=bA1H*(0.5+pace1/2);
      bB1H=bB1H*(0.5+pace1/2);
      h1P=bA1H+bB1H;
      if(!isNaN(h1P)){
        if(Math.abs(bA1H-bB1H)>9)h1P*=0.98;
        if(pgr1)h1P*=0.97;
        if(!isNaN(h1Line)&&Math.abs(h1P-h1Line)>12)h1P=h1Line+(h1P-h1Line)*0.5;
        if(league==="nba"&&!isNaN(h1Line)&&Math.abs(h1P-h1Line)>9)h1P=h1Line+(h1P-h1Line)*0.65;
      }
    }
  }

  let picks=[
    {name:"FT Total",   proj:ftP,  line:ftLine, type:"ft_total", teamSc:null, aSc:aS,  bSc:bS},
    {name:"1H Total",   proj:h1P,  line:h1Line, type:"1h_total", teamSc:null, aSc:aS,  bSc:bS},
    {name:"Team A Total",proj:bAFT,line:aLine,  type:"team",     teamSc:aS,   aSc:aS,  bSc:bS},
    {name:"Team B Total",proj:bBFT,line:bLine,  type:"team",     teamSc:bS,   aSc:aS,  bSc:bS}
  ];

  if(!isNbaOrNcaa||isNaN(h1P))picks=picks.filter(p=>p.type!=="1h_total");

  let li=-1,ms=0;
  picks.forEach((p,i)=>{
    if(isNaN(p.line)||isNaN(p.proj))return;
    let e=p.proj-p.line,st=p.line?Math.abs(e/p.line):0;
    let pt=decision(e,p.line,p.type,p.teamSc,p.aSc,p.bSc);
    if(fma&&pt!=="NO PLAY"&&pt!=="NaN"&&st>=0.045&&st>ms){ms=st;li=i;}
  });

  picks.forEach((p,i)=>{
    let edge=NaN,pt="NaN",dn="";
    if(isNaN(p.line)){dn="Missing / Invalid Line";pt="—";}
    else if(isNaN(p.proj)){dn="Missing / Invalid Last-5 Data";pt="—";}
    else{
      edge=p.proj-p.line;
      pt=decision(edge,p.line,p.type,p.teamSc,p.aSc,p.bSc);
      if(Math.abs(edge)<p.line*0.025)pt="NO PLAY";
      if(p.type==="ft_total"&&pt.startsWith("OVER")){
        if(pgr||dfr)pt="NO PLAY";
        if(Math.abs(bAFT-bBFT)>20)pt="NO PLAY";
        if(aVol>vl&&bVol>vl)pt="NO PLAY";
      }
      if(p.type==="1h_total"&&pt.startsWith("OVER")){
        if(pgr1)pt="NO PLAY";
        if(dfr1)pt="NO PLAY";
        if(aVol1>vl1&&bVol1>vl1)pt="NO PLAY";
      }
    }
    let row=table.insertRow();
    let pred=pt;
    if(i===li&&pt!=="NO PLAY"&&pt!=="NaN")pred+=` <span class="lock">🔒</span>`;
    let pd=isNaN(p.proj)?"NaN":p.proj.toFixed(2);
    let ed=isNaN(edge)?"NaN":edge.toFixed(2);
    let cn=pred.startsWith("OVER")?"pred-over":pred.startsWith("UNDER")?"pred-under":"pred-noplay";
    row.innerHTML=`<td>${p.name}</td><td>${pd}</td><td>${ed}</td><td class="${cn}">${pred}${dn?`<br><small class="error-note">${dn}</small>`:""}</td>`;
  });
}

function clearAll(){
  document.querySelectorAll("input").forEach(i=>{if(i.type!=="checkbox")i.value="";else i.checked=false;});
  ["aAutoTag","bAutoTag","h2hAutoTag"].forEach(id=>document.getElementById(id).style.display="none");
  setStatus("","");
  const t=document.getElementById("results");
  t.innerHTML="<tr><th>Pick</th><th>Projection</th><th>Edge</th><th>Prediction</th></tr>";
  t.style.display="none";
}

onLeagueChange();
</script>
