<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BB Engine" />
  <meta name="theme-color" content="#d4af37" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="0A45F320-A89F-4851-AA4E-CE22138FD52F.jpeg" />
  <link rel="icon" type="image/jpeg" href="0A45F320-A89F-4851-AA4E-CE22138FD52F.jpeg" />

  <title>Basketball Prediction Engine</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      padding: 0;
      background: #efefef;
      color: #1f2430;
      font-family: Segoe UI, -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0 0 10px 0;
      padding-top: max(10px, env(safe-area-inset-top));
      padding-left: max(14px, env(safe-area-inset-left));
      padding-right: max(14px, env(safe-area-inset-right));
      padding-bottom: 10px;
      background: linear-gradient(90deg, #c91920 0%, #d91f26 50%, #b91520 100%);
      color: #fff;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.18);
    }

    .brand-name {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.3px;
      color: #fff;
    }

    .brand-right {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: rgba(255, 255, 255, 0.85);
      text-transform: uppercase;
    }

    .theme-toggle {
      background: none !important;
      border: none !important;
      box-shadow: none !important;
      padding: 0 !important;
      margin: 0 !important;
      font-size: 11px !important;
      font-weight: 700 !important;
      letter-spacing: 1.5px !important;
      color: rgba(255, 255, 255, 0.85) !important;
      text-transform: uppercase !important;
      cursor: pointer !important;
      opacity: 1 !important;
    }

    .wrapper {
      max-width: 760px;
      margin: 10px auto;
      padding: 0 10px;
    }

    .section {
      border: 1px solid #dedede;
      background: #ffffff;
      margin: 8px auto;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      color: #1f2430;
      border-radius: 0 !important;
    }

    .section-toggle {
      width: 100%;
      background: none !important;
      border: none;
      padding: 12px 10px;
      margin: 0 !important;
      color: #20242c !important;
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-align: left;
      cursor: pointer;
      border-radius: 0 !important;
    }

    .section-toggle .toggle-title {
      display: block;
      font-weight: 800;
      color: #20242c !important;
    }

    .section-toggle .toggle-icon {
      font-size: 18px;
      line-height: 1;
      transition: transform 0.2s ease;
      color: #d91f26 !important;
    }

    .section-body {
      padding: 0 10px 10px;
      margin-top: 0;
    }

    .section.collapsed .section-body {
      display: none;
    }

    .section.collapsed .section-toggle .toggle-icon {
      transform: rotate(-90deg);
    }

    .section.locked .section-body {
      display: none !important;
    }

    .section.locked .section-toggle {
      opacity: 0.4 !important;
      cursor: not-allowed;
      pointer-events: none;
    }

    .section.locked .section-toggle .toggle-icon {
      display: none;
    }

    h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 800;
    }

    label {
      display: block;
      font-size: 12px;
      margin-bottom: 4px;
      color: #20242c;
      font-weight: 600;
    }

    h3 span,
    label span,
    small {
      color: #7b8088;
    }

    input,
    .league-box,
    .autocomplete-wrap {
      width: 100%;
      max-width: 260px;
      box-sizing: border-box;
    }

    input,
    .league-box {
      display: block;
      padding: 8px 10px;
      font-size: 12px;
      background: #ffffff;
      color: #1f2430;
      border: 1px solid #cfd4da;
      margin-bottom: 6px;
      border-radius: 0 !important;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
    }

    input::placeholder {
      color: #9aa0a8;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #4aa346;
      box-shadow: 0 0 0 2px rgba(74, 163, 70, 0.12);
    }

    input[type="checkbox"] {
      width: 12px !important;
      height: 12px !important;
      min-width: 12px !important;
      min-height: 12px !important;
      max-width: 12px !important;
      max-height: 12px !important;
      margin-right: 6px !important;
      vertical-align: middle !important;
      appearance: checkbox !important;
      -webkit-appearance: checkbox !important;
    }

    button {
      padding: 8px 16px;
      margin: 6px;
      font-weight: 700;
      background: #313744;
      color: #fff;
      border: none;
      border-radius: 0 !important;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.95;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .fetch-btn {
      background: #49a443 !important;
      color: #fff !important;
      padding: 6px 12px !important;
      font-size: 12px !important;
      font-weight: 700 !important;
      border: none !important;
      cursor: pointer;
      margin-top: 4px;
      box-shadow: 0 2px 6px rgba(73, 164, 67, 0.2);
      border-radius: 0 !important;
    }

    .fixture-toolbar {
      display: flex;
      gap: 8px;
      margin: 10px 0 8px;
      flex-wrap: wrap;
    }

    .fixture-day {
      background: #eceff3 !important;
      color: #2a2f38 !important;
      border: 1px solid #d7dbe1 !important;
      padding: 6px 10px !important;
      border-radius: 0 !important;
      font-size: 12px !important;
      font-weight: 700;
      margin: 0;
      min-width: 90px !important;
      text-align: center;
    }

    .fixture-day.active {
      background: #49a443 !important;
      color: #fff !important;
      border-color: #49a443 !important;
    }

    .autocomplete-wrap {
      position: relative;
      margin-bottom: 4px;
    }

    .autocomplete-wrap input {
      width: 100%;
      margin-bottom: 0;
      box-sizing: border-box;
    }

    .autocomplete-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #cfd4da;
      border-top: none;
      z-index: 999;
      max-height: 180px;
      overflow-y: auto;
      display: none;
      border-radius: 0 !important;
    }

    .autocomplete-list div {
      padding: 8px 10px;
      font-size: 12px;
      cursor: pointer;
      color: #20242c;
    }

    .autocomplete-list div:hover,
    .autocomplete-list div.active {
      background: #49a443 !important;
      color: #fff !important;
    }

    .autocomplete-list div.group-label {
      color: #7b8088 !important;
      font-size: 10px;
      padding: 4px 8px;
      cursor: default;
      background: #f2f3f5 !important;
      pointer-events: none;
    }

    .autocomplete-list strong {
      color: inherit;
      font-weight: 800;
      text-decoration: underline;
    }

    .injury-box {
      background: #f6f7f9;
      border: 1px solid #d9dde4;
      padding: 8px;
      margin-top: 6px;
      font-size: 11px;
      line-height: 1.8;
      display: none;
      border-radius: 0 !important;
    }

    .injury-box .inj-title {
      color: #20242c;
      font-weight: bold;
      margin-bottom: 2px;
    }

    .inj-out {
      color: #d92d2a;
    }

    .inj-dtd {
      color: #d98a00;
    }

    .inj-rest {
      color: #2f8f4a;
    }

    #fetchStatus {
      font-size: 11px;
      margin-top: 6px;
      min-height: 16px;
    }

    #fetchStatus.ok {
      color: #2f8f4a;
    }

    #fetchStatus.err {
      color: #d92d2a;
    }

    #fetchStatus.loading {
      color: #d98a00;
    }

    .autofill-indicator {
      font-size: 10px;
      color: #2f8f4a;
      display: none;
    }

    .spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 2px solid #4aa346;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .actions {
      text-align: center;
      padding-bottom: 40px;
    }

    #runBtn,
    #clearBtn {
      opacity: 1 !important;
      border: none !important;
      cursor: pointer !important;
      padding: 5px 14px !important;
      font-size: 12px !important;
      font-weight: 700 !important;
      min-width: 0 !important;
      width: auto !important;
      border-radius: 0 !important;
    }

    #runBtn {
      background: #3a9c35 !important;
      color: #fff !important;
      box-shadow: 0 2px 8px rgba(58, 156, 53, 0.35) !important;
    }

    #clearBtn {
      background: #3a404c !important;
      color: #fff !important;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2) !important;
    }

    .table-wrap {
      overflow-x: auto;
      margin: 0 10px 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 12px;
      background: #fff !important;
      border-radius: 0 !important;
    }

    th,
    td {
      border: 1px solid #dfe2e7;
      padding: 8px 6px;
      text-align: center;
      border-radius: 0 !important;
    }

    th {
      background: #3a404c !important;
      color: #fff !important;
      font-weight: 700;
    }

    td {
      background: #fff !important;
      color: #1f2430 !important;
      font-weight: 600 !important;
    }

    .pred-over {
      background: #3a9c35 !important;
      color: #fff !important;
      font-weight: 800 !important;
    }

    .pred-under {
      background: #c91920 !important;
      color: #fff !important;
      font-weight: 800 !important;
    }

    .pred-noplay {
      background: #eaeaea !important;
      color: #5a5f6b !important;
      font-weight: 700 !important;
    }

    small.error-note {
      color: #c91920 !important;
      font-size: 10px !important;
      font-weight: 600 !important;
      display: block;
      margin-top: 3px;
    }

    .lock {
      font-size: 4px !important;
      display: inline-block;
      vertical-align: middle;
      transform: translateY(-1px);
      margin-left: 4px;
    }

    body.dark-mode {
      background: #111 !important;
      color: #d4af37 !important;
    }

    body.dark-mode .section {
      background: #1a1a1a !important;
      border-color: #333 !important;
      color: #d4af37 !important;
    }

    body.dark-mode .section-toggle,
    body.dark-mode .section-toggle .toggle-title,
    body.dark-mode label {
      color: #d4af37 !important;
    }

    body.dark-mode .section-toggle .toggle-icon {
      color: #d4af37 !important;
    }

    body.dark-mode input,
    body.dark-mode .league-box {
      background: #222 !important;
      color: #d4af37 !important;
      border-color: #444 !important;
    }

    body.dark-mode input::placeholder {
      color: rgba(212, 175, 55, 0.4) !important;
    }

    body.dark-mode .autocomplete-list {
      background: #222 !important;
      border-color: #444 !important;
    }

    body.dark-mode .autocomplete-list div {
      color: #d4af37 !important;
    }

    body.dark-mode .autocomplete-list div.group-label {
      background: #111 !important;
      color: #888 !important;
    }

    body.dark-mode table {
      background: #1a1a1a !important;
    }

    body.dark-mode th {
      background: #111 !important;
      color: #d4af37 !important;
      border-color: #333 !important;
    }

    body.dark-mode td {
      background: #1a1a1a !important;
      color: #d4af37 !important;
      border-color: #333 !important;
    }

    body.dark-mode .injury-box {
      background: #1a1a2a !important;
      border-color: #334 !important;
    }

    body.dark-mode .injury-box .inj-title {
      color: #aac !important;
    }

    body.dark-mode .pred-over {
      background: #3a9c35 !important;
      color: #fff !important;
    }

    body.dark-mode .pred-under {
      background: #c91920 !important;
      color: #fff !important;
    }

    body.dark-mode .pred-noplay {
      background: #2a2f3a !important;
      color: #9aa0a8 !important;
    }

    body.dark-mode .section.locked .section-toggle {
      opacity: 0.3 !important;
    }
  </style>
</head>
<body>
  <header class="app-header">
    <span class="brand-name">TheBetCeo ⚡️</span>
    <span class="brand-right">
      <button class="theme-toggle" type="button" onclick="toggleTheme()" title="Toggle dark/light mode">🏀</button>
      PREDICTIONS
    </span>
  </header>

  <div class="wrapper">
    <div class="section" id="leagueSection">
      <h3>League Tier</h3>
      <label>Select League</label>
      <select id="leagueSelect" class="league-box" onchange="onLeagueChange()">
        <option value="">- Select League -</option>

        <optgroup label="── USA ─────────────────">
          <option value="nba">USA - NBA</option>
          <option value="ncaa">USA - NCAA</option>
        </optgroup>

        <optgroup label="── South America ───────">
          <option value="lnb">Argentina - LNB</option>
          <option value="nbb">Brazil - NBB</option>
        </optgroup>

        <optgroup label="── North America ───────">
          <option value="cebl">Canada - CEBL</option>
        </optgroup>

        <optgroup label="── Africa ──────────────">
          <option value="bal">Africa - BAL (Basketball Africa League)</option>
          <option value="nigeria">Nigeria - Premier League</option>
          <option value="rwanda">Rwanda - Basketball League</option>
        </optgroup>

        <optgroup label="── Europe ──────────────">
          <option value="aba">ABA League (Regional)</option>
          <option value="euroleague">EuroLeague</option>
          <option value="eurocup">EuroCup</option>
          <option value="elbl">Estonian-Latvian League</option>
          <option value="austria_zweite">Austria - Zweite Liga</option>
          <option value="belgium_top">Belgium - Top Division 1</option>
          <option value="bih_1st">Bosnia &amp; Herzegovina - 1st Division</option>
          <option value="bulgaria_nbl">Bulgaria - NBL</option>
          <option value="croatia_premier">Croatia - Premijer Liga</option>
          <option value="nbl_cz">Czech Republic - NBL</option>
          <option value="denmark_bliga">Denmark - Basketligaen</option>
          <option value="england_slb">England - SLB</option>
          <option value="finland_koris">Finland - Korisliiga</option>
          <option value="finland_koris_w">Finland - Korisliiga Women</option>
          <option value="proa">France - Pro A</option>
          <option value="prob">France - Pro B</option>
          <option value="georgia_super">Georgia - Superleague</option>
          <option value="bbl">Germany - BBL</option>
          <option value="germany_proa">Germany - Pro A</option>
          <option value="germany_prob">Germany - Pro B</option>
          <option value="bcl">Greece - Basketball League (BCL)</option>
          <option value="a2">Greece - Elite League (A2)</option>
          <option value="hungary_nb1">Hungary - NB I. A</option>
          <option value="isl">Israel - BSL</option>
          <option value="lba">Italy - Lega Basket Serie A</option>
          <option value="italy_a2">Italy - Serie A2</option>
          <option value="italy_serb">Italy - Serie B</option>
          <option value="lkl">Lithuania - LKL</option>
          <option value="lithuania_nkl">Lithuania - NKL</option>
          <option value="plk">Poland - PLK</option>
          <option value="poland_1liga">Poland - 1. Liga</option>
          <option value="portugal_lpb">Portugal - LPB</option>
          <option value="portugal_proliga">Portugal - Proliga</option>
          <option value="romania_ln">Romania - Liga Nationala</option>
          <option value="serbia_kls">Serbia - KLS</option>
          <option value="serbia_2mls">Serbia - 2. MLS</option>
          <option value="acb">Spain - Liga ACB</option>
          <option value="spain_primera">Spain - Primera FEB</option>
          <option value="spain_segunda">Spain - Segunda FEB</option>
          <option value="sweden_super">Sweden - Superettan</option>
          <option value="sweden_sbl">Sweden - SBL</option>
          <option value="swiss_nlb">Switzerland - NLB</option>
          <option value="swiss_sbl">Switzerland - SB League</option>
          <option value="bsl">Turkiye - BSL (Super Lig)</option>
          <option value="turkey_tbl">Turkiye - TBL</option>
          <option value="turkey_tb2l">Turkiye - TB2L</option>
          <option value="turkey_tkbl_w">Turkiye - TKBL Women</option>
          <option value="united_league">United League (Regional)</option>
        </optgroup>

        <optgroup label="── Asia ────────────────">
          <option value="cba">China - CBA</option>
          <option value="china_nbl">China - NBL</option>
          <option value="taipei_pleague">Chinese Taipei - P League+</option>
          <option value="taipei_sbl">Chinese Taipei - SBL</option>
          <option value="taipei_tpbl">Chinese Taipei - TPBL</option>
          <option value="bleague">Japan - B.League</option>
          <option value="pba">Philippines - PBA</option>
          <option value="korea_kbl">Republic of Korea - KBL</option>
        </optgroup>

        <optgroup label="── Oceania ─────────────">
          <option value="ausnbl">Australia - NBL</option>
          <option value="nznbl">New Zealand - NBL</option>
        </optgroup>

        <optgroup label="── International ───────">
          <option value="fiba_wc">FIBA - World Cup</option>
          <option value="fiba_eb">FIBA - EuroBasket</option>
          <option value="fiba_ac">FIBA - AmeriCup</option>
        </optgroup>

        <optgroup label="── Other ───────────────">
          <option value="unknown">Other / Mixed League</option>
        </optgroup>
      </select>
    </div>

    <div class="section" id="espnSection">
      <h3>⚡ ESPN Auto-Fetch <span style="font-size:11px;color:#aaa;">(NBA &amp; NCAA only)</span></h3>

      <div id="fixtureToolbar" class="fixture-toolbar">
        <button type="button" class="fixture-day active" id="fixturesTodayBtn" onclick="loadFixtures(0)">Today</button>
        <button type="button" class="fixture-day" id="fixturesTomorrowBtn" onclick="loadFixtures(1)">Tomorrow</button>
      </div>

      <label style="font-size:12px;">Select match</label>
      <select id="fixtureSelect" class="league-box" onchange="onFixtureSelect()">
        <option value="">- Select match -</option>
      </select>

      <label style="font-size:12px;">Team A Name (Home)</label>
      <div class="autocomplete-wrap">
        <input id="teamAName" placeholder="e.g. Lakers" autocomplete="off" oninput="onTeamInput('A')" />
        <div class="autocomplete-list" id="dropA"></div>
      </div>

      <label style="font-size:12px;margin-top:6px;">Team B Name (Away)</label>
      <div class="autocomplete-wrap">
        <input id="teamBName" placeholder="e.g. Celtics" autocomplete="off" oninput="onTeamInput('B')" />
        <div class="autocomplete-list" id="dropB"></div>
      </div>

      <button class="fetch-btn" id="fetchBtn" type="button" onclick="fetchESPN()">📡 Fetch Stats</button>
      <div id="fetchStatus"></div>

      <div class="injury-box" id="injuryBoxA">
        <div class="inj-title">Team A - Injury &amp; Rest</div>
        <div id="injuryContentA"></div>
      </div>

      <div class="injury-box" id="injuryBoxB">
        <div class="inj-title">Team B - Injury &amp; Rest</div>
        <div id="injuryContentB"></div>
      </div>
    </div>

    <div class="section" id="marketSection">
      <h3>Market Lines</h3>

      <label>FT Total</label>
      <input id="ftMarket" placeholder="150.5 or 150.5 - 160.5" oninput="resetResultsTable()" />

      <div id="h1MarketSection" style="display:none;">
        <label>1H Total</label>
        <input id="h1Market" placeholder="105.5 or 105.5 - 110.5" oninput="resetResultsTable()" />

        <div id="q1MarketSection" style="display:none;">
          <label>Q1 Total</label>
          <input id="q1Market" placeholder="55.5 or 55.5 - 58.5" oninput="resetResultsTable()" />
        </div>
      </div>

      <label>Team A Total</label>
      <input id="teamAMarket" placeholder="75.5 or 75.5 - 79.5" oninput="resetResultsTable()" />

      <label>Team B Total</label>
      <input id="teamBMarket" placeholder="75.5 or 75.5 - 79.5" oninput="resetResultsTable()" />
    </div>

    <div class="section" id="teamASection">
      <h3>Team A - Home (Last 5) <span class="autofill-indicator" id="aAutoTag">✅ Auto-filled</span></h3>

      <label>FT Scored <span style="font-size:10px;color:#888;">(recent → oldest)</span></label>
      <input id="aFTScored" placeholder="85,79,88,74,82" />

      <label>FT Allowed</label>
      <input id="aFTAllowed" placeholder="76,80,72,79,77" />

      <div id="a1HSection" style="display:none;">
        <label>1H Scored</label>
        <input id="a1HScored" placeholder="42,38,45,40,41" />

        <label>1H Allowed</label>
        <input id="a1HAllowed" placeholder="38,41,37,42,39" />

        <div id="aQ1Section" style="display:none;">
          <label>Q1 Scored</label>
          <input id="aQ1Scored" placeholder="28,26,30,25,27" />

          <label>Q1 Allowed</label>
          <input id="aQ1Allowed" placeholder="25,27,24,28,26" />
        </div>
      </div>
    </div>

    <div class="section" id="teamBSection">
      <h3>Team B - Away (Last 5) <span class="autofill-indicator" id="bAutoTag">✅ Auto-filled</span></h3>

      <label>FT Scored <span style="font-size:10px;color:#888;">(recent → oldest)</span></label>

      if (arr.length >= 5) {

      const minPct =
        marketType === "h1" ? thr.h1 :
        marketType === "q1" ? thr.q1 :
        marketType === "team" ? thr.team :
        thr.ft;

      if (Math.abs(edge / line) < minPct) return "NO PLAY";
      return edge > 0 ? "OVER " + displayLine(line) : "UNDER " + displayLine(line);
    }

    function getTrapVolThreshold(marketType, league) {
      if (marketType === "q1") return league === "nba" ? 6.5 : 6.0;
      if (marketType === "h1") return league === "nba" ? 10.5 : 9.0;
      if (marketType === "team") return league === "nba" ? 11.5 : 10.0;
      return league === "nba" ? 18 : 15;
    }

    function detectTrap(edge, line, pick, league, marketType, vol) {
      if (!line || isNaN(edge) || line <= 0 || !pick || pick === "NO PLAY") return false;

      const pct = Math.abs(edge / line);
      let bad = 0;
      const volLimit = getTrapVolThreshold(marketType, league);

      if (pct > 0.12) bad++;
      if (vol && vol > volLimit) bad++;

      if (marketType === "ft" && pick.includes("UNDER")) {
        if (league === "nba" && line < 205) bad++;
        else if (league === "ncaa" && line < 125) bad++;
      }

      return bad >= 2;
    }

    function selectLock(markets) {
      const valid = markets.filter(m =>
        m.pick !== "NO PLAY" &&
        m.pick !== "—" &&
        !isNaN(m.edge) &&
        m.line !== null &&
        !isNaN(m.line) &&
        m.line > 0 &&
        Math.abs(m.edge / m.line) >= 0.045 &&
        m.fullModel !== false
      );

      if (!valid.length) return -1;

      const best = [...valid].sort((a, b) => {
        const ea = Math.abs(a.edge / a.line);
        const eb = Math.abs(b.edge / b.line);
        if (Math.abs(eb - ea) > 0.0005) return eb - ea;
        return Math.abs(b.edge) - Math.abs(a.edge);
      })[0];

      return markets.findIndex(m => m === best);
    }

    function anchorProjection(proj, line, league, marketType) {
      if (proj === null || isNaN(proj) || line === null || isNaN(line)) return proj;
      const diff = proj - line;

      if (marketType === "ft") {
        if (league === "nba" && Math.abs(diff) > 18) return line + diff * MODEL.LINE_ANCHOR_NBA;
        if (Math.abs(diff) > 25) return line + diff * MODEL.LINE_ANCHOR_OTHER;
        return proj;
      }

      if (marketType === "h1") {
        if (league === "nba" && Math.abs(diff) > 9) return line + diff * MODEL.LINE_ANCHOR_NBA;
        if (Math.abs(diff) > 12) return line + diff * MODEL.LINE_ANCHOR_OTHER;
        return proj;
      }

      if (marketType === "q1") {
        if (Math.abs(diff) > 6) return line + diff * MODEL.LINE_ANCHOR_NBA;
        return proj;
      }

      if (marketType === "team") {
        if (league === "nba" && Math.abs(diff) > 10) return line + diff * 0.55;
        if (Math.abs(diff) > 12) return line + diff * 0.50;
        return proj;
      }

      return proj;
    }

    function hideInjuryBox(side) {
      const box = document.getElementById(side === "A" ? "injuryBoxA" : "injuryBoxB");
      const content = document.getElementById(side === "A" ? "injuryContentA" : "injuryContentB");
      if (content) content.innerHTML = "";
      if (box) box.style.display = "none";
    }

    function clearSideFields(side) {
      const ids = side === "A"
        ? ["aFTScored", "aFTAllowed", "a1HScored", "a1HAllowed", "aQ1Scored", "aQ1Allowed"]
        : ["bFTScored", "bFTAllowed", "b1HScored", "b1HAllowed", "bQ1Scored", "bQ1Allowed"];

      ids.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = "";
      });

      const tag = document.getElementById(side === "A" ? "aAutoTag" : "bAutoTag");
      if (tag) tag.style.display = "none";

      if (side === "A") g_injA = { restMult: 1, scoringMult: 1, notes: [] };
      if (side === "B") g_injB = { restMult: 1, scoringMult: 1, notes: [] };
      hideInjuryBox(side);
    }

    function clearH2HFields() {
      ["aFTH2H", "bFTH2H", "a1HH2H", "b1HH2H"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = "";
      });

      const ftCb = document.getElementById("useFTH2H");
      const h1Cb = document.getElementById("use1HH2H");
      if (ftCb) ftCb.checked = false;
      if (h1Cb) h1Cb.checked = false;

      const h2hTag = document.getElementById("h2hAutoTag");
      if (h2hTag) h2hTag.style.display = "none";
    }

    function clearAutoFill(changedSide = null) {
      _fetchToken++;
      unlockFetchBtn();
      setStatus("", "");
      resetResultsTable();

      if (changedSide === "A" || changedSide === "B") {
        selectedTeamIds[changedSide] = null;
        setManualSource(changedSide);
        clearSideFields(changedSide);
        clearH2HFields();
      } else {
        selectedTeamIds = { A: null, B: null };
        g_fetchMeta = defaultFetchMeta();
        clearSideFields("A");
        clearSideFields("B");
        clearH2HFields();
      }
    }

    function isStatFieldValid(id) {
      const parsed = parseGames(id);
      return Array.isArray(parsed) && parsed.length >= 2;
    }

    function isMarketComplete() {
      return ["ftMarket", "h1Market", "q1Market", "teamAMarket", "teamBMarket"].some(id => hasValidMarketLine(id));
    }

    function isTeamAComplete() {
      return isStatFieldValid("aFTScored") && isStatFieldValid("aFTAllowed");
    }

    function isTeamBComplete() {
      return isStatFieldValid("bFTScored") && isStatFieldValid("bFTAllowed");
    }

    function isH2HComplete() {
      const cb = document.getElementById("useFTH2H");
      if (cb && cb.checked) return hasValue("aFTH2H") && hasValue("bFTH2H");
      return true;
    }

    function updateSectionLocks() {
      const league = document.getElementById("leagueSelect").value;
      const isNbaOrNcaa = league === "nba" || league === "ncaa";

      ["espnSection", "marketSection", "teamASection", "teamBSection", "h2hSection"].forEach(lockSection);
      if (!league) return;

      if (isNbaOrNcaa) unlockSection("espnSection");
      unlockSection("marketSection");

      if (!isMarketComplete()) return;
      unlockSection("teamASection");

      if (!isTeamAComplete()) return;
      unlockSection("teamBSection");

      if (!isTeamBComplete()) return;
      unlockSection("h2hSection");
    }

    function goToNextStep() {
      const league = document.getElementById("leagueSelect").value;
      if (!league) {
        accordionOpen("leagueSection");
        return;
      }

      const marketOpen = document.getElementById("marketSection") &&
        !document.getElementById("marketSection").classList.contains("collapsed");

      if (marketOpen) return;
      if (!isMarketComplete()) {
        accordionOpen("marketSection");
        return;
      }
      if (!isTeamAComplete()) {
        accordionOpen("teamASection");
        return;
      }
      if (!isTeamBComplete()) {
        accordionOpen("teamBSection");
        return;
      }
      if (!isH2HComplete()) {
        accordionOpen("h2hSection");
        return;
      }

      closeSection("h2hSection");
    }

    function getLocalDateKey(daysAhead = 0) {
      const d = new Date();
      d.setHours(0, 0, 0, 0);
      d.setDate(d.getDate() + daysAhead);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return "" + y + m + day;
    }

    function getLocalDateKeyFromISO(iso) {
      const d = new Date(iso);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return "" + y + m + day;
    }

    function setFixtureDay(offset) {
      const todayBtn = document.getElementById("fixturesTodayBtn");
      const tomorrowBtn = document.getElementById("fixturesTomorrowBtn");
      if (!todayBtn || !tomorrowBtn) return;
      todayBtn.classList.toggle("active", offset === 0);
      tomorrowBtn.classList.toggle("active", offset === 1);
    }

    function formatFixtureTime(dateStr) {
      if (!dateStr) return "--:--";
      try {
        return new Date(dateStr).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
      } catch (e) {
        return "--:--";
      }
    }

    function getTeamList() {
      const league = document.getElementById("leagueSelect").value;
      if (league === "nba") return { label: "NBA", teams: NBA_TEAM_LIST };
      return null;
    }

    function highlight(name, query) {
      const lower = name.toLowerCase();
      const q = query.toLowerCase();
      const i = lower.indexOf(q);
      if (i === -1) return safeText(name);

      return (
        safeText(name.slice(0, i)) +
        "<strong>" + safeText(name.slice(i, i + query.length)) + "</strong>" +
        safeText(name.slice(i + query.length))
      );
    }

    function closeDrop(dropId) {
      const drop = document.getElementById(dropId);
      if (drop) {
        drop.style.display = "none";
        drop.innerHTML = "";
      }
      if (activeDropTeam === (dropId === "dropA" ? "A" : "B")) activeDropTeam = null;
    }

    function selectTeam(side, name, id) {
      const inputId = side === "A" ? "teamAName" : "teamBName";
      const dropId = side === "A" ? "dropA" : "dropB";
      document.getElementById(inputId).value = name;
      selectedTeamIds[side] = id || null;
      closeDrop(dropId);
      activeDropTeam = null;
    }

    function lookupTeamId(name, leagueHint) {
      const n = String(name || "").toLowerCase().trim();
      if (leagueHint !== "nba") return null;
      if (NBA_TEAM_MAP[n] !== undefined) return NBA_TEAM_MAP[n];

      let bestKey = null;
      let bestLen = 0;
      for (const key of Object.keys(NBA_TEAM_MAP)) {
        if (n.includes(key) && key.length > bestLen) {
          bestKey = key;
          bestLen = key.length;
        }
      }
      if (bestKey) return NBA_TEAM_MAP[bestKey];

      if (n.length >= 3) {
        bestKey = null;
        bestLen = 0;
        for (const key of Object.keys(NBA_TEAM_MAP)) {
          if (key.includes(n) && key.length > bestLen) {
            bestKey = key;
            bestLen = key.length;
          }
        }
        if (bestKey) return NBA_TEAM_MAP[bestKey];
      }

      return null;
    }

    function onTeamInput(side) {
      clearAutoFill(side);
      selectedTeamIds[side] = null;

      const inputId = side === "A" ? "teamAName" : "teamBName";
      const dropId = side === "A" ? "dropA" : "dropB";
      const input = document.getElementById(inputId);
      const drop = document.getElementById(dropId);
      const val = input.value.trim();

      if (!val || val.length < 1) {
        closeDrop(dropId);
        return;
      }

      const list = getTeamList();
      if (!list) {
        closeDrop(dropId);
        return;
      }

      const matches = list.teams.filter(t => t.toLowerCase().includes(val.toLowerCase()));
      if (!matches.length) {
        closeDrop(dropId);
        return;
      }

      drop.innerHTML = "";
      const group = document.createElement("div");
      group.className = "group-label";
      group.textContent = list.label;
      drop.appendChild(group);

      matches.forEach(teamName => {
        const div = document.createElement("div");
        const tid = lookupTeamId(teamName, document.getElementById("leagueSelect").value) || "";
        div.innerHTML = highlight(teamName, val);
        div.addEventListener("mousedown", () => selectTeam(side, teamName, tid));
        drop.appendChild(div);
      });

      drop.style.display = "block";
      activeDropTeam = side;
    }

    document.addEventListener("click", e => {
      if (!e.target.closest(".autocomplete-wrap")) {
        closeDrop("dropA");
        closeDrop("dropB");
      }
    });

    document.addEventListener("keydown", e => {
      if (!activeDropTeam) return;
      const dropId = activeDropTeam === "A" ? "dropA" : "dropB";
      const drop = document.getElementById(dropId);
      const items = [...drop.querySelectorAll("div:not(.group-label)")];
      if (!items.length) return;

      const current = drop.querySelector(".active");
      let idx = items.indexOf(current);

      if (e.key === "ArrowDown") {
        e.preventDefault();
        if (current) current.classList.remove("active");
        items[Math.min(idx + 1, items.length - 1)].classList.add("active");
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        if (current) current.classList.remove("active");
        items[Math.max(idx - 1, 0)].classList.add("active");
      } else if (e.key === "Enter") {
        if (current) {
          e.preventDefault();
          current.dispatchEvent(new MouseEvent("mousedown"));
        }
      } else if (e.key === "Escape") {
        closeDrop(dropId);
        activeDropTeam = null;
      }
    });

    function makeSectionsCollapsible() {
      document.querySelectorAll(".section").forEach(section => {
        if (section.dataset.collapsibleReady === "1") return;

        const heading = section.querySelector("h3");
        if (!heading) return;

        const titleHTML = heading.innerHTML;
        const body = document.createElement("div");
        body.className = "section-body";

        const children = [...section.childNodes];
        children.forEach(node => {
          if (node !== heading) body.appendChild(node);
        });

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "section-toggle";

        const titleSpan = document.createElement("span");
        titleSpan.className = "toggle-title";
        titleSpan.innerHTML = titleHTML;

        const iconSpan = document.createElement("span");
        iconSpan.className = "toggle-icon";
        iconSpan.innerHTML = "&#9662;";

        btn.appendChild(titleSpan);
        btn.appendChild(iconSpan);

        btn.addEventListener("click", () => {
          const wasCollapsed = section.classList.contains("collapsed");
          section.classList.toggle("collapsed");
          if (!wasCollapsed) {
            updateSectionLocks();
            goToNextStep();
          }
        });

        section.innerHTML = "";
        section.appendChild(btn);
        section.appendChild(body);
        section.classList.add("collapsed");
        section.dataset.collapsibleReady = "1";
      });
    }

    function onLeagueChange() {
      closeDrop("dropA");
      closeDrop("dropB");
      unlockFetchBtn();
      setStatus("", "");
      resetResultsTable();

      ["ftMarket", "h1Market", "q1Market", "teamAMarket", "teamBMarket"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = "";
      });

      const league = document.getElementById("leagueSelect").value;
      const isNbaOrNcaa = league === "nba" || league === "ncaa";

      document.getElementById("espnSection").style.display = isNbaOrNcaa ? "block" : "none";

      ["a1HSection", "b1HSection", "h2h1HSection", "h1MarketSection"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = isNbaOrNcaa ? "block" : "none";
      });

      const isNba = league === "nba";
      ["aQ1Section", "bQ1Section", "q1MarketSection"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = isNba ? "block" : "none";
      });

      if (!isNba) {
        ["aQ1Scored", "aQ1Allowed", "bQ1Scored", "bQ1Allowed", "q1Market"].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.value = "";
        });
      }

      if (!isNbaOrNcaa) {
        [
          "a1HScored","a1HAllowed","b1HScored","b1HAllowed",
          "a1HH2H","b1HH2H","h1Market",
          "aQ1Scored","aQ1Allowed","bQ1Scored","bQ1Allowed","q1Market"
        ].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.value = "";
        });

        ["aAutoTag", "bAutoTag", "h2hAutoTag"].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.style.display = "none";
        });

        document.getElementById("use1HH2H").checked = false;
      }

      _fetchToken++;
      selectedTeamIds = { A: null, B: null };
      g_fetchMeta = defaultFetchMeta();

      ["teamAName", "teamBName"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = "";
      });

      [
        "aFTScored","aFTAllowed","bFTScored","bFTAllowed",
        "a1HScored","a1HAllowed","b1HScored","b1HAllowed",
        "aQ1Scored","aQ1Allowed","bQ1Scored","bQ1Allowed",
        "aFTH2H","bFTH2H","a1HH2H","b1HH2H"
      ].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = "";
      });

      document.getElementById("useFTH2H").checked = false;
      document.getElementById("use1HH2H").checked = false;

      ["aAutoTag", "bAutoTag", "h2hAutoTag"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = "none";
      });

      _schedCache.clear();
      _summaryCache.clear();

      g_injA = { restMult: 1, scoringMult: 1, notes: [] };
      g_injB = { restMult: 1, scoringMult: 1, notes: [] };
      hideInjuryBox("A");
      hideInjuryBox("B");

      const fsel = document.getElementById("fixtureSelect");
      if (fsel) {
        fsel.innerHTML = '<option value="">— Select match —</option>';
        fsel.value = "";
      }

      if (!league) {
        lockFrom("espnSection");
        accordionOpen("leagueSection");
        return;
      }

      updateSectionLocks();
      goToNextStep();
      loadFixtures(0);
    }

    function toggleTheme() {
      const isDark = document.body.classList.toggle("dark-mode");
      localStorage.setItem("theme", isDark ? "dark" : "light");
    }

    (function applySavedTheme() {
      if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark-mode");
      }
    })();

    document.addEventListener("DOMContentLoaded", () => {
      makeSectionsCollapsible();

      document.querySelectorAll(".section").forEach(s => {
        s.classList.add("collapsed");
        s.classList.remove("locked");
      });

      const ls0 = document.getElementById("leagueSelect");
      if (ls0) ls0.value = "";

      const espnEl = document.getElementById("espnSection");
      if (espnEl) espnEl.style.display = "none";

      ["a1HSection","b1HSection","h2h1HSection","h1MarketSection","aQ1Section","bQ1Section","q1MarketSection"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = "none";
      });

      lockFrom("espnSection");
      openSection("leagueSection");

      ["useFTH2H", "use1HH2H"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener("change", resetResultsTable);
      });

      ["aFTH2H","bFTH2H","a1HH2H","b1HH2H"].forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.addEventListener("input", () => {
            const tag = document.getElementById("h2hAutoTag");
            if (tag) tag.style.display = "none";
            resetResultsTable();
          });
        }
      });

      const bucketMap = {
        "aFTScored":["A","ft"], "aFTAllowed":["A","ft"],
        "a1HScored":["A","h1"], "a1HAllowed":["A","h1"],
        "aQ1Scored":["A","q1"], "aQ1Allowed":["A","q1"],
        "bFTScored":["B","ft"], "bFTAllowed":["B","ft"],
        "b1HScored":["B","h1"], "b1HAllowed":["B","h1"],
        "bQ1Scored":["B","q1"], "bQ1Allowed":["B","q1"]
      };

      Object.entries(bucketMap).forEach(([id, [side, bucket]]) => {
        const el = document.getElementById(id);
        if (el) {
          el.addEventListener("input", () => {
            setManualSource(side, bucket);
            const tagId = side === "A" ? "aAutoTag" : "bAutoTag";
            const tagEl = document.getElementById(tagId);
            if (tagEl) tagEl.style.display = "none";
            resetResultsTable();
            updateSectionLocks();
          });
        }
      });

      ["ftMarket","teamAMarket","teamBMarket","h1Market","q1Market"].forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.addEventListener("input", () => {
            resetResultsTable();
            updateSectionLocks();
          });
        }
      });

      ["aFTScored","aFTAllowed","a1HScored","a1HAllowed","aQ1Scored","aQ1Allowed"].forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.addEventListener("input", () => {
            updateSectionLocks();
            goToNextStep();
          });
        }
      });

      ["bFTScored","bFTAllowed","b1HScored","b1HAllowed","bQ1Scored","bQ1Allowed"].forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.addEventListener("input", () => {
            updateSectionLocks();
            goToNextStep();
          });
        }
      });

      ["aFTH2H","bFTH2H","a1HH2H","b1HH2H","useFTH2H","use1HH2H"].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        const check = () => {
          updateSectionLocks();
          goToNextStep();
        };
        el.addEventListener("input", check);
        el.addEventListener("change", check);
      });
    });

    /* HALF 2 STARTS HERE */
  </script>
