<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#111111">

<title>Institutional Basketball Engine</title>

<!-- App Icons -->
<link rel="icon" type="image/png" sizes="32x32" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">

<style>
body{
  background:#111;
  color:#d4af37;
  font-family:Segoe UI, sans-serif;
  margin:0;
  padding:20px;
}
h2{text-align:center;}
.section{
  border:1px solid #d4af37;
  padding:10px;
  margin-bottom:12px;
}
input{
  width:110px;
  margin:4px;
  padding:5px;
  background:#222;
  color:#d4af37;
  border:1px solid #d4af37;
}
button{
  padding:8px 18px;
  margin:8px;
  background:#d4af37;
  color:#111;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}
th,td{
  border:1px solid #d4af37;
  padding:6px;
  text-align:center;
}
.pred-over{background:#1e7d3a;color:#fff;}
.pred-under{background:#8b1e1e;color:#fff;}
.pred-noplay{background:#444;color:#bbb;}
.lock{font-size:12px;margin-left:4px;}
</style>
</head>

<body>

<h2>🏀 Institutional Basketball Engine</h2>

<div class="section">
<h3>Market Lines</h3>
FT <input id="ftLine">
1H <input id="h1Line">
Team A <input id="aLine">
Team B <input id="bLine">
</div>

<div class="section">
<h3>Team A</h3>
FT Sc <input id="aFTSc">
FT Al <input id="aFTAl">
1H Sc <input id="aH1Sc">
1H Al <input id="aH1Al">
FT H2H <input id="aFTH2H">
1H H2H <input id="aH1H2H">
</div>

<div class="section">
<h3>Team B</h3>
FT Sc <input id="bFTSc">
FT Al <input id="bFTAl">
1H Sc <input id="bH1Sc">
1H Al <input id="bH1Al">
FT H2H <input id="bFTH2H">
1H H2H <input id="bH1H2H">
</div>

<button onclick="runEngine()">Run Engine</button>

<table id="results" style="display:none;">
<tr>
<th>Market</th>
<th>Projection</th>
<th>Edge %</th>
<th>Tier</th>
<th>Pick</th>
</tr>
</table>

<script>

function val(id){
  return parseFloat(document.getElementById(id).value);
}

function tier(strength){
  if(strength>=0.12) return "Institutional";
  if(strength>=0.10) return "Elite";
  if(strength>=0.07) return "Strong";
  if(strength>=0.05) return "Lean";
  return "No Play";
}

function decision(strength,line){
  if(strength>=0.05) return "OVER "+line;
  if(strength<=-0.05) return "UNDER "+line;
  return "NO PLAY";
}

function runEngine(){

let ftLine=val("ftLine");
let h1Line=val("h1Line");
let aLine=val("aLine");
let bLine=val("bLine");

let aFT=(val("aFTSc")+val("bFTAl"))/2;
let bFT=(val("bFTSc")+val("aFTAl"))/2;
let aH1=(val("aH1Sc")+val("bH1Al"))/2;
let bH1=(val("bH1Sc")+val("aH1Al"))/2;

if(!isNaN(val("aFTH2H"))) aFT=aFT*0.7+val("aFTH2H")*0.3;
if(!isNaN(val("bFTH2H"))) bFT=bFT*0.7+val("bFTH2H")*0.3;
if(!isNaN(val("aH1H2H"))) aH1=aH1*0.7+val("aH1H2H")*0.3;
if(!isNaN(val("bH1H2H"))) bH1=bH1*0.7+val("bH1H2H")*0.3;

let ftProj=aFT+bFT;
let h1Proj=aH1+bH1;

let picks=[
{name:"FT Total",proj:ftProj,line:ftLine},
{name:"1H Total",proj:h1Proj,line:h1Line},
{name:"Team A",proj:aFT,line:aLine},
{name:"Team B",proj:bFT,line:bLine}
];

let table=document.getElementById("results");
table.style.display="table";
table.innerHTML="<tr><th>Market</th><th>Projection</th><th>Edge %</th><th>Tier</th><th>Pick</th></tr>";

let lockIndex=-1,maxStrength=0;

picks.forEach((p,i)=>{
  let edge=(p.proj-p.line)/p.line;
  p.strength=edge;
  if(Math.abs(edge)>maxStrength && Math.abs(edge)>=0.08){
    maxStrength=Math.abs(edge);
    lockIndex=i;
  }
});

picks.forEach((p,i)=>{
  let row=table.insertRow();
  let edgePercent=(p.strength*100).toFixed(2)+"%";
  let tierLabel=tier(Math.abs(p.strength));
  let pick=decision(p.strength,p.line);
  if(i===lockIndex && pick!=="NO PLAY"){
    pick+=" 🔒";
  }

  row.innerHTML=`
  <td>${p.name}</td>
  <td>${p.proj.toFixed(2)}</td>
  <td>${edgePercent}</td>
  <td>${tierLabel}</td>
  <td class="${
    pick.startsWith("OVER")?"pred-over":
    pick.startsWith("UNDER")?"pred-under":"pred-noplay"}">
    ${pick}
  </td>`;
});

}

</script>

</body>
</html>
