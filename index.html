<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VCF Split & Deduplicate</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #0b1020;
      color: #ffffff;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
    }

    p {
      color: #c7c7c7;
      line-height: 1.55;
    }

    .card {
      background: #131a2b;
      border: 1px solid #2a3552;
      border-radius: 16px;
      padding: 18px;
      margin-top: 18px;
    }

    label {
      display: block;
      margin: 14px 0 8px;
      font-weight: bold;
      font-size: 15px;
    }

    input[type="file"],
    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #34415f;
      background: #0a0f1d;
      color: white;
    }

    button {
      margin-top: 18px;
      width: 100%;
      padding: 15px;
      border: 0;
      border-radius: 14px;
      background: #3b82f6;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    .secondary {
      background: #22c55e;
    }

    .result {
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      background: #0a0f1d;
      border: 1px solid #2a3552;
      white-space: pre-line;
      line-height: 1.55;
    }

    .hidden {
      display: none;
    }

    .small {
      color: #9fb0d1;
      font-size: 13px;
      margin-top: 10px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>VCF Split & Deduplicate</h1>
    <p>
      Upload your VCF file. This tool will split every multi-number contact into separate contacts,
      keep only one number per contact card, and remove duplicate numbers from the entire file.
    </p>

    <div class="card">
      <label for="vcfFile">1. Upload VCF file</label>
      <input id="vcfFile" type="file" accept=".vcf,text/vcard" />

      <label for="countryCode">2. Default country code (optional)</label>
      <input id="countryCode" type="text" placeholder="Example: 234 for Nigeria" />

      <div class="small">
        Example:
        <br>Ade with 3 numbers becomes:
        <br>Ade_1
        <br>Ade_2
        <br>Ade_3
      </div>

      <button id="cleanBtn">Process VCF</button>

      <div id="result" class="result hidden"></div>

      <button id="downloadBtn" class="secondary hidden">Download Cleaned VCF</button>
    </div>
  </div>

  <script>
    let cleanedVcfText = "";

    function unfoldVcardText(text) {
      return text.replace(/\r?\n[ \t]/g, "");
    }

    function splitCards(text) {
      const normalized = unfoldVcardText(text).replace(/\r\n/g, "\n").replace(/\r/g, "\n");
      const lines = normalized.split("\n");
      const cards = [];
      let current = [];
      let inside = false;

      for (const rawLine of lines) {
        const line = rawLine.trimEnd();
        if (line.toUpperCase() === "BEGIN:VCARD") {
          inside = true;
          current = ["BEGIN:VCARD"];
        } else if (inside) {
          current.push(line);
          if (line.toUpperCase() === "END:VCARD") {
            cards.push(current);
            current = [];
            inside = false;
          }
        }
      }

      return cards;
    }

    function basePropName(line) {
      const beforeColon = line.split(":", 1)[0] || "";
      const beforeSemi = beforeColon.split(";", 1)[0].toUpperCase();
      const parts = beforeSemi.split(".");
      return parts[parts.length - 1];
    }

    function propValue(line) {
      const idx = line.indexOf(":");
      return idx >= 0 ? line.slice(idx + 1) : "";
    }

    function beforeColon(line) {
      const idx = line.indexOf(":");
      return idx >= 0 ? line.slice(0, idx) : line;
    }

    function normalizePhone(raw, defaultCountryCode) {
      raw = (raw || "").trim();
      if (!raw) return "";

      let plus = raw.startsWith("+");
      let digits = raw.replace(/\D/g, "");

      if (!digits) return "";

      if (raw.startsWith("00")) {
        digits = digits.slice(2);
        plus = true;
      }

      if (defaultCountryCode) {
        const cc = String(defaultCountryCode).replace(/\D/g, "");
        if (digits.startsWith("0") && digits.length >= 10) {
          digits = cc + digits.slice(1);
          plus = true;
        }
      }

      return (plus ? "+" : "") + digits;
    }

    function displayNameFromN(nValue) {
      if (!nValue) return "";
      const parts = nValue.split(";");
      const family = (parts[0] || "").trim();
      const given = (parts[1] || "").trim();
      const additional = (parts[2] || "").trim();
      const prefix = (parts[3] || "").trim();
      const suffix = (parts[4] || "").trim();

      return [prefix, given, additional, family, suffix].filter(Boolean).join(" ").trim();
    }

    function makeSafeName(name) {
      const cleaned = String(name || "")
        .replace(/\s+/g, " ")
        .trim();
      return cleaned || "Contact";
    }

    function parseCard(lines, defaultCountryCode) {
      let version = "3.0";
      let fn = "";
      let n = "";
      const telEntries = [];
      const otherLines = [];

      for (const line of lines) {
        const name = basePropName(line);

        if (name === "BEGIN" || name === "END") continue;

        if (name === "VERSION") {
          version = propValue(line).trim() || version;
        } else if (name === "FN") {
          fn = propValue(line);
        } else if (name === "N") {
          n = propValue(line);
        } else if (name === "TEL") {
          const rawPhone = propValue(line);
          const normalized = normalizePhone(rawPhone, defaultCountryCode);
          if (normalized) {
            telEntries.push({
              originalLine: line,
              normalized
            });
          }
        } else {
          otherLines.push(line);
        }
      }

      const baseName = makeSafeName(fn || displayNameFromN(n));

      return {
        version,
        fn,
        n,
        baseName,
        telEntries,
        otherLines
      };
    }

    function buildTelLine(originalLine, normalizedNumber) {
      return `${beforeColon(originalLine)}:${normalizedNumber}`;
    }

    function buildNLine(name) {
      return `${name};;;;`;
    }

    function renderCard(card) {
      const out = [];
      out.push("BEGIN:VCARD");
      out.push(`VERSION:${card.version}`);
      out.push(`FN:${card.fn}`);
      out.push(`N:${card.n}`);
      out.push(card.telLine);
      out.push(...card.otherLines);
      out.push("END:VCARD");
      return out.join("\n");
    }

    function readFileText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = reject;
        reader.readAsText(file);
      });
    }

    function downloadFile(filename, content) {
      const blob = new Blob([content], { type: "text/vcard;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    document.getElementById("cleanBtn").addEventListener("click", async () => {
      const vcfFile = document.getElementById("vcfFile").files[0];
      const defaultCountryCode = document.getElementById("countryCode").value.trim();
      const resultBox = document.getElementById("result");
      const downloadBtn = document.getElementById("downloadBtn");

      if (!vcfFile) {
        alert("Please upload your VCF file first.");
        return;
      }

      try {
        const vcfText = await readFileText(vcfFile);
        const rawCards = splitCards(vcfText);
        const parsedCards = rawCards.map(card => parseCard(card, defaultCountryCode));

        const seenNumbers = new Set();
        const outputCards = [];

        let cardsWithoutNumber = 0;
        let duplicateNumbersRemoved = 0;
        let splitContactsCount = 0;

        for (const card of parsedCards) {
          const localSeen = new Set();
          const uniqueNumbersInsideCard = [];

          for (const tel of card.telEntries) {
            if (!localSeen.has(tel.normalized)) {
              localSeen.add(tel.normalized);
              uniqueNumbersInsideCard.push(tel);
            } else {
              duplicateNumbersRemoved++;
            }
          }

          if (uniqueNumbersInsideCard.length === 0) {
            cardsWithoutNumber++;
            continue;
          }

          const freshNumbers = [];
          for (const tel of uniqueNumbersInsideCard) {
            if (!seenNumbers.has(tel.normalized)) {
              seenNumbers.add(tel.normalized);
              freshNumbers.push(tel);
            } else {
              duplicateNumbersRemoved++;
            }
          }

          if (freshNumbers.length === 0) {
            continue;
          }

          if (freshNumbers.length > 1) {
            splitContactsCount++;
          }

          const shouldSuffix = freshNumbers.length > 1;

          freshNumbers.forEach((tel, index) => {
            const finalName = shouldSuffix
              ? `${card.baseName}_${index + 1}`
              : card.baseName;

            outputCards.push({
              version: card.version,
              fn: finalName,
              n: buildNLine(finalName),
              telLine: buildTelLine(tel.originalLine, tel.normalized),
              otherLines: [...card.otherLines]
            });
          });
        }

        cleanedVcfText = outputCards.map(renderCard).join("\n") + "\n";

        resultBox.classList.remove("hidden");
        resultBox.textContent =
          `Input contact cards: ${parsedCards.length}\n` +
          `Output contact cards: ${outputCards.length}\n` +
          `Duplicate numbers removed: ${duplicateNumbersRemoved}\n` +
          `Source contacts split into separate cards: ${splitContactsCount}\n` +
          `Cards skipped with no valid number: ${cardsWithoutNumber}\n` +
          `Ready to download: cleaned_one_number_only.vcf`;

        downloadBtn.classList.remove("hidden");
      } catch (err) {
        resultBox.classList.remove("hidden");
        resultBox.textContent = "Error: " + (err.message || String(err));
        downloadBtn.classList.add("hidden");
      }
    });

    document.getElementById("downloadBtn").addEventListener("click", () => {
      if (!cleanedVcfText) {
        alert("Nothing to download yet.");
        return;
      }
      downloadFile("cleaned_one_number_only.vcf", cleanedVcfText);
    });
  </script>
</body>
</html>
