<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BB Engine">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d4af37">
<link rel="apple-touch-icon" href="0A45F320-A89F-4851-AA4E-CE22138FD52F.jpeg">
<link rel="icon" type="image/jpeg" href="0A45F320-A89F-4851-AA4E-CE22138FD52F.jpeg">

<title>Basketball Prediction Engine</title>

<style>
body{background:#111;color:#d4af37;font-family:Segoe UI,sans-serif;margin:0;}
.wrapper{max-width:760px;margin:10px auto;padding:0 10px;}
h1{text-align:center;font-size:18px;margin:10px 0;}
.section{border:1px solid #d4af37;background:#1a1a1a;padding:8px;margin:6px auto;}
label{display:block;font-size:12px;margin-bottom:3px;}

input{
  width:100%;
  max-width:260px;
  padding:5px;
  font-size:12px;
  background:#222;
  color:#d4af37;
  border:1px solid #d4af37;
  margin-bottom:4px;
}

.league-box{
  width:100%;
  max-width:260px;
  padding:5px;
  font-size:12px;
  background:#222;
  color:#d4af37;
  border:1px solid #d4af37;
  margin-bottom:4px;
  border-radius:0;
  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:none;
}
  
input[type="checkbox"]{
  width:12px;
  height:12px;
  margin-right:6px;
  vertical-align:middle;
}

::placeholder{color:rgba(255,255,255,0.35);}

button{
  padding:6px 16px;
  margin:6px;
  font-weight:bold;
  background:#d4af37;
  color:#111;
  border:none;
  cursor:pointer;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
  font-size:12px;
}

th,td{
  border:1px solid #d4af37;
  padding:6px;
  text-align:center;
}

.pred-over{background:#1e7d3a;color:#fff;font-weight:bold;}
.pred-under{background:#8b1e1e;color:#fff;font-weight:bold;}
.pred-noplay{background:#444;color:#bbb;font-weight:bold;}

.lock {
  font-size: 4px; display: inline-block; vertical-align: middle;
  transform: translateY(-1px); margin-left: 4px;
}
</style>
</head>

<body>
<h1>🏀 Basketball Prediction Engine</h1>
<div class="wrapper">

  <div class="section">
  <h3 style="font-size:22px;">League Tier</h3>
  <label style="font-size:18px; margin-top:10px;">Select League</label>
  <select id="leagueSelect" class="league-box">
    <option value="nba">NBA</option>
    <option value="euro_elite">EuroLeague</option>
    <option value="euro_elite">EuroCup</option>
    <option value="euro_elite">Spain Liga ACB</option>
    <option value="euro_elite">Turkey BSL</option>
    <option value="euro_elite">Italy Serie A</option>
    <option value="euro_elite">Germany BBL</option>
    <option value="euro_elite">France Pro A</option>
    <option value="secondary">ABA Liga</option>
    <option value="secondary">Turkey TBL</option>
    <option value="secondary">France Pro B</option>
    <option value="secondary">Poland PLK</option>
    <option value="secondary">Greece A2</option>
    <option value="ncaa">NCAA</option>
    <option value="ncaa">NCAAB</option>
    <option value="africa">BAL</option>
    <option value="africa">Nigeria League</option>
    <option value="africa">Rwanda League</option>
    <option value="africa">AfroBasket</option>
    <option value="unknown">Unknown / Mixed</option>
  </select>
</div>
  
<div class="section">
<h3>Market Lines</h3>
<label>FT Total</label>
<input id="ftMarket" placeholder="150.5 - 160.5">
<label>1H Total</label>
<input id="h1Market" placeholder="78.5 - 82.5">
<label>Team A Total</label>
<input id="teamAMarket" placeholder="75.5 - 79.5">
<label>Team B Total</label>
<input id="teamBMarket" placeholder="75.5 - 79.5">
</div>

<div class="section">
<h3>Team A (Last 5)</h3>
<label>FT Scored</label>
<input id="aFTScored" placeholder="85,79,88,74,82">
<label>FT Allowed</label>
<input id="aFTAllowed" placeholder="76,80,72,79,77">
<label>1H Scored</label>
<input id="aH1Scored" placeholder="41,38,42,36,39">
<label>1H Allowed</label>
<input id="aH1Allowed" placeholder="37,35,38,34,39">
</div>

<div class="section">
<h3>Team B (Last 5)</h3>
<label>FT Scored</label>
<input id="bFTScored" placeholder="83,77,81,79,80">
<label>FT Allowed</label>
<input id="bFTAllowed" placeholder="78,82,74,77,80">
<label>1H Scored</label>
<input id="bH1Scored" placeholder="39,37,40,36,38">
<label>1H Allowed</label>
<input id="bH1Allowed" placeholder="36,39,35,38,37">
</div>

<div class="section">
<h3>H2H</h3>
<label><input type="checkbox" id="useFTH2H"> Use FT H2H (min 2 games)</label>
<input id="aFTH2H" placeholder="82,78,84,76,82">
<input id="bFTH2H" placeholder="79,81,77,80,78">

<label><input type="checkbox" id="use1HH2H"> Use 1H H2H (min 2 games)</label>
<input id="aH1H2H" placeholder="41,38,42,36,39">
<input id="bH1H2H" placeholder="39,37,40,36,38">
</div>

<div style="text-align:center;">
<button onclick="runEngine()">Run</button>
<button onclick="clearAll()">Clear</button>
</div>

<table id="results" style="display:none;">
<tr>
<th>Pick</th>
<th>Projection</th>
<th>Edge</th>
<th>Prediction</th>
</tr>
</table>

</div>

<script>

function parseGames(id){
  let raw = document.getElementById(id).value.trim();
  if(!raw) return null;
  let arr = raw.split(",").map(x => parseFloat(x.trim()));
  if(arr.some(x => isNaN(x) || x < 0)) return "error";
  return arr;
}

function avg(arr){
  if(!arr || arr.length === 0) return NaN;
  return arr.reduce((a,b)=>a+b,0) / arr.length;
}

function stdDev(arr){
  if(!arr || arr.length < 2) return 0;
  let m = avg(arr);
  let variance = arr.reduce((a,b)=>a+Math.pow(b-m,2),0) / (arr.length - 1);
  return Math.sqrt(variance);
}

function mid(val){
  if(!val) return NaN;
  val = val.trim();
  if(!val.includes("-")) return NaN;
  let p = val.split("-").map(x=>x.trim());
  let a = parseFloat(p[0]), b = parseFloat(p[1]);
  if(isNaN(a) || isNaN(b)) return NaN;
  return (a + b) / 2;
}

function displayLine(val){
  if(isNaN(val)) return "NaN";
  return (Math.round(val * 2) / 2).toFixed(1);
}

function dynamicWeight(sample){
  if(!sample || sample.length < 2) return 0;
  if(sample.length <= 3) return 0.20;
  return 0.30;
}

function applyVolatility(proj, std, limit){
  if(isNaN(proj) || isNaN(std)) return NaN;
  if(std > limit) return proj * 0.96;
  return proj;
}

function decision(edge, line, type, teamSc, aSc, bSc){
  if(isNaN(edge) || isNaN(line)) return "NaN";

  let threshold;
  if(type === "ft_total")      threshold = edge > 0 ? line * 0.045 : line * 0.06;
  else if(type === "team")     threshold = edge > 0 ? line * 0.05  : line * 0.065;
  else if(type === "h1_total") threshold = edge > 0 ? line * 0.06  : line * 0.075;
  else return "NaN";

  if(isNaN(threshold)) return "NaN";

  if(Math.abs(edge) < threshold) return "NO PLAY";

  if(edge < 0){
    if(type === "ft_total")  { if(!isNaN(aSc) && !isNaN(bSc) && (aSc >= line*0.58 || bSc >= line*0.58)) return "NO PLAY"; }
    if(type === "team")      { if(!isNaN(teamSc) && teamSc >= line*0.58) return "NO PLAY"; }
    if(type === "h1_total")  { if(!isNaN(aSc) && !isNaN(bSc) && (aSc >= line*0.63 || bSc >= line*0.63)) return "NO PLAY"; }
  }

  return edge > 0 ? "OVER " + displayLine(line) : "UNDER " + displayLine(line);
}

function runEngine(){
  const table = document.getElementById("results");
  table.style.display = "table";
  table.innerHTML = "<tr><th>Pick</th><th>Projection</th><th>Edge</th><th>Prediction</th></tr>";

  const league = document.getElementById("leagueSelect").value;

  const leagueBases = {
    "nba": 230,
    "euro_elite": 175,
    "secondary": 170,
    "ncaa": 150,
    "africa": 160,
    "unknown": 160
  };

  let expectedBase = leagueBases[league] || 160;

  let ftLine  = mid(document.getElementById("ftMarket").value);
  let h1Line  = mid(document.getElementById("h1Market").value);
  let aLine   = mid(document.getElementById("teamAMarket").value);
  let bLine   = mid(document.getElementById("teamBMarket").value);

  let aFTScArr  = parseGames("aFTScored");
  let aFTAllArr = parseGames("aFTAllowed");
  let bFTScArr  = parseGames("bFTScored");
  let bFTAllArr = parseGames("bFTAllowed");
  let aH1ScArr  = parseGames("aH1Scored");
  let aH1AllArr = parseGames("aH1Allowed");
  let bH1ScArr  = parseGames("bH1Scored");
  let bH1AllArr = parseGames("bH1Allowed");

  // Calculate bases independently - NaN if input error/missing
  let aFTSc  = aFTScArr  === "error" ? NaN : avg(aFTScArr);
  let aFTAll = aFTAllArr === "error" ? NaN : avg(aFTAllArr);
  let bFTSc  = bFTScArr  === "error" ? NaN : avg(bFTScArr);
  let bFTAll = bFTAllArr === "error" ? NaN : avg(bFTAllArr);

  let aH1Sc  = aH1ScArr  === "error" ? NaN : avg(aH1ScArr);
  let aH1All = aH1AllArr === "error" ? NaN : avg(aH1AllArr);
  let bH1Sc  = bH1ScArr  === "error" ? NaN : avg(bH1ScArr);
  let bH1All = bH1AllArr === "error" ? NaN : avg(bH1AllArr);

  let baseAFT = (aFTSc + bFTAll) / 2;
  let baseBFT = (bFTSc + aFTAll) / 2;
  let baseAH1 = (aH1Sc + bH1All) / 2;
  let baseBH1 = (bH1Sc + aH1All) / 2;

  let teamAPace = aFTSc + aFTAll;
  let teamBPace = bFTSc + bFTAll;
  let rawPace   = (teamAPace + teamBPace) / 2;

  let pace = expectedBase ? rawPace / expectedBase : 1;
  pace = Math.max(0.92, Math.min(1.08, pace));

  // H2H blending (different lengths allowed)
  if(document.getElementById("useFTH2H").checked){
    let aH = parseGames("aFTH2H");
    let bH = parseGames("bFTH2H");
    if(aH !== "error" && bH !== "error" && aH && bH){
      let wA = dynamicWeight(aH);
      let wB = dynamicWeight(bH);
      let currentTotal = baseAFT + baseBFT;
      let h2hTotal = avg(aH) + avg(bH);
      if(!isNaN(currentTotal) && currentTotal > 0 && Math.abs(h2hTotal - currentTotal) / currentTotal > 0.20){
        wA *= 0.5;
        wB *= 0.5;
      }
      if(!isNaN(avg(aH))) baseAFT = baseAFT * (1 - wA) + avg(aH) * wA;
      if(!isNaN(avg(bH))) baseBFT = baseBFT * (1 - wB) + avg(bH) * wB;
    }
  }

  if(document.getElementById("use1HH2H").checked){
    let aH = parseGames("aH1H2H");
    let bH = parseGames("bH1H2H");
    if(aH !== "error" && bH !== "error" && aH && bH){
      let wA = dynamicWeight(aH);
      let wB = dynamicWeight(bH);
      if(!isNaN(avg(aH))) baseAH1 = baseAH1 * (1 - wA) + avg(aH) * wA;
      if(!isNaN(avg(bH))) baseBH1 = baseBH1 * (1 - wB) + avg(bH) * wB;
    }
  }

  // Apply pace and volatility independently
  baseAFT = isNaN(baseAFT) ? NaN : baseAFT * pace;
  baseBFT = isNaN(baseBFT) ? NaN : baseBFT * pace;

  let aVol = (stdDev(aFTScArr === "error" ? [] : aFTScArr) + stdDev(aFTAllArr === "error" ? [] : aFTAllArr)) / 2;
  let bVol = (stdDev(bFTScArr === "error" ? [] : bFTScArr) + stdDev(bFTAllArr === "error" ? [] : bFTAllArr)) / 2;
  baseAFT = applyVolatility(baseAFT, aVol, 12);
  baseBFT = applyVolatility(baseBFT, bVol, 12);

  baseAH1 = isNaN(baseAH1) ? NaN : baseAH1 * pace;
  baseBH1 = isNaN(baseBH1) ? NaN : baseBH1 * pace;

  let aH1Vol = (stdDev(aH1ScArr === "error" ? [] : aH1ScArr) + stdDev(aH1AllArr === "error" ? [] : aH1AllArr)) / 2;
  let bH1Vol = (stdDev(bH1ScArr === "error" ? [] : bH1ScArr) + stdDev(bH1AllArr === "error" ? [] : bH1AllArr)) / 2;
  baseAH1 = applyVolatility(baseAH1, aH1Vol, 8);
  baseBH1 = applyVolatility(baseBH1, bH1Vol, 8);

  let ftProj  = (isNaN(baseAFT) || isNaN(baseBFT)) ? NaN : baseAFT + baseBFT;
  let h1Proj  = (isNaN(baseAH1) || isNaN(baseBH1)) ? NaN : baseAH1 + baseBH1;

  let picks = [
    {name:"FT Total",     proj:ftProj,  line:ftLine,  type:"ft_total", teamSc:null, aSc:aFTSc, bSc:bFTSc},
    {name:"1H Total",     proj:h1Proj,  line:h1Line,  type:"h1_total", teamSc:null, aSc:aH1Sc, bSc:bH1Sc},
    {name:"Team A Total", proj:baseAFT, line:aLine,   type:"team",     teamSc:aFTSc, aSc:aFTSc, bSc:bFTSc},
    {name:"Team B Total", proj:baseBFT, line:bLine,   type:"team",     teamSc:bFTSc, aSc:aFTSc, bSc:bFTSc}
  ];

  let lockIndex = -1;
  let maxStrength = 0;

  picks.forEach((p, i) => {
    let edge = NaN;
    let pickText = "NaN";

    if(!isNaN(p.proj) && !isNaN(p.line)){
      edge = p.proj - p.line;
      let strength = Math.abs(edge / p.line);
      pickText = decision(edge, p.line, p.type, p.teamSc, p.aSc, p.bSc);

      if(pickText !== "NO PLAY" && pickText !== "NaN" && strength >= 0.08 && strength > maxStrength){
        maxStrength = strength;
        lockIndex = i;
      }
    }

    let row = table.insertRow();
    let pred = pickText;
    if(i === lockIndex && pickText !== "NO PLAY" && pickText !== "NaN"){
      pred += ` <span class="lock">🔒</span>`;
    }

    let projDisplay = isNaN(p.proj) ? "NaN" : p.proj.toFixed(2);
    let edgeDisplay = isNaN(edge) ? "NaN" : edge.toFixed(2);

    let className = "pred-noplay";
    if(pred.startsWith("OVER")) className = "pred-over";
    else if(pred.startsWith("UNDER")) className = "pred-under";

    row.innerHTML = `
      <td>${p.name}</td>
      <td>${projDisplay}</td>
      <td>${edgeDisplay}</td>
      <td class="${className}">${pred}</td>`;
  });
}

function renderError(table){
  ["FT Total","1H Total","Team A Total","Team B Total"].forEach(name => {
    let row = table.insertRow();
    row.innerHTML = `<td>${name}</td><td>Error</td><td>Error</td><td>Error</td>`;
  });
}

function clearAll(){
  document.querySelectorAll("input").forEach(i => i.value = "");
  document.querySelectorAll("input[type=checkbox]").forEach(i => i.checked = false);
  const table = document.getElementById("results");
  table.innerHTML = "<tr><th>Pick</th><th>Projection</th><th>Edge</th><th>Prediction</th></tr>";
  table.style.display = "none";
}
</script>
</body>
</html>
