<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BB Engine" />
  <meta name="theme-color" content="#d4af37" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="0A45F320-A89F-4851-AA4E-CE22138FD52F.jpeg" />
  <link rel="icon" type="image/jpeg" href="0A45F320-A89F-4851-AA4E-CE22138FD52F.jpeg" />

  <title>Basketball Prediction Engine</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      padding: 0;
      background: #efefef;
      color: #1f2430;
      font-family: Segoe UI, -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0 0 10px 0;
      padding-top: max(10px, env(safe-area-inset-top));
      padding-left: max(14px, env(safe-area-inset-left));
      padding-right: max(14px, env(safe-area-inset-right));
      padding-bottom: 10px;
      background: linear-gradient(90deg, #c91920 0%, #d91f26 50%, #b91520 100%);
      color: #fff;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.18);
    }

    .brand-name {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.3px;
      color: #fff;
    }

    .brand-right {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: rgba(255, 255, 255, 0.85);
      text-transform: uppercase;
    }

    .theme-toggle {
      background: none !important;
      border: none !important;
      box-shadow: none !important;
      padding: 0 !important;
      margin: 0 !important;
      font-size: 11px !important;
      font-weight: 700 !important;
      letter-spacing: 1.5px !important;
      color: rgba(255, 255, 255, 0.85) !important;
      text-transform: uppercase !important;
      cursor: pointer !important;
      opacity: 1 !important;
    }

    .wrapper {
      max-width: 760px;
      margin: 10px auto;
      padding: 0 10px;
    }

    .section {
      border: 1px solid #dedede;
      background: #ffffff;
      margin: 8px auto;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      color: #1f2430;
      border-radius: 0 !important;
    }

    .section-toggle {
      width: 100%;
      background: none !important;
      border: none;
      padding: 12px 10px;
      margin: 0 !important;
      color: #20242c !important;
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-align: left;
      cursor: pointer;
      border-radius: 0 !important;
    }

    .section-toggle .toggle-title {
      display: block;
      font-weight: 800;
      color: #20242c !important;
    }

    .section-toggle .toggle-icon {
      font-size: 18px;
      line-height: 1;
      transition: transform 0.2s ease;
      color: #d91f26 !important;
    }

    .section-body {
      padding: 0 10px 10px;
      margin-top: 0;
    }

    .section.collapsed .section-body {
      display: none;
    }

    .section.collapsed .section-toggle .toggle-icon {
      transform: rotate(-90deg);
    }

    .section.locked .section-body {
      display: none !important;
    }

    .section.locked .section-toggle {
      opacity: 0.4 !important;
      cursor: not-allowed;
      pointer-events: none;
    }

    .section.locked .section-toggle .toggle-icon {
      display: none;
    }

    h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 800;
    }

    label {
      display: block;
      font-size: 12px;
      margin-bottom: 4px;
      color: #20242c;
      font-weight: 600;
    }

    h3 span,
    label span,
    small {
      color: #7b8088;
    }

    input,
    .league-box,
    .autocomplete-wrap {
      width: 100%;
      max-width: 260px;
      box-sizing: border-box;
    }

    input,
    .league-box {
      display: block;
      padding: 8px 10px;
      font-size: 12px;
      background: #ffffff;
      color: #1f2430;
      border: 1px solid #cfd4da;
      margin-bottom: 6px;
      border-radius: 0 !important;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
    }

    input::placeholder {
      color: #9aa0a8;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #4aa346;
      box-shadow: 0 0 0 2px rgba(74, 163, 70, 0.12);
    }

    input[type="checkbox"] {
      width: 12px !important;
      height: 12px !important;
      min-width: 12px !important;
      min-height: 12px !important;
      max-width: 12px !important;
      max-height: 12px !important;
      margin-right: 6px !important;
      vertical-align: middle !important;
      appearance: checkbox !important;
      -webkit-appearance: checkbox !important;
    }

    button {
      padding: 8px 16px;
      margin: 6px;
      font-weight: 700;
      background: #313744;
      color: #fff;
      border: none;
      border-radius: 0 !important;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.95;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .fetch-btn {
      background: #49a443 !important;
      color: #fff !important;
      padding: 6px 12px !important;
      font-size: 12px !important;
      font-weight: 700 !important;
      border: none !important;
      cursor: pointer;
      margin-top: 4px;
      box-shadow: 0 2px 6px rgba(73, 164, 67, 0.2);
      border-radius: 0 !important;
    }

    .fixture-toolbar {
      display: flex;
      gap: 8px;
      margin: 10px 0 8px;
      flex-wrap: wrap;
    }

    .fixture-day {
      background: #eceff3 !important;
      color: #2a2f38 !important;
      border: 1px solid #d7dbe1 !important;
      padding: 6px 10px !important;
      border-radius: 0 !important;
      font-size: 12px !important;
      font-weight: 700;
      margin: 0;
      min-width: 90px !important;
      text-align: center;
    }

    .fixture-day.active {
      background: #49a443 !important;
      color: #fff !important;
      border-color: #49a443 !important;
    }

    .autocomplete-wrap {
      position: relative;
      margin-bottom: 4px;
    }

    .autocomplete-wrap input {
      width: 100%;
      margin-bottom: 0;
      box-sizing: border-box;
    }

    .autocomplete-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #cfd4da;
      border-top: none;
      z-index: 999;
      max-height: 180px;
      overflow-y: auto;
      display: none;
      border-radius: 0 !important;
    }

    .autocomplete-list div {
      padding: 8px 10px;
      font-size: 12px;
      cursor: pointer;
      color: #20242c;
    }

    .autocomplete-list div:hover,
    .autocomplete-list div.active {
      background: #49a443 !important;
      color: #fff !important;
    }

    .autocomplete-list div.group-label {
      color: #7b8088 !important;
      font-size: 10px;
      padding: 4px 8px;
      cursor: default;
      background: #f2f3f5 !important;
      pointer-events: none;
    }

    .autocomplete-list strong {
      color: inherit;
      font-weight: 800;
      text-decoration: underline;
    }

    .injury-box {
      background: #f6f7f9;
      border: 1px solid #d9dde4;
      padding: 8px;
      margin-top: 6px;
      font-size: 11px;
      line-height: 1.8;
      display: none;
      border-radius: 0 !important;
    }

    .injury-box .inj-title {
      color: #20242c;
      font-weight: bold;
      margin-bottom: 2px;
    }

    .inj-out {
      color: #d92d2a;
    }

    .inj-dtd {
      color: #d98a00;
    }

    .inj-rest {
      color: #2f8f4a;
    }

    #fetchStatus {
      font-size: 11px;
      margin-top: 6px;
      min-height: 16px;
    }

    #fetchStatus.ok {
      color: #2f8f4a;
    }

    #fetchStatus.err {
      color: #d92d2a;
    }

    #fetchStatus.loading {
      color: #d98a00;
    }

    .autofill-indicator {
      font-size: 10px;
      color: #2f8f4a;
      display: none;
    }

    .spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 2px solid #4aa346;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .actions {
      text-align: center;
      padding-bottom: 20px;
    }

    #runBtn,
    #clearBtn {
      opacity: 1 !important;
      border: none !important;
      cursor: pointer !important;
      padding: 5px 14px !important;
      font-size: 12px !important;
      font-weight: 700 !important;
      min-width: 0 !important;
      width: auto !important;
      border-radius: 0 !important;
    }

    #runBtn {
      background: #3a9c35 !important;
      color: #fff !important;
      box-shadow: 0 2px 8px rgba(58, 156, 53, 0.35) !important;
    }

    #clearBtn {
      background: #3a404c !important;
      color: #fff !important;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2) !important;
    }

    .table-wrap {
      overflow-x: auto;
      margin: 0 10px 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 12px;
      background: #fff !important;
      border-radius: 0 !important;
    }

    th,
    td {
      border: 1px solid #dfe2e7;
      padding: 8px 6px;
      text-align: center;
      border-radius: 0 !important;
    }

    th {
      background: #3a404c !important;
      color: #fff !important;
      font-weight: 700;
    }

    td {
      background: #fff !important;
      color: #1f2430 !important;
      font-weight: 600 !important;
    }

    .pred-over {
      background: #3a9c35 !important;
      color: #fff !important;
      font-weight: 800 !important;
    }

    .pred-under {
      background: #c91920 !important;
      color: #fff !important;
      font-weight: 800 !important;
    }

    .pred-noplay {
      background: #eaeaea !important;
      color: #5a5f6b !important;
      font-weight: 700 !important;
    }

    small.error-note {
      color: #c91920 !important;
      font-size: 10px !important;
      font-weight: 600 !important;
      display: block;
      margin-top: 3px;
    }

    .lock {
      font-size: 10px !important;
      display: inline-block;
      vertical-align: middle;
      transform: translateY(-1px);
      margin-left: 4px;
    }

    .protocol-output {
      display: none;
      margin: 0 10px 24px;
    }

    .protocol-card {
      border: 1px solid #dfe2e7;
      background: #fff;
      margin-top: 10px;
      border-radius: 0 !important;
      overflow: hidden;
    }

    .protocol-head {
      padding: 10px;
      font-size: 12px;
      font-weight: 800;
      background: #f5f7fa;
      color: #20242c;
      border-bottom: 1px solid #dfe2e7;
    }

    .protocol-stage-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 0;
      font-size: 11px;
    }

    .protocol-stage-table th,
    .protocol-stage-table td {
      border: 1px solid #dfe2e7;
      padding: 7px 6px;
      text-align: left;
      vertical-align: top;
    }

    .protocol-stage-table th {
      background: #3a404c !important;
      color: #fff !important;
      font-weight: 700;
    }

    .protocol-stage-table td {
      background: #fff !important;
      color: #1f2430 !important;
      font-weight: 600 !important;
    }

    body.dark-mode {
      background: #111 !important;
      color: #d4af37 !important;
    }

    body.dark-mode .section {
      background: #1a1a1a !important;
      border-color: #333 !important;
      color: #d4af37 !important;
    }

    body.dark-mode .section-toggle,
    body.dark-mode .section-toggle .toggle-title,
    body.dark-mode label {
      color: #d4af37 !important;
    }

    body.dark-mode .section-toggle .toggle-icon {
      color: #d4af37 !important;
    }

    body.dark-mode input,
    body.dark-mode .league-box {
      background: #222 !important;
      color: #d4af37 !important;
      border-color: #444 !important;
    }

    body.dark-mode input::placeholder {
      color: rgba(212, 175, 55, 0.4) !important;
    }

    body.dark-mode .autocomplete-list {
      background: #222 !important;
      border-color: #444 !important;
    }

    body.dark-mode .autocomplete-list div {
      color: #d4af37 !important;
    }

    body.dark-mode .autocomplete-list div.group-label {
      background: #111 !important;
      color: #888 !important;
    }

    body.dark-mode table {
      background: #1a1a1a !important;
    }

    body.dark-mode th {
      background: #111 !important;
      color: #d4af37 !important;
      border-color: #333 !important;
    }

    body.dark-mode td {
      background: #1a1a1a !important;
      color: #d4af37 !important;
      border-color: #333 !important;
    }

    body.dark-mode .injury-box {
      background: #1a1a2a !important;
      border-color: #334 !important;
    }

    body.dark-mode .injury-box .inj-title {
      color: #aac !important;
    }

    body.dark-mode .pred-over {
      background: #3a9c35 !important;
      color: #fff !important;
    }

    body.dark-mode .pred-under {
      background: #c91920 !important;
      color: #fff !important;
    }

    body.dark-mode .pred-noplay {
      background: #2a2f3a !important;
      color: #9aa0a8 !important;
    }

    body.dark-mode .section.locked .section-toggle {
      opacity: 0.3 !important;
    }

    body.dark-mode .protocol-card {
      background: #1a1a1a !important;
      border-color: #333 !important;
    }

    body.dark-mode .protocol-head {
      background: #111 !important;
      color: #d4af37 !important;
      border-color: #333 !important;
    }

    body.dark-mode .protocol-stage-table th {
      background: #111 !important;
      color: #d4af37 !important;
      border-color: #333 !important;
    }

    body.dark-mode .protocol-stage-table td {
      background: #1a1a1a !important;
      color: #d4af37 !important;
      border-color: #333 !important;
    }
  </style>
</head>
<body>
  <header class="app-header">
    <span class="brand-name">TheBetCeo ⚡️</span>
    <span class="brand-right">
      <button class="theme-toggle" type="button" onclick="toggleTheme()" title="Toggle dark/light mode">🏀</button>
      PREDICTIONS
    </span>
  </header>

  <div class="wrapper">
    <div class="section" id="leagueSection">
      <h3>League Tier</h3>
      <label>Select League</label>
      <select id="leagueSelect" class="league-box" onchange="onLeagueChange()">
        <option value="">- Select League -</option>

        <optgroup label="── USA ─────────────────">
          <option value="nba">USA - NBA</option>
          <option value="ncaa">USA - NCAA</option>
        </optgroup>

        <optgroup label="── South America ───────">
          <option value="lnb">Argentina - LNB</option>
          <option value="nbb">Brazil - NBB</option>
        </optgroup>

        <optgroup label="── North America ───────">
          <option value="cebl">Canada - CEBL</option>
        </optgroup>

        <optgroup label="── Africa ──────────────">
          <option value="bal">Africa - BAL (Basketball Africa League)</option>
          <option value="nigeria">Nigeria - Premier League</option>
          <option value="rwanda">Rwanda - Basketball League</option>
        </optgroup>

        <optgroup label="── Europe ──────────────">
          <option value="aba">ABA League (Regional)</option>
          <option value="euroleague">EuroLeague</option>
          <option value="eurocup">EuroCup</option>
          <option value="elbl">Estonian-Latvian League</option>
          <option value="austria_zweite">Austria - Zweite Liga</option>
          <option value="belgium_top">Belgium - Top Division 1</option>
          <option value="bih_1st">Bosnia &amp; Herzegovina - 1st Division</option>
          <option value="bulgaria_nbl">Bulgaria - NBL</option>
          <option value="croatia_premier">Croatia - Premijer Liga</option>
          <option value="nbl_cz">Czech Republic - NBL</option>
          <option value="denmark_bliga">Denmark - Basketligaen</option>
          <option value="england_slb">England - SLB</option>
          <option value="finland_koris">Finland - Korisliiga</option>
          <option value="finland_koris_w">Finland - Korisliiga Women</option>
          <option value="proa">France - Pro A</option>
          <option value="prob">France - Pro B</option>
          <option value="georgia_super">Georgia - Superleague</option>
          <option value="bbl">Germany - BBL</option>
          <option value="germany_proa">Germany - Pro A</option>
          <option value="germany_prob">Germany - Pro B</option>
          <option value="bcl">Greece - Basketball League (BCL)</option>
          <option value="a2">Greece - Elite League (A2)</option>
          <option value="hungary_nb1">Hungary - NB I. A</option>
          <option value="isl">Israel - BSL</option>
          <option value="lba">Italy - Lega Basket Serie A</option>
          <option value="italy_a2">Italy - Serie A2</option>
          <option value="italy_serb">Italy - Serie B</option>
          <option value="lkl">Lithuania - LKL</option>
          <option value="lithuania_nkl">Lithuania - NKL</option>
          <option value="plk">Poland - PLK</option>
          <option value="poland_1liga">Poland - 1. Liga</option>
          <option value="portugal_lpb">Portugal - LPB</option>
          <option value="portugal_proliga">Portugal - Proliga</option>
          <option value="romania_ln">Romania - Liga Nationala</option>
          <option value="serbia_kls">Serbia - KLS</option>
          <option value="serbia_2mls">Serbia - 2. MLS</option>
          <option value="acb">Spain - Liga ACB</option>
          <option value="spain_primera">Spain - Primera FEB</option>
          <option value="spain_segunda">Spain - Segunda FEB</option>
          <option value="sweden_super">Sweden - Superettan</option>
          <option value="sweden_sbl">Sweden - SBL</option>
          <option value="swiss_nlb">Switzerland - NLB</option>
          <option value="swiss_sbl">Switzerland - SB League</option>
          <option value="bsl">Turkiye - BSL (Super Lig)</option>
          <option value="turkey_tbl">Turkiye - TBL</option>
          <option value="turkey_tb2l">Turkiye - TB2L</option>
          <option value="turkey_tkbl_w">Turkiye - TKBL Women</option>
          <option value="united_league">United League (Regional)</option>
        </optgroup>

        <optgroup label="── Asia ────────────────">
          <option value="cba">China - CBA</option>
          <option value="china_nbl">China - NBL</option>
          <option value="taipei_pleague">Chinese Taipei - P League+</option>
          <option value="taipei_sbl">Chinese Taipei - SBL</option>
          <option value="taipei_tpbl">Chinese Taipei - TPBL</option>
          <option value="bleague">Japan - B.League</option>
          <option value="pba">Philippines - PBA</option>
          <option value="korea_kbl">Republic of Korea - KBL</option>
        </optgroup>

        <optgroup label="── Oceania ─────────────">
          <option value="ausnbl">Australia - NBL</option>
          <option value="nznbl">New Zealand - NBL</option>
        </optgroup>

        <optgroup label="── International ───────">
          <option value="fiba_wc">FIBA - World Cup</option>
          <option value="fiba_eb">FIBA - EuroBasket</option>
          <option value="fiba_ac">FIBA - AmeriCup</option>
        </optgroup>

        <optgroup label="── Other ───────────────">
          <option value="unknown">Other / Mixed League</option>
        </optgroup>
      </select>
    </div>

    <div class="section" id="espnSection">
      <h3>⚡ ESPN Auto-Fetch <span style="font-size:11px;color:#aaa;">(NBA &amp; NCAA only)</span></h3>

      <div id="fixtureToolbar" class="fixture-toolbar">
        <button type="button" class="fixture-day active" id="fixturesTodayBtn" onclick="loadFixtures(0)">Today</button>
        <button type="button" class="fixture-day" id="fixturesTomorrowBtn" onclick="loadFixtures(1)">Tomorrow</button>
      </div>

      <label style="font-size:12px;">Select match</label>
      <select id="fixtureSelect" class="league-box" onchange="onFixtureSelect()">
        <option value="">- Select match -</option>
      </select>

      <label style="font-size:12px;">Team A Name (Home)</label>
      <div class="autocomplete-wrap">
        <input id="teamAName" placeholder="e.g. Lakers" autocomplete="off" oninput="onTeamInput('A')" />
        <div class="autocomplete-list" id="dropA"></div>
      </div>

      <label style="font-size:12px;margin-top:6px;">Team B Name (Away)</label>
      <div class="autocomplete-wrap">
        <input id="teamBName" placeholder="e.g. Celtics" autocomplete="off" oninput="onTeamInput('B')" />
        <div class="autocomplete-list" id="dropB"></div>
      </div>

      <button class="fetch-btn" id="fetchBtn" type="button" onclick="fetchESPN()">📡 Fetch Stats</button>
      <div id="fetchStatus"></div>

      <div class="injury-box" id="injuryBoxA">
        <div class="inj-title">Team A - Injury &amp; Rest</div>
        <div id="injuryContentA"></div>
      </div>

      <div class="injury-box" id="injuryBoxB">
        <div class="inj-title">Team B - Injury &amp; Rest</div>
        <div id="injuryContentB"></div>
      </div>
    </div>

    <div class="section" id="marketSection">
      <h3>Market Lines</h3>

      <label>FT Total</label>
      <input id="ftMarket" placeholder="150.5 or 150.5 - 160.5" oninput="resetResultsTable()" />

      <div id="h1MarketSection" style="display:none;">
        <label>1H Total</label>
        <input id="h1Market" placeholder="105.5 or 105.5 - 110.5" oninput="resetResultsTable()" />

        <div id="q1MarketSection" style="display:none;">
          <label>Q1 Total</label>

    function parseDateOnlyUTC(dateInput) {
      if (!dateInput) return null;
      const s = String(dateInput);
      const match = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (match) {
        return new Date(Date.UTC(Number(match[1]), Number(match[2]) - 1, Number(match[3])));
      }
      const d = new Date(s);
      if (isNaN(d.getTime())) return null;
      return new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()));
    }

    function daysBetweenUTC(a, b) {
      const d1 = parseDateOnlyUTC(a);
      const d2 = parseDateOnlyUTC(b);
      if (!d1 || !d2) return null;
      return Math.round((d2.getTime() - d1.getTime()) / 86400000);

      return fetch(WORKER_URL + "?url=" + encodeURIComponent(url), {

        headers: {}

        .then(res => {
          if (!res.ok) throw new Error("Worker HTTP " + res.status);

        .finally(() => clearTimeout(timer));

      const raw = normalizeDashes(String(val).trim());

      const rangeMatch = raw.match(/^(\d{1,3}(?:\.\d+)?)\s*-\s*(\d{1,3}(?:\.\d+)?)$/);
      if (rangeMatch) {
        const a = parseFloat(rangeMatch[1]);
        const b = parseFloat(rangeMatch[2]);
        if (!isFinite(a) || !isFinite(b) || a <= 0 || b <= 0 || b < a) return null;
        return (a + b) / 2;
      }

      const singleMatch = raw.match(/^(\d{1,3}(?:\.\d+)?)$/);
      if (singleMatch) {
        const x = parseFloat(singleMatch[1]);
        return isFinite(x) && x > 0 ? x : null;
      }

      return null;
    }

      const el = document.getElementById(id);
      const raw = el ? el.value.trim() : "";
      if (el) el.style.borderColor = "";
      if (!raw) return null;

      const parts = raw.split(",").map(x => x.trim()).filter(Boolean);
      if (!parts.length) return null;
      if (parts.length > 5) return { err: "maximum 5 values allowed" };

      const out = [];
      for (let i = 0; i < parts.length; i++) {
        const v = parseFloat(parts[i]);
        if (isNaN(v)) return { err: '"' + parts[i] + '" at position ' + (i + 1) + " is not a number" };
        if (v < 0) return { err: "value at position " + (i + 1) + " is negative (" + v + ")" };
        if (v > 250) return { err: "value at position " + (i + 1) + " is too high (" + v + ")" };
        out.push(v);
      }
      return out;
    }

    function avg(arr) {
      if (!arr || arr.length === 0) return NaN;
      return arr.reduce((a, b) => a + b, 0) / arr.length;
    }

    function trimmedAvg(arr) {
      if (!arr || arr.length === 0) return NaN;
      if (arr.length < 5) return avg(arr);
      const s = [...arr].sort((a, b) => a - b);
      s.shift();
      s.pop();
      return avg(s);
    }

    function weightedAvg(arr) {
      if (!arr || arr.length === 0) return NaN;
      if (arr.length === 1) return arr[0];

      const fullWeights = [0.10, 0.15, 0.20, 0.25, 0.30];
      const recent = arr.slice(0, 5).reverse();
      const weights = fullWeights.slice(fullWeights.length - recent.length);
      const totalWeight = weights.reduce((a, b) => a + b, 0);

      return recent.reduce((sum, val, i) => {
        return sum + val * (weights[i] / totalWeight);
      }, 0);
    }

    function stdDev(arr) {
      if (!arr || arr.length < 2) return 0;
      const m = avg(arr);
      return Math.sqrt(arr.reduce((a, b) => a + Math.pow(b - m, 2), 0) / (arr.length - 1));
    }

    function getH2HWeight(lenA, lenB) {
      const n = Math.min(lenA || 0, lenB || 0);
      if (n < 2) return 0;
      if (n === 2) return 0.12;
      if (n === 3) return 0.18;
      if (n === 4) return 0.22;
      return 0.25;
    }

    function applyVolatility(proj, std, limit) {
      if (isNaN(proj) || isNaN(std)) return NaN;
      if (std <= limit) return proj;
      return proj * (1 - 0.05 * Math.min(1, (std - limit) / limit));
    }

    function getSampleTier(...arrays) {
      const lens = arrays.map(a => Array.isArray(a) ? a.length : 0);
      const minLen = Math.min(...lens);
      if (minLen >= 5) return "full";
      if (minLen >= 2) return "thin";
      return "insufficient";
    }

    function getLeagueEdgeThresholds(league) {
      if (league === "nba") return { ft: 0.047, h1: 0.050, q1: 0.055, team: 0.072 };
      if (league === "ncaa") return { ft: 0.053, h1: 0.058, q1: 0.065, team: 0.088 };

      if ([
        "euroleague","eurocup","acb","lba","bbl","bcl","lkl","proa","prob",
        "bsl","isl","aba","plk","serbia_kls","croatia_premier","elbl",
        "georgia_super","hungary_nb1","romania_ln","austria_zweite",
        "belgium_top","bih_1st","bulgaria_nbl","nbl_cz","denmark_bliga",
        "england_slb","finland_koris","finland_koris_w","germany_proa",
        "germany_prob","a2","italy_a2","italy_serb","lithuania_nkl",
        "poland_1liga","portugal_lpb","portugal_proliga","serbia_2mls",
        "spain_primera","spain_segunda","sweden_super","sweden_sbl",
        "swiss_nlb","swiss_sbl","turkey_tbl","turkey_tb2l","turkey_tkbl_w",
        "united_league"
      ].includes(league)) {
        return { ft: 0.054, h1: 0.059, q1: 0.068, team: 0.082 };
      }

      if (["cba","china_nbl","taipei_pleague","taipei_sbl","taipei_tpbl","bleague","pba","korea_kbl"].includes(league)) {
        return { ft: 0.058, h1: 0.063, q1: 0.072, team: 0.095 };
      }

      return { ft: 0.062, h1: 0.067, q1: 0.075, team: 0.105 };
    }

    function getLineSanityBands(league) {
      if (league === "nba") return { ft:[190,260], h1:[90,135], q1:[44,70], team:[85,140] };
      if (league === "ncaa") return { ft:[110,175], h1:[52,90], q1:null, team:[50,95] };
      if (["euroleague","eurocup","acb","lba","bbl","bcl","bsl","isl"].includes(league)) {
        return { ft:[130,185], h1:[62,95], q1:null, team:[60,100] };
      }
      if (["cba","pba"].includes(league)) {
        return { ft:[165,225], h1:[80,115], q1:null, team:[75,120] };
      }
      return { ft:[110,220], h1:[52,115], q1:null, team:[48,120] };
    }

    function validateLines(league, ftLine, h1Line, q1Line, aLine, bLine) {
      const bands = getLineSanityBands(league);
      const errs = [];

      function chk(val, band, label) {
        if (val === null || !band) return;
        if (val < band[0]) errs.push(label + " looks too low (" + val + ")");
        if (val > band[1]) errs.push(label + " looks too high (" + val + ")");
      }

      chk(ftLine, bands.ft, league.toUpperCase() + " FT total");
      chk(h1Line, bands.h1, league.toUpperCase() + " 1H total");
      chk(q1Line, bands.q1, league.toUpperCase() + " Q1 total");
      chk(aLine, bands.team, league.toUpperCase() + " Team A total");
      chk(bLine, bands.team, league.toUpperCase() + " Team B total");

      return errs;
    }

    function getPick(edge, line, league, marketType) {
      if (!line || isNaN(edge) || isNaN(line) || line <= 0) return "NO PLAY";
      const thr = getLeagueEdgeThresholds(league || "unknown");
      const minPct =
        marketType === "h1" ? thr.h1 :
        marketType === "q1" ? thr.q1 :
        marketType === "team" ? thr.team :
        thr.ft;

      if (Math.abs(edge / line) < minPct) return "NO PLAY";
      return edge > 0 ? "OVER " + displayLine(line) : "UNDER " + displayLine(line);
    }

    function getTrapVolThreshold(marketType, league) {
      if (marketType === "q1") return league === "nba" ? 6.5 : 6.0;
      if (marketType === "h1") return league === "nba" ? 10.5 : 9.0;
      if (marketType === "team") return league === "nba" ? 11.5 : 10.0;
      return league === "nba" ? 18 : 15;
    }

    function detectTrap(edge, line, pick, league, marketType, vol) {
      if (!line || isNaN(edge) || line <= 0 || !pick || pick === "NO PLAY") return false;

      const pct = Math.abs(edge / line);
      let bad = 0;
      const volLimit = getTrapVolThreshold(marketType, league);

      if (pct > 0.12) bad++;
      if (vol && vol > volLimit) bad++;

      if (marketType === "ft" && pick.includes("UNDER")) {
        if (league === "nba" && line < 205) bad++;
        else if (league === "ncaa" && line < 125) bad++;
      }

      return bad >= 2;
    }

    function selectLock(markets) {
      const valid = markets.filter(m =>
        m.pick !== "NO PLAY" &&
        m.pick !== "—" &&
        !isNaN(m.edge) &&
        m.line !== null &&
        !isNaN(m.line) &&
        m.line > 0 &&
        Math.abs(m.edge / m.line) >= 0.045 &&
        m.fullModel !== false
      );

      if (!valid.length) return -1;

      const best = [...valid].sort((a, b) => {
        const ea = Math.abs(a.edge / a.line);
        const eb = Math.abs(b.edge / b.line);
        if (Math.abs(eb - ea) > 0.0005) return eb - ea;
        return Math.abs(b.edge) - Math.abs(a.edge);
      })[0];

      return markets.findIndex(m => m === best);
    }

    function anchorProjection(proj, line, league, marketType) {
      if (proj === null || isNaN(proj) || line === null || isNaN(line)) return proj;
      const diff = proj - line;

      if (marketType === "ft") {
        if (league === "nba" && Math.abs(diff) > 18) return line + diff * MODEL.LINE_ANCHOR_NBA;
        if (Math.abs(diff) > 25) return line + diff * MODEL.LINE_ANCHOR_OTHER;
        return proj;
      }

      if (marketType === "h1") {
        if (league === "nba" && Math.abs(diff) > 9) return line + diff * MODEL.LINE_ANCHOR_NBA;
        if (Math.abs(diff) > 12) return line + diff * MODEL.LINE_ANCHOR_OTHER;
        return proj;
      }

      if (marketType === "q1") {
        if (Math.abs(diff) > 6) return line + diff * MODEL.LINE_ANCHOR_NBA;
        return proj;
      }

      if (marketType === "team") {
        if (league === "nba" && Math.abs(diff) > 10) return line + diff * 0.55;
        if (Math.abs(diff) > 12) return line + diff * 0.50;
        return proj;
      }

      return proj;
    }

    async function fetchLeagueTeamCatalog(league) {
      const base = getLeagueBase(league);
      if (!base) return [];

      if (_teamCatalogCache.has(league)) {
        return _teamCatalogCache.get(league);
      }

      const promise = (async () => {
        const data = await proxyFetch(base + "/teams?limit=500");
        const leagues = data?.sports?.[0]?.leagues || [];
        let teams = [];

        for (const lg of leagues) {
          teams = teams.concat(lg?.teams || []);
        }
        if (!teams.length) teams = data?.teams || [];

        const seen = new Set();
        const out = [];

        for (const item of teams) {
          const t = item.team || item;
          const id = String(t?.id || "");
          const name = t?.displayName || t?.shortDisplayName || t?.name || "";

          if (!id || !name) continue;

          const key = id + "::" + normalizeTeamName(name);
          if (seen.has(key)) continue;
          seen.add(key);

          out.push({ id, name });
        }

        out.sort((a, b) => a.name.localeCompare(b.name));
        return out;
      })().catch(err => {
        _teamCatalogCache.delete(league);
        logDebug("fetchLeagueTeamCatalog failed", err);
        return [];
      });

      _teamCatalogCache.set(league, promise);
      return promise;
    }

    function highlight(name, query) {
      const rawQ = String(query || "").trim();
      if (!rawQ) return safeText(name);

      const originalLower = String(name || "").toLowerCase();
      const queryLower = rawQ.toLowerCase();
      const rawIndex = originalLower.indexOf(queryLower);

      if (rawIndex === -1) return safeText(name);

      return (
        safeText(name.slice(0, rawIndex)) +
        "<strong>" + safeText(name.slice(rawIndex, rawIndex + rawQ.length)) + "</strong>" +
        safeText(name.slice(rawIndex + rawQ.length))
      );
    }

    function lookupTeamId(name, leagueHint) {
      const n = normalizeTeamName(name);

      if (leagueHint === "nba") {
        if (NBA_TEAM_MAP[n] !== undefined) return NBA_TEAM_MAP[n];

        let bestKey = null;
        let bestLen = 0;

        for (const key of Object.keys(NBA_TEAM_MAP)) {
          if (n.includes(key) && key.length > bestLen) {
            bestKey = key;
            bestLen = key.length;
          }
        }
        if (bestKey) return NBA_TEAM_MAP[bestKey];

        if (n.length >= 3) {
          bestKey = null;
          bestLen = 0;
          for (const key of Object.keys(NBA_TEAM_MAP)) {
            if (key.includes(n) && key.length > bestLen) {
              bestKey = key;
              bestLen = key.length;
            }
          }
          if (bestKey) return NBA_TEAM_MAP[bestKey];
        }
      }

      if (leagueHint === "ncaa") {
        if (NCAA_TEAM_MAP[n] !== undefined) return NCAA_TEAM_MAP[n];

        let bestKey = null;
        let bestLen = 0;

        for (const key of Object.keys(NCAA_TEAM_MAP)) {
          if (n.includes(key) && key.length > bestLen) {
            bestKey = key;
            bestLen = key.length;
          }
        }
        if (bestKey) return NCAA_TEAM_MAP[bestKey];
      }

      return null;
    }

      const items = [...drop.querySelectorAll("div:not(.group-label)")];

        e.preventDefault();

        items[Math.max(idx - 1, 0)].classList.add("active");
      } else if (e.key === "Enter") {
        if (current) {
          e.preventDefault();

    async function searchTeamFromAPI(base, name, league) {
      const n = normalizeTeamName(name);

      try {
        const data = await proxyFetch(base + "/teams?limit=500");
        const leagues = data?.sports?.[0]?.leagues || [];
        let teams = [];

        for (const l of leagues) {
          teams = teams.concat(l?.teams || []);
        }
        if (!teams.length) teams = data?.teams || [];

        const words = n.split(/\s+/).filter(w => w.length >= 3);
        let best = null;
        let bestScore = 0;

        for (const t of teams) {
          const team = t.team || t;
          const displayName = normalizeTeamName(team.displayName || "");
          const shortName = normalizeTeamName(team.shortDisplayName || "");
          const nickname = normalizeTeamName(team.nickname || "");
          const location = normalizeTeamName(team.location || "");
          const abbrev = normalizeTeamName(team.abbreviation || "");

          if (displayName === n || shortName === n) return String(team.id);

          let score = 0;
          if (displayName.includes(n) || n.includes(displayName)) score += 4;
          if (shortName.includes(n) || n.includes(shortName)) score += 4;
          if (nickname && (nickname === n || n.includes(nickname))) score += 2;
          if (location && n.includes(location)) score += 2;
          if (abbrev && abbrev === n) score += 2;
          score += words.filter(w => displayName.includes(w) || shortName.includes(w)).length;

          if (score > bestScore) {
            bestScore = score;
            best = String(team.id);
          }
        }

        if (best && bestScore >= 3 && validateTeamId(best, league)) return best;
      } catch (e) {
        logDebug("searchTeamFromAPI teams failed", e);
      }

      try {
        const catalog = await fetchLeagueTeamCatalog(league);
        const catalogMap = new Map(catalog.map(t => [String(t.id), normalizeTeamName(t.name)]));

    async function fetchInjuryAndRest(base, teamId, teamAvgScored, lastGameDate, nextGameDate, league) {
      const result = { restMult: 1, scoringMult: 1, notes: [] };

      const diffDays = daysBetweenUTC(lastGameDate, nextGameDate);
      if (diffDays !== null) {
        const restDays = Math.max(0, diffDays - 1);

        if (restDays > 7) {
          result.restMult = 1;
          result.notes.push({ type: "rest", text: "Rest unavailable" });
        } else {
          result.restMult = restMultiplier(restDays, league);

          const label =
            restDays === 0 ? "Back-to-back ⚠️" :
            restDays === 1 ? "1 day rest" :
            restDays === 2 ? "2 days rest ✓" :
            `${restDays} days rest`;

          const adj = result.restMult !== 1
            ? ` (${((result.restMult - 1) * 100).toFixed(1)}% scoring adj)`
            : "";

          result.notes.push({ type: "rest", text: label + adj });
        }
      } else if (lastGameDate) {
        result.notes.push({ type: "rest", text: "Rest unknown" });
      }

      try {
        const data = await proxyFetch(`${base}/teams/${teamId}/injuries`).catch(() => null);
        const items = data?.injuries || data?.items || [];
        if (!items.length) return result;

        const avgPPG = teamAvgScored || 75;
        let totalReduction = 0;

        for (const inj of items) {
          const status = (inj?.status || inj?.type?.description || "").toLowerCase();
          const isOut = status.includes("out") || status.includes("injured reserve") || status.includes("suspended");
          const isDTD = status.includes("questionable") || status.includes("doubtful") || status.includes("day-to-day");
          if (!isOut && !isDTD) continue;

          const athlete = inj?.athlete || inj?.person || {};
          const playerName = athlete?.displayName || athlete?.fullName || "Unknown";

          let ppg = 0;
          for (const cat of (athlete?.statistics?.splits?.categories || [])) {
            for (const stat of (cat.stats || [])) {
              if (stat.name === "avgPoints" || stat.abbreviation === "PPG") {
                ppg = parseFloat(stat.value) || 0;
              }
            }
          }

          if (ppg === 0) {
            const pos = (athlete?.position?.abbreviation || athlete?.position?.name || "").toUpperCase();
            if (isOut) {
              if (pos === "PG" || pos === "SG" || pos === "G") ppg = 10;
              else if (pos === "SF" || pos === "PF" || pos === "F") ppg = 9;
              else if (pos === "C") ppg = 8;
              else ppg = 7;
            }
          }

          if (ppg === 0) continue;

          const share = ppg / avgPPG;
          const impact = Math.min(isOut ? share * 0.65 : share * 0.30, 0.22);
          totalReduction += impact;

          const tag = isOut ? "OUT" : "DTD";
          const ppgStr = ppg > 0 ? ` (${ppg.toFixed(1)} ppg)` : "";
          const adjStr = impact > 0.005 ? ` → -${(impact * 100).toFixed(1)}% offense` : "";

          result.notes.push({
            type: isOut ? "out" : "dtd",
            text: `${playerName}${ppgStr} — ${tag}${adjStr}`
          });
        }

        const maxInjCap = league === "nba" ? 0.25 : 0.20;
        result.scoringMult = 1 - Math.min(totalReduction, maxInjCap);
      } catch (e) {
        logDebug("fetchInjuryAndRest failed", e);
      }

      return result;
    }

    function stripOTFromScores(scoreA, scoreB, linesA, linesB, regulationPeriods) {
      let sA = scoreA;
      let sB = scoreB;

      if (linesA.length > regulationPeriods && linesB.length > regulationPeriods) {
        const sumA = linesA.reduce((s, p) => s + readVal(p), 0);
        const sumB = linesB.reduce((s, p) => s + readVal(p), 0);

        if (Math.abs(sumA - sA) <= 3 && Math.abs(sumB - sB) <= 3) {
          let otA = 0;
          let otB = 0;
          for (let i = regulationPeriods; i < linesA.length; i++) otA += readVal(linesA[i]);
          for (let i = regulationPeriods; i < linesB.length; i++) otB += readVal(linesB[i]);
          if (otA > 0 || otB > 0) {
            sA -= otA;
            sB -= otB;
          }
        }
      }

      return [sA, sB];
    }

              const events = r?.events || r?.team?.schedule?.events || [];
              for (const ev of events) {
                const dateStr = ev?.date || "";
                if (dateStr && dateStr < "2024-01-01") continue;

                const comp = ev?.competitions?.[0];
                if (!comp) continue;

                const done =
                  comp?.status?.type?.completed ||
                  comp?.status?.type?.name === "STATUS_FINAL" ||
                  comp?.status?.type?.state === "post";
                if (!done) continue;

                const competitors = comp?.competitors || [];
                if (competitors.length < 2 || !ev.id) continue;

                const hasA = competitors.some(c => matchesTeam(c, tA));
                const hasB = competitors.some(c => matchesTeam(c, tB));
                if (!hasA || !hasB) continue;

                const cA = competitors.find(x => matchesTeam(x, tA)) || competitors[0];
                const cB = competitors.find(x => matchesTeam(x, tB)) || competitors[1];
                const ps = s => typeof s === "object" ? parseFloat(s.value ?? s.displayValue ?? 0) : parseFloat(s);

                gameRefs.push({
                  id: String(ev.id),
                  date: dateStr,
                  rawScoreA: ps(cA?.score),
                  rawScoreB: ps(cB?.score)
                });
              }
            } catch (e) {
              logDebug("fetchNcaaH2H failed", e);
            }
          }
        }
      }

      if (!gameRefs.length) return [];

      const seen = new Set();
      const unique = gameRefs.filter(g => {
        if (seen.has(g.id)) return false;
        seen.add(g.id);
        return true;
      }).sort((a, b) => {
        const da = a.date ? new Date(a.date).getTime() : 0;
        const db = b.date ? new Date(b.date).getTime() : 0;
        return db - da;
      });

      const h2h = [];

      for (const ref of unique.slice(0, 5)) {
        let added = false;

        try {
          await new Promise(r => setTimeout(r, 80));
          const key = `${base}:sum:${ref.id}`;
          const data = await (_summaryCache.has(key)
            ? _summaryCache.get(key)
            : (() => {
                const p = proxyFetch(`${base}/summary?event=${ref.id}`).catch(err => {
                  _summaryCache.delete(key);
                  throw err;
                });
                cacheSet(_summaryCache, key, p);
                return p;
              })());

          const hc = data?.header?.competitions?.[0];
          if (hc) {
            const competitors = hc?.competitors || [];
            const cA = competitors.find(c => matchesTeam(c, tA));
            const cB = competitors.find(c => matchesTeam(c, tB));

            if (cA && cB) {
              let sA = parseFloat(cA.score);
              let sB = parseFloat(cB.score);
              if (!isNaN(sA) && !isNaN(sB) && sA > 0 && sB > 0) {
                const lA = cA?.linescores || [];
                const lB = cB?.linescores || [];
                const [h1A, h1B] = extractFirstHalf(lA, lB);
                [sA, sB] = stripOTFromScores(sA, sB, lA, lB, 2);

                h2h.push({
                  teamAId: tA,
                  teamBId: tB,
                  scoreA: Math.round(sA),
                  scoreB: Math.round(sB),
                  h1A,
                  h1B,
                  q1A: 0,
                  q1B: 0,
                  date: ref.date
                });
                added = true;
              }
            }
          }
        } catch (e) {
          logDebug("fetchNcaaH2H summary failed", e);
        }

        if (!added && !isNaN(ref.rawScoreA) && !isNaN(ref.rawScoreB) && ref.rawScoreA > 0 && ref.rawScoreB > 0) {
          h2h.push({
            teamAId: tA,
            teamBId: tB,
            scoreA: Math.round(ref.rawScoreA),
            scoreB: Math.round(ref.rawScoreB),
            h1A: 0,
            h1B: 0,
            q1A: 0,
            q1B: 0,
            date: ref.date
          });
        }
      }

      return h2h.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
    }

          queryDates.map(dateStr => {

          })
        );

        const seen = new Set();
        const merged = [];

        payloads.forEach(data => {
          (data?.events || []).forEach(ev => {
            if (!ev?.id || seen.has(ev.id)) return;
            seen.add(ev.id);
            merged.push(ev);
          });
        });

        const now = Date.now();

        const events = merged
          .filter(ev => {
            const comp = ev?.competitions?.[0];
            if (!comp || (comp.competitors || []).length < 2) return false;

            const eventTime = new Date(ev.date);
            if (isNaN(eventTime.getTime())) return false;

            const eventLocalKey = getLocalDateKeyFromISO(ev.date);
            if (eventLocalKey !== targetLocalKey) return false;

            const state = comp?.status?.type?.state || "";
            const completed = comp?.status?.type?.completed || state === "post";
            if (completed) return false;

            if (offset === 0 && eventTime.getTime() <= now) return false;

            return true;
          })
          .sort((a, b) => new Date(a.date) - new Date(b.date));

        if (!events.length) {
          sel.innerHTML = '<option value="">No upcoming matches</option>';

          opt.dataset.homeId = homeId;
          opt.dataset.awayId = awayId;
          sel.appendChild(opt);

      } catch (e) {
        logDebug("loadFixtures failed", e);
        sel.innerHTML = '<option value="">Unable to load matches</option>';
      }

          let projA1H = aS1 * MODEL.TEAM_WEIGHT + bA1 * MODEL.OPP_WEIGHT;
          let projB1H = bS1 * MODEL.TEAM_WEIGHT + aA1 * MODEL.OPP_WEIGHT;

          addStage("h1", "Base Projection", projA1H + projB1H, "Pre-H2H 1H total");

          const pgr1 = Math.abs(aS1 - bS1) > eb1H * 0.10;
          addStage("h1", "Pace Gap Filter", pgr1 ? 1 : 0, pgr1 ? "Triggered" : "Not triggered");

          if (document.getElementById("use1HH2H").checked) {
            let h2ha1 = parseGames("a1HH2H");
            let h2hb1 = parseGames("b1HH2H");
            if (h2ha1?.err) h2ha1 = null;
            if (h2hb1?.err) h2hb1 = null;

            if (h2ha1 && h2hb1 && h2ha1.length >= 2 && h2hb1.length >= 2) {
              let w1 = getH2HWeight(h2ha1.length, h2hb1.length);
              const h2hA1avg = avg(h2ha1);
              const h2hB1avg = avg(h2hb1);
              addStage("h1", "H2H Reference", h2hA1avg + h2hB1avg, `Weight ${w1.toFixed(2)}`);

              if (!isNaN(projA1H) && projA1H > 0 && !isNaN(h2hA1avg)) {
                const dA1 = Math.abs(h2hA1avg - projA1H) / projA1H;
                const wA1 = dA1 > MODEL.H2H_DIVERGE_THRESHOLD ? w1 * 0.5 : w1;
                projA1H = projA1H * (1 - wA1) + h2hA1avg * wA1;
              }
              if (!isNaN(projB1H) && projB1H > 0 && !isNaN(h2hB1avg)) {
                const dB1 = Math.abs(h2hB1avg - projB1H) / projB1H;
                const wB1 = dB1 > MODEL.H2H_DIVERGE_THRESHOLD ? w1 * 0.5 : w1;
                projB1H = projB1H * (1 - wB1) + h2hB1avg * wB1;
              }
              addStage("h1", "H2H Blend", projA1H + projB1H, "1H H2H blended");
            } else {
              addStage("h1", "H2H Blend", projA1H + projB1H, "Skipped");
            }
          } else {
            addStage("h1", "H2H Blend", projA1H + projB1H, "Skipped");
          }

          const rawPace1H = (aS1 + aA1 + bS1 + bA1) / (2 * eb1H);
          const pace1 = Math.max(cl.min, Math.min(cl.max, rawPace1H));
          addStage("h1", "Pace Blend", pace1, `Clamp ${cl.min.toFixed(2)}-${cl.max.toFixed(2)}`);

          const vl1 = league === "nba" ? 7 : 6;
          const aVol1Raw = (stdDev(safeArr(a1HS) || []) + stdDev(safeArr(a1HA) || [])) / 2;
          const bVol1Raw = (stdDev(safeArr(b1HS) || []) + stdDev(safeArr(b1HA) || [])) / 2;
          aVol1 = aVol1Raw * 0.6 + bVol1Raw * 0.4;
          bVol1 = bVol1Raw * 0.6 + aVol1Raw * 0.4;

          const dfr1 = (aA1 < eb1H * 0.40) || (bA1 < eb1H * 0.40);
          addStage("h1", "Defensive Floor Filter", dfr1 ? 1 : 0, dfr1 ? "Triggered" : "Not triggered");

          projA1H = applyVolatility(projA1H, aVol1, vl1);
          projB1H = applyVolatility(projB1H, bVol1, vl1);
          addStage("h1", "Volatility Filter", projA1H + projB1H, `Limit ${vl1}`);

          projA1H = projA1H * MODEL.REGRESSION_WEIGHT + (eb1H / 2) * MODEL.BASELINE_WEIGHT;
          projB1H = projB1H * MODEL.REGRESSION_WEIGHT + (eb1H / 2) * MODEL.BASELINE_WEIGHT;
          addStage("h1", "Regression To Mean", projA1H + projB1H, "1H regression applied");

          projA1H = projA1H * (MODEL.PACE_BLEND + pace1 / 2);
          projB1H = projB1H * (MODEL.PACE_BLEND + pace1 / 2);
          addStage("h1", "Pace Applied", projA1H + projB1H, "Post pace blend");

          if (injMultA !== 1) projA1H *= injMultA;
          if (injMultB !== 1) projB1H *= injMultB;
          addStage("h1", "Injury/Rest Adjustment", projA1H + projB1H, `A ${injMultA.toFixed(3)} / B ${injMultB.toFixed(3)}`);

          projA1H += hAdj * 0.375;
          projB1H -= hAdj * 0.375;
          addStage("h1", "Home Edge", projA1H + projB1H, `±${(hAdj * 0.375).toFixed(2)}`);

          h1Proj = projA1H + projB1H;

          if (!isNaN(h1Proj)) {
            if (dfr1) h1Proj *= 0.97;
            if (Math.abs(projA1H - projB1H) > 9) h1Proj *= MODEL.MULTI_GOAL_SUPPRESS;
            if (pgr1) h1Proj *= MODEL.PACE_SUPPRESS;
            addStage("h1", "Suppression Filters", h1Proj, "Multi-goal / pace suppression");
            h1Proj = anchorProjection(h1Proj, h1Line, league, "h1");
            addStage("h1", "Line Anchor", h1Proj, "1H anchor applied");
          }
        } else {
          addStage("h1", "Base Projection", h1Proj, "Insufficient 1H inputs");
        }
      }

      let q1Proj = NaN;
      let aVolQ1 = 0;
      let bVolQ1 = 0;

      if (isNba) {
        const ebQ1 = eb / 4;
        addStage("q1", "League Base", ebQ1, "Q1 baseline");

        let aQ1S = parseGames("aQ1Scored");
        let aQ1A = parseGames("aQ1Allowed");
        let bQ1S = parseGames("bQ1Scored");
        let bQ1A = parseGames("bQ1Allowed");

        if (aQ1S?.err) aQ1S = null;
        if (aQ1A?.err) aQ1A = null;
        if (bQ1S?.err) bQ1S = null;
        if (bQ1A?.err) bQ1A = null;

        const aS1Q = safeArr(aQ1S) ? weightedAvg(aQ1S) : NaN;
        const aA1Q = safeArr(aQ1A) ? weightedAvg(aQ1A) : NaN;
        const bS1Q = safeArr(bQ1S) ? weightedAvg(bQ1S) : NaN;
        const bA1Q = safeArr(bQ1A) ? weightedAvg(bQ1A) : NaN;

        addStage("q1", "Sample Inputs", getSampleTier(aQ1S, aQ1A, bQ1S, bQ1A), "Q1 sample tier", "text");

        if (!isNaN(aS1Q) && !isNaN(aA1Q) && !isNaN(bS1Q) && !isNaN(bA1Q)) {
          let projAQ1 = aS1Q * MODEL.TEAM_WEIGHT + bA1Q * MODEL.OPP_WEIGHT;
          let projBQ1 = bS1Q * MODEL.TEAM_WEIGHT + aA1Q * MODEL.OPP_WEIGHT;

          addStage("q1", "Base Projection", projAQ1 + projBQ1, "Pre-H2H Q1 total");

          if (document.getElementById("useQ1H2H").checked) {
            let h2haQ1 = parseGames("aQ1H2H");
            let h2hbQ1 = parseGames("bQ1H2H");
            if (h2haQ1?.err) h2haQ1 = null;
            if (h2hbQ1?.err) h2hbQ1 = null;

            if (h2haQ1 && h2hbQ1 && h2haQ1.length >= 2 && h2hbQ1.length >= 2) {
              let wQ1 = getH2HWeight(h2haQ1.length, h2hbQ1.length);
              const h2hAQ1avg = avg(h2haQ1);
              const h2hBQ1avg = avg(h2hbQ1);
              addStage("q1", "H2H Reference", h2hAQ1avg + h2hBQ1avg, `Weight ${wQ1.toFixed(2)}`);

              if (!isNaN(projAQ1) && projAQ1 > 0 && !isNaN(h2hAQ1avg)) {
                const dAQ1 = Math.abs(h2hAQ1avg - projAQ1) / projAQ1;
                const wAQ1 = dAQ1 > MODEL.H2H_DIVERGE_THRESHOLD ? wQ1 * 0.5 : wQ1;
                projAQ1 = projAQ1 * (1 - wAQ1) + h2hAQ1avg * wAQ1;
              }
              if (!isNaN(projBQ1) && projBQ1 > 0 && !isNaN(h2hBQ1avg)) {
                const dBQ1 = Math.abs(h2hBQ1avg - projBQ1) / projBQ1;
                const wBQ1 = dBQ1 > MODEL.H2H_DIVERGE_THRESHOLD ? wQ1 * 0.5 : wQ1;
                projBQ1 = projBQ1 * (1 - wBQ1) + h2hBQ1avg * wBQ1;
              }
              addStage("q1", "H2H Blend", projAQ1 + projBQ1, "Q1 H2H blended");
            } else {
              addStage("q1", "H2H Blend", projAQ1 + projBQ1, "Skipped");
            }
          } else {
            addStage("q1", "H2H Blend", projAQ1 + projBQ1, "Skipped");
          }

          aVolQ1 = (stdDev(safeArr(aQ1S) || []) + stdDev(safeArr(aQ1A) || [])) / 2;
          bVolQ1 = (stdDev(safeArr(bQ1S) || []) + stdDev(safeArr(bQ1A) || [])) / 2;

          projAQ1 = applyVolatility(projAQ1, aVolQ1, 4.5);
          projBQ1 = applyVolatility(projBQ1, bVolQ1, 4.5);
          addStage("q1", "Volatility Filter", projAQ1 + projBQ1, "Q1 volatility applied");

          projAQ1 = projAQ1 * 0.85 + (ebQ1 / 2) * 0.15;
          projBQ1 = projBQ1 * 0.85 + (ebQ1 / 2) * 0.15;
          addStage("q1", "Regression To Mean", projAQ1 + projBQ1, "Q1 regression applied");

          const rawPaceQ1 = (aS1Q + aA1Q + bS1Q + bA1Q) / (2 * ebQ1);
          const paceQ1 = Math.max(0.90, Math.min(1.10, rawPaceQ1));
          addStage("q1", "Pace Blend", paceQ1, "Clamp 0.90-1.10");

          projAQ1 *= MODEL.PACE_BLEND + paceQ1 / 2;
          projBQ1 *= MODEL.PACE_BLEND + paceQ1 / 2;
          addStage("q1", "Pace Applied", projAQ1 + projBQ1, "Post pace blend");

          if (injMultA !== 1) projAQ1 *= injMultA;
          if (injMultB !== 1) projBQ1 *= injMultB;
          addStage("q1", "Injury/Rest Adjustment", projAQ1 + projBQ1, `A ${injMultA.toFixed(3)} / B ${injMultB.toFixed(3)}`);

          projAQ1 += hAdj * 0.25;
          projBQ1 -= hAdj * 0.25;
          addStage("q1", "Home Edge", projAQ1 + projBQ1, `±${(hAdj * 0.25).toFixed(2)}`);

          q1Proj = projAQ1 + projBQ1;

          const pgrQ1 = Math.abs(aS1Q - bS1Q) > ebQ1 * 0.10;
          const dfrQ1 = (aA1Q < ebQ1 * 0.40) || (bA1Q < ebQ1 * 0.40);
          addStage("q1", "Pace Gap Filter", pgrQ1 ? 1 : 0, pgrQ1 ? "Triggered" : "Not triggered");
          addStage("q1", "Defensive Floor Filter", dfrQ1 ? 1 : 0, dfrQ1 ? "Triggered" : "Not triggered");

          if (pgrQ1) q1Proj *= MODEL.PACE_SUPPRESS;
          if (dfrQ1) q1Proj *= 0.97;
          addStage("q1", "Suppression Filters", q1Proj, "Q1 suppression applied");
          q1Proj = anchorProjection(q1Proj, q1Line, league, "q1");
          addStage("q1", "Line Anchor", q1Proj, "Q1 anchor applied");
        } else {
          addStage("q1", "Base Projection", q1Proj, "Insufficient Q1 inputs");
        }
      }

      const ftEdge = ftLine !== null && !isNaN(ftProj) ? ftProj - ftLine : NaN;
      const h1Edge = h1Line !== null && !isNaN(h1Proj) ? h1Proj - h1Line : NaN;
      const q1Edge = q1Line !== null && !isNaN(q1Proj) ? q1Proj - q1Line : NaN;
      const aEdge = aLine !== null && !isNaN(projAFT) ? projAFT - aLine : NaN;
      const bEdge = bLine !== null && !isNaN(projBFT) ? projBFT - bLine : NaN;

      addStage("ft", "Edge", ftEdge, "Projection - line");
      addStage("h1", "Edge", h1Edge, "Projection - line");
      addStage("q1", "Edge", q1Edge, "Projection - line");
      addStage("teamA", "Edge", aEdge, "Projection - line");
      addStage("teamB", "Edge", bEdge, "Projection - line");

      const ftSampleTier = getSampleTier(aSA, aAA, bSA, bAA);
      const h1SampleTier = getSampleTier(
        safeArr(parseGames("a1HScored")),
        safeArr(parseGames("a1HAllowed")),
        safeArr(parseGames("b1HScored")),
        safeArr(parseGames("b1HAllowed"))
      );
      const q1SampleTier = getSampleTier(
        safeArr(parseGames("aQ1Scored")),
        safeArr(parseGames("aQ1Allowed")),
        safeArr(parseGames("bQ1Scored")),
        safeArr(parseGames("bQ1Allowed"))
      );

      const ftNote =
        ftSampleTier === "insufficient" ? "Insufficient FT sample — need 2+ games" :
        ftSampleTier === "thin" ? "Thin FT sample — projection only" :
        null;

      const h1Note =
        h1SampleTier === "insufficient" ? "Insufficient 1H sample — need 2+ games" :
        h1SampleTier === "thin" ? "Thin 1H sample — projection only" :
        null;

      const q1Note =
        q1SampleTier === "insufficient" ? "Insufficient Q1 sample — need 2+ games" :
        q1SampleTier === "thin" ? "Thin Q1 sample — projection only" :
        null;

      const ftProjectionOnly =
        (
          (g_fetchMeta.A.ft.source === "espn" && !g_fetchMeta.A.ft.venueReliable) ||
          (g_fetchMeta.B.ft.source === "espn" && !g_fetchMeta.B.ft.venueReliable)
        );

      const h1ProjectionOnly =
        (
          (g_fetchMeta.A.h1.source === "espn" && !g_fetchMeta.A.h1.venueReliable) ||
          (g_fetchMeta.B.h1.source === "espn" && !g_fetchMeta.B.h1.venueReliable)
        );

      const q1ProjectionOnly =
        (
          (g_fetchMeta.A.q1.source === "espn" && !g_fetchMeta.A.q1.venueReliable) ||
          (g_fetchMeta.B.q1.source === "espn" && !g_fetchMeta.B.q1.venueReliable)
        );

      const ftProjectionNote = ftProjectionOnly ? "Weak home/away venue sample — projection only" : null;
      const h1ProjectionNote = h1ProjectionOnly ? "Weak home/away venue sample — projection only" : null;
      const q1ProjectionNote = q1ProjectionOnly ? "Weak Q1 venue sample — projection only" : null;

      let ftPick = getPick(ftEdge, ftLine, league, "ft");
      let h1Pick = getPick(h1Edge, h1Line, league, "h1");
      let q1Pick = getPick(q1Edge, q1Line, league, "q1");
      let aPick = getPick(aEdge, aLine, league, "team");
      let bPick = getPick(bEdge, bLine, league, "team");

      const ftFullModel = ftSampleTier === "full" && !ftProjectionOnly;
      const h1FullModel = h1SampleTier === "full" && !h1ProjectionOnly && !isNaN(h1Proj);
      const q1FullModel = q1SampleTier === "full" && !q1ProjectionOnly && !isNaN(q1Proj);
      const teamFullModel = ftFullModel;

      const ftTrap = ftPick !== "NO PLAY" && detectTrap(ftEdge, ftLine, ftPick, league, "ft", aVol + bVol);
      const h1Trap = h1Pick !== "NO PLAY" && detectTrap(h1Edge, h1Line, h1Pick, league, "h1", aVol1 + bVol1);
      const q1Trap = q1Pick !== "NO PLAY" && detectTrap(q1Edge, q1Line, q1Pick, league, "q1", aVolQ1 + bVolQ1);
      const aTrap = aPick !== "NO PLAY" && detectTrap(aEdge, aLine, aPick, league, "team", aVol);
      const bTrap = bPick !== "NO PLAY" && detectTrap(bEdge, bLine, bPick, league, "team", bVol);

      if (ftTrap) ftPick = "NO PLAY";
      if (h1Trap) h1Pick = "NO PLAY";
      if (q1Trap) q1Pick = "NO PLAY";
      if (aTrap) aPick = "NO PLAY";
      if (bTrap) bPick = "NO PLAY";

      if (ftSampleTier !== "full") {
        ftPick = "NO PLAY";
        aPick = "NO PLAY";
        bPick = "NO PLAY";
      }
      if (h1SampleTier !== "full") h1Pick = "NO PLAY";
      if (q1SampleTier !== "full") q1Pick = "NO PLAY";

      if (ftProjectionOnly) {
        ftPick = "NO PLAY";
        aPick = "NO PLAY";
        bPick = "NO PLAY";
      }
      if (h1ProjectionOnly) h1Pick = "NO PLAY";
      if (q1ProjectionOnly) q1Pick = "NO PLAY";

      function addDecisionStages(bucket, edge, line, pick, sampleTier, projectionOnly, trap) {
        const pct = (!isNaN(edge) && line && line > 0) ? Math.abs(edge / line) : NaN;
        addStage(bucket, "Strong Edge Filter", pct, isNaN(pct) ? "No valid edge" : `Min ${(bucket === "ft" ? getLeagueEdgeThresholds(league).ft : bucket === "h1" ? getLeagueEdgeThresholds(league).h1 : bucket === "q1" ? getLeagueEdgeThresholds(league).q1 : getLeagueEdgeThresholds(league).team).toFixed(3)}`);
        addStage(bucket, "Sample Filter", sampleTier, sampleTier === "full" ? "Pass" : "No play", "text");
        addStage(bucket, "Projection Only Filter", projectionOnly ? "Projection only" : "Full model", projectionOnly ? "No play" : "Pass", "text");
        addStage(bucket, "Trap Filter", trap ? "Triggered" : "Clear", trap ? "No play" : "Pass", "text");
        addStage(bucket, "Final Pick", pick, "Final decision", "pick");
      }

      addDecisionStages("ft", ftEdge, ftLine, ftPick, ftSampleTier, ftProjectionOnly, ftTrap);
      addDecisionStages("h1", h1Edge, h1Line, h1Pick, h1SampleTier, h1ProjectionOnly, h1Trap);
      addDecisionStages("q1", q1Edge, q1Line, q1Pick, q1SampleTier, q1ProjectionOnly, q1Trap);
      addDecisionStages("teamA", aEdge, aLine, aPick, ftSampleTier, ftProjectionOnly, aTrap);
      addDecisionStages("teamB", bEdge, bLine, bPick, ftSampleTier, ftProjectionOnly, bTrap);

      const markets = [
        { edge: ftEdge, line: ftLine, pick: ftPick, fullModel: ftFullModel },
        { edge: h1Edge, line: h1Line, pick: h1Pick, fullModel: h1FullModel },
        { edge: q1Edge, line: q1Line, pick: q1Pick, fullModel: q1FullModel },
        { edge: aEdge, line: aLine, pick: aPick, fullModel: teamFullModel },
        { edge: bEdge, line: bLine, pick: bPick, fullModel: teamFullModel }
      ];

      const lockIdx = selectLock(markets);

      const picks = [
        {
          name: "FT Total",
          proj: ftProj,
          edge: ftEdge,
          pick: ftPick,
          note: ftNote || ftProjectionNote
        },
        {
          name: "1H Total",
          proj: h1Proj,
          edge: h1Edge,
          pick: h1Pick,
          note: h1Note || h1ProjectionNote
        },
        {
          name: "Q1 Total",
          proj: q1Proj,
          edge: q1Edge,
          pick: q1Pick,
          note: q1Note || q1ProjectionNote
        },
        {
          name: "Team A Total",
          proj: projAFT,
          edge: aEdge,
          pick: aPick,
          note: ftNote || ftProjectionNote
        },
        {
          name: "Team B Total",
          proj: projBFT,
          edge: bEdge,
          pick: bPick,
          note: ftNote || ftProjectionNote
        }
      ];

      picks.forEach(p => {
        if (p.name === "1H Total" && !isNbaOrNcaa) p.note = "1H market not available for this league";
        if (p.name === "1H Total" && isNbaOrNcaa && isNaN(h1Proj) && !p.note) p.note = "Insufficient 1H sample";
        if (p.name === "Q1 Total" && isNba && isNaN(q1Proj) && !p.note) p.note = "Insufficient Q1 sample";
      });

      const finalPicks = isNba
  ? picks
  : isNbaOrNcaa
    ? picks.filter(p => p.name !== "Q1 Total")
    : picks.filter(p => p.name !== "1H Total" && p.name !== "Q1 Total");

      finalPicks.forEach(p => {
        const originalIndex = picks.indexOf(p);
        const isLock = lockIdx === originalIndex;
        const row = table.insertRow();

        let predText = p.pick;
        if (p.note) predText = "—";
        else if (markets[originalIndex] && markets[originalIndex].line === null) predText = "—";

        if (isLock && predText !== "—" && predText !== "NO PLAY") {
          predText += ' <span class="lock">🔒</span>';
        }

        const pd = isNaN(p.proj) ? "—" : p.proj.toFixed(2);
        const lineRef = markets[originalIndex]?.line;
        const edgePct = (!isNaN(p.edge) && lineRef && lineRef > 0) ? (p.edge / lineRef) * 100 : NaN;
        const ed = isNaN(edgePct) ? "—" : (edgePct > 0 ? "+" : "") + edgePct.toFixed(2) + "%";
        const cn = predText.includes("OVER")
          ? "pred-over"
          : predText.includes("UNDER")
          ? "pred-under"
          : "pred-noplay";

        row.innerHTML = `<td>${p.name}</td><td>${pd}</td><td>${ed}</td><td class="${cn}">${predText}${p.note ? `<br><small class="error-note">${safeText(p.note)}</small>` : ""}</td>`;
      });

      renderProtocolOutput([
        { title: "FT Total Protocol", stages: protocol.ft },
        { title: "1H Total Protocol", stages: protocol.h1 },
        ...(isNba ? [{ title: "Q1 Total Protocol", stages: protocol.q1 }] : []),
        { title: "Team A Total Protocol", stages: protocol.teamA },
        { title: "Team B Total Protocol", stages: protocol.teamB }
      ]);

      setTimeout(() => {
        table.scrollIntoView({ behavior: "smooth", block: "start" });
      }, 100);
    }

    function clearAll() {
      _fetchToken++;
      _teamSearchToken.A++;
      _teamSearchToken.B++;
      unlockFetchBtn();
      selectedTeamIds = { A: null, B: null };
      g_fetchMeta = defaultFetchMeta();

      const ls = document.getElementById("leagueSelect");
      if (ls) ls.value = "";

      document.querySelectorAll("input").forEach(i => {
        if (i.type !== "checkbox") i.value = "";
        else i.checked = false;
        i.style.borderColor = "";
      });

      [
        "ftMarket","h1Market","q1Market","teamAMarket","teamBMarket",
        "aFTScored","aFTAllowed","a1HScored","a1HAllowed","aQ1Scored","aQ1Allowed",
        "bFTScored","bFTAllowed","b1HScored","b1HAllowed","bQ1Scored","bQ1Allowed",
        "aFTH2H","bFTH2H","a1HH2H","b1HH2H","aQ1H2H","bQ1H2H"
      ].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = "";
      });

      const espn = document.getElementById("espnSection");
      if (espn) espn.style.display = "none";

      ["a1HSection","b1HSection","h2h1HSection","h1MarketSection","aQ1Section","bQ1Section","q1MarketSection","h2hQ1Section"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = "none";
      });

      ["aAutoTag","bAutoTag","h2hAutoTag"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = "none";
      });

      hideInjuryBox("A");
      hideInjuryBox("B");
      g_injA = { restMult: 1, scoringMult: 1, notes: [] };
      g_injB = { restMult: 1, scoringMult: 1, notes: [] };

      _schedCache.clear();
      _summaryCache.clear();
      _fixtureCache.clear();

      setStatus("", "");
      closeDrop("dropA");
      closeDrop("dropB");

      const t = document.getElementById("results");
      t.innerHTML = "<tr><th>Pick</th><th>Projection</th><th>Edge</th><th>Prediction</th></tr>";
      t.style.display = "none";
      resetProtocolOutput();

      const fixtureSelect = document.getElementById("fixtureSelect");
      if (fixtureSelect) {
        fixtureSelect.innerHTML = '<option value="">— Select match —</option>';
        fixtureSelect.value = "";
      }

      document.querySelectorAll(".section").forEach(s => {
        s.classList.add("collapsed");
        s.classList.remove("locked");
      });

      lockFrom("espnSection");
      updateSectionLocks();
      accordionOpen("leagueSection");
    }

    function onLeagueChange() {
  _teamSearchToken.A++;
  _teamSearchToken.B++;
  closeDrop("dropA");
  closeDrop("dropB");
  unlockFetchBtn();
  setStatus("", "");
  resetResultsTable();

  ["ftMarket", "h1Market", "q1Market", "teamAMarket", "teamBMarket"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = "";
  });

  const league = document.getElementById("leagueSelect").value;
  const isNbaOrNcaa = league === "nba" || league === "ncaa";
  const isNba = league === "nba";

  document.getElementById("espnSection").style.display = isNbaOrNcaa ? "block" : "none";

  ["a1HSection", "b1HSection", "h2h1HSection", "h1MarketSection"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = isNbaOrNcaa ? "block" : "none";
  });

  ["aQ1Section", "bQ1Section", "q1MarketSection", "h2hQ1Section"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = isNba ? "block" : "none";
  });

      if (!isNba) {
        ["aQ1Scored", "aQ1Allowed", "bQ1Scored", "bQ1Allowed", "q1Market", "aQ1H2H", "bQ1H2H"].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.value = "";
        });
        const q1Cb = document.getElementById("useQ1H2H");
        if (q1Cb) q1Cb.checked = false;
      }

      if (!isNbaOrNcaa) {
        [
          "a1HScored","a1HAllowed","b1HScored","b1HAllowed",
          "a1HH2H","b1HH2H","h1Market",
          "aQ1Scored","aQ1Allowed","bQ1Scored","bQ1Allowed","q1Market","aQ1H2H","bQ1H2H"
        ].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.value = "";
        });

        ["aAutoTag", "bAutoTag", "h2hAutoTag"].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.style.display = "none";
        });

        document.getElementById("use1HH2H").checked = false;
        const q1Cb = document.getElementById("useQ1H2H");
        if (q1Cb) q1Cb.checked = false;
      }

      _fetchToken++;
      selectedTeamIds = { A: null, B: null };
      g_fetchMeta = defaultFetchMeta();

      ["teamAName", "teamBName"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = "";
      });

      [
        "aFTScored","aFTAllowed","bFTScored","bFTAllowed",
        "a1HScored","a1HAllowed","b1HScored","b1HAllowed",
        "aQ1Scored","aQ1Allowed","bQ1Scored","bQ1Allowed",
        "aFTH2H","bFTH2H","a1HH2H","b1HH2H","aQ1H2H","bQ1H2H"
      ].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = "";
      });

      document.getElementById("useFTH2H").checked = false;
      document.getElementById("use1HH2H").checked = false;
      const q1Cb = document.getElementById("useQ1H2H");
      if (q1Cb) q1Cb.checked = false;

      ["aAutoTag", "bAutoTag", "h2hAutoTag"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = "none";
      });

      _schedCache.clear();
      _summaryCache.clear();

      g_injA = { restMult: 1, scoringMult: 1, notes: [] };
      g_injB = { restMult: 1, scoringMult: 1, notes: [] };
      hideInjuryBox("A");
      hideInjuryBox("B");

      const fsel = document.getElementById("fixtureSelect");
      if (fsel) {
        fsel.innerHTML = '<option value="">— Select match —</option>';
        fsel.value = "";
      }

      if (!league) {
        lockFrom("espnSection");
        accordionOpen("leagueSection");
        return;
      }

updateSectionLocks();

if (isNbaOrNcaa) {
  accordionOpen("espnSection");
  loadFixtures(0);
} else {
  accordionOpen("marketSection");
}
}

    function toggleTheme() {
      const isDark = document.body.classList.toggle("dark-mode");
      localStorage.setItem("theme", isDark ? "dark" : "light");
    }

    (function applySavedTheme() {
      if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark-mode");
      }
    })();

    document.addEventListener("DOMContentLoaded", () => {
      makeSectionsCollapsible();

      document.querySelectorAll(".section").forEach(s => {
        s.classList.add("collapsed");
        s.classList.remove("locked");
      });

      const ls0 = document.getElementById("leagueSelect");
      if (ls0) ls0.value = "";

      const espnEl = document.getElementById("espnSection");
      if (espnEl) espnEl.style.display = "none";

      ["a1HSection","b1HSection","h2h1HSection","h1MarketSection","aQ1Section","bQ1Section","q1MarketSection","h2hQ1Section"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = "none";
      });

      lockFrom("espnSection");
      openSection("leagueSection");

      ["useFTH2H", "use1HH2H", "useQ1H2H"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener("change", resetResultsTable);
      });

      ["aFTH2H","bFTH2H","a1HH2H","b1HH2H","aQ1H2H","bQ1H2H"].forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.addEventListener("input", () => {
            const tag = document.getElementById("h2hAutoTag");
            if (tag) tag.style.display = "none";
            resetResultsTable();
          });
        }
      });

      const bucketMap = {
        "aFTScored":["A","ft"], "aFTAllowed":["A","ft"],
        "a1HScored":["A","h1"], "a1HAllowed":["A","h1"],
        "aQ1Scored":["A","q1"], "aQ1Allowed":["A","q1"],
        "bFTScored":["B","ft"], "bFTAllowed":["B","ft"],
        "b1HScored":["B","h1"], "b1HAllowed":["B","h1"],
        "bQ1Scored":["B","q1"], "bQ1Allowed":["B","q1"]
      };

      Object.entries(bucketMap).forEach(([id, [side, bucket]]) => {
        const el = document.getElementById(id);
        if (el) {
          el.addEventListener("input", () => {
            setManualSource(side, bucket);
            const tagId = side === "A" ? "aAutoTag" : "bAutoTag";
            const tagEl = document.getElementById(tagId);
            if (tagEl) tagEl.style.display = "none";
            resetResultsTable();
            updateSectionLocks();
            goToNextStep(false);
          });
        }
      });

      ["ftMarket","teamAMarket","teamBMarket","h1Market","q1Market"].forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.addEventListener("input", () => {
            resetResultsTable();
            updateSectionLocks();
          });
        }
      });

      ["aFTScored","aFTAllowed","a1HScored","a1HAllowed","aQ1Scored","aQ1Allowed"].forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.addEventListener("input", () => {
            updateSectionLocks();
          });
        }
      });

      ["bFTScored","bFTAllowed","b1HScored","b1HAllowed","bQ1Scored","bQ1Allowed"].forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.addEventListener("input", () => {
            updateSectionLocks();
          });
        }
      });

      ["aFTH2H","bFTH2H","a1HH2H","b1HH2H","aQ1H2H","bQ1H2H","useFTH2H","use1HH2H","useQ1H2H"].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        const check = () => {
          updateSectionLocks();
        };
        el.addEventListener("input", check);
        el.addEventListener("change", check);
      });
    });
  </script>
</body>
</html>
