<style>
body {background:#111;color:#d4af37;font-family:Segoe UI,sans-serif;margin:0;}
.wrapper {max-width:760px;margin:10px auto;padding:0 10px;}
h1 {text-align:center;font-size:18px;margin:10px 0;}
.section {border:1px solid #d4af37;background:#1a1a1a;padding:8px;margin:6px auto;}
label {display:block;font-size:12px;margin-bottom:3px;}

input {
  width:100%;
  max-width:260px;
  padding:5px;
  font-size:12px;
  background:#222;
  color:#d4af37;
  border:1px solid #d4af37;
  margin-bottom:4px;
}

.league-box {
  width:100%;
  max-width:260px;
  padding:5px;
  font-size:12px;
  background:#222;
  color:#d4af37;
  border:1px solid #d4af37;
  margin-bottom:4px;
  border-radius:0;
  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:none;
}

input[type="checkbox"] {
  width:12px;
  height:12px;
  margin-right:6px;
  vertical-align:middle;
}

::placeholder {color:rgba(255,255,255,0.35);}

button {
  padding:6px 16px;
  margin:6px;
  font-weight:bold;
  background:#d4af37;
  color:#111;
  border:none;
  cursor:pointer;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
  font-size:12px;
}

th, td {
  border:1px solid #d4af37;
  padding:6px;
  text-align:center;
}

.pred-over {background:#1e7d3a;color:#fff;font-weight:bold;}
.pred-under {background:#8b1e1e;color:#fff;font-weight:bold;}
.pred-noplay {background:#444;color:#bbb;font-weight:bold;}

.lock {
  font-size: 4px; display: inline-block; vertical-align: middle;
  transform: translateY(-1px); margin-left: 4px;
}

small.error-note {color:#ff6b6b; font-size:10px; display:block; margin-top:2px;}
</style>

<h1>🏀 Basketball Prediction Engine</h1>
<div class="wrapper">

  <div class="section">
    <h3 style="font-size:22px;">League Tier</h3>
    <label style="font-size:18px; margin-top:10px;">Select League</label>
    <select id="leagueSelect" class="league-box">
      <option value="nba">NBA</option>
      <option value="euro_elite">EuroLeague</option>
      <option value="euro_elite">EuroCup</option>
      <option value="euro_elite">Spain Liga ACB</option>
      <option value="euro_elite">Turkey BSL</option>

      <option value="africa">AfroBasket</option>
      <option value="unknown">Unknown / Mixed</option>
    </select>
  </div>

  <div class="section">
    <h3>Market Lines</h3>
    <label>FT Total</label>
    <input id="ftMarket" placeholder="e.g. 225.5 - 230.5"><small id="ftMarketErr" class="error-note"></small>
    <label>Team A Total</label>
    <input id="teamAMarket" placeholder="e.g. 112.5 - 115.5"><small id="teamAMarketErr" class="error-note"></small>
    <label>Team B Total</label>
    <input id="teamBMarket" placeholder="e.g. 110.5 - 113.5"><small id="teamBMarketErr" class="error-note"></small>
  </div>

  <div class="section">
    <h3>Team A (Last 5)</h3>
    <label>FT Scored</label>
    <input id="aFTScored" placeholder="e.g. 118,115,122,108,120"><small id="aFTScoredErr" class="error-note"></small>
    <label>FT Allowed</label>
    <input id="aFTAllowed" placeholder="e.g. 110,112,105,114,109"><small id="aFTAllowedErr" class="error-note"></small>
  </div>

  <div class="section">
    <h3>Team B (Last 5)</h3>
    <label>FT Scored</label>
    <input id="bFTScored" placeholder="e.g. 114,110,117,112,115"><small id="bFTScoredErr" class="error-note"></small>
    <label>FT Allowed</label>
    <input id="bFTAllowed" placeholder="e.g. 108,116,104,110,113"><small id="bFTAllowedErr" class="error-note"></small>
  </div>

  <div class="section">
    <h3>H2H (Full Game)</h3>
    <label><input type="checkbox" id="useFTH2H"> Use FT H2H (min 2 games)</label>
    <input id="aFTH2H" placeholder="e.g. 112,108,115,105,110"><small id="aFTH2HErr" class="error-note"></small>
    <input id="bFTH2H" placeholder="e.g. 109,113,107,111,108"><small id="bFTH2HErr" class="error-note"></small>
  </div>

  <div style="text-align:center;">
    <button onclick="runEngine()">Run</button>
    <button onclick="clearAll()">Clear</button>
  </div>

  <table id="results" style="display:none;">
    <tr>
      <th>Pick</th>
      <th>Projection</th>
      <th>Edge</th>
      <th>Prediction</th>
    </tr>
  </table>
