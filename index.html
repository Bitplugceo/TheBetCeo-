function lookupTeamId(name, leagueHint) {
  const n = name.toLowerCase().trim();
  const isNba = leagueHint === "nba";
  const PRIMARY   = isNba ? NBA_TEAM_MAP : NCAA_TEAM_MAP;
  const SECONDARY = isNba ? NCAA_TEAM_MAP : NBA_TEAM_MAP;

  // 1. Exact match — primary league first
  if (PRIMARY[n]   !== undefined) return PRIMARY[n];
  if (SECONDARY[n] !== undefined) return SECONDARY[n];

  // 2. Input contains key (user typed MORE than the key) — longest key wins
  let bestKey = null, bestLen = 0;
  for (let key of Object.keys(PRIMARY)) {
    if (n.includes(key) && key.length > bestLen) { bestKey = key; bestLen = key.length; }
  }
  if (bestKey) return PRIMARY[bestKey];
  for (let key of Object.keys(SECONDARY)) {
    if (n.includes(key) && key.length > bestLen) { bestKey = key; bestLen = key.length; }
  }
  if (bestKey) return SECONDARY[bestKey];

  // 3. Key contains input (user typed LESS than key, e.g. "FAU") — min 3 chars
  if (n.length >= 3) {
    bestKey = null; bestLen = 0;
    for (let key of Object.keys(PRIMARY)) {
      if (key.includes(n) && key.length > bestLen) { bestKey = key; bestLen = key.length; }
    }
    if (bestKey) return PRIMARY[bestKey];
    for (let key of Object.keys(SECONDARY)) {
      if (key.includes(n) && key.length > bestLen) { bestKey = key; bestLen = key.length; }
    }
    if (bestKey) return SECONDARY[bestKey];
  }

  return null;
}

// ─── Robust ID normalization ──────────────────────────────────────────────────
// ESPN returns IDs in multiple formats: "41", "t:41", "s:40~l:41~t:41", etc.


function normalizeId(raw) {
  if (raw === null || raw === undefined) return "";
  const s = String(raw);
  const tMatch = s.match(/t:(\d+)/);
  if (tMatch) return tMatch[1];
  const numMatch = s.match(/^(\d+)$/);
  if (numMatch) return numMatch[1];
  return s.replace(/\D/g, "") || s;
}

// ─── CRITICAL FIX: matchesTeam ────────────────────────────────────────────────
// In ESPN schedule API, competitor.id is often "1" or "2" (home/away slot),
// NOT the team ID. Must check team.id, team.uid, and uid as well.
function matchesTeam(competitor, teamId) {
  const tid = String(teamId);
  if (!competitor) return false;
  // Most reliable: team.id
  if (normalizeId(competitor.team?.id) === tid) return true;
  // team.uid e.g. "s:40~l:41~t:269"
  if (normalizeId(competitor.team?.uid) === tid) return true;
  // competitor uid
  if (normalizeId(competitor.uid) === tid) return true;
  // competitor id (sometimes correct, sometimes "1"/"2")
  if (normalizeId(competitor.id) === tid) return true;
  return false;
}

    } else {
      messages.push(`${teamBName}: no data ❌`);

    setStatus('<span class="spinner"></span>Scanning H2H since 2024...', "loading");

      const h2hB1H = h2hGames.slice(0,5).map(g => normalizeId(g.teamAId)===tA ? g.h1B : g.h1A).filter(v => v > 0);
      if (h2hA1H.length >= 2) {
        document.getElementById("a1HH2H").value = h2hA1H.join(",");
        document.getElementById("b1HH2H").value = h2hB1H.join(",");

      // Found 1 game — show it but don't auto-check (min 2 required)
      const tA = String(teamAId);

      document.getElementById("aFTH2H").value = normalizeId(g.teamAId)===tA ? g.scoreA : g.scoreB;

      messages.push("H2H: 1 game found (min 2 to auto-enable)");

    if (allGood) setStatus("", ""); else setStatus(messages.filter(m=>m.includes('❌')).join(' | '), 'err');

  } catch(e) {
    setStatus("❌ " + e.message, "err");
  } finally {
    btn.disabled = false;
  }
}

// ─── FIX 2: NCAA Schedule – include seasontype 1, try more seasons ────────────
async function fetchNcaaSchedule(base, teamId) {
  const tId = String(teamId);
  const pv = p => parseFloat(String(p?.value ?? p?.displayValue ?? 0)) || 0;
  const gameRefs = [];

  // Try current and previous season, all season types (1=pre, 2=regular, 3=post)
  for (const season of ["2026","2025","2024"]) {
    for (const stype of ["2","3","1"]) {
      try {
        const r = await proxyFetch(`${base}/teams/${teamId}/schedule?season=${season}&seasontype=${stype}`).catch(() => ({}));
        const events = r?.events || r?.team?.schedule?.events || [];
        for (const ev of events) {
          if (!ev.id) continue;
          const comp = ev?.competitions?.[0];
          if (!comp) continue;
          const done = comp?.status?.type?.completed ||
                       comp?.status?.type?.name === "STATUS_FINAL" ||
                       comp?.status?.type?.state === "post";
          if (!done || (comp?.competitors || []).length < 2) continue;
          const c = comp.competitors;
          // FIX: use normalizeId for competitor matching
          const mine = c.find(x => matchesTeam(x, tId)) || c[0];
          const opp  = c.find(x => !matchesTeam(x, tId)) || c[1];
          const ps = s => typeof s === "object" ? parseFloat(s.value ?? s.displayValue ?? 0) : parseFloat(s);
          gameRefs.push({id:String(ev.id), date:ev.date||"", rawS:ps(mine?.score), rawA:ps(opp?.score)});
        }
      } catch(e) {}
    }
    // Stop digging into older seasons if we already have enough
    if (gameRefs.length >= 10) break;
  }

  if (!gameRefs.length) return null;

  const seen = new Set();
  const unique = gameRefs.filter(g => { if(seen.has(g.id)) return false; seen.add(g.id); return true; });
  unique.sort((a,b) => {
    const da = a.date ? new Date(a.date).getTime() : 0;
    const db = b.date ? new Date(b.date).getTime() : 0;
    return db - da;
  });

  const top5 = unique.slice(0,5);
  const scored=[], allowed=[], h1Scored=[], h1Allowed=[];

  for (const ref of top5) {
    let ms = ref.rawS, os = ref.rawA, h1m = 0, h1o = 0, gotLS = false;
    try {
      const data = await proxyFetch(`${base}/summary?event=${ref.id}`);
      const hc = data?.header?.competitions?.[0];
      if (hc) {
        const competitors = hc?.competitors || [];
        // FIX: normalizeId in summary lookup too
        const mine = competitors.find(c => matchesTeam(c, tId));
        const opp  = competitors.find(c => !matchesTeam(c, tId));
        if (mine && opp) {
          const lm = mine?.linescores || [], lo = opp?.linescores || [];
          if (lm.length >= 1) {
            gotLS = true;
            ms = parseFloat(mine.score) || ms;
            os = parseFloat(opp.score) || os;
            h1m = pv(lm[0]); h1o = pv(lo[0]);
            if (lm.length > 2) {
              const sm = lm.reduce((s,p) => s+pv(p), 0), so = lo.reduce((s,p) => s+pv(p), 0);
              if (Math.abs(sm-ms) <= 3 && Math.abs(so-os) <= 3) {
                let otm = 0, oto = 0;
                for(let i=2; i<lm.length; i++) otm += pv(lm[i]);
                for(let i=2; i<lo.length; i++) oto += pv(lo[i]);
                if(otm > 0 || oto > 0) { ms -= otm; os -= oto; }
              }
            }
          }
        }
      }
    } catch(e) {}
    if (isNaN(ms) || isNaN(os) || ms <= 0 || os <= 0) continue;
    scored.push(Math.round(ms));
    allowed.push(Math.round(os));
    if (gotLS && h1m > 0) { h1Scored.push(Math.round(h1m)); h1Allowed.push(Math.round(h1o)); }
  }

  return scored.length >= 2 ? {scored, allowed, h1Scored, h1Allowed} : null;
}

// ─── FIX 3: NCAA H2H – scan BOTH teams' schedules + normalizeId everywhere ───
async function fetchNcaaH2H(base, teamAId, teamBId) {
  const tA = String(teamAId), tB = String(teamBId);
  const pv = p => parseFloat(String(p?.value ?? p?.displayValue ?? 0)) || 0;

          const events = r?.events || r?.team?.schedule?.events || [];
          // Log first completed game's competitor IDs to diagnose matching
          if (events.length > 0 && season === '2026' && stype === '2') {
            for (const _ev of events.slice(0,3)) {
              const _comp = _ev?.competitions?.[0];
              if (!_comp?.status?.type?.completed) continue;
              const _cs = _comp?.competitors || [];
              break;
            }
          }
          for (const ev of events) {
            const dateStr = ev?.date || "";
            // Only 2024 onwards
            if (dateStr && dateStr < "2024-01-01") continue;
            const comp = ev?.competitions?.[0];
            if (!comp) continue;
            const done = comp?.status?.type?.completed ||
                         comp?.status?.type?.name === "STATUS_FINAL" ||
                         comp?.status?.type?.state === "post";
            if (!done) continue;
            const competitors = comp?.competitors || [];
            if (competitors.length < 2 || !ev.id) continue;

            // FIX: use normalizeId to check both teams are present
            const hasA = competitors.some(c => matchesTeam(c, tA));
            const hasB = competitors.some(c => matchesTeam(c, tB));
            if (!hasA || !hasB) {
              // Log first few mismatches to see what IDs are present
              if (gameRefs.length === 0 && competitors.length > 0) {
              }
              continue;
            }

            const cA = competitors.find(x => matchesTeam(x, tA)) || competitors[0];
            const cB = competitors.find(x => matchesTeam(x, tB)) || competitors[1];
            const ps = s => typeof s === "object" ? parseFloat(s.value ?? s.displayValue ?? 0) : parseFloat(s);
            gameRefs.push({id:String(ev.id), date:dateStr, rawScoreA:ps(cA?.score), rawScoreB:ps(cB?.score)});
          }
        } catch(e) {}
      }
    }
  }

  if (!gameRefs.length) return [];

  // Deduplicate
  const seen = new Set();
  const uniqueRefs = gameRefs.filter(g => { if(seen.has(g.id)) return false; seen.add(g.id); return true; });
  uniqueRefs.sort((a,b) => {
    const da = a.date ? new Date(a.date).getTime() : 0;
    const db = b.date ? new Date(b.date).getTime() : 0;
    return db - da;
  });

  const h2h = [];
  for (const ref of uniqueRefs.slice(0,5)) {
    let added = false;
    try {
      const data = await proxyFetch(`${base}/summary?event=${ref.id}`);
      const hc = data?.header?.competitions?.[0];
      if (hc) {
        const competitors = hc?.competitors || [];
        // FIX: normalizeId in summary lookup
        const cA = competitors.find(c => matchesTeam(c, tA));
        const cB = competitors.find(c => matchesTeam(c, tB));
        if (competitors.length > 0)        if (cA && cB) {
          let sA = parseFloat(cA.score), sB = parseFloat(cB.score);
          if (!isNaN(sA) && !isNaN(sB) && sA > 0 && sB > 0) {
            const lA = cA?.linescores || [], lB = cB?.linescores || [];
            const h1A = lA.length >= 1 ? pv(lA[0]) : 0;
            const h1B = lB.length >= 1 ? pv(lB[0]) : 0;
            // Strip OT
            if (lA.length > 2 && lB.length > 2) {
              const sumA = lA.reduce((s,p) => s+pv(p), 0), sumB = lB.reduce((s,p) => s+pv(p), 0);
              if (Math.abs(sumA-sA) <= 3 && Math.abs(sumB-sB) <= 3) {
                let otA = 0, otB = 0;
                for(let i=2; i<lA.length; i++) otA += pv(lA[i]);
                for(let i=2; i<lB.length; i++) otB += pv(lB[i]);
                if(otA > 0 || otB > 0) { sA -= otA; sB -= otB; }
              }
            }
            h2h.push({teamAId:tA, teamBId:tB, scoreA:Math.round(sA), scoreB:Math.round(sB), h1A, h1B, date:ref.date, eventId:ref.id});
            added = true;
          }
        }
      }
    } catch(e) {}
    // Fallback to raw schedule scores if summary failed
    if (!added && !isNaN(ref.rawScoreA) && !isNaN(ref.rawScoreB) && ref.rawScoreA > 0 && ref.rawScoreB > 0) {
      h2h.push({teamAId:tA, teamBId:tB, scoreA:Math.round(ref.rawScoreA), scoreB:Math.round(ref.rawScoreB), h1A:0, h1B:0, date:ref.date, eventId:ref.id});
    }
  }

  h2h.sort((a,b) => {
    const da = a.date ? new Date(a.date).getTime() : 0;
    const db = b.date ? new Date(b.date).getTime() : 0;
    return db - da;
  });
  return h2h.slice(0,5);
}

function parseNbaEvents(data) {

    const c = comp.competitors || [];
    if (c.length < 2) continue;
    let sA = Number(c[0]?.score), sB = Number(c[1]?.score);
    if (isNaN(sA) || isNaN(sB) || (sA === 0 && sB === 0)) continue;
    const lA = c[0]?.linescores || [], lB = c[1]?.linescores || [];
    const h1A = lA.length >= 2 ? pvN(lA[0]) + pvN(lA[1]) : 0;
    const h1B = lB.length >= 2 ? pvN(lB[0]) + pvN(lB[1]) : 0;
    if (lA.length > 4 && lB.length > 4) {
      const tA = lA.reduce((s,p) => s+pvN(p), 0), tB = lB.reduce((s,p) => s+pvN(p), 0);
      if (Math.abs(tA-sA) <= 3 && Math.abs(tB-sB) <= 3) {
        let otA = 0, otB = 0;
        for(let i=4; i<lA.length; i++) otA += pvN(lA[i]);
        for(let i=4; i<lB.length; i++) otB += pvN(lB[i]);
        if(otA > 0 || otB > 0) { sA -= otA; sB -= otB; }
      }
    }
    if (sA > 0 && sB > 0) games.push({
      teamAId: String(c[0]?.team?.id),
      teamBId: String(c[1]?.team?.id),
      scoreA: sA, scoreB: sB, h1A, h1B, date: ev?.date || ""
    });
  }
  return games;
}

async function fetchNbaH2H(base, teamAId, teamBId) {
  const tA = String(teamAId), tB = String(teamBId);
  const pvN = p => parseFloat(String(p?.value ?? p?.displayValue ?? 0)) || 0;
  const gameRefs = [];

  for (const season of ["2026","2025","2024"]) {
    try {
      const [r1, r2] = await Promise.all([
        proxyFetch(`${base}/teams/${teamAId}/schedule?season=${season}&seasontype=2`).catch(() => ({})),
        proxyFetch(`${base}/teams/${teamAId}/schedule?season=${season}&seasontype=3`).catch(() => ({}))
      ]);
      const events = [...(r1?.events||r1?.team?.schedule?.events||[]), ...(r2?.events||r2?.team?.schedule?.events||[])];
      for (const ev of events) {
        const dateStr = ev?.date || "";
        if (dateStr && dateStr < "2024-01-01") continue;
        const comp = ev?.competitions?.[0];
        if (!comp) continue;
        const done = comp?.status?.type?.completed || comp?.status?.type?.name === "STATUS_FINAL" || comp?.status?.type?.state === "post";
        if (!done) continue;
        const c = comp?.competitors || [];
        if (c.length < 2 || !ev.id) continue;
        const hasB = c.some(x => matchesTeam(x, tB));
        if (!hasB) continue;
        const cA = c.find(x => matchesTeam(x, tA)) || c[0];
        const cB = c.find(x => matchesTeam(x, tB)) || c[1];
        const ps = s => typeof s === "object" ? parseFloat(s.value ?? s.displayValue ?? 0) : parseFloat(s);
        gameRefs.push({id:String(ev.id), date:dateStr, rawScoreA:ps(cA?.score), rawScoreB:ps(cB?.score)});
      }
    } catch(e) {}
  }

  if (!gameRefs.length) return [];
  const seenIds = new Set();
  const uniqueGameRefs = gameRefs.filter(g => { if(seenIds.has(g.id)) return false; seenIds.add(g.id); return true; });
  uniqueGameRefs.sort((a,b) => {
    const da = a.date ? new Date(a.date).getTime() : 0;
    const db = b.date ? new Date(b.date).getTime() : 0;
    return db - da;
  });

  const h2h = [];
  for (const ref of uniqueGameRefs.slice(0,5)) {
    let gameAdded = false;
    try {
      const data = await proxyFetch(`${base}/summary?event=${ref.id}`);
      const hc = data?.header?.competitions?.[0];
      if (hc) {
        const competitors = hc?.competitors || [];
        const cA = competitors.find(c => matchesTeam(c, tA));
        const cB = competitors.find(c => matchesTeam(c, tB));
        if (competitors.length > 0)        if (cA && cB) {
          let sA = parseFloat(cA.score), sB = parseFloat(cB.score);
          if (!isNaN(sA) && !isNaN(sB) && sA > 0 && sB > 0) {
            const lA = cA?.linescores || [], lB = cB?.linescores || [];
            if (lA.length > 4 && lB.length > 4) {
              const sumA = lA.reduce((s,p) => s+pvN(p), 0), sumB = lB.reduce((s,p) => s+pvN(p), 0);
              if (Math.abs(sumA-sA) <= 3 && Math.abs(sumB-sB) <= 3) {
                let otA = 0, otB = 0;
                for(let i=4; i<lA.length; i++) otA += pvN(lA[i]);
                for(let i=4; i<lB.length; i++) otB += pvN(lB[i]);
                if(otA > 0 || otB > 0) { sA -= otA; sB -= otB; }
              }
            }
            const h1A = lA.length >= 2 ? pvN(lA[0])+pvN(lA[1]) : 0;
            const h1B = lB.length >= 2 ? pvN(lB[0])+pvN(lB[1]) : 0;
            h2h.push({teamAId:tA, teamBId:tB, scoreA:Math.round(sA), scoreB:Math.round(sB), h1A, h1B, date:ref.date, eventId:ref.id});
            gameAdded = true;
          }
        }
      }
    } catch(e) {}
    if (!gameAdded && !isNaN(ref.rawScoreA) && !isNaN(ref.rawScoreB) && ref.rawScoreA > 0 && ref.rawScoreB > 0) {
      h2h.push({teamAId:tA, teamBId:tB, scoreA:Math.round(ref.rawScoreA), scoreB:Math.round(ref.rawScoreB), h1A:0, h1B:0, date:ref.date, eventId:ref.id});
    }
  }

  h2h.sort((a,b) => {
    const da = a.date ? new Date(a.date).getTime() : 0;
    const db = b.date ? new Date(b.date).getTime() : 0;
    return db - da;
  });
  return h2h;
}

function extractLastFive(games, teamId) {
  const scored=[], allowed=[], h1Scored=[], h1Allowed=[];
  const sorted = [...games].sort((a,b) => {
    const da = a.date ? new Date(a.date).getTime() : 0;
    const db = b.date ? new Date(b.date).getTime() : 0;
    return db - da;
  });
  for (const g of sorted) {
    if (scored.length >= 5) break;
    if (g.teamAId === teamId) {
      scored.push(g.scoreA); allowed.push(g.scoreB);
      if (g.h1A > 0) { h1Scored.push(g.h1A); h1Allowed.push(g.h1B); }
    } else if (g.teamBId === teamId) {
      scored.push(g.scoreB); allowed.push(g.scoreA);
      if (g.h1B > 0) { h1Scored.push(g.h1B); h1Allowed.push(g.h1A); }
    }
  }
  return scored.length >= 2 ? {scored, allowed, h1Scored, h1Allowed} : null;
}

async function searchTeamFromAPI(base, name) {
  const n = name.toLowerCase().trim();
  try {
    const data = await proxyFetch(`https://site.api.espn.com/apis/common/v3/search?query=${encodeURIComponent(name)}&limit=10&type=team&sport=basketball`);
    for (const r of (data?.items || data?.results || [])) {
      const uid = r?.uid || r?.team?.uid || "";
      const m = uid.match(/t:(\d+)/);
      if (m) return m[1];
      const id = r?.id || r?.team?.id;
      if (id && String(id).match(/^\d+$/)) return String(id);
    }
  } catch(e) {}
  try {
    const data = await proxyFetch(`${base}/teams?limit=500`);
    const leagues = data?.sports?.[0]?.leagues || [];
    let teams = [];
    for (const l of leagues) teams = teams.concat(l?.teams || []);
    if (!teams.length) teams = data?.teams || [];
    const words = n.split(/\s+/).filter(w => w.length >= 3);
    let best = null, bestScore = 0;
    for (let t of teams) {
      const team = t.team || t;
      const fields = [team.displayName, team.shortDisplayName, team.name, team.nickname, team.abbreviation, team.location]
        .filter(Boolean).map(f => f.toLowerCase()).join(" ");
      if (fields.includes(n)) return String(team.id);
      let score = words.filter(w => fields.includes(w)).length;
      if (team.location && n.includes(team.location.toLowerCase())) score += 2;
      if (team.nickname && n.includes(team.nickname.toLowerCase())) score += 2;
      if (score > bestScore) { bestScore = score; best = String(team.id); }
    }
    return bestScore >= 2 ? best : null;
  } catch(e) { return null; }
}

/* =============================================
   ENGINE CORE
   ============================================= */
function parseGames(id){let raw=document.getElementById(id).value.trim();if(!raw)return null;let arr=raw.split(",").map(x=>parseFloat(x.trim()));if(arr.some(x=>isNaN(x)||x<0||x>300))return"error";return arr;}
function avg(arr){if(!arr||arr.length===0)return NaN;return arr.reduce((a,b)=>a+b,0)/arr.length;}
function trimmedAvg(arr){if(!arr||arr.length===0)return NaN;if(arr.length<5)return avg(arr);let s=[...arr].sort((a,b)=>a-b);s.shift();s.pop();return avg(s);}
function stdDev(arr){if(!arr||arr.length<2)return 0;let m=avg(arr);return Math.sqrt(arr.reduce((a,b)=>a+Math.pow(b-m,2),0)/(arr.length-1));}
function mid(val){if(!val)return NaN;val=val.trim();if(!val.includes("-"))return NaN;let p=val.split("-").map(x=>x.trim());let a=parseFloat(p[0]),b=parseFloat(p[1]);if(isNaN(a)||isNaN(b))return NaN;return(a+b)/2;}
function displayLine(val){if(isNaN(val))return"NaN";return(Math.round(val*2)/2).toFixed(1);}
function dynamicWeight(s){if(!s||s.length<2)return 0;return s.length<=3?0.20:0.30;}
function applyVolatility(proj,std,limit){if(isNaN(proj)||isNaN(std))return NaN;if(std<=limit)return proj;return proj*(1-0.07*Math.min(1,(std-limit)/limit));}

function decision(edge,line,type,teamSc,aSc,bSc){
  if(isNaN(edge)||isNaN(line))return"NaN";
  if(Math.abs(edge/line)<0.045)return"NO PLAY";
  const isTotalType=type==="ft_total"||type==="1h_total";
  let thr=isTotalType?(edge>0?line*0.045:line*0.06):(edge>0?line*0.05:line*0.065);
  if(isNaN(thr)||Math.abs(edge)<thr)return"NO PLAY";
  if(edge<0){
    if(isTotalType&&!isNaN(aSc)&&!isNaN(bSc)&&(aSc>=line*0.58||bSc>=line*0.58))return"NO PLAY";
    if(type==="team"&&!isNaN(teamSc)&&teamSc>=line*0.58)return"NO PLAY";
  }
  return edge>0?"OVER "+displayLine(line):"UNDER "+displayLine(line);
}

function runEngine(){
  const table=document.getElementById("results");
  table.style.display="table";
  table.innerHTML="<tr><th>Pick</th><th>Projection</th><th>Edge</th><th>Prediction</th></tr>";
  const league=document.getElementById("leagueSelect").value;
  const bases={"nba":230,"euro_elite":175,"secondary":170,"ncaa":150,"africa":160,"unknown":160};
  const paceClamps={"nba":{min:0.90,max:1.15},"euro_elite":{min:0.92,max:1.10},"secondary":{min:0.92,max:1.10},"ncaa":{min:0.90,max:1.12},"africa":{min:0.90,max:1.12},"unknown":{min:0.90,max:1.12}};
  let eb=bases[league]||160;
  const cl=paceClamps[league]||{min:0.90,max:1.12};
  let ftLine=mid(document.getElementById("ftMarket").value);
  let aLine=mid(document.getElementById("teamAMarket").value);
  let bLine=mid(document.getElementById("teamBMarket").value);
  let aSA=parseGames("aFTScored"),aAA=parseGames("aFTAllowed"),bSA=parseGames("bFTScored"),bAA=parseGames("bFTAllowed");
  let aS=(aSA==="error"||aSA===null)?NaN:trimmedAvg(aSA);
  let aA=(aAA==="error"||aAA===null)?NaN:trimmedAvg(aAA);
  let bS=(bSA==="error"||bSA===null)?NaN:trimmedAvg(bSA);
  let bA=(bAA==="error"||bAA===null)?NaN:trimmedAvg(bAA);
  let fma=!isNaN(aS)&&!isNaN(aA)&&!isNaN(bS)&&!isNaN(bA);
  let bAFT=(!isNaN(aS)&&!isNaN(bA))?(aS+bA)/2:(!isNaN(aS)?aS:NaN);
  let bBFT=(!isNaN(bS)&&!isNaN(aA))?(bS+aA)/2:(!isNaN(bS)?bS:NaN);
  let tAP=(!isNaN(aS)&&!isNaN(aA))?(aS+aA)/2:NaN;
  let tBP=(!isNaN(bS)&&!isNaN(bA))?(bS+bA)/2:NaN;
  let pgr=(!isNaN(tAP)&&!isNaN(tBP)&&Math.abs(tAP-tBP)>eb*0.10);
  let rp=(!isNaN(tAP)&&!isNaN(tBP))?(tAP+tBP)/2:(!isNaN(tAP)?tAP:(!isNaN(tBP)?tBP:NaN));
  let pace=!isNaN(rp)&&eb?Math.max(cl.min,Math.min(cl.max,rp/eb)):1;
  let h2ha=null,h2hb=null;
  if(document.getElementById("useFTH2H").checked){h2ha=parseGames("aFTH2H");h2hb=parseGames("bFTH2H");}
  if(fma&&h2ha&&h2hb&&h2ha!=="error"&&h2hb!=="error"&&h2ha.length>=2&&h2hb.length>=2){
    let w=Math.min(0.30,dynamicWeight(h2ha)+dynamicWeight(h2hb));
    let h2hAvgA=avg(h2ha),h2hAvgB=avg(h2hB);
    // FIX: blend each team individually to preserve matchup-specific patterns
    if(!isNaN(bAFT)&&bAFT>0&&!isNaN(h2hAvgA)){
      let divA=Math.abs(h2hAvgA-bAFT)/bAFT;
      let wA=divA>0.20?w*0.5:w;
      bAFT=bAFT*(1-wA)+h2hAvgA*wA;
    }
    if(!isNaN(bBFT)&&bBFT>0&&!isNaN(h2hAvgB)){
      let divB=Math.abs(h2hAvgB-bBFT)/bBFT;
      let wB=divB>0.20?w*0.5:w;
      bBFT=bBFT*(1-wB)+h2hAvgB*wB;
    }
  }
  // FIX: blend own team's vol with opponent's defensive vol — both affect the projection
  let aVolRaw=(stdDev(aSA==="error"?[]:aSA)+stdDev(aAA==="error"?[]:aAA))/2;
  let bVolRaw=(stdDev(bSA==="error"?[]:bSA)+stdDev(bAA==="error"?[]:bAA))/2;
  let aVol=aVolRaw*0.6+bVolRaw*0.4;
  let bVol=bVolRaw*0.6+aVolRaw*0.4;
  let dfr=(!isNaN(aA)&&aA<eb*0.40)||(!isNaN(bA)&&bA<eb*0.40);
  let vl={"nba":14,"euro_elite":12,"secondary":12,"ncaa":11,"africa":11,"unknown":12}[league]||12;
  // FIX: correct order — volatility → pace → regression (regression is final anchor)
  bAFT=applyVolatility(bAFT,aVol,vl);bBFT=applyVolatility(bBFT,bVol,vl);
  bAFT=bAFT*(0.5+pace/2);bBFT=bBFT*(0.5+pace/2);
  let lta=eb/2;bAFT=(bAFT*0.85)+(lta*0.15);bBFT=(bBFT*0.85)+(lta*0.15);
  let ftP=(!isNaN(bAFT)&&!isNaN(bBFT))?bAFT+bBFT:NaN;
  if(!isNaN(ftP)){
    if(Math.abs(bAFT-bBFT)>18)ftP*=0.98;
    if(pgr)ftP*=0.97;
    if(!isNaN(ftLine)&&Math.abs(ftP-ftLine)>25)ftP=ftLine+(ftP-ftLine)*0.5;
    if(league==="nba"&&!isNaN(ftLine)&&Math.abs(ftP-ftLine)>18)ftP=ftLine+(ftP-ftLine)*0.65;
  }

  let h1P=NaN,h1Line=NaN;
  let aVol1=0,bVol1=0,vl1=7,pgr1=false,dfr1=false;
  const isNbaOrNcaa=league==="nba"||league==="ncaa";
  if(isNbaOrNcaa){
    const eb1H=eb/2;
    h1Line=mid(document.getElementById("h1Market").value);
    let a1HS=parseGames("a1HScored"),a1HA=parseGames("a1HAllowed");
    let b1HS=parseGames("b1HScored"),b1HA=parseGames("b1HAllowed");
    let aS1=(a1HS==="error"||a1HS===null)?NaN:trimmedAvg(a1HS);
    let aA1=(a1HA==="error"||a1HA===null)?NaN:trimmedAvg(a1HA);
    let bS1=(b1HS==="error"||b1HS===null)?NaN:trimmedAvg(b1HS);
    let bA1=(b1HA==="error"||b1HA===null)?NaN:trimmedAvg(b1HA);
    let fma1=!isNaN(aS1)&&!isNaN(aA1)&&!isNaN(bS1)&&!isNaN(bA1);
    if(fma1){
      let bA1H=(aS1+bA1)/2,bB1H=(bS1+aA1)/2;
      let tAP1=(aS1+aA1)/2,tBP1=(bS1+bA1)/2;
      pgr1=Math.abs(tAP1-tBP1)>eb1H*0.10;
      let rp1=(tAP1+tBP1)/2;
      let pace1=Math.max(cl.min,Math.min(cl.max,rp1/eb1H));
      if(document.getElementById("use1HH2H").checked){
        let h2ha1=parseGames("a1HH2H"),h2hb1=parseGames("b1HH2H");
        if(h2ha1&&h2hb1&&h2ha1!=="error"&&h2hb1!=="error"&&h2ha1.length>=2&&h2hb1.length>=2){
          let w1=Math.min(0.30,dynamicWeight(h2ha1)+dynamicWeight(h2hb1));
          let h2hA1avg=avg(h2ha1),h2hB1avg=avg(h2hb1);
          if(!isNaN(bA1H)&&bA1H>0&&!isNaN(h2hA1avg)){
            let dA1=Math.abs(h2hA1avg-bA1H)/bA1H;
            let wA1=dA1>0.20?w1*0.5:w1;
            bA1H=bA1H*(1-wA1)+h2hA1avg*wA1;
          }
          if(!isNaN(bB1H)&&bB1H>0&&!isNaN(h2hB1avg)){
            let dB1=Math.abs(h2hB1avg-bB1H)/bB1H;
            let wB1=dB1>0.20?w1*0.5:w1;
            bB1H=bB1H*(1-wB1)+h2hB1avg*wB1;
          }
        }
      }
      vl1={"nba":7,"ncaa":6}[league]||7;
      // FIX: blend own + opponent volatility
      let aVol1raw=(stdDev(a1HS||[])+stdDev(a1HA||[]))/2;
      let bVol1raw=(stdDev(b1HS||[])+stdDev(b1HA||[]))/2;
      aVol1=aVol1raw*0.6+bVol1raw*0.4;
      bVol1=bVol1raw*0.6+aVol1raw*0.4;
      dfr1=(!isNaN(aA1)&&aA1<eb1H*0.40)||(!isNaN(bA1)&&bA1<eb1H*0.40);
      // FIX: volatility → pace → regression
      bA1H=applyVolatility(bA1H,aVol1,vl1);
      bB1H=applyVolatility(bB1H,bVol1,vl1);
      bA1H=bA1H*(0.5+pace1/2);
      bB1H=bB1H*(0.5+pace1/2);
      bA1H=(bA1H*0.85)+(eb1H*0.15);
      bB1H=(bB1H*0.85)+(eb1H*0.15);
      h1P=bA1H+bB1H;
      if(!isNaN(h1P)){
        if(Math.abs(bA1H-bB1H)>9)h1P*=0.98;
        if(pgr1)h1P*=0.97;
        if(!isNaN(h1Line)&&Math.abs(h1P-h1Line)>12)h1P=h1Line+(h1P-h1Line)*0.5;
        if(league==="nba"&&!isNaN(h1Line)&&Math.abs(h1P-h1Line)>9)h1P=h1Line+(h1P-h1Line)*0.65;
      }
    }
  }

  let picks=[
    {name:"FT Total",    proj:ftP,  line:ftLine, type:"ft_total", teamSc:null, aSc:aS, bSc:bS},
    {name:"1H Total",    proj:h1P,  line:h1Line, type:"1h_total", teamSc:null, aSc:aS, bSc:bS},
    {name:"Team A Total",proj:bAFT, line:aLine,  type:"team",     teamSc:aS,   aSc:aS, bSc:bS},
    {name:"Team B Total",proj:bBFT, line:bLine,  type:"team",     teamSc:bS,   aSc:aS, bSc:bS}
  ];

  if(!isNbaOrNcaa||isNaN(h1P)) picks=picks.filter(p=>p.type!=="1h_total");

  let li=-1,ms=0;
  picks.forEach((p,i)=>{
    if(isNaN(p.line)||isNaN(p.proj))return;
    let e=p.proj-p.line,st=p.line?Math.abs(e/p.line):0;
    let pt=decision(e,p.line,p.type,p.teamSc,p.aSc,p.bSc);
    if(fma&&pt!=="NO PLAY"&&pt!=="NaN"&&st>=0.045&&st>ms){ms=st;li=i;}
  });

  picks.forEach((p,i)=>{
    let edge=NaN,pt="NaN",dn="";
    if(isNaN(p.line)){dn="Missing / Invalid Line";pt="—";}
    else if(isNaN(p.proj)){dn="Missing / Invalid Last-5 Data";pt="—";}
    else{
      edge=p.proj-p.line;
      pt=decision(edge,p.line,p.type,p.teamSc,p.aSc,p.bSc);
      if(Math.abs(edge)<p.line*0.025)pt="NO PLAY";
      if(p.type==="ft_total"&&pt.startsWith("OVER")){
        if(pgr||dfr)pt="NO PLAY";
        if(Math.abs(bAFT-bBFT)>20)pt="NO PLAY";
        if(aVol>vl&&bVol>vl)pt="NO PLAY";
      }
      // FIX: dfr also protects team totals — defensive rate flag means low-scoring game likely
      if(p.type==="team"&&pt.startsWith("OVER")&&dfr)pt="NO PLAY";
      if(p.type==="1h_total"&&pt.startsWith("OVER")){
        if(pgr1)pt="NO PLAY";
        if(dfr1)pt="NO PLAY";
        if(aVol1>vl1&&bVol1>vl1)pt="NO PLAY";
      }
    }
    let row=table.insertRow();
    let pred=pt;
    if(i===li&&pt!=="NO PLAY"&&pt!=="NaN")pred+=` <span class="lock">🔒</span>`;
    let pd=isNaN(p.proj)?"NaN":p.proj.toFixed(2);
    let ed=isNaN(edge)?"NaN":edge.toFixed(2);
    let cn=pred.startsWith("OVER")?"pred-over":pred.startsWith("UNDER")?"pred-under":"pred-noplay";
    row.innerHTML=`<td>${p.name}</td><td>${pd}</td><td>${ed}</td><td class="${cn}">${pred}${dn?`<br><small class="error-note">${dn}</small>`:""}</td>`;
  });
  setTimeout(()=>table.scrollIntoView({behavior:"smooth",block:"nearest"}),50);
}

function clearAll(){
  document.querySelectorAll("input").forEach(i=>{if(i.type!=="checkbox")i.value="";else i.checked=false;});
  ["aAutoTag","bAutoTag","h2hAutoTag"].forEach(id=>document.getElementById(id).style.display="none");
  setStatus("","");
