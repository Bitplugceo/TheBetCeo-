<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VCF Cleaner</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #0f1115;
      color: #ffffff;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
    }

    p {
      color: #c7c7c7;
      line-height: 1.5;
    }

    .card {
      background: #171a21;
      border: 1px solid #2a2f3a;
      border-radius: 14px;
      padding: 18px;
      margin-top: 18px;
    }

    label {
      display: block;
      margin: 14px 0 8px;
      font-weight: bold;
    }

    input[type="file"],
    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #343a46;
      background: #0f1115;
      color: white;
    }

    button {
      margin-top: 18px;
      width: 100%;
      padding: 14px;
      border: 0;
      border-radius: 12px;
      background: #2f81f7;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.95;
    }

    .secondary {
      background: #238636;
    }

    .muted {
      color: #9aa4b2;
      font-size: 14px;
    }

    .result {
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      background: #0f1115;
      border: 1px solid #2a2f3a;
      white-space: pre-line;
    }

    .hidden {
      display: none;
    }

    .small {
      font-size: 13px;
      color: #9aa4b2;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>VCF Cleaner</h1>
    <p>
      Upload your contacts VCF file, remove duplicates, and optionally keep only numbers
      that appear in your own WhatsApp number list.
    </p>

    <div class="card">
      <label for="vcfFile">1. Upload VCF file</label>
      <input id="vcfFile" type="file" accept=".vcf,text/vcard" />

      <label for="countryCode">2. Default country code (optional)</label>
      <input id="countryCode" type="text" placeholder="Example: 234 for Nigeria" />

      <label for="waFile">3. Upload WhatsApp numbers list (optional)</label>
      <input id="waFile" type="file" accept=".txt,.csv" />

      <div class="small">
        Example WhatsApp list format:
        <br />+2348012345678
        <br />08031234567
      </div>

      <button id="cleanBtn">Clean My VCF</button>

      <div id="result" class="result hidden"></div>

      <button id="downloadBtn" class="secondary hidden">Download Cleaned VCF</button>
    </div>
  </div>

  <script>
    let cleanedVcfText = "";

    function unfoldVcardText(text) {
      return text.replace(/\r?\n[ \t]/g, "");
    }

    function splitCards(text) {
      const normalized = unfoldVcardText(text).replace(/\r\n/g, "\n").replace(/\r/g, "\n");
      const lines = normalized.split("\n");
      const cards = [];
      let current = [];
      let inside = false;

      for (const rawLine of lines) {
        const line = rawLine.trimEnd();
        if (line.toUpperCase() === "BEGIN:VCARD") {
          inside = true;
          current = ["BEGIN:VCARD"];
        } else if (inside) {
          current.push(line);
          if (line.toUpperCase() === "END:VCARD") {
            cards.push(current);
            current = [];
            inside = false;
          }
        }
      }
      return cards;
    }

    function propName(line) {
      const beforeColon = line.split(":", 1)[0] || "";
      return beforeColon.split(";", 1)[0].toUpperCase();
    }

    function propValue(line) {
      const idx = line.indexOf(":");
      return idx >= 0 ? line.slice(idx + 1) : "";
    }

    function normalizePhone(raw, defaultCountryCode) {
      raw = (raw || "").trim();
      if (!raw) return "";

      let plus = raw.startsWith("+");
      let digits = raw.replace(/\D/g, "");

      if (!digits) return "";

      if (raw.startsWith("00")) {
        digits = digits.slice(2);
        plus = true;
      }

      if (defaultCountryCode) {
        const cc = String(defaultCountryCode).replace(/\D/g, "");
        if (digits.startsWith("0") && digits.length >= 10) {
          digits = cc + digits.slice(1);
          plus = true;
        }
      }

      return (plus ? "+" : "") + digits;
    }

    function unique(arr) {
      return [...new Set(arr)];
    }

    function parseCard(lines, defaultCountryCode) {
      let version = "3.0";
      let fn = "";
      let n = "";
      const telLines = [];
      const emailLines = [];
      const otherLines = [];
      const telKeys = [];
      const emailKeys = [];

      for (const line of lines) {
        const name = propName(line);

        if (name === "BEGIN" || name === "END") continue;

        if (name === "VERSION") {
          version = propValue(line).trim() || version;
        } else if (name === "FN") {
          fn = propValue(line);
        } else if (name === "N") {
          n = propValue(line);
        } else if (name === "TEL") {
          telLines.push(line);
          const key = normalizePhone(propValue(line), defaultCountryCode);
          if (key) telKeys.push(key);
        } else if (name === "EMAIL") {
          emailLines.push(line);
          const key = propValue(line).trim().toLowerCase();
          if (key) emailKeys.push(key);
        } else {
          otherLines.push(line);
        }
      }

      return {
        version,
        fn,
        n,
        telLines,
        emailLines,
        otherLines,
        telKeys: unique(telKeys),
        emailKeys: unique(emailKeys)
      };
    }

    function samePerson(a, b) {
      if (a.telKeys.some(x => b.telKeys.includes(x))) return true;
      if (a.emailKeys.some(x => b.emailKeys.includes(x))) return true;

      const aName = (a.fn || a.n || "").trim().toLowerCase();
      const bName = (b.fn || b.n || "").trim().toLowerCase();

      if (aName && bName && !a.telKeys.length && !b.telKeys.length && !a.emailKeys.length && !b.emailKeys.length) {
        return aName === bName;
      }

      return false;
    }

    function mergeCards(base, incoming, defaultCountryCode) {
      if (!base.fn && incoming.fn) base.fn = incoming.fn;
      if (!base.n && incoming.n) base.n = incoming.n;

      const seenTel = new Set(base.telKeys);
      for (const line of incoming.telLines) {
        const key = normalizePhone(propValue(line), defaultCountryCode);
        if (key && !seenTel.has(key)) {
          base.telLines.push(line);
          base.telKeys.push(key);
          seenTel.add(key);
        }
      }

      const seenEmail = new Set(base.emailKeys);
      for (const line of incoming.emailLines) {
        const key = propValue(line).trim().toLowerCase();
        if (key && !seenEmail.has(key)) {
          base.emailLines.push(line);
          base.emailKeys.push(key);
          seenEmail.add(key);
        }
      }

      const seenOther = new Set(base.otherLines);
      for (const line of incoming.otherLines) {
        if (!seenOther.has(line)) {
          base.otherLines.push(line);
          seenOther.add(line);
        }
      }
    }

    function renderCard(card) {
      const out = ["BEGIN:VCARD", `VERSION:${card.version}`];
      if (card.fn) out.push(`FN:${card.fn}`);
      if (card.n) out.push(`N:${card.n}`);
      out.push(...card.telLines);
      out.push(...card.emailLines);
      out.push(...card.otherLines);
      out.push("END:VCARD");
      return out.join("\n");
    }

    function parseWhatsAppList(text, defaultCountryCode, fileName) {
      const allowed = new Set();
      const lines = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");

      if (fileName.toLowerCase().endsWith(".csv")) {
        for (const line of lines) {
          const parts = line.split(",");
          for (const part of parts) {
            const num = normalizePhone(part, defaultCountryCode);
            if (num) allowed.add(num);
          }
        }
      } else {
        for (const line of lines) {
          const num = normalizePhone(line, defaultCountryCode);
          if (num) allowed.add(num);
        }
      }

      return allowed;
    }

    function readFileText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = reject;
        reader.readAsText(file);
      });
    }

    function downloadFile(filename, content) {
      const blob = new Blob([content], { type: "text/vcard;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    document.getElementById("cleanBtn").addEventListener("click", async () => {
      const vcfFile = document.getElementById("vcfFile").files[0];
      const waFile = document.getElementById("waFile").files[0];
      const defaultCountryCode = document.getElementById("countryCode").value.trim();
      const resultBox = document.getElementById("result");
      const downloadBtn = document.getElementById("downloadBtn");

      if (!vcfFile) {
        alert("Please upload your VCF file first.");
        return;
      }

      try {
        const vcfText = await readFileText(vcfFile);
        const rawCards = splitCards(vcfText);
        const parsedCards = rawCards.map(card => parseCard(card, defaultCountryCode));

        const merged = [];
        for (const card of parsedCards) {
          let found = null;
          for (const existing of merged) {
            if (samePerson(existing, card)) {
              found = existing;
              break;
            }
          }

          if (!found) {
            merged.push(card);
          } else {
            mergeCards(found, card, defaultCountryCode);
          }
        }

        let kept = merged;
        let waCountText = "";

        if (waFile) {
          const waText = await readFileText(waFile);
          const allowed = parseWhatsAppList(waText, defaultCountryCode, waFile.name);
          kept = merged.filter(card => card.telKeys.some(num => allowed.has(num)));
          waCountText = `After WhatsApp-list filter: ${kept.length}`;
        }

        cleanedVcfText = kept.map(renderCard).join("\n") + "\n";

        resultBox.classList.remove("hidden");
        resultBox.textContent =
          `Input cards: ${parsedCards.length}\n` +
          `After dedupe: ${merged.length}\n` +
          (waCountText ? waCountText + `\n` : "") +
          `Ready to download: cleaned.vcf`;

        downloadBtn.classList.remove("hidden");
      } catch (err) {
        resultBox.classList.remove("hidden");
        resultBox.textContent = "Error: " + (err.message || String(err));
        downloadBtn.classList.add("hidden");
      }
    });

    document.getElementById("downloadBtn").addEventListener("click", () => {
      if (!cleanedVcfText) {
        alert("Nothing to download yet.");
        return;
      }
      downloadFile("cleaned.vcf", cleanedVcfText);
    });
  </script>
</body>
</html>
