<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basketball Prediction Engine</title>
<style>
body{background:#111;color:#ffeb3b;font-family:Segoe UI,Tahoma,sans-serif;margin:0;padding:10px}
.wrapper{max-width:800px;margin:0 auto}
.section{border:1px solid #ffeb3b;background:#1a1a1a;padding:14px;margin:10px 0;border-radius:6px}
label{display:block;margin:6px 0 3px}
input,select{width:100%;max-width:340px;padding:8px;background:#222;color:#ffeb3b;border:1px solid #ffeb3b;border-radius:4px}
button{padding:10px 20px;margin:10px 6px;background:#ffeb3b;color:#111;border:none;border-radius:5px;font-weight:bold}
table{width:100%;border-collapse:collapse;margin-top:16px;display:none}
th,td{border:1px solid #ffeb3b;padding:8px;text-align:center}
.pred-over{background:#228B22;color:#fff;font-weight:bold}
.pred-under{background:#B22222;color:#fff;font-weight:bold}
.pred-noplay{background:#444;color:#ccc}
</style>
</head>
<body>
<h1>🏀 Basketball Prediction Engine</h1>
<div class="wrapper">

<div class="section">
<label>League</label>
<select id="league">
<option value="nba">NBA</option>
<option value="euro">EuroLeague</option>
<option value="unknown">Other</option>
</select>
<label><input type="checkbox" id="home"> Team A Home</label>
</div>

<div class="section">
<label>Full Game Line</label>
<input id="ftLine">
<label>Team A Line</label>
<input id="aLine">
<label>Team B Line</label>
<input id="bLine">
</div>

<div class="section">
<label>Team A Scored</label>
<input id="aSc">
<label>Team A Allowed</label>
<input id="aAl">
<label>Team B Scored</label>
<input id="bSc">
<label>Team B Allowed</label>
<input id="bAl">
</div>

<div style="text-align:center">
<button onclick="run()">Run</button>
</div>

<table id="results">
<thead>
<tr>
<th>Pick</th><th>Proj</th><th>Edge</th><th>Edge %</th><th>Conf</th><th>Decision</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>
const config={
leagues:{
nba:{base:230.6,pace:{min:0.88,max:1.18},offWeight:0.55,minEdge:2,relEdge:0.028,highMult:1.085,rho:0.30},
euro:{base:172,pace:{min:0.90,max:1.12},offWeight:0.50,minEdge:1.5,relEdge:0.03,highMult:1.085,rho:0.25},
unknown:{base:165,pace:{min:0.88,max:1.15},offWeight:0.52,minEdge:1.5,relEdge:0.032,highMult:1.085,rho:0.27}
},
regPrior:7,
volLimit:13,
volPenaltyMax:0.07,
volPenaltyScale:1.4,
marketShrink:0.06,
floorMult:0.68,
capMult:1.20,
homeBoost:1.028,
homeReduce:0.972,
minLine:50,
maxInput:250
};

function parseList(str){
return str.split(",")
.map(x=>parseFloat(x.trim()))
.filter(n=>!isNaN(n)&&n>0&&n<config.maxInput);
}

function avg(a){return a.reduce((x,y)=>x+y,0)/a.length;}
function std(a){
if(a.length<2)return 0;
let m=avg(a);
return Math.sqrt(a.reduce((s,x)=>s+(x-m)**2,0)/(a.length-1));
}

function shrink(mean,prior,n){
let w=config.regPrior/(config.regPrior+n);
return mean*(1-w)+prior*w;
}

function pace(aSc,aAl,bSc,bAl,base,clamp){
let offA=(aSc+bAl)/2;
let offB=(bSc+aAl)/2;
let raw=(offA+offB)/base;
return Math.max(clamp.min,Math.min(clamp.max,raw));
}

function volPenalty(p,sd){
if(sd<=config.volLimit)return p;
let f=Math.min(1,(sd-config.volLimit)/(config.volLimit*config.volPenaltyScale));
return p*(1-config.volPenaltyMax*f);
}

function clamp(val,min,max){
return Math.max(min,Math.min(max,val));
}

function decision(edge,line,cfg,teamAvg,isUnder){
if(line<=0)return{txt:"NO PLAY",cls:"pred-noplay"};
let absE=Math.abs(edge);
if(absE<cfg.minEdge||absE<cfg.relEdge*line)return{txt:"NO PLAY",cls:"pred-noplay"};
if(isUnder&&teamAvg>=(cfg.base/2)*cfg.highMult)return{txt:"NO PLAY",cls:"pred-noplay"};
return edge>0?{txt:`OVER ${line.toFixed(1)}`,cls:"pred-over"}:{txt:`UNDER ${line.toFixed(1)}`,cls:"pred-under"};
}

function confidence(sample,vol,rel){
if(sample>=7&&vol<9&&rel>0.025)return"High";
if(sample>=4&&vol<13&&rel>0.015)return"Medium";
return"Low";
}

function run(){
let leagueKey=document.getElementById("league").value;
let cfg=config.leagues[leagueKey];
let base=cfg.base;
let prior=base/2;

let ft=parseFloat(document.getElementById("ftLine").value);
let aL=parseFloat(document.getElementById("aLine").value);
let bL=parseFloat(document.getElementById("bLine").value);

if(isNaN(ft)||isNaN(aL)||isNaN(bL)||ft<config.minLine)return;

let aSc=parseList(document.getElementById("aSc").value);
let aAl=parseList(document.getElementById("aAl").value);
let bSc=parseList(document.getElementById("bSc").value);
let bAl=parseList(document.getElementById("bAl").value);

if(!aSc.length||!aAl.length||!bSc.length||!bAl.length)return;

let aScRaw=avg(aSc),aAlRaw=avg(aAl),bScRaw=avg(bSc),bAlRaw=avg(bAl);

if(document.getElementById("home").checked){
aScRaw*=config.homeBoost;
aAlRaw*=config.homeReduce;
bScRaw*=config.homeReduce;
bAlRaw*=config.homeBoost;
}

let pFactor=pace(aScRaw,aAlRaw,bScRaw,bAlRaw,base,cfg.pace);

let aScAdj=shrink(aScRaw,prior,aSc.length);
let aAlAdj=shrink(aAlRaw,prior,aAl.length);
let bScAdj=shrink(bScRaw,prior,bSc.length);
let bAlAdj=shrink(bAlRaw,prior,bAl.length);

let pA=(cfg.offWeight*aScAdj+(1-cfg.offWeight)*bAlAdj)*pFactor;
let pB=(cfg.offWeight*bScAdj+(1-cfg.offWeight)*aAlAdj)*pFactor;

let aVol=(std(aSc)+std(aAl))/2;
let bVol=(std(bSc)+std(bAl))/2;
let totalVol=Math.sqrt(aVol**2+bVol**2+2*cfg.rho*aVol*bVol);

pA=volPenalty(pA,aVol);
pB=volPenalty(pB,bVol);

pA=(1-config.marketShrink)*pA+config.marketShrink*aL;
pB=(1-config.marketShrink)*pB+config.marketShrink*bL;

pA=clamp(pA,prior*0.6,prior*1.3);
pB=clamp(pB,prior*0.6,prior*1.3);

let total=pA+pB;
total=volPenalty(total,totalVol);
total=clamp(total,base*config.floorMult,base*config.capMult);

let rows=[
{name:"Full Game",proj:total,line:ft,teamAvg:aScRaw+bScRaw,isUnder:false,vol:totalVol,sample:Math.min(aSc.length,bSc.length)},
{name:"Team A",proj:pA,line:aL,teamAvg:aScRaw,isUnder:true,vol:aVol,sample:aSc.length},
{name:"Team B",proj:pB,line:bL,teamAvg:bScRaw,isUnder:true,vol:bVol,sample:bSc.length}
];

let tbody=document.querySelector("#results tbody");
tbody.innerHTML="";

rows.forEach(r=>{
let edge=r.proj-r.line;
let rel=Math.abs(edge)/r.line;
let d=decision(edge,r.line,cfg,r.teamAvg,r.isUnder);
let conf=confidence(r.sample,r.vol,rel);
let tr=document.createElement("tr");
tr.innerHTML=`<td>${r.name}</td><td>${r.proj.toFixed(1)}</td><td>${edge.toFixed(1)}</td><td>${(rel*100).toFixed(1)}%</td><td>${conf}</td><td class="${d.cls}">${d.txt}</td>`;
tbody.appendChild(tr);
});

document.getElementById("results").style.display="table";
}
</script>
</body>
</html>
