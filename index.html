<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BB Engine">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d4af37">
<link rel="apple-touch-icon" href="0A45F320-A89F-4851-AA4E-CE22138FD52F.jpeg">
<link rel="icon" type="image/jpeg" href="0A45F320-A89F-4851-AA4E-CE22138FD52F.jpeg">

<title>Basketball Prediction Engine</title>

<style>
body {background:#111;color:#d4af37;font-family:Segoe UI,sans-serif;margin:0;}
.wrapper {max-width:760px;margin:10px auto;padding:0 10px;}
h1 {text-align:center;font-size:18px;margin:10px 0;}
.section {border:1px solid #d4af37;background:#1a1a1a;padding:8px;margin:6px auto;}
label {display:block;font-size:12px;margin-bottom:3px;}

input {
  width:100%;
  max-width:260px;
  padding:5px;
  font-size:12px;
  background:#222;
  color:#d4af37;
  border:1px solid #d4af37;
  margin-bottom:4px;
}

.league-box {
  width:100%;
  max-width:260px;
  padding:5px;
  font-size:12px;
  background:#222;
  color:#d4af37;
  border:1px solid #d4af37;
  margin-bottom:4px;
  border-radius:0;
  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:none;
}

input[type="checkbox"] {
  width:12px;
  height:12px;
  margin-right:6px;
  vertical-align:middle;
}

::placeholder {color:rgba(255,255,255,0.35);}

button {
  padding:6px 16px;
  margin:6px;
  font-weight:bold;
  background:#d4af37;
  color:#111;
  border:none;
  cursor:pointer;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
  font-size:12px;
}

th, td {
  border:1px solid #d4af37;
  padding:6px;
  text-align:center;
}

.pred-over {background:#1e7d3a;color:#fff;font-weight:bold;}
.pred-under {background:#8b1e1e;color:#fff;font-weight:bold;}
.pred-noplay {background:#444;color:#bbb;font-weight:bold;}

.lock {
  font-size: 4px; display: inline-block; vertical-align: middle;
  transform: translateY(-1px); margin-left: 4px;
}

small.error-note {color:#ff6b6b; font-size:10px; display:block; margin-top:2px;}
</style>
</head>

<body>
<h1>🏀 Basketball Prediction Engine</h1>
<div class="wrapper">

  <div class="section">
  <h3 style="font-size:22px;">League Tier</h3>
  <label style="font-size:18px; margin-top:10px;">Select League</label>
  <select id="leagueSelect" class="league-box">
  <option value="nba">USA - NBA</option>
  <option value="euro_elite">Europe - EuroLeague / Spain ACB / Turkey BSL / Italy Serie A</option>
  <option value="secondary">Europe - ABA League / France Pro B / Poland PLK / Greece A2</option>
  <option value="ncaa">USA - NCAA</option>
  <option value="africa">Africa - BAL / Nigeria League / Rwanda League</option>
  <option value="unknown">Other / Mixed League</option>
</select>
</div>

<div class="section">
<h3>Market Lines</h3>
<label>FT Total</label>
<input id="ftMarket" placeholder="150.5 - 160.5">
<label>Team A Total</label>
<input id="teamAMarket" placeholder="75.5 - 79.5">
<label>Team B Total</label>
<input id="teamBMarket" placeholder="75.5 - 79.5">
</div>

<div class="section">
<h3>Team A (Last 5)</h3>
<label>FT Scored</label>
<input id="aFTScored" placeholder="85,79,88,74,82">
<label>FT Allowed</label>
<input id="aFTAllowed" placeholder="76,80,72,79,77">
</div>

<div class="section">
<h3>Team B (Last 5)</h3>
<label>FT Scored</label>
<input id="bFTScored" placeholder="83,77,81,79,80">
<label>FT Allowed</label>
<input id="bFTAllowed" placeholder="78,82,74,77,80">
</div>

<div class="section">
<h3>H2H</h3>
<label><input type="checkbox" id="useFTH2H"> Use FT H2H (min 2 games)</label>
<input id="aFTH2H" placeholder="82,78,84,76,82">
<input id="bFTH2H" placeholder="79,81,77,80,78">

</div>

<div style="text-align:center;">
<button onclick="runEngine()">Run</button>
<button onclick="clearAll()">Clear</button>
</div>

<table id="results" style="display:none;">
<tr>
<th>Pick</th>
<th>Projection</th>
<th>Edge</th>
<th>Prediction</th>
</tr>
</table>

</div>

<script>

function parseGames(id){
  let raw = document.getElementById(id).value.trim();
  if(!raw) return null;
  let arr = raw.split(",").map(x => parseFloat(x.trim()));
  if(arr.some(x => isNaN(x) || x < 0 || x > 300)) return "error";
  return arr;
}

function avg(arr){
  if(!arr || arr.length === 0) return NaN;
  return arr.reduce((a,b)=>a+b,0) / arr.length;
}

  function trimmedAvg(arr){
  if(!arr || arr.length === 0) return NaN;

  if(arr.length < 5){
    return avg(arr); // use normal average if less than 5 games
  }

  let sorted = [...arr].sort((a,b)=>a-b);
  sorted.shift();   // remove lowest
  sorted.pop();     // remove highest

  return avg(sorted);
}
  
function stdDev(arr){
  if(!arr || arr.length < 2) return 0;
  let m = avg(arr);
  let variance = arr.reduce((a,b)=>a+Math.pow(b-m,2),0) / (arr.length - 1);
  return Math.sqrt(variance);
}

function mid(val){
  if(!val) return NaN;
  val = val.trim();
  if(!val.includes("-")) return NaN;
  let p = val.split("-").map(x=>x.trim());
  let a = parseFloat(p[0]), b = parseFloat(p[1]);
  if(isNaN(a) || isNaN(b)) return NaN;
  return (a + b) / 2;
}

function displayLine(val){
  if(isNaN(val)) return "NaN";
  return (Math.round(val * 2) / 2).toFixed(1);
}

function dynamicWeight(sample){
  if(!sample || sample.length < 2) return 0;
  if(sample.length <= 3) return 0.20;
  return 0.30;
}

function applyVolatility(proj, std, limit){
  if(isNaN(proj) || isNaN(std)) return NaN;
  if(std <= limit) return proj;

  const excess = std - limit;
  const maxExcess = limit;
  const reductionFactor = Math.min(1, excess / maxExcess);
  const maxCut = 0.05;

  const cut = maxCut * reductionFactor;
  return proj * (1 - cut);
}

function decision(edge, line, type, teamSc, aSc, bSc){
  if(isNaN(edge) || isNaN(line)) return "NaN";

  if(Math.abs(edge) < 3) return "NO PLAY";
  
  let threshold;
  if(type === "ft_total")      threshold = edge > 0 ? line * 0.045 : line * 0.06;
  else if(type === "team")     threshold = edge > 0 ? line * 0.05  : line * 0.065;
  else return "NaN";

  if(isNaN(threshold)) return "NaN";

  if(Math.abs(edge) < threshold) return "NO PLAY";

  if(edge < 0){
    if(type === "ft_total")  { 
      if(!isNaN(aSc) && !isNaN(bSc) && (aSc >= line*0.58 || bSc >= line*0.58)) return "NO PLAY"; 
    }
    if(type === "team")      { 
      if(!isNaN(teamSc) && teamSc >= line*0.58) return "NO PLAY"; 
    }
  }

  return edge > 0 ? "OVER " + displayLine(line) : "UNDER " + displayLine(line);
}

function runEngine(){
  const table = document.getElementById("results");
  table.style.display = "table";
  table.innerHTML = "<tr><th>Pick</th><th>Projection</th><th>Edge</th><th>Prediction</th></tr>";

  const league = document.getElementById("leagueSelect").value;

  const leagueBases = {
    "nba": 230,
    "euro_elite": 175,
    "secondary": 170,
    "ncaa": 150,
    "africa": 160,
    "unknown": 160
  };

  const leaguePaceClamps = {
    "nba":       { min: 0.90, max: 1.15 },
    "euro_elite": { min: 0.92, max: 1.10 },
    "secondary":  { min: 0.92, max: 1.10 },
    "ncaa":       { min: 0.90, max: 1.12 },
    "africa":     { min: 0.90, max: 1.12 },
    "unknown":    { min: 0.90, max: 1.12 }
  };

  let expectedBase = leagueBases[league] || 160;
  const clamps = leaguePaceClamps[league] || { min: 0.90, max: 1.12 };

  let ftLine  = mid(document.getElementById("ftMarket").value);
  let aLine   = mid(document.getElementById("teamAMarket").value);
  let bLine   = mid(document.getElementById("teamBMarket").value);

  let aFTScArr  = parseGames("aFTScored");
  let aFTAllArr = parseGames("aFTAllowed");
  let bFTScArr  = parseGames("bFTScored");
  let bFTAllArr = parseGames("bFTAllowed");

  let aFTSc  = (aFTScArr  === "error" || aFTScArr  === null) ? NaN : trimmedAvg(aFTScArr);
let aFTAll = (aFTAllArr === "error" || aFTAllArr === null) ? NaN : trimmedAvg(aFTAllArr);
let bFTSc  = (bFTScArr  === "error" || bFTScArr  === null) ? NaN : trimmedAvg(bFTScArr);
let bFTAll = (bFTAllArr === "error" || bFTAllArr === null) ? NaN : trimmedAvg(bFTAllArr);
let fullModelActive = 
  !isNaN(aFTSc) &&
  !isNaN(aFTAll) &&
  !isNaN(bFTSc) &&
  !isNaN(bFTAll);
  
  let baseAFT = NaN;
let baseBFT = NaN;

// Team A projection logic
if (!isNaN(aFTSc) && !isNaN(bFTAll)) {
  baseAFT = (aFTSc * 0.6) + (bFTAll * 0.4);
} else if (!isNaN(aFTSc)) {
  baseAFT = aFTSc;
}

// Team B projection logic
if (!isNaN(bFTSc) && !isNaN(aFTAll)) {
  baseBFT = (bFTSc * 0.6) + (aFTAll * 0.4);
} else if (!isNaN(bFTSc)) {
  baseBFT = bFTSc;
}

  let teamAPace = (!isNaN(aFTSc) && !isNaN(aFTAll)) ? aFTSc + aFTAll : NaN;
let teamBPace = (!isNaN(bFTSc) && !isNaN(bFTAll)) ? bFTSc + bFTAll : NaN;

/* -------- Pace Gap Filter -------- */

let paceGapRisk = false;

if(!isNaN(teamAPace) && !isNaN(teamBPace)){
  let paceGap = Math.abs(teamAPace - teamBPace);

  if(paceGap > 18){
    paceGapRisk = true;
  }
}
  
let rawPace = NaN;

if (!isNaN(teamAPace) && !isNaN(teamBPace)) {
  rawPace = (teamAPace + teamBPace) / 2;
} else if (!isNaN(teamAPace)) {
  rawPace = teamAPace;
} else if (!isNaN(teamBPace)) {
  rawPace = teamBPace;
}

  let pace = 1;
  if (!isNaN(rawPace) && expectedBase !== 0 && !isNaN(expectedBase)) {
    pace = rawPace / expectedBase;
    pace = Math.max(clamps.min, Math.min(clamps.max, pace));
  }

  let ftH2Ha = null, ftH2Hb = null;

  if(document.getElementById("useFTH2H").checked){
    ftH2Ha = parseGames("aFTH2H");
    ftH2Hb = parseGames("bFTH2H");
  }
  
    if(
  fullModelActive &&
  ftH2Ha &&
  ftH2Hb &&
  ftH2Ha !== "error" &&
  ftH2Hb !== "error" &&
  ftH2Ha.length >= 2 &&
  ftH2Hb.length >= 2
){
      let wA = dynamicWeight(ftH2Ha);
      let wB = dynamicWeight(ftH2Hb);

      const totalGames = ftH2Ha.length + ftH2Hb.length;
      wA = wA * (ftH2Ha.length / totalGames);
      wB = wB * (ftH2Hb.length / totalGames);

      // Cap total H2H influence at ~30%
      let totalH2HWeight = wA + wB;
      if (totalH2HWeight > 0.30) {
        const scale = 0.30 / totalH2HWeight;
        wA *= scale;
        wB *= scale;
      }

      let currentTotal = baseAFT + baseBFT;
      let h2hTotal = avg(ftH2Ha) + avg(ftH2Hb);
      if(!isNaN(currentTotal) && currentTotal > 0 && Math.abs(h2hTotal - currentTotal) / currentTotal > 0.20){
        wA *= 0.5;
        wB *= 0.5;
      }
      if(!isNaN(avg(ftH2Ha))) baseAFT = baseAFT * (1 - wA) + avg(ftH2Ha) * wA;
      if(!isNaN(avg(ftH2Hb))) baseBFT = baseBFT * (1 - wB) + avg(ftH2Hb) * wB;
    }


  let aVol = (stdDev(aFTScArr === "error" ? [] : aFTScArr) + stdDev(aFTAllArr === "error" ? [] : aFTAllArr)) / 2;
let bVol = (stdDev(bFTScArr === "error" ? [] : bFTScArr) + stdDev(bFTAllArr === "error" ? [] : bFTAllArr)) / 2;
  
  /* -------- Defensive Floor Filter -------- */

let defensiveFloorRisk = false;

if(
 (!isNaN(aFTAll) && aFTAll < 70) ||
 (!isNaN(bFTAll) && bFTAll < 70)
){
 defensiveFloorRisk = true;
}
  
let volatilityLimits = {
  "nba": 14,
  "euro_elite": 12,
  "secondary": 12,
  "ncaa": 11,
  "africa": 11,
  "unknown": 12
};

let volLimit = volatilityLimits[league] || 12;

let volatilityBlock = false;

if(aVol > volLimit * 1.35 || bVol > volLimit * 1.35){
  volatilityBlock = true;
}

baseAFT = applyVolatility(baseAFT, aVol, volLimit);
baseBFT = applyVolatility(baseBFT, bVol, volLimit);

 // regression to league mean
let leagueTeamAvg = expectedBase / 2;

baseAFT = (baseAFT * 0.85) + (leagueTeamAvg * 0.15);
baseBFT = (baseBFT * 0.85) + (leagueTeamAvg * 0.15);
  
baseAFT = baseAFT * (0.5 + pace/2);
baseBFT = baseBFT * (0.5 + pace/2);

let ftProj = NaN;

if(!isNaN(baseAFT) && !isNaN(baseBFT)){
  ftProj = baseAFT + baseBFT;
}

  let projDiff = (!isNaN(baseAFT) && !isNaN(baseBFT))
  ? Math.abs(baseAFT - baseBFT)
  : NaN;
if(!isNaN(projDiff) && projDiff > 18){
  ftProj = ftProj * 0.98;
}

 if(paceGapRisk){
  ftProj = ftProj * 0.97;
}
  
  if(!isNaN(ftProj) && !isNaN(ftLine)){
  if(Math.abs(ftProj - ftLine) > 25){
    ftProj = ftLine + (ftProj - ftLine) * 0.5;
  }
}
  
  let picks = [
    {name:"FT Total",     proj:ftProj,  line:ftLine,  type:"ft_total", teamSc:null, aSc:aFTSc, bSc:bFTSc},
    {name:"Team A Total", proj:baseAFT, line:aLine,   type:"team",     teamSc:aFTSc, aSc:aFTSc, bSc:bFTSc},
    {name:"Team B Total", proj:baseBFT, line:bLine,   type:"team",     teamSc:bFTSc, aSc:aFTSc, bSc:bFTSc}
  ];

  let lockIndex = -1;
  let maxStrength = 0;


/* -------- PHASE 1: Find strongest pick -------- */
picks.forEach((p, i) => {
  if (isNaN(p.line) || isNaN(p.proj)) return;

  let edge = p.proj - p.line;
  let strength = (p.line !== 0 && !isNaN(p.line)) ? Math.abs(edge / p.line) : 0;
  let pickText = decision(edge, p.line, p.type, p.teamSc, p.aSc, p.bSc);

  if (fullModelActive &&
      pickText !== "NO PLAY" &&
      pickText !== "NaN" &&
      strength >= 0.045 &&
      strength > maxStrength) {

      maxStrength = strength;
      lockIndex = i;
  }
});


/* -------- PHASE 2: Render table -------- */
picks.forEach((p, i) => {

  let edge = NaN;
  let pickText = "NaN";
  let displayNote = "";

  if (isNaN(p.line)) {
    displayNote = "Missing / Invalid Line";
    pickText = "—";

  } else if (isNaN(p.proj)) {
    displayNote = "Missing / Invalid Last-5 Data";
    pickText = "—";

  } else {

    edge = p.proj - p.line;
pickText = decision(edge, p.line, p.type, p.teamSc, p.aSc, p.bSc);

/* -------- Market Trap Filter -------- */

let trapThreshold = p.line * 0.015;

if(Math.abs(edge) < trapThreshold){
    pickText = "NO PLAY";
}

    /* -------- Upgrade Filters -------- */

    if(p.type === "ft_total" && pickText.startsWith("OVER")){

      if(paceGapRisk){
        pickText = "NO PLAY";
      }

      if(defensiveFloorRisk){
        pickText = "NO PLAY";
      }

    }
  }

  let row = table.insertRow();
  let pred = pickText;

  if (i === lockIndex && pickText !== "NO PLAY" && pickText !== "NaN") {
    pred += ` <span class="lock">🔒</span>`;
  }

  let projDisplay = isNaN(p.proj) ? "NaN" : p.proj.toFixed(2);
  let edgeDisplay = isNaN(edge) ? "NaN" : edge.toFixed(2);

  let className = "pred-noplay";
  if (pred.startsWith("OVER")) className = "pred-over";
  else if (pred.startsWith("UNDER")) className = "pred-under";

  row.innerHTML = `
  <td>${p.name}</td>
  <td>${projDisplay}</td>
  <td>${edgeDisplay}</td>
  <td class="${className}">
    ${pred}
    ${displayNote ? `<br><small class="error-note">${displayNote}</small>` : ""}
  </td>`;
});
}
  
function clearAll(){
  document.querySelectorAll("input").forEach(i => i.value = "");
  document.querySelectorAll("input[type=checkbox]").forEach(i => i.checked = false);
  const table = document.getElementById("results");
  table.innerHTML = "<tr><th>Pick</th><th>Projection</th><th>Edge</th><th>Prediction</th></tr>";
  table.style.display = "none";
}
</script>
</body>
</html>
