<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BB Engine">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d4af37">

<link rel="apple-touch-icon" href="0A45F320-A89F-4851-AA4E-CE22138FD52F.jpeg">
<link rel="icon" type="image/jpeg" href="0A45F320-A89F-4851-AA4E-CE22138FD52F.jpeg">

<title>Basketball Prediction Engine</title>

<style>
body {background:#111;color:#d4af37;font-family:Segoe UI,sans-serif;margin:0;}
.wrapper {max-width:760px;margin:10px auto;padding:0 10px;}
h1 {text-align:center;font-size:18px;margin:10px 0;}
.section {border:1px solid #d4af37;background:#1a1a1a;padding:8px;margin:6px auto;}
label {display:block;font-size:12px;margin-bottom:3px;}

input, select {
  width:100%;
  max-width:260px;
  padding:5px;
  font-size:12px;
  background:#222;
  color:#d4af37;
  border:1px solid #d4af37;
  margin-bottom:4px;
  appearance:none;
}

input[type="checkbox"] {
  width:12px;
  height:12px;
  margin-right:6px;
}

button {
  padding:6px 16px;
  margin:6px;
  font-weight:bold;
  background:#d4af37;
  color:#111;
  border:none;
  cursor:pointer;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
  font-size:12px;
}

th, td {
  border:1px solid #d4af37;
  padding:6px;
  text-align:center;
}

.pred-over {background:#1e7d3a;color:#fff;font-weight:bold;}
.pred-under {background:#8b1e1e;color:#fff;font-weight:bold;}
.pred-noplay {background:#444;color:#bbb;font-weight:bold;}

.lock {
  font-size:4px;
  display:inline-block;
  vertical-align:middle;
  transform:translateY(-1px);
  margin-left:4px;
}

small.error-note {color:#ff6b6b;font-size:10px;display:block;margin-top:2px;}
</style>
</head>

<body>
<h1>🏀 Basketball Prediction Engine</h1>

<div class="wrapper">

<div class="section">
<h3>League Tier</h3>
<select id="leagueSelect">
  <option value="nba">NBA</option>
  <option value="euro_elite">EuroLeague / ACB / BBL</option>
  <option value="secondary">Secondary Europe</option>
  <option value="ncaa">NCAA</option>
  <option value="africa">Africa</option>
  <option value="unknown">Unknown</option>
</select>
</div>

<div class="section">
<h3>Market Lines</h3>
<label>FT Total</label>
<input id="ftMarket" placeholder="150.5 - 160.5">
<label>Team A Total</label>
<input id="teamAMarket" placeholder="75.5 - 79.5">
<label>Team B Total</label>
<input id="teamBMarket" placeholder="75.5 - 79.5">
</div>

<div class="section">
<h3>Team A (Last 5)</h3>
<label>FT Scored</label>
<input id="aFTScored" placeholder="85,79,88,74,82">
<label>FT Allowed</label>
<input id="aFTAllowed" placeholder="76,80,72,79,77">
</div>

<div class="section">
<h3>Team B (Last 5)</h3>
<label>FT Scored</label>
<input id="bFTScored" placeholder="83,77,81,79,80">
<label>FT Allowed</label>
<input id="bFTAllowed" placeholder="78,82,74,77,80">
</div>

<div class="section">
<h3>H2H (Optional)</h3>
<label><input type="checkbox" id="useFTH2H"> Use FT H2H (min 2 games)</label>
<input id="aFTH2H" placeholder="82,78,84">
<input id="bFTH2H" placeholder="79,81,77">
</div>

<div style="text-align:center;">
<button onclick="runEngine()">Run</button>
<button onclick="clearAll()">Clear</button>
</div>

<table id="results" style="display:none;">
<tr>
<th>Pick</th>
<th>Projection</th>
<th>Edge</th>
<th>Prediction</th>
</tr>
</table>

</div>

<script>

function parseGames(id){
  let raw=document.getElementById(id).value.trim();
  if(!raw) return null;
  let arr=raw.split(",").map(x=>parseFloat(x.trim()));
  if(arr.some(x=>isNaN(x)||x<0||x>250)) return "error";
  return arr;
}

function avg(arr){
  if(!arr||arr.length===0) return NaN;
  return arr.reduce((a,b)=>a+b,0)/arr.length;
}

function stdDev(arr){
  if(!arr||arr.length<2) return 0;
  let m=avg(arr);
  let variance=arr.reduce((a,b)=>a+Math.pow(b-m,2),0)/(arr.length-1);
  return Math.sqrt(variance);
}

function mid(val){
  if(!val||!val.includes("-")) return NaN;
  let p=val.split("-").map(x=>parseFloat(x.trim()));
  if(isNaN(p[0])||isNaN(p[1])) return NaN;
  return (p[0]+p[1])/2;
}

function dynamicWeight(sample){
  if(!sample||sample.length<2) return 0;
  if(sample.length<=3) return 0.20;
  return 0.30;
}

function applyVolatility(proj,std,limit){
  if(isNaN(proj)||isNaN(std)) return NaN;
  if(std<=limit) return proj;
  let cut=Math.min(0.10,(std-limit)/limit*0.10);
  return proj*(1-cut);
}

function decision(edge,line,type,teamSc,aSc,bSc){
  if(isNaN(edge)||isNaN(line)) return "NaN";
  let threshold;
  if(type==="ft_total") threshold=edge>0?line*0.045:line*0.06;
  else threshold=edge>0?line*0.05:line*0.065;

  if(Math.abs(edge)<threshold) return "NO PLAY";

  if(edge<0){
    if(type==="ft_total"&&aSc>=line*0.58||bSc>=line*0.58) return "NO PLAY";
    if(type==="team"&&teamSc>=line*0.58) return "NO PLAY";
  }

  return edge>0?"OVER "+line.toFixed(1):"UNDER "+line.toFixed(1);
}

function runEngine(){

const table=document.getElementById("results");
table.style.display="table";
table.innerHTML="<tr><th>Pick</th><th>Projection</th><th>Edge</th><th>Prediction</th></tr>";

const league=document.getElementById("leagueSelect").value;
const leagueBase={nba:230,euro_elite:175,secondary:170,ncaa:150,africa:160,unknown:160};
const expectedBase=leagueBase[league]||160;

let ftLine=mid(ftMarket.value);
let aLine=mid(teamAMarket.value);
let bLine=mid(teamBMarket.value);

let aScArr=parseGames("aFTScored");
let aAllArr=parseGames("aFTAllowed");
let bScArr=parseGames("bFTScored");
let bAllArr=parseGames("bFTAllowed");

let aSc=avg(aScArr);
let aAll=avg(aAllArr);
let bSc=avg(bScArr);
let bAll=avg(bAllArr);

let baseA=(aSc+bAll)/2;
let baseB=(bSc+aAll)/2;

let rawTotal=((aSc+aAll)+(bSc+bAll))/2;
let pace=Math.max(0.90,Math.min(1.15,rawTotal/expectedBase));

baseA*=pace;
baseB*=pace;

if(useFTH2H.checked){
  let h2ha=parseGames("aFTH2H");
  let h2hb=parseGames("bFTH2H");
  if(h2ha&&h2hb&&h2ha.length>=2&&h2hb.length>=2){
    let w=dynamicWeight(h2ha);
    baseA=baseA*(1-w)+avg(h2ha)*w;
    baseB=baseB*(1-w)+avg(h2hb)*w;
  }
}

baseA=applyVolatility(baseA,stdDev(aScArr),12);
baseB=applyVolatility(baseB,stdDev(bScArr),12);

let ftProj=baseA+baseB;

let picks=[
{name:"FT Total",proj:ftProj,line:ftLine,type:"ft_total",teamSc:null,aSc:aSc,bSc:bSc},
{name:"Team A Total",proj:baseA,line:aLine,type:"team",teamSc:aSc,aSc:aSc,bSc:bSc},
{name:"Team B Total",proj:baseB,line:bLine,type:"team",teamSc:bSc,aSc:aSc,bSc:bSc}
];

let lockIndex=-1,maxStrength=0;

picks.forEach((p,i)=>{
let edge=p.proj-p.line;
let pickText=decision(edge,p.line,p.type,p.teamSc,p.aSc,p.bSc);
let strength=Math.abs(edge/p.line);
if(pickText!=="NO PLAY"&&strength>=0.08&&strength>maxStrength){
maxStrength=strength;
lockIndex=i;
}

let row=table.insertRow();
let pred=pickText;
if(i===lockIndex&&pickText!=="NO PLAY") pred+=` <span class="lock">🔒</span>`;

let className="pred-noplay";
if(pred.startsWith("OVER")) className="pred-over";
if(pred.startsWith("UNDER")) className="pred-under";

row.innerHTML=`
<td>${p.name}</td>
<td>${p.proj.toFixed(2)}</td>
<td>${edge.toFixed(2)}</td>
<td class="${className}">${pred}</td>`;
});
}

function clearAll(){
document.querySelectorAll("input").forEach(i=>i.value="");
document.querySelectorAll("input[type=checkbox]").forEach(i=>i.checked=false);
results.style.display="none";
}

</script>
</body>
</html>
