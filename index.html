  const res = await fetch(WORKER_URL + "?url=" + encodeURIComponent(url));

function lookupTeamId(name) {
  const n = name.toLowerCase().trim();
  // Check NBA map
  for (let key of Object.keys(NBA_TEAM_MAP)) {
    if (n === key || n.includes(key) || key.includes(n)) {
      return NBA_TEAM_MAP[key];
    }
  }
  // Check NCAA map
  for (let key of Object.keys(NCAA_TEAM_MAP)) {
    if (n === key || n.includes(key) || key.includes(n)) {
      return NCAA_TEAM_MAP[key];
    }
  }
  return null;
}

/* =============================================
   ESPN FETCH — SCOREBOARD-BASED (THE FIX)
   Uses scoreboard endpoint with date range instead
   of team schedule, which had empty scores.
   ============================================= */
async function fetchESPN() {
  const league = document.getElementById("leagueSelect").value;
  const teamAName = document.getElementById("teamAName").value.trim();
  const teamBName = document.getElementById("teamBName").value.trim();

  if (!teamAName || !teamBName) {
    setStatus("❌ Enter both team names first.", "err");
    return;
  }

  const btn = document.getElementById("fetchBtn");
  btn.disabled = true;
  setStatus('<span class="spinner"></span>Fetching from ESPN...', "loading");

  try {
    const leagueSlug = league === "ncaa" ? "mens-college-basketball" : "nba";
    const espnBase = `https://site.api.espn.com/apis/site/v2/sports/basketball/${leagueSlug}`;

    // Resolve team IDs
    let teamAId = lookupTeamId(teamAName);
    let teamBId = lookupTeamId(teamBName);

    if (!teamAId) teamAId = await searchTeamFromAPI(espnBase, teamAName);
    if (!teamBId) teamBId = await searchTeamFromAPI(espnBase, teamBName);

    if (!teamAId) throw new Error(`Can't find "${teamAName}". Try just the nickname e.g. "Warriors", "Lakers"`);
    if (!teamBId) throw new Error(`Can't find "${teamBName}". Try just the nickname e.g. "Bulls", "Celtics"`);

    setStatus('<span class="spinner"></span>Loading game stats...', "loading");

    let aStats, bStats, allGames = [];

    if (leagueSlug === "mens-college-basketball") {
      // NCAA: team schedule endpoint is the only reliable source
      [aStats, bStats] = await Promise.all([
        fetchTeamSchedule(espnBase, teamAId, leagueSlug),
        fetchTeamSchedule(espnBase, teamBId, leagueSlug)
      ]);
    } else {
      // NBA: scoreboard date range works perfectly
      allGames = await fetchRecentGamesFromScoreboard(espnBase, 60, leagueSlug);
      if (allGames.length === 0) throw new Error("No recent game data available from ESPN scoreboard.");
      aStats = extractLastFive(allGames, String(teamAId));
      bStats = extractLastFive(allGames, String(teamBId));
    }

    let messages = [];

    if (aStats && aStats.scored.length > 0) {
      document.getElementById("aFTScored").value  = aStats.scored.join(",");
      document.getElementById("aFTAllowed").value = aStats.allowed.join(",");
      document.getElementById("aAutoTag").style.display = "inline";
      messages.push(`${teamAName}: ${aStats.scored.length} games ✅`);
    } else {
      messages.push(`${teamAName}: not found ❌`);
    }

    if (bStats && bStats.scored.length > 0) {
      document.getElementById("bFTScored").value  = bStats.scored.join(",");
      document.getElementById("bFTAllowed").value = bStats.allowed.join(",");
      document.getElementById("bAutoTag").style.display = "inline";
      messages.push(`${teamBName}: ${bStats.scored.length} games ✅`);
    } else {
      messages.push(`${teamBName}: not found ❌`);
    }

    // --- H2H FETCH (2024 → today) ---
    setStatus('<span class="spinner"></span>Scanning H2H since 2024...', "loading");
    let h2hGames;
    if (leagueSlug === "mens-college-basketball") {
      h2hGames = await fetchH2HFromSchedules(espnBase, teamAId, teamBId, leagueSlug);
    } else {
      h2hGames = await fetchH2HGames(espnBase, teamAId, teamBId, leagueSlug);
    }

    if (h2hGames.length >= 2) {
      const last5h2h = h2hGames.slice(0, 5);
      const h2hA = [], h2hB = [];
      for (const g of last5h2h) {
        if (g.teamAId === String(teamAId)) {
          h2hA.push(g.scoreA);
          h2hB.push(g.scoreB);
        } else {
          h2hA.push(g.scoreB);
          h2hB.push(g.scoreA);
        }
      }
      document.getElementById("aFTH2H").value = h2hA.join(",");
      document.getElementById("bFTH2H").value = h2hB.join(",");
      document.getElementById("useFTH2H").checked = true;
      document.getElementById("h2hAutoTag").style.display = "inline";
    } else {
      document.getElementById("useFTH2H").checked = false;
    }

    const allGood = aStats && bStats && aStats.scored.length > 0 && bStats.scored.length > 0;
    if (!allGood) {
      const missing = messages.filter(m => m.includes("❌")).join(" | ");
      setStatus("⚠️ " + missing + " — Fill missing fields manually", "err");
    } else {
      setStatus("", "");
    }

  } catch(e) {
    setStatus("❌ " + e.message, "err");
  } finally {
    btn.disabled = false;
  }
}

/* =============================================
   DATE RANGE FETCHER
   Fetches all completed games between two dates
   using ESPN scoreboard endpoint.
   Parses linescores to strip OT periods.
   ============================================= */
function parseEventsFromData(data, leagueSlug) {
  const games = [];
  const events = data?.events || [];
  const regulationPeriods = (leagueSlug === "mens-college-basketball") ? 2 : 4;

  for (const ev of events) {
    const comp = ev?.competitions?.[0];
    if (!comp) continue;
    const competitors = comp?.competitors || [];
    if (competitors.length < 2) continue;
    const status = comp?.status?.type?.completed;
    if (!status) continue;

    // Always start with ESPN's official final score — this is always correct
    let scoreA = Number(competitors[0]?.score);
    let scoreB = Number(competitors[1]?.score);
    if (scoreA <= 0 || scoreB <= 0) continue;

    const linesA = competitors[0]?.linescores || [];
    const linesB = competitors[1]?.linescores || [];

    let hasOT = false;

    // Only strip OT if:
    // 1. linescores exist and have more entries than regulation
    // 2. The linescore total actually matches the final score (validates data integrity)
    if (linesA.length > regulationPeriods && linesB.length > regulationPeriods) {
      const totalA = linesA.reduce((s, p) => s + Number(p?.value || 0), 0);
      const totalB = linesB.reduce((s, p) => s + Number(p?.value || 0), 0);

      // Only trust linescores if their sum matches the final score (within 1 point rounding)
      if (Math.abs(totalA - scoreA) <= 1 && Math.abs(totalB - scoreB) <= 1) {
        let otA = 0, otB = 0;
        for (let p = regulationPeriods; p < linesA.length; p++) otA += Number(linesA[p]?.value || 0);
        for (let p = regulationPeriods; p < linesB.length; p++) otB += Number(linesB[p]?.value || 0);
        if (otA > 0 || otB > 0) {
          scoreA -= otA;
          scoreB -= otB;
          hasOT = true;
        }
      }
      // If linescore sums don't match, just use the raw final score as-is
    }

    if (scoreA <= 0 || scoreB <= 0) continue;

    games.push({
      teamAId: String(competitors[0]?.team?.id),
      teamBId: String(competitors[1]?.team?.id),
      scoreA,
      scoreB,
      date: ev?.date || "",
      hasOT
    });
  }
  return games;
}

async function fetchRecentGamesFromScoreboard(base, daysBack, leagueSlug) {
  const allGames = [];
  const today = getDateString(0);
  const from  = getDateString(daysBack);

  // NCAA needs groups=50 to get Division I games
  const extra = leagueSlug === "mens-college-basketball" ? "&groups=100&limit=365" : "&limit=500";
  const url = `${base}/scoreboard?dates=${from}-${today}${extra}`;

  try {
    const data = await proxyFetch(url);
    allGames.push(...parseEventsFromData(data, leagueSlug));
  } catch(e) {
    // Fallback: day-by-day for last 14 days
    for (let i = 1; i <= 14; i++) {
      const dateStr = getDateString(i);
      try {
        const data = await proxyFetch(`${base}/scoreboard?dates=${dateStr}${extra}`);
        allGames.push(...parseEventsFromData(data, leagueSlug));
      } catch(e2) { /* skip bad day */ }
    }
  }

  return allGames;
}

/* =============================================
   FETCH H2H GAMES — 2024-01-01 TO TODAY
   Scans in ~90-day chunks to avoid ESPN limits.
   Strips OT via linescores.
   Only keeps games where BOTH team IDs match.
   ============================================= */
async function fetchH2HGames(base, teamAId, teamBId, leagueSlug) {
  const h2hGames = [];
  const tA = String(teamAId);
  const tB = String(teamBId);

  const startDate = new Date("2024-01-01");
  const endDate   = new Date();
  const chunks = [];
  let cursor = new Date(startDate);
  while (cursor < endDate) {
    const chunkEnd = new Date(cursor);
    chunkEnd.setDate(chunkEnd.getDate() + 89);
    if (chunkEnd > endDate) chunkEnd.setTime(endDate.getTime());
    const from = cursor.toISOString().slice(0,10).replace(/-/g,"");
    const to   = chunkEnd.toISOString().slice(0,10).replace(/-/g,"");
    chunks.push({ from, to });
    cursor.setDate(cursor.getDate() + 90);
  }

  const extra = leagueSlug === "mens-college-basketball" ? "&groups=100&limit=365" : "&limit=500";

  for (const chunk of chunks) {
    try {
      const url = `${base}/scoreboard?dates=${chunk.from}-${chunk.to}${extra}`;
      const data = await proxyFetch(url);
      const games = parseEventsFromData(data, leagueSlug);
      for (const g of games) {
        const isH2H = (g.teamAId === tA && g.teamBId === tB) ||
                      (g.teamAId === tB && g.teamBId === tA);
        if (isH2H) h2hGames.push(g);
      }
    } catch(e) { /* skip failed chunk */ }
  }

  // Sort newest → oldest
  h2hGames.sort((a, b) => (a.date > b.date ? -1 : 1));
  return h2hGames;
}

/* =============================================
   NCAA: FETCH TEAM SCHEDULE DIRECTLY
   Returns last 5 completed games with OT stripped
   ============================================= */
async function fetchTeamSchedule(base, teamId, leagueSlug) {
  try {
    const url = `${base}/teams/${teamId}/schedule`;
    const data = await proxyFetch(url);
    // ESPN returns either data.events or data.team.schedule.events
    const events = data?.events || data?.team?.schedule?.events || [];

    const scored = [], allowed = [];
    const tId = String(teamId);

    // Collect all completed games, newest first
    const completed = [];
    for (const ev of events) {
      const comp = ev?.competitions?.[0];
      if (!comp) continue;
      const done = comp?.status?.type?.completed || comp?.status?.type?.name === "STATUS_FINAL";
      if (!done) continue;
      const competitors = comp?.competitors || [];
      if (competitors.length < 2) continue;
      completed.push({ ev, comp, competitors });
    }
    // Reverse so newest is first
    completed.reverse();

    for (const { comp, competitors } of completed) {
      if (scored.length >= 5) break;

      // Find our team — try id match, fallback to homeAway
      let mine = competitors.find(c => String(c.team?.id) === tId);
      let opp  = competitors.find(c => String(c.team?.id) !== tId);

      // If id match fails, use score directly from competitors[0] vs [1]
      if (!mine) {
        mine = competitors[0];
        opp  = competitors[1];
      }
      if (!mine || !opp) continue;

      let myScore  = parseFloat(mine.score);
      let oppScore = parseFloat(opp.score);
      if (isNaN(myScore) || isNaN(oppScore) || myScore <= 0 || oppScore <= 0) continue;

      // OT strip — NCAA = 2 halves regulation
      const linesMe  = mine?.linescores || [];
      const linesOpp = opp?.linescores  || [];
      if (linesMe.length > 2 && linesOpp.length > 2) {
        const sumMe  = linesMe.reduce((s, p)  => s + parseFloat(p?.value || 0), 0);
        const sumOpp = linesOpp.reduce((s, p) => s + parseFloat(p?.value || 0), 0);
        if (Math.abs(sumMe - myScore) <= 1 && Math.abs(sumOpp - oppScore) <= 1) {
          let otMe = 0, otOpp = 0;
          for (let p = 2; p < linesMe.length; p++)  otMe  += parseFloat(linesMe[p]?.value  || 0);
          for (let p = 2; p < linesOpp.length; p++) otOpp += parseFloat(linesOpp[p]?.value || 0);
          if (otMe > 0 || otOpp > 0) { myScore -= otMe; oppScore -= otOpp; }
        }
      }

      if (myScore > 0 && oppScore > 0) {
        scored.push(Math.round(myScore));
        allowed.push(Math.round(oppScore));
      }
    }

    if (scored.length < 2) return null;
    return { scored, allowed };
  } catch(e) {
    return null;
  }
}

/* =============================================
   NCAA H2H: cross-reference both team schedules
   to find games they played against each other
   since 2024
   ============================================= */
async function fetchH2HFromSchedules(base, teamAId, teamBId, leagueSlug) {
  try {
    const url = `${base}/teams/${teamAId}/schedule`;
    const data = await proxyFetch(url);
    const events = data?.events || data?.team?.schedule?.events || [];
    const h2hGames = [];
    const tA = String(teamAId);
    const tB = String(teamBId);

    for (const ev of events) {
      const dateStr = ev?.date || "";
      if (dateStr && dateStr < "2024-01-01") continue;

      const comp = ev?.competitions?.[0];
      if (!comp) continue;
      const done = comp?.status?.type?.completed || comp?.status?.type?.name === "STATUS_FINAL";
      if (!done) continue;

      const competitors = comp?.competitors || [];
      if (competitors.length < 2) continue;

      // Check if opponent is Team B — check all possible id fields
      const hasTeamB = competitors.some(c =>
        String(c.team?.id) === tB || String(c.id) === tB
      );
      if (!hasTeamB) continue;

      // Get scores — use index-based if id match fails
      const cA = competitors.find(c => String(c.team?.id) === tA) || competitors[0];
      const cB = competitors.find(c => String(c.team?.id) === tB) || competitors[1];

      let scoreA = parseFloat(cA.score);
      let scoreB = parseFloat(cB.score);
      if (isNaN(scoreA) || isNaN(scoreB) || scoreA <= 0 || scoreB <= 0) continue;

      // OT strip
      const linesA = cA?.linescores || [];
      const linesB = cB?.linescores || [];
      if (linesA.length > 2 && linesB.length > 2) {
        const sumA = linesA.reduce((s, p) => s + parseFloat(p?.value || 0), 0);
        const sumB = linesB.reduce((s, p) => s + parseFloat(p?.value || 0), 0);
        if (Math.abs(sumA - scoreA) <= 1 && Math.abs(sumB - scoreB) <= 1) {
          let otA = 0, otB = 0;
          for (let p = 2; p < linesA.length; p++) otA += parseFloat(linesA[p]?.value || 0);
          for (let p = 2; p < linesB.length; p++) otB += parseFloat(linesB[p]?.value || 0);
          if (otA > 0 || otB > 0) { scoreA -= otA; scoreB -= otB; }
        }
      }

      h2hGames.push({ teamAId: tA, teamBId: tB, scoreA: Math.round(scoreA), scoreB: Math.round(scoreB), date: dateStr, hasOT: false });
    }

    h2hGames.sort((a, b) => (a.date > b.date ? -1 : 1));
    return h2hGames;
  } catch(e) {
    return [];
  }
}

/* =============================================
   EXTRACT LAST 5 GAMES FOR A TEAM (NBA scoreboard)
   ============================================= */
function extractLastFive(games, teamId) {
  const scored = [], allowed = [];
  const sorted = [...games].sort((a, b) => (b.date > a.date ? 1 : -1));

  for (const g of sorted) {
    if (scored.length >= 5) break;
    if (g.teamAId === teamId) {
      scored.push(g.scoreA);
      allowed.push(g.scoreB);
    } else if (g.teamBId === teamId) {
      scored.push(g.scoreB);
      allowed.push(g.scoreA);
    }
  }

  if (scored.length < 2) return null;
  // Already newest-first from the sort above — keep that order
  return { scored, allowed };
}

/* =============================================
   TEAM SEARCH — multiple strategies for NCAA
   ============================================= */
async function searchTeamFromAPI(base, name) {
  const n = name.toLowerCase().trim();

  // 1) Try ESPN site search — works well for full NCAA names
  try {
    const searchUrl = `https://site.api.espn.com/apis/common/v3/search?query=${encodeURIComponent(name)}&limit=10&type=team&sport=basketball`;
    const data = await proxyFetch(searchUrl);
    const results = data?.items || data?.results || [];
    for (const r of results) {
      // ESPN search returns uid like "s:40~l:41~t:2509" — extract the t: part
      const uid = r?.uid || r?.team?.uid || "";
      const uidMatch = uid.match(/t:(\d+)/);
      if (uidMatch) return uidMatch[1];
      // Sometimes id is returned directly
      const id = r?.id || r?.team?.id;
      if (id && String(id).match(/^\d+$/)) return String(id);
    }
  } catch(e) { /* fall through */ }

  // 2) ESPN suggest/autocomplete endpoint
  try {
    const suggestUrl = `https://site.api.espn.com/apis/common/v3/typeahead?query=${encodeURIComponent(name)}&sport=basketball&limit=5`;
    const data = await proxyFetch(suggestUrl);
    const results = data?.items || [];
    for (const r of results) {
      const uid = r?.uid || "";
      const uidMatch = uid.match(/t:(\d+)/);
      if (uidMatch) return uidMatch[1];
    }
  } catch(e) { /* fall through */ }

  // 3) Team list fuzzy match
  try {
    const url = `${base}/teams?limit=500`;
    const data = await proxyFetch(url);
    const leagues = data?.sports?.[0]?.leagues || data?.leagues || [];
    let teams = [];
    if (leagues.length > 0) {
      for (const l of leagues) teams = teams.concat(l?.teams || []);
    } else {
      teams = data?.teams || [];
    }

    const words = n.split(/\s+/).filter(w => w.length >= 3);
    let best = null, bestScore = 0;

    for (let t of teams) {
      const team = t.team || t;
      const fields = [
        team.displayName, team.shortDisplayName,
        team.name, team.nickname, team.abbreviation, team.location
      ].filter(Boolean).map(f => f.toLowerCase()).join(" ");

      if (fields.includes(n)) return String(team.id);

      let score = words.filter(w => fields.includes(w)).length;
      if (team.location && n.includes(team.location.toLowerCase())) score += 2;
      if (team.nickname && n.includes(team.nickname.toLowerCase())) score += 2;
      if (score > bestScore) { bestScore = score; best = String(team.id); }
    }
    return bestScore >= 2 ? best : null;
  } catch(e) {
    return null;
  }
}

/* =============================================
   ENGINE CORE (unchanged)
   ============================================= */
function parseGames(id) {
  let raw = document.getElementById(id).value.trim();
  if (!raw) return null;
  let arr = raw.split(",").map(x => parseFloat(x.trim()));
  if (arr.some(x => isNaN(x) || x < 0 || x > 300)) return "error";
  return arr;
}

function avg(arr) {
  if (!arr || arr.length === 0) return NaN;
  return arr.reduce((a,b) => a+b, 0) / arr.length;
}

function trimmedAvg(arr) {
  if (!arr || arr.length === 0) return NaN;
  if (arr.length < 5) return avg(arr);
  let sorted = [...arr].sort((a,b) => a-b);
  sorted.shift(); sorted.pop();
  return avg(sorted);
}

function stdDev(arr) {
  if (!arr || arr.length < 2) return 0;
  let m = avg(arr);
  let variance = arr.reduce((a,b) => a + Math.pow(b-m, 2), 0) / (arr.length - 1);
  return Math.sqrt(variance);
}

function mid(val) {
  if (!val) return NaN;
  val = val.trim();
  if (!val.includes("-")) return NaN;
  let p = val.split("-").map(x => x.trim());
  let a = parseFloat(p[0]), b = parseFloat(p[1]);
  if (isNaN(a) || isNaN(b)) return NaN;
  return (a + b) / 2;
}

function displayLine(val) {
  if (isNaN(val)) return "NaN";
  return (Math.round(val * 2) / 2).toFixed(1);
}

function dynamicWeight(sample) {
  if (!sample || sample.length < 2) return 0;
  if (sample.length <= 3) return 0.20;
  return 0.30;
}

function applyVolatility(proj, std, limit) {
  if (isNaN(proj) || isNaN(std)) return NaN;
  if (std <= limit) return proj;
  const excess = std - limit;
  const maxExcess = limit;
  const reductionFactor = Math.min(1, excess / maxExcess);
  const maxCut = 0.07;
  const cut = maxCut * reductionFactor;
  return proj * (1 - cut);
}

function decision(edge, line, type, teamSc, aSc, bSc) {
  if (isNaN(edge) || isNaN(line)) return "NaN";
  let strength = Math.abs(edge / line);
  if (strength < 0.045) return "NO PLAY";

  let threshold;
  if (type === "ft_total")  threshold = edge > 0 ? line * 0.045 : line * 0.06;
  else if (type === "team") threshold = edge > 0 ? line * 0.05  : line * 0.065;
  else return "NaN";

  if (isNaN(threshold)) return "NaN";
  if (Math.abs(edge) < threshold) return "NO PLAY";

  if (edge < 0) {
    if (type === "ft_total") {
      if (!isNaN(aSc) && !isNaN(bSc) && (aSc >= line*0.58 || bSc >= line*0.58)) return "NO PLAY";
    }
    if (type === "team") {
      if (!isNaN(teamSc) && teamSc >= line*0.58) return "NO PLAY";
    }
  }

  return edge > 0 ? "OVER " + displayLine(line) : "UNDER " + displayLine(line);
}

function runEngine() {
  const table = document.getElementById("results");
  table.style.display = "table";
  table.innerHTML = "<tr><th>Pick</th><th>Projection</th><th>Edge</th><th>Prediction</th></tr>";

  const league = document.getElementById("leagueSelect").value;

  const leagueBases = {
    "nba":230,"euro_elite":175,"secondary":170,"ncaa":150,"africa":160,"unknown":160
  };
  const leaguePaceClamps = {
    "nba":       {min:0.90,max:1.15},
    "euro_elite":{min:0.92,max:1.10},
    "secondary": {min:0.92,max:1.10},
    "ncaa":      {min:0.90,max:1.12},
    "africa":    {min:0.90,max:1.12},
    "unknown":   {min:0.90,max:1.12}
  };

  let expectedBase = leagueBases[league] || 160;
  const clamps = leaguePaceClamps[league] || {min:0.90,max:1.12};

  let ftLine = mid(document.getElementById("ftMarket").value);
  let aLine  = mid(document.getElementById("teamAMarket").value);
  let bLine  = mid(document.getElementById("teamBMarket").value);

  let aFTScArr  = parseGames("aFTScored");
  let aFTAllArr = parseGames("aFTAllowed");
  let bFTScArr  = parseGames("bFTScored");
  let bFTAllArr = parseGames("bFTAllowed");

  let aFTSc  = (aFTScArr  === "error" || aFTScArr  === null) ? NaN : trimmedAvg(aFTScArr);
  let aFTAll = (aFTAllArr === "error" || aFTAllArr === null) ? NaN : trimmedAvg(aFTAllArr);
  let bFTSc  = (bFTScArr  === "error" || bFTScArr  === null) ? NaN : trimmedAvg(bFTScArr);
  let bFTAll = (bFTAllArr === "error" || bFTAllArr === null) ? NaN : trimmedAvg(bFTAllArr);

  let fullModelActive = !isNaN(aFTSc) && !isNaN(aFTAll) && !isNaN(bFTSc) && !isNaN(bFTAll);

  let baseAFT = NaN, baseBFT = NaN;
  if (!isNaN(aFTSc) && !isNaN(bFTAll)) baseAFT = (aFTSc + bFTAll) / 2;
  else if (!isNaN(aFTSc)) baseAFT = aFTSc;
  if (!isNaN(bFTSc) && !isNaN(aFTAll)) baseBFT = (bFTSc + aFTAll) / 2;
  else if (!isNaN(bFTSc)) baseBFT = bFTSc;

  let teamAPace = (!isNaN(aFTSc) && !isNaN(aFTAll)) ? (aFTSc + aFTAll) / 2 : NaN;
  let teamBPace = (!isNaN(bFTSc) && !isNaN(bFTAll)) ? (bFTSc + bFTAll) / 2 : NaN;

  let paceGapRisk = false;
  if (!isNaN(teamAPace) && !isNaN(teamBPace)) {
    let paceGap = Math.abs(teamAPace - teamBPace);
    let paceGapLimit = expectedBase * 0.10;
    if (paceGap > paceGapLimit) paceGapRisk = true;
  }

  let rawPace = NaN;
  if (!isNaN(teamAPace) && !isNaN(teamBPace)) rawPace = (teamAPace + teamBPace) / 2;
  else if (!isNaN(teamAPace)) rawPace = teamAPace;
  else if (!isNaN(teamBPace)) rawPace = teamBPace;

  let pace = 1;
  if (!isNaN(rawPace) && expectedBase !== 0 && !isNaN(expectedBase)) {
    pace = rawPace / expectedBase;
    pace = Math.max(clamps.min, Math.min(clamps.max, pace));
  }

  let ftH2Ha = null, ftH2Hb = null;
  if (document.getElementById("useFTH2H").checked) {
    ftH2Ha = parseGames("aFTH2H");
    ftH2Hb = parseGames("bFTH2H");
  }

  if (fullModelActive && ftH2Ha && ftH2Hb &&
      ftH2Ha !== "error" && ftH2Hb !== "error" &&
      ftH2Ha.length >= 2 && ftH2Hb.length >= 2) {
    let wA = dynamicWeight(ftH2Ha);
    let wB = dynamicWeight(ftH2Hb);
    let totalH2HWeight = Math.min(0.30, wA + wB);
    let baseTotal = baseAFT + baseBFT;
    let h2hTotal  = avg(ftH2Ha) + avg(ftH2Hb);
    if (!isNaN(baseTotal) && !isNaN(h2hTotal) && baseTotal > 0) {
      if (Math.abs(h2hTotal - baseTotal) / baseTotal > 0.20) totalH2HWeight *= 0.5;
      let blendedTotal = baseTotal * (1 - totalH2HWeight) + h2hTotal * totalH2HWeight;
      let ratio = blendedTotal / baseTotal;
      baseAFT *= ratio;
      baseBFT *= ratio;
    }
  }

  let aVol = (stdDev(aFTScArr === "error" ? [] : aFTScArr) + stdDev(aFTAllArr === "error" ? [] : aFTAllArr)) / 2;
  let bVol = (stdDev(bFTScArr === "error" ? [] : bFTScArr) + stdDev(bFTAllArr === "error" ? [] : bFTAllArr)) / 2;

  let defensiveFloorRisk = false;
  let defensiveFloorLimit = expectedBase * 0.40;
  if ((!isNaN(aFTAll) && aFTAll < defensiveFloorLimit) ||
      (!isNaN(bFTAll) && bFTAll < defensiveFloorLimit)) {
    defensiveFloorRisk = true;
  }

  let volatilityLimits = {
    "nba":14,"euro_elite":12,"secondary":12,"ncaa":11,"africa":11,"unknown":12
  };
  let volLimit = volatilityLimits[league] || 12;

  baseAFT = applyVolatility(baseAFT, aVol, volLimit);
  baseBFT = applyVolatility(baseBFT, bVol, volLimit);

  let leagueTeamAvg = expectedBase / 2;
  baseAFT = (baseAFT * 0.85) + (leagueTeamAvg * 0.15);
  baseBFT = (baseBFT * 0.85) + (leagueTeamAvg * 0.15);

  baseAFT = baseAFT * (0.5 + pace/2);
  baseBFT = baseBFT * (0.5 + pace/2);

  let ftProj = NaN;
  if (!isNaN(baseAFT) && !isNaN(baseBFT)) ftProj = baseAFT + baseBFT;

  let projDiff = (!isNaN(baseAFT) && !isNaN(baseBFT)) ? Math.abs(baseAFT - baseBFT) : NaN;
  if (!isNaN(projDiff) && projDiff > 18) ftProj = ftProj * 0.98;
  if (paceGapRisk) ftProj = ftProj * 0.97;

  if (!isNaN(ftProj) && !isNaN(ftLine)) {
    if (Math.abs(ftProj - ftLine) > 25) ftProj = ftLine + (ftProj - ftLine) * 0.5;
  }

  if (league === "nba" && !isNaN(ftProj) && !isNaN(ftLine)) {
    if (Math.abs(ftProj - ftLine) > 18) ftProj = ftLine + (ftProj - ftLine) * 0.65;
  }

  let picks = [
    {name:"FT Total",     proj:ftProj,  line:ftLine, type:"ft_total", teamSc:null,  aSc:aFTSc, bSc:bFTSc},
    {name:"Team A Total", proj:baseAFT, line:aLine,  type:"team",     teamSc:aFTSc, aSc:aFTSc, bSc:bFTSc},
    {name:"Team B Total", proj:baseBFT, line:bLine,  type:"team",     teamSc:bFTSc, aSc:aFTSc, bSc:bFTSc}
  ];

  let lockIndex = -1, maxStrength = 0;

  picks.forEach((p, i) => {
    if (isNaN(p.line) || isNaN(p.proj)) return;
    let edge = p.proj - p.line;
    let strength = (p.line !== 0 && !isNaN(p.line)) ? Math.abs(edge / p.line) : 0;
    let pickText = decision(edge, p.line, p.type, p.teamSc, p.aSc, p.bSc);
    if (fullModelActive && pickText !== "NO PLAY" && pickText !== "NaN" &&
        strength >= 0.045 && strength > maxStrength) {
      maxStrength = strength;
      lockIndex = i;
    }
  });

  picks.forEach((p, i) => {
    let edge = NaN, pickText = "NaN", displayNote = "";

    if (isNaN(p.line)) {
      displayNote = "Missing / Invalid Line"; pickText = "—";
    } else if (isNaN(p.proj)) {
      displayNote = "Missing / Invalid Last-5 Data"; pickText = "—";
    } else {
      edge = p.proj - p.line;
      pickText = decision(edge, p.line, p.type, p.teamSc, p.aSc, p.bSc);

      let trapThreshold = p.line * 0.025;
      if (Math.abs(edge) < trapThreshold) pickText = "NO PLAY";

      if (p.type === "ft_total" && pickText.startsWith("OVER")) {
        if (paceGapRisk) pickText = "NO PLAY";
        if (defensiveFloorRisk) pickText = "NO PLAY";
        let blowoutGap = Math.abs(baseAFT - baseBFT);
        if (blowoutGap > 20) pickText = "NO PLAY";
        if (aVol > volLimit && bVol > volLimit) pickText = "NO PLAY";
      }
    }

    let row = table.insertRow();
    let pred = pickText;
    if (i === lockIndex && pickText !== "NO PLAY" && pickText !== "NaN") {
      pred += ` <span class="lock">🔒</span>`;
    }

    let projDisplay = isNaN(p.proj) ? "NaN" : p.proj.toFixed(2);
    let edgeDisplay = isNaN(edge)   ? "NaN" : edge.toFixed(2);

    let className = "pred-noplay";
    if (pred.startsWith("OVER"))  className = "pred-over";
    else if (pred.startsWith("UNDER")) className = "pred-under";

    row.innerHTML = `
      <td>${p.name}</td>
      <td>${projDisplay}</td>
      <td>${edgeDisplay}</td>
      <td class="${className}">
        ${pred}
        ${displayNote ? `<br><small class="error-note">${displayNote}</small>` : ""}
      </td>`;
  });
}

function clearAll() {
  document.querySelectorAll("input").forEach(i => {
    if (i.type !== "checkbox") i.value = "";
    else i.checked = false;
  });
